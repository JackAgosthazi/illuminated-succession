 Thomas Mowbray","date":"1398-09-16","endDate":null,"precision":"day","category":"dynastic","actors":["richard-ii","henry-iv"],"place":"Gosford Green, Coventry","significance":3,"summary":"At Coventry on 16 September 1398, Richard II halted a scheduled trial by combat between Henry Bolingbroke, Duke of Hereford, and Thomas Mowbray, Duke of Norfolk, arising from Bolingbroke's accusation that Mowbray had spoken treasonously. Instead of letting the duel proceed, Richard banished both men: Mowbray for life, and Bolingbroke for ten years, later reduced to six out of stated sympathy for Bolingbroke's aging father, John of Gaunt.","citations":[{"url":"https://en.wikipedia.org/wiki/Thomas_de_Mowbray,_1st_Duke_of_Norfolk","title":"Thomas de Mowbray, 1st Duke of Norfolk - Wikipedia","publisher":"Wikipedia","quote":"Instead of fighting, the two men were exiled: Mowbray for life, Bolingbroke for 10 years."},{"url":"https://en.wikipedia.org/wiki/Henry_IV_of_England","title":"Henry IV of England - Wikipedia","publisher":"Wikipedia","quote":"Richard decided to banish Henry from the kingdom (with the approval of Henry's father, John of Gaunt), although it is unknown where he spent his exile, to avoid further bloodshed."}],"uncertain":null},{"id":"evt-1399-gaunt-death-inheritance","title":"Death of John of Gaunt and seizure of the Lancastrian inheritance","date":"1399-02-03","endDate":null,"precision":"day","category":"dynastic","actors":["john-of-gaunt","richard-ii","henry-iv"],"place":"Leicester Castle","significance":4,"summary":"John of Gaunt, Duke of Lancaster, died of natural causes at Leicester Castle on 3 February 1399. Rather than allowing the exiled Henry Bolingbroke to inherit his father's vast Lancastrian estates and titles, Richard II declared them forfeit to the Crown and extended Bolingbroke's exile to life, a confiscation that stripped Bolingbroke of his inheritance and alienated many of the Lancastrian affinity.","citations":[{"url":"https://en.wikipedia.org/wiki/John_of_Gaunt","title":"John of Gaunt - Wikipedia","publisher":"Wikipedia","quote":"John of Gaunt died of natural causes on 3 February 1399 at Leicester Castle, with his third wife Katherine by his side."},{"url":"https://en.wikipedia.org/wiki/John_of_Gaunt","title":"John of Gaunt - Wikipedia","publisher":"Wikipedia","quote":"Following Gaunt's death in 1399, the Lancastrian estates and titles were declared forfeit to the Crown"},{"url":"https://en.wikipedia.org/wiki/Richard_II_of_England","title":"Richard II of England - Wikipedia","publisher":"Wikipedia","quote":"Richard extended the term of his exile to life and expropriated his properties."}],"uncertain":null},{"id":"evt-1399-henry-iv-usurpation","title":"Bolingbroke's return, Richard II's deposition, and Henry IV's accession","date":"1399-06","endDate":"1399-10-13","precision":"range","category":"succession","actors":["richard-ii","henry-iv"],"place":"Ravenspurn to Westminster, England","significance":5,"summary":"While Richard II was on his second expedition to Ireland, the disinherited Henry Bolingbroke landed at Ravenspurn in Yorkshire, insisting his only aim was to recover his own patrimony; he rapidly gathered support from northern magnates and others alienated by Richard's rule. Richard returned too late to save his throne, and on 30 September 1399 he was deposed by an assembly that recorded him as having 'absolved his lieges and made renunciation and cession' of the crown, which Bolingbroke then claimed as his own right; he was crowned Henry IV at Westminster Abbey on 13 October 1399, founding the Lancastrian dynasty.","citations":[{"url":"https://en.wikipedia.org/wiki/Richard_II_of_England","title":"Richard II of England - Wikipedia","publisher":"Wikipedia","quote":"Bolingbroke landed at Ravenspurn in Yorkshire towards the end of June 1399... Insisting that his only object was to regain his own patrimony, Bolingbroke received the support of both of the preeminent northern magnates."},{"url":"https://www.medievalists.net/2014/12/usurpation-henry-iv-quest-legitimacy-english-throne/","title":"The Usurpation of Henry IV: His Quest for Legitimacy on the English Throne","publisher":"Medievalists.net","quote":"Richard is said to have read out his own deposition and 'absolved his lieges and made renunciation and cession'... Henry 'seeing the throne to be vacant,' did take upon himself the crown as by his right"}],"uncertain":"Chroniclers differ on the exact date of Bolingbroke's landing at Ravenspurn: some accounts place it towards the end of June 1399, others give 4 July 1399."},{"id":"evt-1400-epiphany-rising","title":"The Epiphany Rising","date":"1400-01-06","endDate":"1400-01-16","precision":"range","category":"rebellion","actors":["henry-iv","richard-ii","edward-norwich"],"place":"Windsor and Cirencester, England","significance":3,"summary":"A group of earls loyal to the deposed Richard II — including the earls of Salisbury, Kent, and Huntingdon, and Lord Despenser — conspired to seize and kill the newly crowned Henry IV during festivities at Windsor Castle for Epiphany (6 January 1400) and restore Richard to the throne. Forewarned, Henry escaped Windsor and raised forces; the rebels fled westward, where they were captured and summarily beheaded by local crowds and authorities between 7 and 16 January 1400. The rising convinced Henry that Richard, alive, remained a dangerous rallying point for his enemies.","citations":[{"url":"https://en.wikipedia.org/wiki/Epiphany_Rising","title":"Epiphany Rising - Wikipedia","publisher":"Wikipedia","quote":"They hoped to seize the king during a tournament, kill him, and restore Richard II to the throne."},{"url":"https://murreyandblue.wordpress.com/2017/01/06/the-epiphany-plot-of-1400/","title":"The Epiphany Plot of 1400","publisher":"murreyandblue (WordPress)","quote":"when the townsfolk of Cirencester grasped the measure of the damage done to their town by the fire, they dragged the two lords out again, and summarily executed them."}],"uncertain":"Whether Edward of Norwich, Earl of Rutland, actually betrayed the plot to Henry IV in advance is disputed among contemporary chroniclers."},{"id":"evt-1400-richard-ii-death","title":"Death of Richard II at Pontefract Castle","date":"1400-02-14","endDate":null,"precision":"day","category":"dynastic","actors":["richard-ii","henry-iv"],"place":"Pontefract Castle, Yorkshire","significance":4,"summary":"Richard II, deposed the previous autumn, died in captivity at Pontefract Castle on or around 14 February 1400. The Lancastrian government's account held that he starved himself to death in despair; other chroniclers held he was deliberately starved by his captors, while a French tradition, now discounted, claimed he was violently killed.","citations":[{"url":"https://www.unofficialroyalty.com/death-of-richard-ii-king-of-england-1400/","title":"Death of Richard II, King of England (1400)","publisher":"Unofficial Royalty","quote":"Richard is thought to have starved to death and died on or around February 14, 1400."},{"url":"https://en.wikipedia.org/wiki/Pontefract_Castle","title":"Pontefract Castle - Wikipedia","publisher":"Wikipedia","quote":"Various chroniclers suggest that Richard was starved to death by his captors, and others suggest he starved himself. A contemporary French chronicler suggested that Richard II had been hacked to death, but this is... 'fictitious'."}],"uncertain":"The manner of Richard II's death is not settled: contemporary and modern sources disagree on whether he starved himself, was deliberately starved by his gaolers, or (per a since-discredited French account) was violently killed. This entry does not adopt one version."},{"id":"evt-1400-glyndwr-rising","title":"Glyndŵr Rising begins","date":"1400-09-16","endDate":"1400-09-18","precision":"range","category":"rebellion","actors":["henry-iv"],"place":"Sycharth and Ruthin, Wales","significance":4,"summary":"On 16 September 1400 Owain Glyndŵr was proclaimed Prince of Wales by a small band of followers at Sycharth, and two days later his men attacked the town of Ruthin and the castle of his rival Reginald de Grey, opening a rebellion against Henry IV's rule in Wales that would last for over a decade.","citations":[{"url":"https://en.wikipedia.org/wiki/Glynd%C5%B5r_rebellion","title":"Glyndŵr rebellion - Wikipedia","publisher":"Wikipedia","quote":"On 16 September 1400, Owain acted, and was proclaimed Prince of Wales by a small band of followers who included his eldest son, his brothers-in-law, and the Dean of St Asaph"},{"url":"https://en.wikipedia.org/wiki/Owain_Glynd%C5%B5r","title":"Owain Glyndŵr - Wikipedia","publisher":"Wikipedia","quote":"Owain was immediately proclaimed Prince of Wales by his followers and subsequently launched an assault on Lord Grey's territories, burning Ruthin."}],"uncertain":"Glyndŵr's ultimate fate is unknown: per this source he disappears from the historical record around 1412 and was never captured; later Welsh tradition offers competing, unverified accounts of his death."},{"id":"evt-1401-de-heretico-comburendo","title":"De heretico comburendo","date":"1401","endDate":null,"precision":"year","category":"law","actors":["henry-iv"],"place":"England","significance":4,"summary":"In 1401 Henry IV's parliament passed De heretico comburendo, the first English statute explicitly authorising the burning of convicted heretics who refused to recant or relapsed after abjuration, aimed at suppressing the Lollard followers of John Wycliffe. William Sawtrey was burned that March, the first person executed under English statute law for heresy.","citations":[{"url":"https://en.wikipedia.org/wiki/De_heretico_comburendo","title":"De heretico comburendo - Wikipedia","publisher":"Wikipedia","quote":"De heretico comburendo or the Suppression of Heresy Act 1400 (2 Hen. 4. c. 15) was an act of the Parliament of England passed under King Henry IV of England in 1401... for the suppression of the Lollards"},{"url":"https://www.umsl.edu/~gradyf/medieval/dhc.htm","title":"De Hæretico Comburendo (1401)","publisher":"University of Missouri-St. Louis","quote":"them before the people in an high place cause to be burnt, that such punishment may strike fear into the minds of others"}],"uncertain":null},{"id":"evt-1402-homildon-hill","title":"Battle of Homildon Hill","date":"1402-09-14","endDate":null,"precision":"day","category":"battle","actors":[],"place":"Homildon Hill, Northumberland","significance":3,"summary":"On 14 September 1402 an English force under Henry Percy, Earl of Northumberland, and his son Henry 'Hotspur' Percy destroyed a Scottish raiding army under Archibald, Earl of Douglas, at Homildon Hill in Northumberland, inflicting heavy losses and capturing Douglas along with many other Scottish nobles. Henry IV's subsequent demand that the Percies surrender their prisoners and ransoms, rather than profit from them, fed the grievances that drove the family into rebellion the following year.","citations":[{"url":"https://en.wikipedia.org/wiki/Battle_of_Homildon_Hill","title":"Battle of Homildon Hill - Wikipedia","publisher":"Wikipedia","quote":"14 September 1402"},{"url":"https://www.britishbattles.com/one-hundred-years-war/battle-of-homildon-hill/","title":"Battle of Homildon Hill","publisher":"British Battles","quote":"A decisive victory for the English... it ended the threat from Scotland to the north of England for a generation."}],"uncertain":null},{"id":"evt-1403-shrewsbury","title":"Battle of Shrewsbury","date":"1403-07-21","endDate":null,"precision":"day","category":"battle","actors":["henry-iv","henry-v"],"place":"Shrewsbury, Shropshire","significance":4,"summary":"On 21 July 1403 Henry IV's royal army met a rebel force led by Henry 'Hotspur' Percy at Shrewsbury, in the first battle on English soil where massed longbowmen faced each other. Hotspur was killed by an arrow, apparently after opening his visor, and the rebel line collapsed once news of his death spread. The king's sixteen-year-old son and heir, Prince Henry (later Henry V), fought in the battle and was struck in the face by an arrow that penetrated six inches deep, a wound he survived. The victory ended the Percy challenge to Henry IV's throne.","citations":[{"url":"https://en.wikipedia.org/wiki/Battle_of_Shrewsbury","title":"Battle of Shrewsbury - Wikipedia","publisher":"Wikipedia","quote":"At around the same time Hotspur was killed by an arrow. When the news of Hotspurs death spread through the rebel ranks the whole enemy line collapsed"},{"url":"https://en.wikipedia.org/wiki/Battle_of_Shrewsbury","title":"Battle of Shrewsbury - Wikipedia","publisher":"Wikipedia","quote":"the Prince was hit by an arrow in the face, six inches deep"},{"url":"https://www.historic-uk.com/HistoryUK/HistoryofEngland/The-Battle-of-Shrewsbury/","title":"The Battle of Shrewsbury, 1403","publisher":"Historic UK","quote":"Hotspur was killed, apparently shot in the face when he opened his visor."}],"uncertain":null},{"id":"evt-1405-tripartite-indenture","title":"Tripartite Indenture","date":"1405-02","endDate":null,"precision":"month","category":"treaty","actors":[],"place":null,"significance":3,"summary":"In February 1405 the Welsh rebel leader Owain Glyndŵr, Sir Edmund Mortimer (uncle of the young Edmund Mortimer, 5th Earl of March, and brother-in-law of Henry 'Hotspur' Percy), and Henry Percy, 1st Earl of Northumberland agreed to a threefold partition of England and Wales at Henry IV's expense, Mortimer taking most of the south. The scheme was never realised: Percy was killed at Bramham Moor in 1408, Mortimer died at the siege of Harlech in 1409, and Glyndŵr's revolt was eventually broken.","citations":[{"url":"https://en.wikipedia.org/wiki/Tripartite_Indenture","title":"Tripartite Indenture","publisher":"Wikipedia","quote":"The Tripartite Indenture was an agreement made between Owain Glyndŵr, Edmund Mortimer, and Henry Percy, 1st Earl of Northumberland in February 1405"},{"url":"https://en.wikisource.org/wiki/1911_Encyclop%C3%A6dia_Britannica/Glendower,_Owen","title":"1911 Encyclopædia Britannica/Glendower, Owen","publisher":"Encyclopædia Britannica (1911), via Wikisource","quote":"the tripartite alliance of Owen with Percy and Mortimer (transferred by Shakespeare to an earlier occasion)"},{"url":"https://en.wikipedia.org/wiki/Edmund_Mortimer_(rebel)","title":"Edmund Mortimer (rebel)","publisher":"Wikipedia","quote":"In February 1405, Glyndŵr, Mortimer, and Northumberland entered into the Tripartite Indenture, which proposed a threefold division of the kingdom. Mortimer was to have most of the south of England."}],"uncertain":"The sources cited here establish only the month, February 1405; the precise day and the signing location are not established by them. The 'Edmund Mortimer' party to the indenture was Sir Edmund Mortimer, a distinct person from Edmund Mortimer, 5th Earl of March, who carries the edmund-mortimer id elsewhere in this dataset; no person id is asserted as an actor here to avoid conflating the two."},{"id":"evt-1405-scrope-execution","title":"Execution of Archbishop Richard Scrope","date":"1405-06-08","endDate":null,"precision":"day","category":"rebellion","actors":["henry-iv"],"place":"Clementhorpe, York","significance":4,"summary":"Richard Scrope, Archbishop of York, joined the Percy rising against Henry IV in 1405. Deceived into disbanding his force on Shipton Moor, he was arrested and, denied trial by jury, condemned for treason by a special commission after the chief justice refused to take part. He was beheaded alongside Thomas Mowbray, Earl of Norfolk, on 8 June 1405 — the first execution of an English archbishop — and was widely venerated afterward as a martyr.","citations":[{"url":"https://en.wikisource.org/wiki/1911_Encyclop%C3%A6dia_Britannica/Scrope","title":"1911 Encyclopædia Britannica/Scrope","publisher":"Encyclopædia Britannica (1911), via Wikisource","quote":"Richard Le Scrope (c. 1350–1405), archbishop of York, who took part with the Percies in opposition to Henry IV., and was beheaded for treason in June 1405."},{"url":"https://en.wikipedia.org/wiki/Richard_Scrope_(bishop)","title":"Richard Scrope (bishop)","publisher":"Wikipedia","quote":"The king denied the rebel leaders trial by jury, and a commission headed by the Earl of Arundel and Sir Thomas Beaufort sat in judgment… before a great crowd were beheaded on 8 June 1405."}],"uncertain":null},{"id":"evt-1406-long-parliament","title":"The Long Parliament","date":"1406-03","endDate":"1406-12","precision":"month","category":"law","actors":["henry-iv"],"place":"Westminster","significance":3,"summary":"Sitting from March to December 1406 with long recesses, this was the longest English parliament to that date, running about 23 weeks against a typical two or three. The Commons withheld new taxation over the king's finances, his household spending and the failures in Wales, and only granted revenue in exchange for Henry IV's unprecedented agreement to rely more heavily on his council. It is regarded as a step toward constraining royal authority through parliamentary consent.","citations":[{"url":"https://etd.ohiolink.edu/acprod/odb_etd/ws/send_file/send?accession=muhonors1111087536&disposition=inline","title":"Dispute between the \"Usurper\" and his Commons: The Long Parliament of 1406","publisher":"Miami University Honors Thesis (OhioLINK ETD)","quote":"This parliament lasted from March 22 until December 22… It owed its length to the dispute between members of the Commons and the king over the granting of taxation."},{"url":"https://etd.ohiolink.edu/acprod/odb_etd/ws/send_file/send?accession=muhonors1111087536&disposition=inline","title":"Dispute between the \"Usurper\" and his Commons: The Long Parliament of 1406","publisher":"Miami University Honors Thesis (OhioLINK ETD)","quote":"The session lasted until the Commons granted additional revenue to the king in exchange for his agreement to rely more on his council for advice. The concessions made by the king were unique because they were unprecedented."},{"url":"https://www.worldhistory.org/Henry_IV_of_England/","title":"Henry IV of England","publisher":"World History Encyclopedia","quote":"Parliament insisted that, at the very least, the king must listen to its concerns before endorsing a new round of taxes. Thus, the 'Long Parliament' was another small step on the long road to a constitutional monarchy."}],"uncertain":"The honors thesis cited here gives the sitting as 22 March to 22 December 1406, but no higher-tier source was reachable to confirm the exact days, so precision is held at month. The Parliament Rolls of Medieval England material on British History Online, which would settle this, is paywalled."},{"id":"evt-1413-henry-v-accession","title":"Accession of Henry V","date":"1413-03-20","endDate":"1413-04-09","precision":"day","category":"succession","actors":["henry-iv","henry-v"],"place":"Westminster","significance":4,"summary":"Henry IV died at Westminster on 20 March 1413 and his son acceded as Henry V at the age of twenty-six. Given the still-insecure Lancastrian claim, the coronation was deliberately held soon after, on 9 April 1413 at Westminster Abbey, and is remembered for its violent weather.","citations":[{"url":"https://en.wikipedia.org/wiki/Henry_V_of_England","title":"Henry V of England","publisher":"Wikipedia","quote":"Henry acceded to the throne after his father Henry IV's death on 20 March 1413; the new king was twenty-six years old."},{"url":"https://historyofparliament.com/2023/05/09/coronation-of-king-henry-v/","title":"Beast from the East or Song of Solomon? The Coronation of King Henry V, 9 April 1413","publisher":"The History of Parliament","quote":"King Henry IV had died in the third week of March, and in view of the as yet shaky claim of the Lancastrian dynasty, it was decided to hold the coronation sooner, rather than later, on 9 April."}],"uncertain":null},{"id":"evt-1414-oldcastle-revolt","title":"Oldcastle's Lollard Revolt","date":"1414-01-09","endDate":"1414-01-10","precision":"day","category":"rebellion","actors":["henry-v"],"place":"St Giles's Fields, London","significance":3,"summary":"Sir John Oldcastle, a Lollard knight and former associate of Henry V, escaped the Tower after conviction for heresy and plotted to seize the king and his brothers during a Twelfth-night entertainment at Eltham. Forewarned, Henry gathered troops and easily dispersed the Lollards who assembled at St Giles's Fields on the night of 9–10 January 1414. Most captured participants were hanged or burned; Oldcastle himself evaded capture until 1417.","citations":[{"url":"https://en.wikisource.org/wiki/1911_Encyclop%C3%A6dia_Britannica/Oldcastle,_Sir_John","title":"1911 Encyclopædia Britannica/Oldcastle, Sir John","publisher":"Encyclopædia Britannica (1911), via Wikisource","quote":"The design was to seize the king and his brothers during a Twelfth-night mumming at Eltham, and perhaps, as was alleged, to establish some sort of commonwealth… When the Lollards assembled in force in St Giles's Fields on the 10th of January they were easily dispersed."},{"url":"https://en.wikipedia.org/wiki/Oldcastle_Revolt","title":"Oldcastle Revolt","publisher":"Wikipedia","quote":"On the night of 9/10 January 1414, Henry gathered his troops at St. John's Priory, Clerkenwell, while sending patrols that would prevent insurgent reinforcements from reaching their main camp."}],"uncertain":"Sources differ slightly on the assembly date: Wikipedia gives the night of 9/10 January 1414 while the 1911 Encyclopædia Britannica says the Lollards assembled on 10 January; the span given here covers both."},{"id":"evt-1415-southampton-plot","title":"The Southampton Plot","date":"1415-07-31","endDate":"1415-08-05","precision":"range","category":"rebellion","actors":["henry-v","richard-conisburgh","edmund-mortimer"],"place":"Southampton","significance":3,"summary":"On the eve of Henry V's departure for France, a conspiracy came to light at Southampton in which Richard, Earl of Cambridge, Henry, Lord Scrope of Masham, and Sir Thomas Grey plotted to depose the king and place Edmund Mortimer, Earl of March — whose descent gave him a rival claim to the throne — in his place. Mortimer himself revealed the plot to Henry on 31 July 1415; Grey was beheaded on 2 August and Cambridge and Scrope on 5 August, all before the Bargate at Southampton, clearing the way for the king's invasion fleet to sail.","citations":[{"url":"https://en.wikipedia.org/wiki/Southampton_Plot","title":"Southampton Plot - Wikipedia","publisher":"Wikipedia","quote":"The three ringleaders of the plot were Edmund Mortimer's brother-in-law, Richard of Conisburgh, 3rd Earl of Cambridge; Henry Scrope, 3rd Baron Scrope of Masham; and Sir Thomas Grey."},{"url":"https://en.wikipedia.org/wiki/Southampton_Plot","title":"Southampton Plot - Wikipedia","publisher":"Wikipedia","quote":"Grey was beheaded on 2 August and the two peers on 5 August, both in front of the Bargate."}],"uncertain":"Some historians (e.g. Pugh) argue that the charge the plotters intended to assassinate Henry V and his brothers was fabricated to secure a capital conviction, rather than an accurate account of the conspiracy's aims."},{"id":"evt-1415-harfleur","title":"Siege of Harfleur","date":"1415-08-18","endDate":"1415-09-22","precision":"range","category":"battle","actors":["henry-v"],"place":"Harfleur, Normandy","significance":4,"summary":"From 18 August to 22 September 1415 Henry V's army besieged the Norman port of Harfleur, using gunpowder artillery in the first English siege of a large fortified town to rely significantly on it. The town yielded to the English on 22 September after a costly siege that reduced Henry's army through casualties and dysentery, but secured a base for the campaign that ended at Agincourt the following month.","citations":[{"url":"https://en.wikipedia.org/wiki/Siege_of_Harfleur","title":"Siege of Harfleur - Wikipedia","publisher":"Wikipedia","quote":"18 August – 22 September 1415... Harfleur yielded to the invaders on 22 September."},{"url":"https://www.britishbattles.com/one-hundred-years-war/siege-of-harfleur/","title":"Siege of Harfleur","publisher":"British Battles","quote":"The French garrison of Harfleur surrendered to the besieging English army."}],"uncertain":null},{"id":"evt-1415-agincourt","title":"Battle of Agincourt","date":"1415-10-25","endDate":null,"precision":"day","category":"battle","actors":["henry-v","edward-norwich","humphrey-lancaster-gloucester"],"place":"Azincourt, Picardy, France","significance":5,"summary":"On 25 October 1415, Saint Crispin's Day, Henry V's army, marching for Calais after the siege of Harfleur, destroyed a much larger French force near the village of Azincourt in Picardy. Densely packed French men-at-arms were cut down by English and Welsh longbowmen and dismounted knights; Edward, Duke of York, commanding the English right wing, became the highest-ranking English casualty, while the king's youngest brother, Humphrey, Duke of Gloucester, was wounded and sheltered by Henry himself in the fighting. The victory became the defining triumph of Henry's reign and of English arms in the Hundred Years' War.","citations":[{"url":"https://en.wikipedia.org/wiki/Battle_of_Agincourt","title":"Battle of Agincourt - Wikipedia","publisher":"Wikipedia","quote":"It took place on 25 October 1415 (Saint Crispin's Day) near Azincourt, in northern France."},{"url":"https://en.wikipedia.org/wiki/Battle_of_Agincourt","title":"Battle of Agincourt - Wikipedia","publisher":"Wikipedia","quote":"record evidence identifies at least 112 Englishmen killed in the fighting... around 6,000 of their fighting men were killed"},{"url":"https://www.britishbattles.com/one-hundred-years-war/battle-of-agincourt/","title":"Battle of Agincourt","publisher":"British Battles","quote":"Estimates of the size of the French army vary widely, from 30,000 to as high as 100,000."},{"url":"https://en.wikipedia.org/wiki/Edward,_2nd_Duke_of_York","title":"Edward, 2nd Duke of York - Wikipedia","publisher":"Wikipedia","quote":"He commanded the right wing at the Battle of Agincourt on 25 October 1415, during which he became the highest-ranking English casualty."},{"url":"https://en.wikipedia.org/wiki/Humphrey_of_Gloucester","title":"Humphrey, Duke of Gloucester - Wikipedia","publisher":"Wikipedia","quote":"During the Battle of Agincourt Humphrey was wounded; as he fell, the king sheltered him and withstood a determined assault from French knights."}],"uncertain":"Army sizes and casualties at Agincourt are heavily disputed across sources: French troop estimates range from roughly 12,000 in the most conservative modern analyses up to 30,000-100,000 in other accounts, and English estimates range from about 6,000 to 9,000; French dead are variously put between about 6,000 and 8,000-plus, English dead between just over 100 and several hundred. This entry does not adopt a single figure."},{"id":"evt-1420-treaty-troyes","title":"Treaty of Troyes","date":"1420-05-21","endDate":null,"precision":"day","category":"treaty","actors":["henry-v","catherine-valois"],"place":"Troyes, France","significance":5,"summary":"Signed at Troyes on 21 May 1420, the treaty between Henry V and the incapacitated Charles VI of France recognised Henry as regent of France during Charles's lifetime and vested the French crown permanently in Henry and his heirs upon Charles's death, bypassing the Dauphin Charles, whom the treaty's parties agreed never to treat with over his role in the murder of John the Fearless, Duke of Burgundy. The settlement was sealed by Henry's marriage to Charles's daughter, Catherine of Valois.","citations":[{"url":"https://sourcebooks.web.fordham.edu/source/1420troyes.asp","title":"Treaty of Troyes, 1420 and Conditions in France in 1422","publisher":"Fordham Internet History Sourcebooks Project","quote":"the crown and kingdom of France, with all their rights and appurtenances, shall be vested permanently in our son [son-in-law], King Henry [of England], and his heirs."},{"url":"https://sourcebooks.web.fordham.edu/source/1420troyes.asp","title":"Treaty of Troyes, 1420 and Conditions in France in 1422","publisher":"Fordham Internet History Sourcebooks Project","quote":"we, our son Henry, and also our very dear son Philip, duke of Burgundy, will never treat for peace or amity with the said Charles"},{"url":"https://en.wikipedia.org/wiki/Treaty_of_Troyes","title":"Treaty of Troyes - Wikipedia","publisher":"Wikipedia","quote":"The treaty arranged for the marriage of Charles VI's daughter Catherine of Valois to Henry V"}],"uncertain":null},{"id":"evt-1421-bauge","title":"Battle of Baugé","date":"1421-03-22","endDate":null,"precision":"day","category":"battle","actors":["thomas-lancaster-clarence"],"place":"Baugé, Anjou, France","significance":3,"summary":"On 22 March 1421, while Henry V was in England, a Franco-Scottish force decisively defeated an English army at Baugé in Anjou. Thomas, Duke of Clarence, the king's brother and heir presumptive, attacked rashly without waiting for his archers and was among the first English casualties, a defeat that briefly emboldened the Dauphin's cause in France.","citations":[{"url":"https://en.wikipedia.org/wiki/Battle_of_Baug%C3%A9","title":"Battle of Baugé - Wikipedia","publisher":"Wikipedia","quote":"22 March 1421... Thomas, Duke of Clarence... was killed in the action."},{"url":"https://www.britishbattles.com/one-hundred-years-war/battle-of-bauge/","title":"Battle of Baugé","publisher":"British Battles","quote":"A decisive victory for the Franco-Scottish army of the Earl of Buchan."}],"uncertain":null},{"id":"evt-1422-henry-v-death","title":"Death of Henry V","date":"1422-08-31","endDate":null,"precision":"day","category":"dynastic","actors":["henry-v","henry-vi","john-lancaster-bedford","humphrey-lancaster-gloucester"],"place":"Château de Vincennes, France","significance":5,"summary":"Henry V died in the early hours of 31 August 1422 at the Château de Vincennes near Paris, aged thirty-five, most probably of dysentery contracted during the siege of Meaux. He was succeeded by his nine-month-old son, Henry VI, who became titular king of both England and France weeks later on the death of Charles VI. Before dying, Henry named his brother John, Duke of Bedford, regent of France and his brother Humphrey, Duke of Gloucester, regent in England during the infant king's minority.","citations":[{"url":"https://en.wikipedia.org/wiki/Henry_V_of_England","title":"Henry V of England - Wikipedia","publisher":"Wikipedia","quote":"Henry died in the early hours of 31 August 1422, aged 35; he had reigned for nine and a half years."},{"url":"https://en.wikipedia.org/wiki/Henry_V_of_England","title":"Henry V of England - Wikipedia","publisher":"Wikipedia","quote":"the nine-month-old Henry VI became king of both England and France at least in name"},{"url":"https://plantsandplantagenets.com/2021/09/05/this-week-in-history-the-death-of-henry-v/","title":"This Week in History: The Death of Henry V","publisher":"Plants and Plantagenets","quote":"Suddenly the old king was gone, and the new king of England and heir to France was a tiny boy, barely nine months old."}],"uncertain":null}],"links":[{"id":"lnk-001","from":{"kind":"edge","id":"godwin-wessex--edith-wessex"},"to":{"kind":"event","id":"evt-1051-godwin-exile"},"relation":"family-disgrace-triggered","claim":"When her father Godwin's family was outlawed and fled into exile in 1051, Edith was removed from court and sent to a nunnery.","strength":"explicit","citations":[{"url":"https://en.wikipedia.org/wiki/Edith_of_Wessex","title":"Edith of Wessex","publisher":"Wikipedia","quote":"In 1051, Godwin and his sons fell out with Edward and fled the country. Edith was sent to a nunnery, possibly because she was childless and Edward hoped to divorce her."}]},{"id":"lnk-002","from":{"kind":"edge","id":"godwin-wessex--harold-godwinson"},"to":{"kind":"event","id":"evt-1052-godwin-return"},"relation":"family-alliance-enabled","claim":"Godwin's 1052 return from exile was a coordinated family operation timed to link up with his sons Harold and Leofwine, and the combined force compelled Edward to restore him.","strength":"explicit","citations":[{"url":"https://en.wikisource.org/wiki/Dictionary_of_National_Biography,_1885-1900/Godwin_(d.1053)","title":"Dictionary of National Biography, 1885-1900/Godwin (d.1053)","publisher":"Wikisource","quote":"he gathered his ships together in the Yser and set sail on the 22nd, intending to fall in with his sons Harold and Leofwine"},{"url":"https://avalon.law.yale.edu/medieval/ang11.asp","title":"The Anglo-Saxon Chronicle: Eleventh Century","publisher":"Avalon Project, Yale Law School","quote":"There took up Earl Godwin his burthen, and cleared himself there before his lord King Edward, and before all the nation; proving that he was innocent of the crime laid to his charge."}]},{"id":"lnk-003","from":{"kind":"edge","id":"edith-wessex~edward-confessor"},"to":{"kind":"event","id":"evt-1066-hastings"},"relation":"childlessness-enabled-claim","claim":"Edward's marriage to Edith produced no heir, and it was in this context that Edward appears to have named William of Normandy as his successor, the basis for William's later claim.","strength":"attributed","citations":[{"url":"https://en.wikipedia.org/wiki/William_the_Conqueror","title":"William the Conqueror","publisher":"Wikipedia","quote":"In 1051 the childless King Edward of England appears to have chosen William as his successor."},{"url":"https://en.wikipedia.org/wiki/Edith_of_Wessex","title":"Edith of Wessex","publisher":"Wikipedia","quote":"The marriage produced no children."}]},{"id":"lnk-004","from":{"kind":"person","id":"edward-confessor"},"to":{"kind":"event","id":"evt-1066-hastings"},"relation":"claim-asserted-via","claim":"Norman chroniclers held that the childless Edward had earlier sent Archbishop Robert to Normandy to name William his heir, making this the chronicle basis of William's claim to the throne.","strength":"attributed","citations":[{"url":"https://penelope.uchicago.edu/encyclopaedia_romana/britannia/anglo-saxon/hastings/forsworn.html","title":"Harold and William","publisher":"Encyclopaedia Romana (University of Chicago)","quote":"Edward, king of the English, by the will of God having no heir, had in the past sent Robert, archbishop of Canterbury to the duke, to appoint him heir to the kingdom given to him by God."}]},{"id":"lnk-005","from":{"kind":"person","id":"emma-normandy"},"to":{"kind":"event","id":"evt-1066-hastings"},"relation":"kinship-claim-enabled","claim":"Emma of Normandy's marriage to Æthelred and motherhood of Edward the Confessor gave the English royal line a Norman family connection, the kinship William's claim to the throne was built on.","strength":"attributed","citations":[{"url":"https://en.wikipedia.org/wiki/Norman_Conquest","title":"Norman Conquest","publisher":"Wikipedia","quote":"In 1002, English king Æthelred the Unready married Emma of Normandy, the sister of Richard II, Duke of Normandy. Their son Edward the Confessor, who spent many years in exile in Normandy, succeeded to the English throne in 1042."}]},{"id":"lnk-006","from":{"kind":"person","id":"harold-godwinson"},"to":{"kind":"event","id":"evt-1066-hastings"},"relation":"oath-disputed","claim":"William claimed Harold had sworn an oath supporting William's succession, and treated Harold's accession as a betrayal of that oath, justifying his invasion.","strength":"attributed","citations":[{"url":"https://en.wikipedia.org/wiki/Norman_Conquest","title":"Norman Conquest","publisher":"Wikipedia","quote":"William claimed that he had been promised the throne by his cousin King Edward and that Harold had sworn an oath in agreement to this."},{"url":"https://penelope.uchicago.edu/encyclopaedia_romana/britannia/anglo-saxon/hastings/forsworn.html","title":"Harold and William","publisher":"Encyclopaedia Romana (University of Chicago)","quote":"swear fealty to the duke concerning his crown and, according to the Christian custom, pledge it with oaths"}]},{"id":"lnk-007","from":{"kind":"edge","id":"edward-exile--edgar-atheling"},"to":{"kind":"event","id":"evt-1066-harold-accession"},"relation":"claim-passed-over","claim":"Edgar Ætheling, son of Edward the Exile and grandson of Edmund Ironside, had a hereditary claim to succeed Edward the Confessor, but historians hold he was passed over for Harold in January 1066 because he was thought too young.","strength":"attributed","citations":[{"url":"https://en.wikipedia.org/wiki/Edgar_Atheling","title":"Edgar Ætheling","publisher":"Wikipedia","quote":"Modern historians have conjectured that Edgar was considered too young to be an effective military leader."},{"url":"https://en.wikipedia.org/wiki/Edgar_Atheling","title":"Edgar Ætheling","publisher":"Wikipedia","quote":"Accordingly, Harold Godwinson succeeded Edward, as he was the man best placed to defend the country against foreign claimants to the throne."}]},{"id":"lnk-008","from":{"kind":"person","id":"tostig-godwinson"},"to":{"kind":"event","id":"evt-1066-fulford-stamford-bridge"},"relation":"alliance-provoked-invasion","claim":"Exiled from Northumbria, Tostig allied with Harald Hardrada of Norway, submitting to him as his man, and their combined invasion led to the battles of Fulford and Stamford Bridge.","strength":"explicit","citations":[{"url":"https://en.wikisource.org/wiki/Page:The_Anglo-Saxon_Chronicle_(Giles).djvu/156","title":"The Anglo-Saxon Chronicle (Giles), p.156","publisher":"Wikisource","quote":"Harold king of Norway with three hundred ships... [Tostig] submitted to him and became his man."}]},{"id":"lnk-009","from":{"kind":"person","id":"edward-confessor"},"to":{"kind":"event","id":"evt-1066-harold-accession"},"relation":"succession-designated","claim":"The Anglo-Saxon Chronicle states that on his deathbed Edward committed the realm to Harold.","strength":"explicit","citations":[{"url":"https://en.wikisource.org/wiki/Page:The_Anglo-Saxon_Chronicle_(Giles).djvu/155","title":"The Anglo-Saxon Chronicle (Giles), p.155","publisher":"Wikisource","quote":"the sage ne'ertheless, the realm committed to a highly-born man, Harold's self, the noble earl!"}]},{"id":"lnk-010","from":{"kind":"event","id":"evt-1120-white-ship"},"to":{"kind":"event","id":"evt-1127-oath-for-matilda"},"relation":"death-precipitated","claim":"William Adelin's drowning in the White Ship left Henry I without a legitimate male heir and threw the succession into doubt, leading Henry to have his barons swear at Christmas 1126/January 1127 to recognize Matilda.","strength":"explicit","citations":[{"url":"https://en.wikipedia.org/wiki/Empress_Matilda","title":"Empress Matilda","publisher":"Wikipedia","quote":"With William dead, the succession to the English throne was thrown into doubt."},{"url":"https://en.wikipedia.org/wiki/Empress_Matilda","title":"Empress Matilda","publisher":"Wikipedia","quote":"The Anglo-Norman barons were gathered together at Westminster on Christmas 1126, where they swore in January to recognise Matilda and any future legitimate heir she might have."}]},{"id":"lnk-011","from":{"kind":"event","id":"evt-1127-oath-for-matilda"},"to":{"kind":"event","id":"evt-1135-stephen-accession"},"relation":"oath-breach-justified","claim":"Stephen had sworn the 1127 oath to recognize Matilda, but on Henry I's death his brother Henry of Blois argued the oath need not bind him, clearing the way for Stephen's seizure of the throne.","strength":"explicit","citations":[{"url":"https://en.wikipedia.org/wiki/Stephen,_King_of_England","title":"Stephen, King of England","publisher":"Wikipedia","quote":"Stephen was amongst those who took this oath in 1127."},{"url":"https://en.wikipedia.org/wiki/Stephen,_King_of_England","title":"Stephen, King of England","publisher":"Wikipedia","quote":"Henry of Blois argued that the late king had only insisted on that oath to protect the stability of the kingdom, and in light of the chaos that might now ensue, Stephen would be justified in ignoring it."}]},{"id":"lnk-012","from":{"kind":"person","id":"henry-blois"},"to":{"kind":"event","id":"evt-1135-stephen-accession"},"relation":"alliance-sealed","claim":"Henry of Blois delivered the Church's support to his brother Stephen, securing the royal treasury and clergy backing that let Stephen take the throne.","strength":"explicit","citations":[{"url":"https://en.wikipedia.org/wiki/The_Anarchy","title":"The Anarchy","publisher":"Wikipedia","quote":"Henry of Blois delivered the support of the church to Stephen: Stephen was able to advance to Winchester, where Roger...instructed the royal treasury to be handed over to Stephen."},{"url":"https://en.wikipedia.org/wiki/The_Anarchy","title":"The Anarchy","publisher":"Wikipedia","quote":"On 15 December, Henry delivered an agreement under which Stephen would grant extensive freedoms and liberties to the church"}]},{"id":"lnk-013","from":{"kind":"person","id":"robert-gloucester"},"to":{"kind":"event","id":"evt-1141-battle-lincoln"},"relation":"rebellion-provoked","claim":"Robert of Gloucester commanded the relief force at Lincoln and was recorded as one of the two commanders who surrounded and captured Stephen.","strength":"explicit","citations":[{"url":"https://deremilitari.org/2014/03/the-battle-of-lincoln-1141-from-five-sources/","title":"The Battle of Lincoln (1141) from Five Sources","publisher":"De Re Militari: The Society for Medieval Military History","quote":"was at length by the just judgement of God surrounded and captured at the siege of Lincoln castle, by Robert, earl of Gloucester, his uncle's son"},{"url":"https://deremilitari.org/2014/03/the-battle-of-lincoln-1141-from-five-sources/","title":"The Battle of Lincoln (1141) from Five Sources","publisher":"De Re Militari: The Society for Medieval Military History","quote":"Robert, earl of Gloucester, who was the greatest in the army, commanded the men of the Bessin and other disinherited men to strike the first blow"}]},{"id":"lnk-014","from":{"kind":"person","id":"matilda-boulogne"},"to":{"kind":"event","id":"evt-1141-rout-winchester"},"relation":"siege-orchestrated","claim":"Queen Matilda of Boulogne directed the operations that encircled the Angevin forces at Winchester, leading to Robert of Gloucester's capture and the later exchange of the two leaders.","strength":"explicit","citations":[{"url":"https://en.wikipedia.org/wiki/The_Anarchy","title":"The Anarchy","publisher":"Wikipedia","quote":"Queen Matilda was using Winchester Castle as a base for her operations, but shortly afterwards she and William of Ypres encircled the Angevin forces"},{"url":"https://en.wikipedia.org/wiki/The_Anarchy","title":"The Anarchy","publisher":"Wikipedia","quote":"in November the two sides exchanged the two leaders"}]},{"id":"lnk-015","from":{"kind":"person","id":"robert-gloucester"},"to":{"kind":"event","id":"evt-1141-rout-winchester"},"relation":"rout-captured","claim":"Robert of Gloucester commanded the Angevin rearguard covering Empress Matilda's retreat from Winchester and was surrounded and captured at the River Test crossing.","strength":"explicit","citations":[{"url":"https://en.wikipedia.org/wiki/Rout_of_Winchester","title":"Rout of Winchester","publisher":"Wikipedia","quote":"Robert commanded the rearguard"},{"url":"https://en.wikipedia.org/wiki/Rout_of_Winchester","title":"Rout of Winchester","publisher":"Wikipedia","quote":"Robert surrendered with his men"}]},{"id":"lnk-016","from":{"kind":"person","id":"matilda-empress"},"to":{"kind":"event","id":"evt-1138-battle-standard"},"relation":"claim-invoked","claim":"David I of Scotland invaded northern England in 1138 explicitly announcing he was supporting the claim of his niece, the Empress Matilda, to the English throne.","strength":"explicit","citations":[{"url":"https://en.wikipedia.org/wiki/The_Anarchy","title":"The Anarchy","publisher":"Wikipedia","quote":"David of Scotland also invaded the north of England once again, announcing that he was supporting the claim of his niece the Empress Matilda to the throne"}]},{"id":"lnk-017","from":{"kind":"edge","id":"geoffrey-anjou~matilda-empress"},"to":{"kind":"event","id":"evt-1153-treaty-wallingford"},"relation":"marriage-enabled","claim":"Matilda's 1128 marriage to Geoffrey of Anjou produced Henry, whose claim through both parents was confirmed as Stephen's heir at the Treaty of Wallingford, founding the Plantagenet line.","strength":"explicit","citations":[{"url":"https://en.wikipedia.org/wiki/Geoffrey_Plantagenet,_Count_of_Anjou","title":"Geoffrey Plantagenet, Count of Anjou","publisher":"Wikipedia","quote":"Geoffrey and Matilda's marriage led, through their son Henry II, to the 300-year long reign of the Plantagenet dynasty in England."},{"url":"https://en.wikipedia.org/wiki/Geoffrey_Plantagenet,_Count_of_Anjou","title":"Geoffrey Plantagenet, Count of Anjou","publisher":"Wikipedia","quote":"In 1153, the Treaty of Wallingford stipulated that Stephen should remain King of England for life and that Henry, the son of Geoffrey and Matilda should succeed him, beginning the Plantagenet era in English history."}]},{"id":"lnk-018","from":{"kind":"person","id":"eustace-boulogne"},"to":{"kind":"event","id":"evt-1153-treaty-wallingford"},"relation":"death-precipitated","claim":"Stephen's son and heir Eustace died suddenly in August 1153, removing the chief obstacle to peace and opening the way to the settlement recognizing Henry as Stephen's successor.","strength":"explicit","citations":[{"url":"https://en.wikipedia.org/wiki/Eustace_IV,_Count_of_Boulogne","title":"Eustace IV, Count of Boulogne","publisher":"Wikipedia","quote":"Eustace died suddenly that same year, in mid-August 1153, struck down (so it was said) by the wrath of God while plundering church lands near Bury St Edmunds."},{"url":"https://en.wikipedia.org/wiki/Eustace_IV,_Count_of_Boulogne","title":"Eustace IV, Count of Boulogne","publisher":"Wikipedia","quote":"The death of Eustace was hailed with general satisfaction as opening the possibility of a peaceful settlement between Stephen and his rival, the young Henry Plantagenet."}]},{"id":"lnk-019","from":{"kind":"person","id":"robert-curthose"},"to":{"kind":"event","id":"evt-1100-william-ii-death"},"relation":"absence-enabled","claim":"Robert was still on his return journey from the First Crusade when William II died suddenly in 1100, which let his brother Henry seize the English crown ahead of him.","strength":"explicit","citations":[{"url":"https://en.wikipedia.org/wiki/Robert_Curthose","title":"Robert Curthose","publisher":"Wikipedia","quote":"When William II died on 2 August 1100, Robert was still on the return journey and absent from Normandy."},{"url":"https://en.wikipedia.org/wiki/Robert_Curthose","title":"Robert Curthose","publisher":"Wikipedia","quote":"allowing his other brother Henry to seize the crown of England for himself"}]},{"id":"lnk-020","from":{"kind":"person","id":"robert-curthose"},"to":{"kind":"event","id":"evt-1101-treaty-alton"},"relation":"inheritance-disputed","claim":"Robert assembled a fleet and invaded England in 1101 to press his claim to the throne against Henry I; the dispute was settled by the Treaty of Alton.","strength":"explicit","citations":[{"url":"https://en.wikipedia.org/wiki/Robert_Curthose","title":"Robert Curthose","publisher":"Wikipedia","quote":"Robert began preparations and assembled a fleet at Tréport."},{"url":"https://en.wikipedia.org/wiki/Robert_Curthose","title":"Robert Curthose","publisher":"Wikipedia","quote":"after a tense confrontation, Robert and Henry agreed to the Treaty of Alton"}]},{"id":"lnk-021","from":{"kind":"person","id":"robert-curthose"},"to":{"kind":"event","id":"evt-1106-tinchebray"},"relation":"rivalry-culminated","claim":"Henry defeated and captured Robert at the Battle of Tinchebray in 1106, ending Robert's rule and annexing Normandy to the English crown for almost a century.","strength":"explicit","citations":[{"url":"https://en.wikipedia.org/wiki/Robert_Curthose","title":"Robert Curthose","publisher":"Wikipedia","quote":"In 1106, Henry defeated Robert's army decisively at the Battle of Tinchebray and claimed Normandy as a possession of the English crown, a situation that endured for almost a century. Captured after the battle, Robert would be briefly imprisoned at Corfe Castle."}]},{"id":"lnk-022","from":{"kind":"edge","id":"adeliza-louvain~henry-i"},"to":{"kind":"event","id":"evt-1120-white-ship"},"relation":"remarriage-prompted","claim":"William Adelin's death in the White Ship disaster prompted Henry I to remarry, taking Adeliza of Louvain as his wife in hopes of fathering a new male heir.","strength":"explicit","citations":[{"url":"https://en.wikipedia.org/wiki/Adeliza_of_Louvain","title":"Adeliza of Louvain","publisher":"Wikipedia","quote":"Henry's only legitimate son, William Adelin, had died in 1120, which had prompted Henry to marry again. He hoped to have another son with Adeliza"},{"url":"https://en.wikipedia.org/wiki/Adeliza_of_Louvain","title":"Adeliza of Louvain","publisher":"Wikipedia","quote":"Henry's need for a new male heir expedited the marriage plans and the couple wed on 24 January 1121."}]},{"id":"lnk-023","from":{"kind":"edge","id":"robert-curthose--william-clito"},"to":{"kind":"event","id":"evt-1120-white-ship"},"relation":"claim-elevated","claim":"The White Ship disaster, which drowned Henry I's only legitimate son, transformed the fortunes of Robert Curthose's son William Clito, making him the most plausible alternative heir to the English throne.","strength":"explicit","citations":[{"url":"https://en.wikipedia.org/wiki/William_Clito","title":"William Clito","publisher":"Wikipedia","quote":"The event transformed William Clito's fortunes. At the state of events after the White Ship, William was the most plausible heir to the English throne."}]},{"id":"lnk-024","from":{"kind":"edge","id":"eleanor-aquitaine~louis-vii-france"},"to":{"kind":"event","id":"evt-1154-stephen-death"},"relation":"annulment-enabled","claim":"The annulment of Eleanor's marriage to Louis VII on grounds of consanguinity freed her to marry Henry eight weeks later, thereby transferring her Aquitaine lands from Louis to Henry, who succeeded to England in 1154.","strength":"explicit","citations":[{"url":"https://en.wikipedia.org/wiki/Eleanor_of_Aquitaine","title":"Eleanor of Aquitaine","publisher":"Wikipedia","quote":"On 21 March, the four archbishops, with the approval of Pope Eugene, granted an annulment on grounds of consanguinity within the fourth degree."},{"url":"https://en.wikipedia.org/wiki/Eleanor_of_Aquitaine","title":"Eleanor of Aquitaine","publisher":"Wikipedia","quote":"On 18 May 1152 (Whit Sunday), eight weeks after her annulment, Eleanor married the younger Henry in a quiet private ceremony at Poitiers Cathedral, thereby transferring her Aquitaine lands from Louis to Henry."}]},{"id":"lnk-025","from":{"kind":"edge","id":"eleanor-aquitaine~henry-ii"},"to":{"kind":"event","id":"evt-1154-stephen-death"},"relation":"marriage-enabled","claim":"Henry's 1152 marriage to Eleanor brought him the Duchy of Aquitaine, which together with his succession to Stephen in 1154 assembled the Angevin Empire.","strength":"explicit","citations":[{"url":"https://en.wikipedia.org/wiki/Angevin_Empire","title":"Angevin Empire","publisher":"Wikipedia","quote":"Henry married Eleanor of Aquitaine in 1152, acquiring the Duchy of Aquitaine, and inherited his mother Empress Matilda's claim to the English throne, succeeding his rival Stephen in 1154."},{"url":"https://en.wikipedia.org/wiki/Angevin_Empire","title":"Angevin Empire","publisher":"Wikipedia","quote":"At its largest extent, the Angevin Empire consisted of the Kingdom of England, the Lordship of Ireland, the Duchies of Normandy, Gascony and Aquitaine, as well as of the counties of Anjou, Poitou, Maine, Touraine…"}]},{"id":"lnk-026","from":{"kind":"event","id":"evt-1164-constitutions-clarendon"},"to":{"kind":"event","id":"evt-1170-murder-thomas-becket"},"relation":"grievance-escalated-to","claim":"Becket's resistance to the Constitutions of Clarendon set off the escalating quarrel with Henry II that ended with his murder in Canterbury Cathedral six years later.","strength":"explicit","citations":[{"url":"https://en.wikipedia.org/wiki/Constitutions_of_Clarendon","title":"Constitutions of Clarendon","publisher":"Wikipedia","quote":"The ensuing controversy became so bitter that Becket was murdered on 29 December 1170."}]},{"id":"lnk-027","from":{"kind":"person","id":"henry-ii"},"to":{"kind":"event","id":"evt-1170-murder-thomas-becket"},"relation":"outburst-precipitated","claim":"Henry II's angry words on hearing of Becket's defiance were taken by four of his knights as a command to kill the archbishop, though the famous 'turbulent priest' phrasing is a later invention, not a contemporary record.","strength":"attributed","citations":[{"url":"https://en.wikipedia.org/wiki/Thomas_Becket","title":"Thomas Becket","publisher":"Wikipedia","quote":"On hearing reports of Becket's actions, Henry II is said to have uttered words interpreted by his men as wishing Becket killed."},{"url":"https://en.wikipedia.org/wiki/Thomas_Becket","title":"Thomas Becket","publisher":"Wikipedia","quote":"The most commonly quoted, as invented in 1740 and handed down by oral tradition, is 'Will no one rid me of this turbulent priest?'"}]},{"id":"lnk-028","from":{"kind":"edge","id":"eleanor-aquitaine~henry-ii"},"to":{"kind":"event","id":"evt-1173-great-revolt"},"relation":"rebellion-provoked","claim":"Eleanor's encouragement helped drive her sons Henry, Richard, and Geoffrey to join the 1173 revolt against Henry II, and she was captured trying to reach them.","strength":"explicit","citations":[{"url":"https://en.wikipedia.org/wiki/Revolt_of_1173%E2%80%931174","title":"Revolt of 1173–1174","publisher":"Wikipedia","quote":"In March 1173 Henry the Young King withdrew to the court of his father-in-law, Louis, in Paris and was soon followed by his brothers Richard and Geoffrey with Eleanor's encouragement."},{"url":"https://en.wikipedia.org/wiki/Revolt_of_1173%E2%80%931174","title":"Revolt of 1173–1174","publisher":"Wikipedia","quote":"Eleanor tried to join them but was stopped by Henry II on the way and imprisoned. She would remain in captivity until Henry II's death in 1189."}]},{"id":"lnk-029","from":{"kind":"edge","id":"henry-ii--henry-young-king"},"to":{"kind":"event","id":"evt-1173-great-revolt"},"relation":"inheritance-disputed","claim":"Henry II's grant of three Anjou castles meant for the Young King's inheritance to his youngest son John was a contributing trigger for the Young King's break with his father in 1173.","strength":"explicit","citations":[{"url":"https://en.wikipedia.org/wiki/Revolt_of_1173%E2%80%931174","title":"Revolt of 1173–1174","publisher":"Wikipedia","quote":"Henry II's decision to bequeath three castles in the province of Anjou, which were within the realm of the Young King's inheritance, to his youngest son, John."}]},{"id":"lnk-030","from":{"kind":"person","id":"henry-young-king"},"to":{"kind":"event","id":"evt-1173-great-revolt"},"relation":"grievance-caused","claim":"Contemporary chroniclers attribute Henry the Young King's 1173 break with his father to his frustration at being crowned king yet given no realm to rule and no money.","strength":"attributed","citations":[{"url":"https://en.wikipedia.org/wiki/Henry_the_Young_King","title":"Henry the Young King","publisher":"Wikipedia","quote":"Young Henry fell out with his father in 1173. Contemporary chroniclers allege that this was owing to the young man's frustration that his father had given him no realm to rule, and his feeling starved of funds."}]},{"id":"lnk-031","from":{"kind":"event","id":"evt-1170-murder-thomas-becket"},"to":{"kind":"event","id":"evt-1173-great-revolt"},"relation":"penance-credited-with-victory","claim":"Henry II's 1174 public penance at Becket's tomb was followed the very next day by the capture of William the Lion of Scotland at Alnwick, a coincidence contemporaries read as proof that Becket, and God, had accepted the king's repentance.","strength":"attributed","citations":[{"url":"https://www.english-heritage.org.uk/visit/places/dover-castle/history-and-stories/becket-henry-dover-castle/","title":"Thomas Becket, Henry II and Dover Castle","publisher":"English Heritage","quote":"By a truly extraordinary coincidence, the next day Henry heard that William of Scotland, who had invaded Northumberland, had been captured."},{"url":"https://www.english-heritage.org.uk/visit/places/dover-castle/history-and-stories/becket-henry-dover-castle/","title":"Thomas Becket, Henry II and Dover Castle","publisher":"English Heritage","quote":"It seemed clear that Becket, and God, had accepted the king's repentance."}]},{"id":"lnk-032","from":{"kind":"event","id":"evt-1189-coronation-richard-i"},"to":{"kind":"event","id":"evt-1190-york-massacre"},"relation":"violence-provoked","claim":"Anti-Jewish rioting that broke out at Richard I's 1189 coronation spread to other towns including York, feeding the wave of violence that culminated in the March 1190 massacre at Clifford's Tower.","strength":"explicit","citations":[{"url":"https://www.english-heritage.org.uk/visit/places/cliffords-tower-york/history-and-stories/massacre-of-the-jews/","title":"The Massacre of the Jews at Clifford's Tower","publisher":"English Heritage","quote":"Resentment about the presence of Jews at the coronation was fuelled by anger about taxes to fund the Crusades, leading to riots at the ceremony itself and in Norwich, Stamford, York and Lincoln."}]},{"id":"lnk-033","from":{"kind":"event","id":"evt-1189-siege-of-acre"},"to":{"kind":"event","id":"evt-1192-richard-captivity-ransom"},"relation":"grievance-caused","claim":"Richard's insult to Duke Leopold of Austria at Acre, casting down his standard from the walls, left Leopold with a personal grievance that led him to arrest Richard near Vienna in December 1192.","strength":"explicit","citations":[{"url":"https://en.wikipedia.org/wiki/Leopold_V,_Duke_of_Austria","title":"Leopold V, Duke of Austria","publisher":"Wikipedia","quote":"Richard removed Leopold's colours and the duke wrathfully left for his Austrian home, arriving by the end of 1191."},{"url":"https://en.wikipedia.org/wiki/Leopold_V,_Duke_of_Austria","title":"Leopold V, Duke of Austria","publisher":"Wikipedia","quote":"Whilst travelling under disguise, he stopped at Vienna shortly before Christmas 1192, where he was recognized (supposedly because of his signet ring) and arrested in Erdberg."}]},{"id":"lnk-034","from":{"kind":"person","id":"richard-i"},"to":{"kind":"event","id":"evt-1199-john-accession"},"relation":"succession-designated","claim":"Richard reconciled with John after his release from captivity and named him his heir in place of their nephew Arthur, clearing the way for John's accession in 1199.","strength":"explicit","citations":[{"url":"https://en.wikipedia.org/wiki/Richard_I_of_England","title":"Richard I of England","publisher":"Wikipedia","quote":"Richard forgave John when they met again and named him as his heir in place of their nephew Arthur."}]},{"id":"lnk-035","from":{"kind":"person","id":"arthur-brittany"},"to":{"kind":"event","id":"evt-1199-john-accession"},"relation":"claim-asserted-via","claim":"As the son of John's elder brother Geoffrey, Arthur was regarded by many nobles as having the stronger hereditary claim, and Anjou, Maine, and Touraine declared for him against John in 1199.","strength":"explicit","citations":[{"url":"https://en.wikisource.org/wiki/Arthur_(1187-1203)_(DNB00)","title":"Dictionary of National Biography, 1885-1900/Arthur (1187-1203)","publisher":"Wikisource","quote":"The nobles of Anjou, Maine, and Touraine immediately declared for Arthur, as the son of Geoffrey, John's elder brother."}]},{"id":"lnk-036","from":{"kind":"person","id":"john"},"to":{"kind":"event","id":"evt-1203-arthur-brittany-death"},"relation":"rival-eliminated","claim":"Contemporary rumour and later historians held John immediately responsible for Arthur's death in 1203, though whether he did the deed with his own hands is doubtful.","strength":"attributed","citations":[{"url":"https://en.wikisource.org/wiki/Arthur_(1187-1203)_(DNB00)","title":"Dictionary of National Biography, 1885-1900/Arthur (1187-1203)","publisher":"Wikisource","quote":"There is therefore every probability, when this fact is combined with the current rumours of the time, that he was immediately responsible for the murder, but whether… it was the work of his own hands, is doubtful."}]},{"id":"lnk-037","from":{"kind":"event","id":"evt-1203-arthur-brittany-death"},"to":{"kind":"event","id":"evt-1204-loss-of-normandy"},"relation":"pretext-provided","claim":"Philip II summoned John to answer for Arthur's death before an assembly of his peers; John's refusal to appear led to a judgment of guilt and the forfeiture of his French lands, opening the way to the conquest of Normandy.","strength":"explicit","citations":[{"url":"https://en.wikisource.org/wiki/Arthur_(1187-1203)_(DNB00)","title":"Dictionary of National Biography, 1885-1900/Arthur (1187-1203)","publisher":"Wikisource","quote":"All mediaeval historians are agreed that Philip acceded to this request; that John refused to appear, was pronounced by an assembly of his peers guilty of the murder, and that all his lands in France were declared forfeited."},{"url":"https://en.wikisource.org/wiki/Arthur_(1187-1203)_(DNB00)","title":"Dictionary of National Biography, 1885-1900/Arthur (1187-1203)","publisher":"Wikisource","quote":"It was after this declaration that Philip invaded and conquered Normandy."}]},{"id":"lnk-038","from":{"kind":"edge","id":"isabella-angouleme~john"},"to":{"kind":"event","id":"evt-1204-loss-of-normandy"},"relation":"grievance-caused","claim":"John's marriage to Isabella, who had already been betrothed to Hugh de Lusignan, provoked the Lusignans into rebellion and an appeal to Philip II, who confiscated John's French lands.","strength":"explicit","citations":[{"url":"https://en.wikipedia.org/wiki/Isabella_of_Angoul%C3%AAme","title":"Isabella of Angoulême","publisher":"Wikipedia","quote":"Isabella was originally betrothed to Hugh IX le Brun, Count of Lusignan, grandson and heir of the Count of La Marche."},{"url":"https://en.wikipedia.org/wiki/Isabella_of_Angoul%C3%AAme","title":"Isabella of Angoulême","publisher":"Wikipedia","quote":"As a result of John's temerity in taking her as his second wife, King Philip II of France confiscated all of their French lands and armed conflict ensued."}]},{"id":"lnk-039","from":{"kind":"event","id":"evt-1204-loss-of-normandy"},"to":{"kind":"event","id":"evt-1215-magna-carta"},"relation":"grievance-caused","claim":"The loss of Normandy in 1204 launched John on a ruthless campaign of financial exploitation across England to fund its recovery, fueling the baronial grievances that produced Magna Carta.","strength":"explicit","citations":[{"url":"https://magnacarta.cmp.uea.ac.uk/about/historical_intro","title":"Magna Carta Project - Historical Introduction","publisher":"Magna Carta Project, University of East Anglia","quote":"The turning point in King John's reign was the loss of Normandy to King Philip of France in 1204. It launched John… on a ruthless campaign of financial exploitation across England."}]},{"id":"lnk-040","from":{"kind":"event","id":"evt-1208-interdict-excommunication"},"to":{"kind":"event","id":"evt-1215-magna-carta"},"relation":"grievance-caused","claim":"John's rejection of Stephen Langton as archbishop, and the resulting excommunication and interdict, deepened the crisis of his kingship that led the barons to force Magna Carta on him.","strength":"explicit","citations":[{"url":"https://magnacarta.cmp.uea.ac.uk/about/historical_intro","title":"Magna Carta Project - Historical Introduction","publisher":"Magna Carta Project, University of East Anglia","quote":"Having rejected Pope Innocent III's candidate for the archbishopric of Canterbury, the famed scholar Stephen Langton, John was excommunicated and England placed under an interdict."}]},{"id":"lnk-041","from":{"kind":"event","id":"evt-1214-bouvines"},"to":{"kind":"event","id":"evt-1215-magna-carta"},"relation":"grievance-caused","claim":"John's defeat at Bouvines in 1214 ended his hopes of recovering Normandy and discredited his kingship, emboldening the barons who forced Magna Carta on him the following year.","strength":"explicit","citations":[{"url":"https://magnacarta.cmp.uea.ac.uk/about/historical_intro","title":"Magna Carta Project - Historical Introduction","publisher":"Magna Carta Project, University of East Anglia","quote":"His reputation suffered a further blow when his forces were comprehensively defeated by King Philip at Bouvines in July 1214, ending his hopes of recovering Normandy."}]},{"id":"lnk-042","from":{"kind":"event","id":"evt-1215-magna-carta"},"to":{"kind":"event","id":"evt-1217-battle-of-lincoln"},"relation":"war-provoked","claim":"John's refusal to abide by Magna Carta reignited civil war between the crown and the barons, a conflict decisively turned by the royalist victory at the Battle of Lincoln in 1217.","strength":"explicit","citations":[{"url":"https://en.wikipedia.org/wiki/First_Barons%27_War","title":"First Barons' War","publisher":"Wikipedia","quote":"John's subsequent refusal to accept and abide by Magna Carta, which John had sealed on 15 June 1215"},{"url":"https://en.wikipedia.org/wiki/First_Barons%27_War","title":"First Barons' War","publisher":"Wikipedia","quote":"Marshal and Falkes de Breauté were able to attack and heavily defeat pro-Louis barons at Lincoln Castle on 20 May, in what became known as the Second Battle of Lincoln"}]},{"id":"lnk-043","from":{"kind":"event","id":"evt-1216-death-of-john"},"to":{"kind":"event","id":"evt-1217-battle-of-lincoln"},"relation":"war-continued","claim":"John's death in October 1216 did not end the war; barons who saw Prince Louis of France as a greater threat than John's nine-year-old heir switched allegiance to Henry III, whose forces then won the decisive battle at Lincoln.","strength":"explicit","citations":[{"url":"https://en.wikipedia.org/wiki/First_Barons%27_War","title":"First Barons' War","publisher":"Wikipedia","quote":"Louis now seemed much more of a threat to baronial interests than John's nine-year-old son, Henry"},{"url":"https://en.wikipedia.org/wiki/First_Barons%27_War","title":"First Barons' War","publisher":"Wikipedia","quote":"William Marshal slowly managed to get most barons to switch sides from Louis to Henry and attack Louis."}]},{"id":"lnk-044","from":{"kind":"person","id":"isabella-angouleme"},"to":{"kind":"event","id":"evt-1258-provisions-of-oxford"},"relation":"grievance-caused","claim":"The Lusignan half-siblings Isabella bore Henry III after her second marriage settled in England as favoured 'Poitevins'; baronial hatred of them was a driving force behind the baronial coup that produced the Provisions of Oxford.","strength":"explicit","citations":[{"url":"https://en.wikipedia.org/wiki/Henry_III_of_England","title":"Henry III of England","publisher":"Wikipedia","quote":"By 1258, the general dislike of the Poitevins had turned into hatred, with Simon de Montfort one of their strongest critics."}]},{"id":"lnk-045","from":{"kind":"person","id":"simon-de-montfort"},"to":{"kind":"event","id":"evt-1258-provisions-of-oxford"},"relation":"reform-led","claim":"Montfort stood at the head of the baronial opposition at the 1258 'Mad Parliament' of Oxford that imposed the Provisions on Henry III, and led that opposition on into the Second Barons' War.","strength":"explicit","citations":[{"url":"https://en.wikipedia.org/wiki/Simon_de_Montfort,_6th_Earl_of_Leicester","title":"Simon de Montfort, 6th Earl of Leicester","publisher":"Wikipedia","quote":"at the 'Mad Parliament' of Oxford (1258) Montfort appeared with the Earl of Gloucester, at the head of the opposition."},{"url":"https://en.wikipedia.org/wiki/Simon_de_Montfort,_6th_Earl_of_Leicester","title":"Simon de Montfort, 6th Earl of Leicester","publisher":"Wikipedia","quote":"who led the baronial opposition to the rule of King Henry III, culminating in the Second Barons' War. Following his initial victories over royal forces, he became de facto ruler of England"}]},{"id":"lnk-046","from":{"kind":"person","id":"simon-de-montfort"},"to":{"kind":"event","id":"evt-1264-battle-of-lewes"},"relation":"victory-commanded","claim":"Montfort commanded the baronial army at Lewes on 14 May 1264, capturing Henry III together with Prince Edward and Richard of Cornwall, and so became de facto ruler of England.","strength":"explicit","citations":[{"url":"https://en.wikipedia.org/wiki/Simon_de_Montfort,_6th_Earl_of_Leicester","title":"Simon de Montfort, 6th Earl of Leicester","publisher":"Wikipedia","quote":"In early May 1264, Simon marched out to give battle to the king and scored a spectacular triumph at the Battle of Lewes on 14 May 1264, capturing the king, together with Prince Edward and Richard of Cornwall."}]},{"id":"lnk-047","from":{"kind":"person","id":"simon-de-montfort"},"to":{"kind":"event","id":"evt-1265-montfort-parliament"},"relation":"parliament-summoned","claim":"Montfort summoned the 1265 parliament in the king's name, requiring each county and a select list of boroughs to send two representatives, and it is from this period that parliamentary representation derives.","strength":"explicit","citations":[{"url":"https://en.wikipedia.org/wiki/Simon_de_Montfort,_6th_Earl_of_Leicester","title":"Simon de Montfort, 6th Earl of Leicester","publisher":"Wikipedia","quote":"Montfort sent his summons, in the king's name, to each county and to a select list of boroughs, asking each to send two representatives."},{"url":"https://en.wikipedia.org/wiki/Simon_de_Montfort,_6th_Earl_of_Leicester","title":"Simon de Montfort, 6th Earl of Leicester","publisher":"Wikipedia","quote":"it was from this period that parliamentary representation derives."}]},{"id":"lnk-048","from":{"kind":"person","id":"simon-de-montfort"},"to":{"kind":"event","id":"evt-1265-battle-of-evesham"},"relation":"death-precipitated","claim":"Montfort led his outnumbered army in a desperate uphill charge at Evesham on 4 August 1265 and was killed there by Roger Mortimer, ending his rule.","strength":"explicit","citations":[{"url":"https://en.wikipedia.org/wiki/Simon_de_Montfort,_6th_Earl_of_Leicester","title":"Simon de Montfort, 6th Earl of Leicester","publisher":"Wikipedia","quote":"An ominous black cloud hung over the field of Evesham on 4 August 1265 as Montfort led his army in a desperate uphill charge against superior forces, described by one chronicler as the 'murder of Evesham, for battle it was none'."},{"url":"https://en.wikipedia.org/wiki/Simon_de_Montfort,_6th_Earl_of_Leicester","title":"Simon de Montfort, 6th Earl of Leicester","publisher":"Wikipedia","quote":"Roger Mortimer killed Montfort by stabbing him in the neck with a lance."}]},{"id":"lnk-049","from":{"kind":"event","id":"evt-1258-provisions-of-oxford"},"to":{"kind":"event","id":"evt-1264-battle-of-lewes"},"relation":"repudiation-provoked-war","claim":"Henry III's overthrow of the Provisions of Oxford in 1261 seeded the Second Barons' War, which culminated in his defeat and capture at Lewes in 1264.","strength":"explicit","citations":[{"url":"https://en.wikipedia.org/wiki/Provisions_of_Oxford","title":"Provisions of Oxford","publisher":"Wikipedia","quote":"The Provisions of Oxford were overthrown by Henry, helped by a papal bull, in 1261, seeding the start of the Second Barons' War (1263–1267)."},{"url":"https://en.wikipedia.org/wiki/Provisions_of_Oxford","title":"Provisions of Oxford","publisher":"Wikipedia","quote":"The king was defeated at the Battle of Lewes in 1264, and Simon de Montfort became the real ruler of England for the next twelve months."}]},{"id":"lnk-050","from":{"kind":"event","id":"evt-1264-battle-of-lewes"},"to":{"kind":"event","id":"evt-1265-montfort-parliament"},"relation":"victory-enabled","claim":"Montfort's capture of Henry III at Lewes made him the real ruler of England for the following year, during which he summoned the celebrated parliament of January 1265.","strength":"explicit","citations":[{"url":"https://en.wikipedia.org/wiki/Provisions_of_Oxford","title":"Provisions of Oxford","publisher":"Wikipedia","quote":"The king was defeated at the Battle of Lewes in 1264, and Simon de Montfort became the real ruler of England for the next twelve months."}]},{"id":"lnk-051","from":{"kind":"person","id":"edward-i"},"to":{"kind":"event","id":"evt-1265-battle-of-evesham"},"relation":"revenge-secured","claim":"Henry III's eldest son Edward escaped captivity after Lewes and defeated Simon de Montfort at the Battle of Evesham in 1265, freeing his father and ending Montfort's rule.","strength":"explicit","citations":[{"url":"https://en.wikipedia.org/wiki/Henry_III_of_England","title":"Henry III of England","publisher":"Wikipedia","quote":"Henry's eldest son, Edward, escaped from captivity to defeat Simon at the Battle of Evesham the following year and freed his father."}]},{"id":"lnk-052","from":{"kind":"event","id":"evt-1258-provisions-of-oxford"},"to":{"kind":"event","id":"evt-1267-statute-of-marlborough"},"relation":"reforms-reaffirmed","claim":"Although the Provisions of Oxford were formally annulled, the administrative and legislative reforms the barons had initiated were taken up and confirmed in the Statute of Marlborough of 1267.","strength":"explicit","citations":[{"url":"https://en.wikipedia.org/wiki/Provisions_of_Oxford","title":"Provisions of Oxford","publisher":"Wikipedia","quote":"Nonetheless, the administrative and legislative reforms the barons had initiated were taken up and confirmed in the Statute of Marlborough."}]},{"id":"lnk-053","from":{"kind":"edge","id":"edward-ii~isabella-france"},"to":{"kind":"event","id":"evt-1337-hundred-years-war"},"relation":"claim-asserted-via","claim":"Isabella of France's marriage to Edward II made their son Edward III the nearest surviving male relative of the last direct Capetian kings, the maternal claim he pressed against Philip VI when Gascony was confiscated in 1337.","strength":"explicit","citations":[{"url":"https://en.wikipedia.org/wiki/English_claims_to_the_French_throne","title":"English claims to the French throne","publisher":"Wikipedia","quote":"Edward's claim was through his mother, Isabella, sister of the last direct line Capetian king of France, Charles IV."},{"url":"https://en.wikipedia.org/wiki/English_claims_to_the_French_throne","title":"English claims to the French throne","publisher":"Wikipedia","quote":"In 1337, a dispute arose between Philip and Edward regarding Edward's feudal obligations which resulted in Philip ordering the confiscation of Gascony. Edward declared war on Philip in response."}]},{"id":"lnk-054","from":{"kind":"edge","id":"edward-ii~isabella-france"},"to":{"kind":"event","id":"evt-1327-edward-ii-deposition"},"relation":"deposition-orchestrated","claim":"Isabella landed an invasion force with Roger Mortimer in September 1326 and, after the defeat of Edward II and the Despensers, the parliament of January 1327 she orchestrated deposed her husband and recognised their son as Edward III.","strength":"explicit","citations":[{"url":"https://en.wikisource.org/wiki/Dictionary_of_National_Biography,_1885-1900/Isabella_of_France_(1292-1358)","title":"Dictionary of National Biography, 1885-1900/Isabella of France (1292-1358)","publisher":"Wikisource (Dictionary of National Biography, 1885-1900)","quote":"On 23 Sept. 1326 Isabella embarked at Dort, and on 24 Sept. landed at Harwich, accompanied by her son, Edmund, earl of Kent... Roger Mortimer, a large number of English exiles, and her foreign mercenaries."},{"url":"https://en.wikisource.org/wiki/Dictionary_of_National_Biography,_1885-1900/Isabella_of_France_(1292-1358)","title":"Dictionary of National Biography, 1885-1900/Isabella of France (1292-1358)","publisher":"Wikisource (Dictionary of National Biography, 1885-1900)","quote":"A parliament assembled there on 7 Jan., deposed Edward II, and recognised the Duke of Aquitaine as Edward III."}]},{"id":"lnk-055","from":{"kind":"person","id":"edward-ii"},"to":{"kind":"event","id":"evt-1311-ordinances"},"relation":"favourite-provoked","claim":"Edward II's preferential treatment of his favourite Piers Gaveston, whose arrogance provoked baronial resentment, led the barons to impose the Ordinances of 1311, including Gaveston's permanent banishment.","strength":"explicit","citations":[{"url":"https://en.wikipedia.org/wiki/Ordinances_of_1311","title":"Ordinances of 1311","publisher":"Wikipedia","quote":"The preferential treatment of an upstart like Gaveston, in combination with his behaviour that was seen as arrogant, led to resentment among the established peers of the realm."},{"url":"https://en.wikipedia.org/wiki/Ordinances_of_1311","title":"Ordinances of 1311","publisher":"Wikipedia","quote":"Just as instrumental to their conception were other issues, particularly discontent with the king's favourite, Piers Gaveston, whom the barons subsequently banished from the realm."}]},{"id":"lnk-056","from":{"kind":"person","id":"edward-ii"},"to":{"kind":"event","id":"evt-1312-gaveston-execution"},"relation":"favourite-provoked","claim":"Edward II's secret recall of Gaveston from exile at the end of 1311 and his public restoration in defiance of the Ordinances drove the barons to arms, ending in Gaveston's capture and execution in June 1312.","strength":"explicit","citations":[{"url":"https://en.wikipedia.org/wiki/Ordinances_of_1311","title":"Ordinances of 1311","publisher":"Wikipedia","quote":"Before the end of the year, Gaveston had returned to England, and civil war appeared imminent."},{"url":"https://en.wikisource.org/wiki/1911_Encyclop%C3%A6dia_Britannica/Gaveston,_Piers","title":"1911 Encyclopaedia Britannica/Gaveston, Piers","publisher":"Wikisource (1911 Encyclopaedia Britannica)","quote":"Gaveston then retired to Flanders, but returned secretly to England at the end of 1311. Soon he was publicly restored by Edward, and the barons had taken up arms."}]},{"id":"lnk-057","from":{"kind":"person","id":"isabella-france"},"to":{"kind":"event","id":"evt-1330-mortimer-coup"},"relation":"regime-toppled","claim":"Isabella's regency alongside her lover Roger Mortimer ended when Edward III's men seized Mortimer at Nottingham Castle in October 1330 despite her plea for mercy.","strength":"explicit","citations":[{"url":"https://en.wikisource.org/wiki/Dictionary_of_National_Biography,_1885-1900/Isabella_of_France_(1292-1358)","title":"Dictionary of National Biography, 1885-1900/Isabella of France (1292-1358)","publisher":"Wikisource (Dictionary of National Biography, 1885-1900)","quote":"On the night of 18 Oct. the attack was made on them. Both were arrested, despite Isabella's despairing cry, 'Sweet son, have pity on the gentle Mortimer!' Mortimer was speedily executed as a traitor."}]},{"id":"lnk-058","from":{"kind":"person","id":"edward-iii"},"to":{"kind":"event","id":"evt-1330-mortimer-coup"},"relation":"power-seized","claim":"Edward III joined a conspiracy of nobles against his mother's regime and ordered the seizure of Roger Mortimer at Nottingham Castle in October 1330, ending Isabella and Mortimer's rule and beginning his personal reign.","strength":"explicit","citations":[{"url":"https://en.wikisource.org/wiki/Dictionary_of_National_Biography,_1885-1900/Isabella_of_France_(1292-1358)","title":"Dictionary of National Biography, 1885-1900/Isabella of France (1292-1358)","publisher":"Wikisource (Dictionary of National Biography, 1885-1900)","quote":"On the night of 18 Oct. the attack was made on them. Both were arrested, despite Isabella's despairing cry, 'Sweet son, have pity on the gentle
