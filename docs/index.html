the siege; the city's garrison surrendered on 12 July 1191. Richard subsequently had roughly 2,700 Muslim prisoners from the garrison executed after ransom negotiations stalled, an act that hardened the conflict with Saladin.","citations":[{"url":"https://en.wikipedia.org/wiki/Siege_of_Acre_(1189%E2%80%931191)","title":"Siege of Acre (1189–1191)","publisher":"Wikipedia","quote":"28 August 1189 – 12 July 1191"},{"url":"https://www.worldhistory.org/article/1263/the-siege-of-acre-1189-91-ce/","title":"The Siege of Acre, 1189-91 CE","publisher":"World History Encyclopedia","quote":"The city capitulated on 12 July 1191 CE."}],"uncertain":null},{"id":"evt-1189-coronation-richard-i","title":"Coronation of Richard I and the London Massacre of the Jews","date":"1189-09-03","endDate":null,"precision":"day","category":"succession","actors":["richard-i"],"place":"Westminster Abbey, London","significance":3,"summary":"Richard I was crowned king of England at Westminster Abbey on 3 September 1189. Jewish leaders who arrived to present gifts were flogged and expelled from the ceremony, and when a false rumour spread that Richard had ordered the killing of all Jews, mobs attacked London's Jewish population, burning homes and killing an estimated 30 people. Richard, keen to secure order before departing on crusade, ordered the execution of some of those responsible and issued a writ for the Jews' protection, but the violence spread to other English towns in the following months.","citations":[{"url":"https://en.wikipedia.org/wiki/Richard_I_of_England","title":"Richard I of England","publisher":"Wikipedia","quote":"When a rumour spread that Richard had ordered all Jews to be killed, the people of London attacked the Jewish population."},{"url":"https://www.english-heritage.org.uk/visit/places/cliffords-tower-york/history-and-stories/massacre-of-the-jews/","title":"The Massacre of the Jews at Clifford's Tower","publisher":"English Heritage","quote":"Resentment about the presence of Jews at the coronation was fuelled by anger about taxes to fund the Crusades, leading to riots at the ceremony itself and in Norwich, Stamford, York and Lincoln."}],"uncertain":null},{"id":"evt-1190-york-massacre","title":"Massacre of the Jews of York at Clifford's Tower","date":"1190-03-16","endDate":null,"precision":"day","category":"church","actors":[],"place":"York Castle (Clifford's Tower), York","significance":3,"summary":"On 16 March 1190, coinciding with the Jewish Sabbath before Passover, York's Jewish community, besieged in the royal castle by a mob stirred by anti-Jewish feeling and local debtors seeking to escape their debts, chose mass suicide over surrender; those who did not kill themselves were killed when the mob broke in. It was the culmination of anti-Jewish rioting that had spread across England since Richard I's coronation the previous September.","citations":[{"url":"https://www.english-heritage.org.uk/visit/places/cliffords-tower-york/history-and-stories/massacre-of-the-jews/","title":"The Massacre of the Jews at Clifford's Tower","publisher":"English Heritage","quote":"Friday 16 March coincided with Shabbat Hagadol, the 'Great Sabbath' before the Jewish festival of Pesach or Passover."},{"url":"https://en.wikipedia.org/wiki/Richard_I_of_England","title":"Richard I of England","publisher":"Wikipedia","quote":"Subsequent antisemitic violence occurred the following March, including a massacre at York."}],"uncertain":"Sources disagree on the number killed: English Heritage notes estimates range from 20-40 families, while a later Hebrew account suggests about 150 people."},{"id":"evt-1192-richard-captivity-ransom","title":"Capture, imprisonment, and ransom of Richard I","date":"1192-12","endDate":"1194-02-04","precision":"month","category":"dynastic","actors":["richard-i","eleanor-aquitaine"],"place":"Vienna and imperial castles, Germany","significance":4,"summary":"Returning from the Third Crusade in December 1192, Richard I was seized near Vienna by Duke Leopold of Austria, who resented an earlier slight at Acre, and was handed over to Holy Roman Emperor Henry VI. Henry demanded a ransom of 150,000 marks, an enormous sum that Richard's mother Eleanor of Aquitaine worked to raise through taxation across England. Richard was released on 4 February 1194 once the ransom was paid and he had done homage to the emperor.","citations":[{"url":"https://en.wikipedia.org/wiki/Richard_I_of_England","title":"Richard I of England","publisher":"Wikipedia","quote":"150,000 marks (100,000 pounds of silver)"},{"url":"https://www.medievalists.net/2014/08/kidnapped-king-richard-germany-1192-1194/","title":"The Kidnapped King: Richard I in Germany, 1192-1194","publisher":"Medievalists.net","quote":"Not until February 1194, when he did homage to Henry and a king's ransom had been paid, was he released."}],"uncertain":"The exact date of Richard's capture is not precisely fixed by sources beyond 'shortly before Christmas' / 'December 1192'."},{"id":"evt-1199-death-of-richard-i","title":"Death of Richard I at Châlus-Chabrol","date":"1199-04-06","endDate":null,"precision":"day","category":"dynastic","actors":["richard-i"],"place":"Châlus-Chabrol, Limousin","significance":4,"summary":"While besieging the small castle of Châlus-Chabrol to suppress a revolt in Limousin, Richard I was struck in the shoulder by a crossbow bolt on 26 March 1199. The wound turned gangrenous and Richard died on 6 April 1199, passing the throne to his brother John. Chroniclers give conflicting names for the crossbowman and disagree on his fate and motive.","citations":[{"url":"https://en.wikipedia.org/wiki/Richard_I_of_England","title":"Richard I of England","publisher":"Wikipedia","quote":"Richard was hit in the shoulder by a crossbow bolt, and the wound turned gangrenous."},{"url":"https://www.worldhistory.org/Richard_I_of_England/","title":"Richard I of England","publisher":"World History Encyclopedia","quote":"Richard was mortally wounded in Aquitaine during his siege of the castle of Chalus in 1199. The king, hit in the neck by a crossbow bolt, died on 6 April after the wound had become gangrenous."}],"uncertain":"Sources disagree on where the bolt struck: Wikipedia says the shoulder, World History Encyclopedia says the neck. Chroniclers also disagree on the crossbowman's identity, variously naming him Pierre (or Peter) Basile, John Sabroz, Dudo, and Bertrand de Gourdon, and accounts of his motive and ultimate fate (including a story of vengeance for slain relatives and reports of his being flayed alive by the mercenary Mercadier) are not consistently corroborated."},{"id":"evt-1199-john-accession","title":"Accession and Coronation of King John","date":"1199-05-27","endDate":null,"precision":"day","category":"succession","actors":["john","richard-i","eleanor-aquitaine"],"place":"Westminster Abbey, London","significance":3,"summary":"After Richard I died on 6 April 1199 without a legitimate son, the Angevin succession was contested between John, Henry II's surviving son, and his nephew Arthur of Brittany. John secured the throne and was crowned king of England at Westminster Abbey on 27 May 1199, with the backing of his mother, Eleanor of Aquitaine.","citations":[{"url":"https://en.wikipedia.org/wiki/John,_King_of_England","title":"John, King of England","publisher":"Wikipedia","quote":"After Richard's death on 6 April 1199 there were two potential claimants to the Angevin throne: John... and young Arthur I of Brittany"},{"url":"https://en.wikipedia.org/wiki/John,_King_of_England","title":"John, King of England","publisher":"Wikipedia","quote":"John was crowned at Westminster Abbey, backed by his mother, Eleanor."}],"uncertain":null},{"id":"evt-1203-arthur-brittany-death","title":"Disappearance and Death of Arthur of Brittany","date":"1203-04","endDate":null,"precision":"month","category":"dynastic","actors":["john","arthur-brittany"],"place":"Rouen, Normandy","significance":4,"summary":"Arthur of Brittany, John's rival claimant to the Angevin throne, was captured at the Battle of Mirebeau in 1202 and held prisoner, latterly at Rouen. He vanished in April 1203 and was never seen again; contemporary chroniclers offered conflicting accounts of his fate, including one alleging John killed him personally and disposed of the body in the Seine.","citations":[{"url":"https://en.wikipedia.org/wiki/Arthur_I,_Duke_of_Brittany","title":"Arthur I, Duke of Brittany","publisher":"Wikipedia","quote":"Arthur vanished in April 1203, in the background of several military victories by Philip II of France against King John."},{"url":"https://en.wikipedia.org/wiki/Arthur_I,_Duke_of_Brittany","title":"Arthur I, Duke of Brittany","publisher":"Wikipedia","quote":"he slew him with his own hand, and tying a heavy stone to the body cast it into the Seine"}],"uncertain":"John's direct responsibility for Arthur's death is not established by contemporary sources. Chroniclers give conflicting accounts (the Margam Annals allege John personally killed Arthur; other accounts describe a failed order to blind and castrate him, or claims of natural death); Wikipedia's synthesis notes only that it is 'generally believed John killed him,' not that this is settled fact."},{"id":"evt-1204-loss-of-normandy","title":"Fall of Château Gaillard and Loss of Normandy","date":"1204-03-06","endDate":"1204-08","precision":"range","category":"battle","actors":["john"],"place":"Château Gaillard, Les Andelys, Normandy","significance":5,"summary":"Philip II of France besieged Richard I's fortress of Château Gaillard from August 1203, capturing it on 6 March 1204 after undermining its defenses. Its fall opened the route to Rouen, and by August 1204 Philip had conquered all of Normandy and pushed south into Anjou and Poitou, ending nearly a century of Angevin rule in Normandy.","citations":[{"url":"https://en.wikipedia.org/wiki/Siege_of_Ch%C3%A2teau_Gaillard","title":"Siege of Château Gaillard","publisher":"Wikipedia","quote":"August 1203 – 6 March 1204"},{"url":"https://en.wikipedia.org/wiki/Siege_of_Ch%C3%A2teau_Gaillard","title":"Siege of Château Gaillard","publisher":"Wikipedia","quote":"Normandy is formally annexed to the crown lands of France."},{"url":"https://en.wikipedia.org/wiki/John,_King_of_England","title":"John, King of England","publisher":"Wikipedia","quote":"In March 1204, Gaillard fell... By August, Philip had taken Normandy and advanced south to occupy Anjou and Poitou as well."}],"uncertain":null},{"id":"evt-1208-interdict-excommunication","title":"Papal Interdict on England and Excommunication of John","date":"1208-03-23","endDate":"1209-11","precision":"range","category":"church","actors":["john"],"place":"England","significance":3,"summary":"After John refused to accept Pope Innocent III's appointee Stephen Langton as Archbishop of Canterbury, the pope placed England under an interdict on 23 March 1208, closing churches and suspending most sacraments and burials. John was personally excommunicated in November 1209; the dispute was not resolved until 1213, by which time John had profited substantially from seized church revenues.","citations":[{"url":"https://en.wikipedia.org/wiki/Papal_Interdict_of_1208","title":"Papal Interdict of 1208","publisher":"Wikipedia","quote":"Pope Innocent III placed the Kingdom of England under an interdict after King John refused to accept the pope's appointee, Stephen Langton, as Archbishop of Canterbury."},{"url":"https://en.wikipedia.org/wiki/Papal_Interdict_of_1208","title":"Papal Interdict of 1208","publisher":"Wikipedia","quote":"generally enforced the closure of the churches, forbade the administration of the Catholic sacraments, and prohibited the use of churchyards for burials"},{"url":"https://en.wikipedia.org/wiki/John,_King_of_England","title":"John, King of England","publisher":"Wikipedia","quote":"ban church services in England from 1208 until 1214 and excommunicate John from 1209 until 1213."}],"uncertain":null},{"id":"evt-1214-bouvines","title":"Battle of Bouvines","date":"1214-07-27","endDate":null,"precision":"day","category":"battle","actors":["john"],"place":"Bouvines, County of Flanders","significance":4,"summary":"John organized a coalition with Holy Roman Emperor Otto IV and the counts of Flanders and Boulogne to reclaim his lost French territories, planning a pincer attack on Philip II. After John's own force was checked at La Roche-aux-Moines, Philip won a decisive victory over the coalition at Bouvines on 27 July 1214. The defeat left John financially and politically weakened, emboldening the baronial opposition that produced Magna Carta the following year.","citations":[{"url":"https://en.wikipedia.org/wiki/Battle_of_Bouvines","title":"Battle of Bouvines","publisher":"Wikipedia","quote":"27 July 1214 near the town of Bouvines in the County of Flanders"},{"url":"https://en.wikipedia.org/wiki/Battle_of_Bouvines","title":"Battle of Bouvines","publisher":"Wikipedia","quote":"the disaster at Bouvines forever altered the political situation in England, as John was so weakened that his discontented barons forced him to agree to Magna Carta in 1215."}],"uncertain":null},{"id":"evt-1215-magna-carta","title":"Sealing of Magna Carta","date":"1215-06-15","endDate":null,"precision":"day","category":"law","actors":["john"],"place":"Runnymede, near Windsor","significance":5,"summary":"Facing baronial rebellion after years of military failure and financial exaction, John sealed Magna Carta at Runnymede on 15 June 1215. The charter bound the king to observe the law of the land, guaranteed that free men could not be imprisoned or dispossessed except by lawful judgment, and established a council of twenty-five barons to enforce its terms. Though annulled by the pope within weeks and reissued in modified form by later kings, it became a foundational reference point for constitutional limits on royal power.","citations":[{"url":"https://avalon.law.yale.edu/medieval/magna.asp","title":"Magna Carta (1215)","publisher":"The Avalon Project, Yale Law School","quote":"John, by the grace of God, king of England, lord of Ireland, duke of Normandy and Aquitaine, and count of Anjou, to the archbishop, bishops, abbots, earls, barons, justiciaries, foresters, sheriffs, stewards, servants… greetings."},{"url":"https://avalon.law.yale.edu/medieval/magna.asp","title":"Magna Carta (1215)","publisher":"The Avalon Project, Yale Law School","quote":"No freemen shall be taken or imprisoned or disseised or exiled or in any way destroyed, nor will we go upon him nor send upon him, except by the lawful judgment of his peers or by the law of the land."},{"url":"https://www.nationalarchives.gov.uk/education/resources/magna-carta/british-library-magna-carta-1215-runnymede/","title":"Magna Carta, 1215","publisher":"The National Archives (British Library translation)","quote":"Given by our hand in the meadow that is called Runnymede, between Windsor and Staines, on the fifteenth day of June in the seventeenth year of our reign (i.e. 1215)."}],"uncertain":null},{"id":"evt-1216-death-of-john","title":"Death of King John","date":"1216-10-19","endDate":null,"precision":"day","category":"dynastic","actors":["john","henry-iii"],"place":"Newark Castle, Nottinghamshire","significance":4,"summary":"Amid the civil war with rebel barons and Prince Louis's invading forces, John contracted dysentery during a retreat through eastern England and died at Newark Castle on 19 October 1216. His death, and the accession of his nine-year-old son Henry III, drained support from Louis's cause and turned the tide of the First Barons' War.","citations":[{"url":"https://en.wikipedia.org/wiki/John,_King_of_England","title":"John, King of England","publisher":"Wikipedia","quote":"In October 1216 John contracted dysentery, and he died at Newark Castle, Nottinghamshire."},{"url":"https://en.wikipedia.org/wiki/First_Barons%27_War","title":"First Barons' War","publisher":"Wikipedia","quote":"In October 1216 John contracted dysentery, and he died at Newark Castle, Nottinghamshire."}],"uncertain":null},{"id":"evt-1216-magna-carta-reissue","title":"First Reissue of Magna Carta","date":"1216-11-12","endDate":null,"precision":"day","category":"law","actors":["henry-iii","william-marshal"],"place":"Bristol, England","significance":4,"summary":"Days after being chosen regent for the nine-year-old Henry III, William Marshal's government republished Magna Carta in a revised form, an act intended to win over rebel barons by showing the new regime's commitment to the charter's reforms.","citations":[{"url":"https://en.wikisource.org/wiki/Dictionary_of_National_Biography,_1885-1900/Marshal,_William_(d.1219)","title":"Dictionary of National Biography, 1885-1900/Marshal, William (d.1219)","publisher":"Wikisource (Dictionary of National Biography, 1885-1900)","quote":"The first act of Marshal's government was to republish the Great Charter on 12 Nov."}],"uncertain":null},{"id":"evt-1217-battle-of-lincoln","title":"Battle of Lincoln","date":"1217-05-20","endDate":null,"precision":"day","category":"battle","actors":["henry-iii"],"place":"Lincoln, England","significance":3,"summary":"During the First Barons' War, a royalist relief force led by William Marshal, regent for the young Henry III, attacked and routed the army of Prince Louis of France at Lincoln, killing the French commander Thomas, Count of Perche. The victory was the turning point of the war, breaking the baronial rebellion that had invited Louis to claim the English throne, and it was followed by widespread looting of the city known as the 'Lincoln Fair'.","citations":[{"url":"https://en.wikipedia.org/wiki/Battle_of_Lincoln_(1217)","title":"Battle of Lincoln (1217)","publisher":"Wikipedia","quote":"was the turning point in the First Barons' War"},{"url":"https://en.wikipedia.org/wiki/Battle_of_Lincoln_(1217)","title":"Battle of Lincoln (1217)","publisher":"Wikipedia","quote":"was pillaged by Marshal's victorious army, on the pretence that it was loyal to Louis, later euphemistically called the 'Lincoln Fair'"}],"uncertain":null},{"id":"evt-1217-treaty-of-lambeth","title":"Treaty of Lambeth (Treaty of Kingston)","date":"1217-09-11","endDate":"1217-09-20","precision":"day","category":"treaty","actors":["henry-iii"],"place":"Lambeth Palace and Kingston upon Thames, England","significance":4,"summary":"Negotiated in a sequence of agreements at Lambeth and Kingston between 11 and 20 September 1217, in the wake of the royalist victories at Lincoln and at sea, this settlement ended Prince Louis of France's invasion and claim to the English throne and closed the First Barons' War. Louis renounced his claim and withdrew from England in exchange for a payment of 10,000 marks and an amnesty for the rebel barons; William Marshal, regent for the boy king Henry III, was criticised at the time for the generosity of the terms he granted, though it secured the peace.","citations":[{"url":"https://en.wikipedia.org/wiki/Treaty_of_Lambeth","title":"Treaty of Lambeth","publisher":"Wikipedia","quote":"a treaty signed by Louis and Henry's regents on 11 September at Lambeth Palace"},{"url":"https://en.wikipedia.org/wiki/Treaty_of_Lambeth","title":"Treaty of Lambeth","publisher":"Wikipedia","quote":"a Treaty of Lambeth signed on 20 September ratifying the Kingston treaty"},{"url":"https://en.wikipedia.org/wiki/Treaty_of_Lambeth","title":"Treaty of Lambeth","publisher":"Wikipedia","quote":"a peace treaty signed by Louis of France in September 1217 ending the campaign known as the First Barons' War to uphold the claim by Louis to the throne of England"},{"url":"https://en.wikipedia.org/wiki/William_Marshal,_1st_Earl_of_Pembroke","title":"William Marshal, 1st Earl of Pembroke","publisher":"Wikipedia","quote":"William was criticised for the generosity of the terms he accorded to Louis in September 1217, but his expedient settlement was dictated by sound statesmanship and a desire to remove the French from England as quickly as possible."}],"uncertain":"Sources give a sequence of dates for the settlement (11 September at Lambeth, 12 September at Kingston, ratified 20 September at Lambeth); this record spans the full sequence rather than picking a single day."},{"id":"evt-1217-magna-carta-second-reissue","title":"Second Reissue of Magna Carta","date":"1217-11-06","endDate":null,"precision":"day","category":"law","actors":["henry-iii","william-marshal"],"place":"England","significance":4,"summary":"Following the peace that ended the First Barons' War, William Marshal's regency government reissued Magna Carta again, now alongside a separate Charter of the Forest; this 1217 text established the version of Magna Carta that would be repeatedly confirmed by later kings.","citations":[{"url":"https://en.wikisource.org/wiki/Dictionary_of_National_Biography,_1885-1900/Marshal,_William_(d.1219)","title":"Dictionary of National Biography, 1885-1900/Marshal, William (d.1219)","publisher":"Wikisource (Dictionary of National Biography, 1885-1900)","quote":"The peace was followed on 6 Nov. by a reissue of the Great Charter, which now assumed its final form."}],"uncertain":null},{"id":"evt-1219-death-william-marshal","title":"Death of William Marshal","date":"1219-05-14","endDate":null,"precision":"day","category":"dynastic","actors":["william-marshal","henry-iii"],"place":"Caversham, near Reading","significance":4,"summary":"William Marshal, regent of England for the young Henry III, died at Caversham on 14 May 1219, having secured the kingdom's peace and reissued Magna Carta during his three-year regency.","citations":[{"url":"https://en.wikisource.org/wiki/Dictionary_of_National_Biography,_1885-1900/Marshal,_William_(d.1219)","title":"Dictionary of National Biography, 1885-1900/Marshal, William (d.1219)","publisher":"Wikisource (Dictionary of National Biography, 1885-1900)","quote":"On 14 May 1219 Marshal died at Caversham, near Reading."},{"url":"https://en.wikipedia.org/wiki/William_Marshal,_1st_Earl_of_Pembroke","title":"William Marshal, 1st Earl of Pembroke","publisher":"Wikipedia","quote":"He died peacefully on 14 May 1219 at Caversham, surrounded by his friends and family."}],"uncertain":null},{"id":"evt-1258-provisions-of-oxford","title":"Provisions of Oxford","date":"1258-06","endDate":null,"precision":"month","category":"law","actors":["henry-iii"],"place":"Oxford, England","significance":4,"summary":"At a parliament held in Oxford in June 1258, barons led by Simon de Montfort forced Henry III to accept sweeping reforms subordinating royal authority to a Council of Fifteen and requiring parliaments to meet three times a year. The office of justiciar, independent of the king, was revived to oversee the judiciary. Henry repudiated the Provisions in 1261, a reversal that helped trigger the Second Barons' War.","citations":[{"url":"https://en.wikipedia.org/wiki/Provisions_of_Oxford","title":"Provisions of Oxford","publisher":"Wikipedia","quote":"there be three parliaments a year ... to treat of the common wants of the kingdom, and of the king"},{"url":"https://en.wikipedia.org/wiki/Provisions_of_Oxford","title":"Provisions of Oxford","publisher":"Wikipedia","quote":"This was a most serious departure from previous practice, for it placed at the head of the judiciary a minister virtually independent of the king"}],"uncertain":null},{"id":"evt-1264-battle-of-lewes","title":"Battle of Lewes","date":"1264-05-14","endDate":null,"precision":"day","category":"battle","actors":["henry-iii","edward-i","richard-cornwall"],"place":"Lewes, Sussex","significance":4,"summary":"Simon de Montfort's baronial army defeated the royalist forces of Henry III at Lewes, capturing the king, his brother Richard of Cornwall, and Prince Edward. Henry was forced to accept the Mise of Lewes, and de Montfort became the effective ruler of England until Edward's escape and victory at Evesham the following year.","citations":[{"url":"https://en.wikipedia.org/wiki/Battle_of_Lewes","title":"Battle of Lewes","publisher":"Wikipedia","quote":"The Earl of Cornwall was captured by the barons when he was unable to reach the safety of the priory"},{"url":"https://en.wikipedia.org/wiki/Battle_of_Lewes","title":"Battle of Lewes","publisher":"Wikipedia","quote":"The King was forced by the barons to sign the so-called Mise of Lewes"}],"uncertain":null},{"id":"evt-1265-montfort-parliament","title":"Simon de Montfort's Parliament","date":"1265-01-20","endDate":"1265-03","precision":"day","category":"law","actors":["henry-iii"],"place":"Westminster, London","significance":4,"summary":"Ruling England after his victory at Lewes, Simon de Montfort summoned a parliament that, for the first time, included not only barons, senior churchmen and two knights from each county but also two burgesses from each of the major towns. Held to broaden support for his regime, it is regarded by many historians as a landmark in the development of representative parliament and of the later House of Commons, though others stress its partisan purpose rather than any democratic intent.","citations":[{"url":"https://en.wikipedia.org/wiki/Simon_de_Montfort%27s_Parliament","title":"Simon de Montfort's Parliament","publisher":"Wikipedia","quote":"not only the nobility, senior churchmen and two knights from each county, but also two burgesses from each of the major towns such as York, Lincoln, Sandwich, and the Cinque Ports, the first time this had been done"},{"url":"https://en.wikipedia.org/wiki/Simon_de_Montfort%27s_Parliament","title":"Simon de Montfort's Parliament","publisher":"Wikipedia","quote":"a very partisan assembly, not some sort of proto-democratic representative body"}],"uncertain":"Historians dispute how far this parliament should be seen as a genuine forerunner of representative government versus a partisan tactic by Montfort to shore up his regime; both readings are noted in the summary."},{"id":"evt-1265-battle-of-evesham","title":"Battle of Evesham","date":"1265-08-04","endDate":null,"precision":"day","category":"battle","actors":["henry-iii","edward-i"],"place":"Evesham, Worcestershire","significance":4,"summary":"Prince Edward trapped Simon de Montfort's smaller baronial army in a loop of the River Avon at Evesham, deceiving him with captured banners before destroying his force. De Montfort and his son Henry were killed and his body mutilated, ending the Second Barons' War and restoring royal authority to Henry III, who had been held as de Montfort's captive since Lewes.","citations":[{"url":"https://www.nationalarchives.gov.uk/education/resources/magna-carta/battle-of-evesham/","title":"Battle of Evesham, 1265","publisher":"The National Archives","quote":"Prince Edward and the earl of Gloucester gained the victory, and the earl of Leicester [Simon de Montfort] and his eldest son, Henry, were slain."},{"url":"https://en.wikipedia.org/wiki/Battle_of_Evesham","title":"Battle of Evesham","publisher":"Wikipedia","quote":"His body was mutilated; his head, hands, feet and testicles cut off."}],"uncertain":null},{"id":"evt-1267-statute-of-marlborough","title":"Statute of Marlborough","date":"1267-11","endDate":null,"precision":"month","category":"law","actors":["henry-iii","edward-i","richard-cornwall"],"place":"Marlborough, England","significance":3,"summary":"Issued in the fifty-second year of Henry III's reign, in the presence of the king, Richard of Cornwall (King of the Romans), and Prince Edward, the Statute of Marlborough re-enacted many of the reforming principles of the Provisions of Oxford as royal law, ending the disorder of the Second Barons' War. It restricted lords from taking distresses without recourse to the king's courts and regulated waste by tenants; several of its chapters remain in force in English law, making it the oldest statute still partly in effect.","citations":[{"url":"https://www.legislation.gov.uk/aep/Hen3cc1415/52/1","title":"The Statute of Marlborough 1267 [Distress]","publisher":"legislation.gov.uk","quote":"all Persons, as well of high as of low Estate, shall receive Justice in the King's Court; and none from henceforth shall take any such Revenge or Distress of his own Authority, without Award of the King's Court"},{"url":"https://www.legislation.gov.uk/aep/Hen3c23/52/23","title":"Statute of Marlborough 1267 [Waste]","publisher":"legislation.gov.uk","quote":"Fermors, during their Terms, shall not make Waste, Sale, nor Exile of House, Woods, Men, nor of any Thing belonging to the Tenements that they have to ferm"}],"uncertain":null},{"id":"evt-1272-death-of-henry-iii","title":"Death of Henry III","date":"1272-11-16","endDate":null,"precision":"day","category":"succession","actors":["henry-iii","edward-i"],"place":"Westminster, London","significance":4,"summary":"Henry III died at Westminster after a reign of 56 years, the longest of any English king to that point, and was buried in the abbey he had rebuilt. His son Edward, then away on crusade, succeeded him as Edward I without contest, the first time in over a century the English crown passed peacefully to an adult, undisputed heir.","citations":[{"url":"https://en.wikipedia.org/wiki/Henry_III_of_England","title":"Henry III of England","publisher":"Wikipedia","quote":"His body was buried in Westminster Abbey, which he had rebuilt in the second half of his reign, and was moved to his current tomb in 1290."},{"url":"https://en.wikipedia.org/wiki/Henry_III_of_England","title":"Henry III of England","publisher":"Wikipedia","quote":"He died in 1272, leaving Edward as his successor."}],"uncertain":null},{"id":"evt-1272-edward-i-accession","title":"Accession of Edward I","date":"1272-11-16","endDate":"1274-08-19","precision":"range","category":"succession","actors":["edward-i"],"place":"Westminster, England","significance":3,"summary":"Henry III died on 16 November 1272 while Edward I was returning from crusade, and Edward succeeded to the throne without opposition, being proclaimed king by hereditary right while barons swore allegiance in his absence. He did not hurry home, finally landing at Dover on 2 August 1274, and was crowned at Westminster Abbey on 19 August 1274 alongside Queen Eleanor.","citations":[{"url":"https://www.royal.uk/edward-i-longshanks","title":"Edward I 'Longshanks' (r. 1272-1307)","publisher":"Royal Household (royal.uk)","quote":"Edward succeeded to the throne without opposition - given his track record in military ability and his proven determination to give peace to the country, enhanced by his magnified exploits on crusade."},{"url":"https://en.wikipedia.org/wiki/Edward_I_of_England","title":"Edward I of England","publisher":"Wikipedia","quote":"On 2 August 1274 Edward returned to England, landing at Dover. The thirty-five-year-old king held his coronation on 19 August at Westminster Abbey, alongside Queen Eleanor."}],"uncertain":null},{"id":"evt-1275-statute-westminster-i","title":"Statute of Westminster I","date":"1275","endDate":null,"precision":"year","category":"law","actors":["edward-i"],"place":"Westminster, England","significance":3,"summary":"In Edward I's first parliament in 1275, the Statute of Westminster the First was enacted: a wide-ranging code issued to redress the state of the realm in such things as required amendment for the common profit of Holy Church and of the realm. Among much else it protected free parliamentary elections from force, malice, or menacing, and required that common right be done to all, as well poor as rich, without respect of persons. Its free-election clause remains partly in force in the United Kingdom today.","citations":[{"url":"https://en.wikisource.org/wiki/Freedom_of_Election_Act_1275","title":"Freedom of Election Act 1275 (Statute of Westminster the First, c.5)","publisher":"Wikisource","quote":"AND because Elections ought to be free, the King commandeth upon great Forfeiture, that no Man by force of Arms, nor by Malice, or Menacing, shall disturb any to make free Election."},{"url":"https://www.legislation.gov.uk/aep/Edw1/3/5/data.html","title":"Statute of Westminster, The First (1275) (c. 5)","publisher":"The National Archives / legislation.gov.uk","quote":"to redress the State of the Realm in such Things as required Amendment for the common profit of Holy Church, and of the Realm."},{"url":"https://en.wikipedia.org/wiki/Statute_of_Westminster_1275","title":"Statute of Westminster 1275","publisher":"Wikipedia","quote":"common right is to be done to all, as well poor as rich, without respect of persons"}],"uncertain":"The exact day and month of enactment is not firmly fixed by the sources consulted (Wikipedia gives 'April or May 1275'; the Wikisource text dates it by regnal and liturgical formula, 'Monday of Easter Utas', 3 Edw. I), so only year precision is asserted."},{"id":"evt-1277-treaty-aberconwy","title":"Treaty of Aberconwy","date":"1277-11-10","endDate":null,"precision":"day","category":"treaty","actors":["edward-i"],"place":"Aberconwy, Wales","significance":4,"summary":"The Treaty of Aberconwy, concluded on 10 November 1277, ended the first war between Edward I and Llywelyn ap Gruffudd, Prince of Wales. Llywelyn was stripped of most of his principality, with eastern Gwynedd split between Edward and Llywelyn's brother Dafydd ap Gruffydd, who had defected to Edward. Llywelyn's rule was confined to 'Lesser' Gwynedd, west of the river Conwy.","citations":[{"url":"https://en.wikipedia.org/wiki/Treaty_of_Aberconwy","title":"Treaty of Aberconwy","publisher":"Wikipedia","quote":"Eastern Gwynedd was split between Edward and Llywelyn's brother Dafydd ap Gruffydd, who had defected to Edward."},{"url":"https://www.encyclopedia.com/history/encyclopedias-almanacs-transcripts-and-maps/aberconwy-peace","title":"Aberconwy, Peace of","publisher":"Encyclopedia.com","quote":"His rule was confined to 'Lesser' Gwynedd, west of the Conwy."}],"uncertain":null},{"id":"evt-1284-statute-rhuddlan","title":"Statute of Rhuddlan (Statutum Walliae)","date":"1284-03-19","endDate":null,"precision":"day","category":"law","actors":["edward-i"],"place":"Rhuddlan, Wales","significance":4,"summary":"Following the death of Llywelyn ap Gruffudd in 1282 and the execution of his brother Dafydd ap Gruffudd in 1283, Edward I issued the Statute of Rhuddlan (Statutum Walliae) as a royal ordinance rather than an act of Parliament, first promulgated at Rhuddlan on 19 March 1284. It divided the conquered lands of Gwynedd into the three shires of Anglesey, Carnarvon and Merioneth, establishing an English administrative and legal framework over the conquered principality.","citations":[{"url":"https://en.wikisource.org/wiki/The_Statutes_of_Wales_(1908)/Introduction","title":"The Statutes of Wales (1908) — Introduction","publisher":"Wikisource","quote":"Gwynedd and its appurtenances were divided into the three shires of Anglesey, Carnarvon, and Merioneth."},{"url":"https://en.wikipedia.org/wiki/Statute_of_Rhuddlan","title":"Statute of Rhuddlan","publisher":"Wikipedia","quote":"first promulgated on 19 March 1284"},{"url":"https://www.encyclopedia.com/history/encyclopedias-almanacs-transcripts-and-maps/rhuddlan-statute","title":"Rhuddlan, Statute of","publisher":"Encyclopedia.com","quote":"a royal ordinance, not issued by Parliament"}],"uncertain":"Sources distinguish the date of the ordinance's making (3 March 1284) from its promulgation at Rhuddlan (19 March 1284); this record uses the promulgation date."},{"id":"evt-1290-expulsion-jews","title":"Edict of Expulsion of the Jews from England","date":"1290-07-18","endDate":null,"precision":"day","category":"church","actors":["edward-i"],"place":"England","significance":4,"summary":"On 18 July 1290, Edward I issued the Edict of Expulsion, ordering that all Jews were to leave England by All Saints' Day, 1 November 1290. The order followed Edward's return to England in 1289 deeply in debt, with the expulsion of the Jews being the price he agreed to pay for a large parliamentary tax grant. Jews were not permitted to resettle in England for centuries afterwards.","citations":[{"url":"https://en.wikipedia.org/wiki/Edict_of_Expulsion","title":"Edict of Expulsion","publisher":"Wikipedia","quote":"all Jews were to leave by All Saints' Day, 1 November 1290"},{"url":"https://www.nationalarchives.gov.uk/education/resources/jews-in-england-1290/","title":"Jews in England 1290","publisher":"The National Archives (UK)","quote":"by the time King Edward returned to England in 1289, he was deeply in debt … The expulsion of the Jews was the price he agreed to pay"}],"uncertain":"No surviving text of the 1290 edict itself was located; sources indicate the original is lost and only administrative writs to sheriffs survive. Estimates of the Jewish population affected vary: Wikipedia gives 'perhaps as few as 2,000 people, although estimates vary', while other accounts suggest figures around 3,000."},{"id":"evt-1291-great-cause","title":"The Great Cause: Arbitration of the Scottish Succession","date":"1291","endDate":"1292-11-17","precision":"range","category":"succession","actors":["edward-i"],"place":"Berwick-upon-Tweed, Scotland","significance":3,"summary":"After the death of the child queen Margaret, Maid of Norway, left the Scottish throne vacant, the Guardians of Scotland invited Edward I to arbitrate among the competing claimants in the process known as the Great Cause. Before hearing the case, Edward demanded in May 1291 that his claim of feudal overlordship of Scotland be recognised. On 17 November 1292 he ruled in favour of John Balliol, who swore fealty to Edward and was inaugurated King of Scots at Scone Abbey on 30 November 1292.","citations":[{"url":"https://en.wikipedia.org/wiki/Competitors_for_the_Crown_of_Scotland","title":"Competitors for the Crown of Scotland","publisher":"Wikipedia","quote":"Edward demanded in May 1291 that his claim of feudal overlordship of Scotland be recognised before he would step in and act as arbiter."},{"url":"https://www.worldhistory.org/John_Balliol/","title":"John Balliol","publisher":"World History Encyclopedia","quote":"Balliol swore fealty to Edward, and ten days later, he was inaugurated as King of Scotland on 30 November 1292 CE at Scone Abbey."}],"uncertain":null},{"id":"evt-1295-model-parliament","title":"The \"Model Parliament\" of 1295","date":"1295-11-13","endDate":null,"precision":"day","category":"law","actors":["edward-i"],"place":"Westminster, London, England","significance":4,"summary":"Edward I summoned a parliament to meet at Westminster on 13 November 1295, comprising the higher clergy and magnates alongside representatives of the lower clergy and elected knights of the shires and burgesses of the towns, chiefly to secure funds for his wars. Victorian constitutional historians, notably William Stubbs, later dubbed it the \"Model Parliament\" for containing the elements associated with later representative parliaments. Modern commentary treats the label as retrospective, since subsequent parliaments did not consistently reproduce this composition.","citations":[{"url":"https://en.wikipedia.org/wiki/Model_Parliament","title":"Model Parliament","publisher":"Wikipedia","quote":"Edward I summoned the parliament to meet at Westminster on 13 November 1295."},{"url":"https://www.timewisetraveller.co.uk/modelparliament.html","title":"THE \"MODEL PARLIAMENT\" OF 1295 (E1)","publisher":"Timewise Traveller","quote":"the term \"Model\" is itself something of a misnomer, because many assemblies summoned after this date did not follow the same composition."}],"uncertain":"The 'Model Parliament' label is a 19th-century historiographical term (attributed to William Stubbs) rather than a contemporary designation, and is described by one source consulted as a misnomer since later parliaments did not consistently replicate the 1295 composition."},{"id":"evt-1297-stirling-bridge","title":"Battle of Stirling Bridge","date":"1297-09-11","endDate":null,"precision":"day","category":"battle","actors":[],"place":"Stirling, Scotland","significance":4,"summary":"On 11 September 1297 the Scottish forces of Andrew Moray and William Wallace defeated the combined English forces of John de Warenne, 6th Earl of Surrey, and Hugh de Cressingham, treasurer of the English administration in Scotland, near Stirling on the River Forth. The English were caught crossing a narrow bridge over marshy ground and were routed, Cressingham being among the dead. Edward I was not present, having reassigned forces destined for Scotland to his own campaign in Flanders.","citations":[{"url":"https://en.wikipedia.org/wiki/Battle_of_Stirling_Bridge","title":"Battle of Stirling Bridge","publisher":"Wikipedia","quote":"On 11 September 1297, the forces of Andrew Moray and William Wallace defeated the combined English forces of John de Warenne, 6th Earl of Surrey, and Hugh de Cressingham near Stirling, on the River Forth."},{"url":"https://www.britishbattles.com/scottish-war-of-independence/battle-of-stirling-bridge/","title":"Battle of Stirling Bridge","publisher":"British Battles","quote":"John de Warenne, Earl of Surrey and Sussex and Hugh Cressingham, the Treasurer of the English administration in Scotland."},{"url":"https://www.medievalists.net/2013/01/the-man-who-lost-at-stirling-bridge/","title":"The man who lost at Stirling Bridge","publisher":"Medievalists.net","quote":"Edward reassigned forces destined for Scotland to assist with his campaign in Flanders."}],"uncertain":"Sources confirm Edward I had diverted troops to his Flanders campaign and left Scottish command to Warenne, but none of the sources consulted places him at a specific location on 11 September 1297 itself; his absence from the battle is inferred from the delegation of command and his known Flanders campaign."},{"id":"evt-1305-wallace-execution","title":"Execution of William Wallace","date":"1305-08-23","endDate":null,"precision":"day","category":"rebellion","actors":["edward-i"],"place":"Smithfield, London, England","significance":4,"summary":"William Wallace, captured near Glasgow in August 1305, was tried at Westminster Hall and found guilty of treason on 23 August 1305, though he maintained he had never sworn allegiance to Edward I. He was executed the same day at Smithfield, being hanged, drawn and quartered. His head was displayed on London Bridge and his limbs sent to towns in the north as a warning against rebellion.","citations":[{"url":"https://www.nationalwallacemonument.com/2023/07/wallaces-capture-and-execution/","title":"Wallace's Capture and Execution","publisher":"National Wallace Monument","quote":"On 23rd August 1305 Wallace was found guilty of treason and sentenced to death."},{"url":"https://en.wikipedia.org/wiki/William_Wallace","title":"William Wallace","publisher":"Wikipedia","quote":"hanged, drawn and quartered—strangled by hanging, but released while he was still alive, emasculated, eviscerated (with his bowels burned before him), beheaded, then cut into four parts."}],"uncertain":null},{"id":"evt-1307-edward-i-death","title":"Death of Edward I","date":"1307-07-07","endDate":null,"precision":"day","category":"succession","actors":["edward-i"],"place":"Burgh by Sands, Cumberland, England","significance":4,"summary":"Despite failing health, Edward I was carried north to pursue another campaign against the Scots, Robert Bruce having taken the Scottish crown, and died en route at Burgh by Sands near the Scottish border on 7 July 1307, aged 68. He was succeeded by his son Edward II, who inherited the unresolved war with Scotland.","citations":[{"url":"https://www.royal.uk/edward-i-longshanks","title":"Edward I 'Longshanks' (r. 1272-1307)","publisher":"Royal Household (royal.uk)","quote":"Despite his failing health, Edward was carried north to pursue another campaign, but he died en route at Burgh on Sands on 7 July 1307 aged 68"},{"url":"https://www.cumbriacountyhistory.org.uk/death-king-background-burgh-sands","title":"Death of a king [Background] Burgh by Sands","publisher":"Cumbria County History Trust","quote":"It was while on campaign against the Scots that Edward I died on 7th July 1307"}],"uncertain":null},{"id":"evt-1311-ordinances","title":"The Ordinances of 1311","date":"1311-10-05","endDate":null,"precision":"day","category":"law","actors":["edward-ii"],"place":"London, England","significance":3,"summary":"In 1311 a committee of barons and clergy known as the Lords Ordainers imposed the Ordinances on Edward II, a reform programme restricting royal authority. Grants made to the damage of the king and the impoverishment of the crown were annulled, and the king could no longer go to war without the consent of the baronage, nor reform the coinage. Ordinance 20 required that the king's favourite Piers Gaveston, as the evident enemy of the king and of his people, be completely exiled from England, Scotland, Ireland and Wales.","citations":[{"url":"https://thehistoryofengland.co.uk/resource/the-ordinances-of-1311/","title":"The Ordinances of 1311","publisher":"The History of England","quote":"All grants made to the damage of the king and the impoverishment of the crown since the commission was given to us . . . shall be annulled"},{"url":"https://thehistoryofengland.co.uk/resource/the-ordinances-of-1311/","title":"The Ordinances of 1311 — Ordinance 20","publisher":"The History of England","quote":"Piers Gavaston as the evident enemy of the king and of his people be completely exiled as well from the kingdom of England, Scotland, Ireland and Wales"},{"url":"https://en.wikipedia.org/wiki/Ordinances_of_1311","title":"Ordinances of 1311","publisher":"Wikipedia","quote":"The king could no longer go to war without the consent of the baronage, nor could he make reforms of the coinage."}],"uncertain":"Sources place the substantive completion of the articles in August 1311 but the formal presentation and proclamation on 5 October 1311; this record uses the October date. The British History Online edition (Parliament Rolls of Medieval England) is paywalled and could not be consulted directly."},{"id":"evt-1312-gaveston-execution","title":"Execution of Piers Gaveston","date":"1312-06-19","endDate":null,"precision":"day","category":"dynastic","actors":["edward-ii"],"place":"Blacklow Hill, near Warwick, Warwickshire, England","significance":3,"summary":"On 19 June 1312, Piers Gaveston, the exiled royal favourite of Edward II who had returned to England, was seized by the Earl of Warwick and taken to Blacklow Hill near Warwick, on the Earl of Lancaster's land. There two Welshmen ran him through with a sword and beheaded him, without any legal process. His killing deepened the political crisis between Edward II and the baronage that had produced the Ordinances of the previous year.","citations":[{"url":"https://en.wikipedia.org/wiki/Piers_Gaveston","title":"Piers Gaveston","publisher":"Wikipedia","quote":"On 19 June, he was taken out on the road towards Kenilworth as far as Blacklow Hill, which was on the Earl of Lancaster's land. Here, two Welshmen ran him through with a sword and beheaded him."},{"url":"https://www.executedtoday.com/2010/06/19/1312-piers-gaveston/","title":"1312: Piers Gaveston","publisher":"Executed Today","quote":"Gaveston was beheaded without color of law at Blacklow Hill near Warwick."}],"uncertain":null},{"id":"evt-1314-bannockburn","title":"Battle of Bannockburn","date":"1314-06-23","endDate":"1314-06-24","precision":"range","category":"battle","actors":["edward-ii"],"place":"Bannockburn, near Stirling, Scotland","significance":5,"summary":"On 23-24 June 1314, the Scottish army of Robert Bruce decisively defeated the English army of Edward II at Bannockburn, near Stirling, during the First War of Scottish Independence. Edward's larger force was routed by the smaller Scottish army, and Edward himself barely escaped the field. The battle was a decisive victory for Bruce and formed a major turning point in the war, which ended fourteen years later.","citations":[{"url":"https://en.wikipedia.org/wiki/Battle_of_Bannockburn","title":"Battle of Bannockburn","publisher":"Wikipedia","quote":"It was a decisive victory for Robert Bruce and formed a major turning point in the war, which ended 14 years later"},{"url":"https://www.britishbattles.com/scottish-war-of-independence/battle-of-bannockburn/","title":"Battle of Bannockburn","publisher":"British Battles","quote":"Robert de Bruce kills Sir Henry de Bohun in single combat on the first day of the Battle of Bannockburn on 23rd June 1314"}],"uncertain":null},{"id":"evt-1315-great-famine","title":"The Great Famine","date":"1315","endDate":"1317","precision":"range","category":"economy","actors":[],"place":"Northern Europe, including England","significance":4,"summary":"The Great Famine started with bad weather in spring 1315, most notably lengthy periods of rain which caused flooding and left agricultural fields waterlogged across Northern Europe including England. Crop failures lasted through 1316 until the summer harvest in 1317, and Europe did not fully recover until 1322. Livestock murrains compounded the shortages, and the resulting famine caused widespread mortality.","citations":[{"url":"https://en.wikipedia.org/wiki/Great_Famine_of_1315%E2%80%931317","title":"Great Famine of 1315-1317","publisher":"Wikipedia","quote":"The Great Famine started with bad weather in spring 1315. Crop failures lasted through 1316 until the summer harvest in 1317, and Europe did not fully recover until 1322."},{"url":"https://www.medievalists.net/2019/06/great-famine/","title":"10 Things to Know About the Great Famine","publisher":"Medievalists.net","quote":"The year 1315 saw drastic weather, most notably lengthy periods of rain, which caused flooding and left agricultural fields waterlogged."}],"uncertain":"Sources vary on the famine's chronological bounds: most identify the acute crisis as 1315-1317, but some extend related distress (livestock pestilence, slow recovery) to as late as 1322. Mortality estimates also vary widely by region and no single figure is asserted here."},{"id":"evt-1327-edward-ii-deposition","title":"Deposition of Edward II","date":"1327-01","endDate":null,"precision":"month","category":"succession","actors":["edward-ii","isabella-france","edward-iii"],"place":"Kenilworth Castle and Westminster, England","significance":5,"summary":"Following the 1326 invasion of England led by Queen Isabella of France and Roger Mortimer, a parliament convened at Westminster in January 1327, where the whole community of the realm there present unanimously chose Edward's son as guardian of the kingdom. Edward II was forced to relinquish his crown in January 1327 in favour of his son, who was proclaimed king in London on 25 January 1327. It was the first forced removal of a reigning English king by his subjects since the Norman Conquest.","citations":[{"url":"https://en.wikipedia.org/wiki/Parliament_of_1327","title":"Parliament of 1327","publisher":"Wikipedia","quote":"the whole community of the realm there present, unanimously chose [Edward] to be guardian of the said kingdom"},{"url":"https://en.wikipedia.org/wiki/Edward_II","title":"Edward II","publisher":"Wikipedia","quote":"Edward was forced to relinquish his crown in January 1327 in favour of his son, Edward III of England"},{"url":"https://en.wikipedia.org/wiki/Edward_III","title":"Edward III","publisher":"Wikipedia","quote":"who was proclaimed king in London on 25 January 1327"}],"uncertain":"Sources differ on the exact day of each step: Edward's agreement to abdicate is usually placed around 20-21 January, while his son's proclamation as king is dated 24 or 25 January depending on the account. Month-level precision is used rather than asserting a single contested day."},{"id":"evt-1327-edward-ii-death","title":"Reported death of Edward II","date":"1327-09-21","endDate":null,"precision":"day","category":"dynastic","actors":["edward-ii"],"place":"Berkeley Castle, Gloucestershire, England (traditional/reported location)","significance":4,"summary":"Edward II, deposed in January 1327 and held in custody, was reported to have died at Berkeley Castle on 21 September 1327. Many modern historians believe he was murdered on the orders of the new regime controlled by Isabella of France and Roger Mortimer, though the manner of death is not established. The widely known story that he was killed with a red-hot iron is not supported by near-contemporary sources and is regarded by scholars as later embellishment or hostile propaganda.","citations":[{"url":"https://en.wikipedia.org/wiki/Edward_II","title":"Edward II","publisher":"Wikipedia","quote":"he died in Berkeley Castle on 21 September, probably murdered on the orders of the new regime"},{"url":"https://historiesandcastles.com/blogs/medieval-english-monarchy/the-mysterious-death-of-edward-ii-at-berkeley-castle","title":"The Mysterious Death of Edward II at Berkeley Castle","publisher":"Histories and Castles","quote":"No near-contemporary source mentions it. Scholars dismiss it as propaganda, a cruel jab at the king's sexuality rather than historical fact."}],"uncertain":"The fact, date, and manner of Edward II's death are all genuinely disputed. The 'red-hot poker' story first appears only in chronicles written in the 1330s-1340s, well after the event, and is now widely regarded as later embellishment or hostile propaganda rather than fact; the more commonly favoured modern view — death by murder, possibly suffocation, on the orders of the Isabella-Mortimer regime — remains unproven. A minority position associated with the historian Ian Mortimer, resting on the Fieschi Letter (c.1337), argues Edward did not die at Berkeley in 1327 at all but was secretly released and lived on abroad; this survival thesis has been contested by other scholars as unconvincing. The date and place recorded here reflect the traditional account, not a settled fact."},{"id":"evt-1330-mortimer-coup","title":"Edward III's coup against Roger Mortimer","date":"1330-10-19","endDate":null,"precision":"day","category":"dynastic","actors":["edward-iii","isabella-france"],"place":"Nottingham Castle, England","significance":4,"summary":"On 19 October 1330 the seventeen-year-old Edward III, aided by his close companion William Montagu and a small number of other trusted men, took Roger Mortimer by surprise and captured him at Nottingham Castle, the party having been conducted into a secret underground passage by the castle's constable. Mortimer, who alongside Isabella of France had dominated the regency government since Edward II's deposition, was condemned without trial and hanged at Tyburn on 29 November 1330. The coup began Edward III's personal rule.","citations":[{"url":"https://en.wikipedia.org/wiki/Edward_III_of_England","title":"Edward III of England","publisher":"Wikipedia","quote":"Aided by his close companion William Montagu, 3rd Baron Montagu, and a small number of other trusted men, Edward took Mortimer by surprise and captured him at Nottingham Castle on 19 October 1330."},{"url":"https://en.wikipedia.org/wiki/Roger_Mortimer,_1st_Earl_of_March","title":"Roger Mortimer, 1st Earl of March","publisher":"Wikipedia","quote":"condemned without trial and hanged at Tyburn on 29 November 1330."},{"url":"https://nottinghamhiddenhistoryteam.wordpress.com/2015/10/12/the-story-of-mortimers-hole/","title":"The Story of Mortimer's Hole","publisher":"Nottingham Hidden History Team","quote":"Montagu and Edward's loyal Knights were conducted by William Elan (Constable of the Castle) into a secret underground passage leading up through the rock."}],"uncertain":null},{"id":"evt-1337-hundred-years-war","title":"Confiscation of Aquitaine and start of the Hundred Years' War","date":"1337-05","endDate":null,"precision":"month","category":"dynastic","actors":["edward-iii"],"place":"Paris and the Duchy of Aquitaine (Gascony)","significance":5,"summary":"In May 1337 it was agreed by Philip VI of France's council that Gascony should be taken back into Philip's hands, confiscating Edward III's continental duchy of Aquitaine along with the county of Ponthieu. This prompted Edward to renew his claim for the French throne, this time by force of arms, and he formally declared himself King of France in a ceremony at Ghent in January 1340. The confiscation and ensuing succession dispute are conventionally dated as the start of the Hundred Years' War.","citations":[{"url":"https://en.wikipedia.org/wiki/Hundred_Years%27_War","title":"Hundred Years' War","publisher":"Wikipedia","quote":"It was agreed that Gascony should be taken back into Philip's hands, which prompted Edward to renew his claim for the French throne, this time by force of arms."},{"url":"https://en.wikipedia.org/wiki/Edward_III_of_England","title":"Edward III of England","publisher":"Wikipedia","quote":"In 1337, Philip VI of France confiscated the English king's Duchy of Aquitaine and the county of Ponthieu."},{"url":"https://www.worldhistory.org/Hundred_Years'_War/","title":"Hundred Years' War","publisher":"World History Encyclopedia","quote":"Edward got the ball rolling by declaring himself King of France in a ceremony in Ghent in January 1340."}],"uncertain":"The exact day of the confiscation is not consistent across sources: Wikipedia's body text states only 'May 1337' while its infobox cites 24 May 1337 as the war's conventional start date, so month-level precision is used."},{"id":"evt-1346-crecy","title":"Battle of Crécy","date":"1346-08-26","endDate":null,"precision":"day","category":"battle","actors":["edward-iii","edward-black-prince"],"place":"Crécy-en-Ponthieu, Picardy, France","significance":5,"summary":"The Battle of Crécy on 26 August 1346 saw an English army under Edward III, including a division commanded by his son Edward the Black Prince, defeat a much larger French force led by King Philip VI in Picardy, northern France. The battle turned on the English and Welsh longbowmen, whose weapon was unique to them and took up to ten years to master. Crécy established the effectiveness of the longbow as a dominant weapon on the Western European battlefield.","citations":[{"url":"https://www.britannica.com/event/Battle-of-Crecy","title":"Battle of Crécy","publisher":"Encyclopaedia Britannica","quote":"The longbow used by the English and Welsh archers was unique to them; it took up to ten years to master"},{"url":"https://en.wikipedia.org/wiki/Battle_of_Cr%C3%A9cy","title":"Battle of Crécy","publisher":"Wikipedia","quote":"The battle established the effectiveness of the longbow as a dominant weapon on the Western European battlefield."},{"url":"https://www.worldhistory.org/article/1510/battle-of-crecy/","title":"Battle of Crécy","publisher":"World History Encyclopedia","quote":"The Battle of Crécy on 26 August 1346 CE saw an English army defeat a much larger French force"}],"uncertain":null},{"id":"evt-1348-black-death","title":"The Black Death reaches England","date":"1348","endDate":"1349","precision":"range","category":"plague","actors":[],"place":"Melcombe (Weymouth), Dorset, England","significance":5,"summary":"According to the Grey Friars' Chronicle, plague reached England by ship at Melcombe in the county of Dorset a little before the Feast of St John the Baptist in 1348; from there it spread through the country during 1348 and 1349. Mortality estimates vary considerably: for England a figure of 40-60% of the population is widely accepted, while broader estimates for Europe range from roughly one-third to between 30% and 50% of the population of affected areas. The pandemic caused catastrophic depopulation with lasting economic and social consequences.","citations":[{"url":"https://en.wikipedia.org/wiki/Black_Death_in_England","title":"Black Death in England","publisher":"Wikipedia","quote":"In this year, in Melcombe, in the county of Dorset, a little before the Feast of St. John the Baptist, two ships, one of them from Bristol, came alongside."},{"url":"https://en.wikipedia.org/wiki/Black_Death_in_England","title":"Black Death in England — mortality","publisher":"Wikipedia","quote":"a figure of 40–60% of the population is widely accepted."},{"url":"https://www.worldhistory.org/Black_Death/","title":"Black Death","publisher":"World History Encyclopedia","quote":"between 30% and 50% of the population of those places affected died from the Black Death."},{"url":"https://www.history.com/articles/black-death","title":"Black Death - Causes, Symptoms & Impact","publisher":"HISTORY (A&E Television Networks)","quote":"Over the next five years, the Black Death would kill more than 20 million people in Europe—almost one-third of the continent's population."}],"uncertain":"Mortality estimates conflict materially across sources and no single death toll is asserted: Wikipedia's England-specific article cites a widely accepted 40-60% figure, noting individual historians' estimates ranging from about 20% (Russell) to 62.5% (Benedictow); HISTORY gives roughly one-third for Europe overall; World History Encyclopedia gives 30-50% for affected areas."},{"id":"evt-1356-poitiers","title":"Battle of Poitiers","date":"1356-09-19","endDate":null,"precision":"day","category":"battle","actors":["edward-black-prince"],"place":"Near Poitiers, France","significance":4,"summary":"On 19 September 1356, an Anglo-Gascon army of roughly 6,000 men under Edward the Black Prince defeated a much larger French royal army of some 14,000 to 16,000 a few miles south of Poitiers. King John II of France was captured, as were his young son Philip and between 2,000 and 3,000 men-at-arms — a catastrophic outcome for the French crown. The king's captivity forced years of Anglo-French negotiation that eventually produced the Treaty of Brétigny in 1360.","citations":[{"url":"https://www.britannica.com/event/Battle-of-Poitiers-French-history-1356","title":"Battle of Poitiers | Description & Significance","publisher":"Encyclopaedia Britannica","quote":"King John II was captured, as were his 14-year-old son Philip and between 2,000 and 3,000 men-at-arms."},{"url":"https://en.wikipedia.org/wiki/Battle_of_Poitiers","title":"Battle of Poitiers","publisher":"Wikipedia","quote":"It took place in western France, 5 miles (8 km) south of Poitiers, when approximately 14,000 to 16,000 French attacked a strong defensive position held by 6,000 Anglo-Gascons."}],"uncertain":null},{"id":"evt-1360-treaty-bretigny","title":"Treaty of Brétigny","date":"1360-05-08","endDate":"1360-10-24","precision":"range","category":"treaty","actors":["edward-iii"],"place":"Brétigny, near Chartres, France (ratified at Calais)","significance":4,"summary":"Edward III and King John II of France agreed peace terms at Brétigny on 8 May 1360, ending the first phase of the Hundred Years' War, and the agreement was ratified at Calais in October 1360. Edward gave up his claim to the French throne in exchange for Ponthieu, Calais and an enlarged Aquitaine — Guyenne, Gascony, Poitou, Saintonge and Aunis — to be held free and clear, without doing homage. John II's release was tied to a large ransom.","citations":[{"url":"https://en.wikipedia.org/wiki/Treaty_of_Br%C3%A9tigny","title":"Treaty of Brétigny","publisher":"Wikipedia","quote":"By the terms of this treaty, Edward III obtained Guyenne, Gascony, Poitou, Saintonge and Aunis...The king of England was to hold these free and clear, without doing homage for them."},{"url":"https://www.gasconrolls.org/en/blog/654-years-on-the-treaty-of-bretigny-8-may-1360/","title":"654 years on: the treaty of Brétigny 8 May 1360","publisher":"Gascon Rolls Project (Department of Digital Humanities, King's College London)","quote":"On 8 May 1360, a peace treaty was finally signed. Edward III gave up his claims to the French throne in exchange of the county of Ponthieu, Calais and an enlarged Aquitaine in full sovereignty."}],"uncertain":"Sources consulted did not converge on a single ransom figure for John II (variously three or four million gold crowns/écus, with differing initial instalments), so no specific amount is asserted. No primary edition of the treaty text was located on the Avalon Project or elsewhere in this research."},{"id":"evt-1376-good-parliament","title":"The Good Parliament","date":"1376-04-28","endDate":"1376-07-10","precision":"range","category":"law","actors":["edward-iii","edward-black-prince","john-of-gaunt"],"place":"Westminster, England","significance":4,"summary":"Sitting at Westminster from 28 April to 10 July 1376, the Good Parliament was the longest Parliament up until that time. The Commons prosecuted the crown's ministers before the Lords in what became the first recorded parliamentary impeachments, petitioning that Lord Latimer be deprived of his office on the grounds that he had often deceived the king; the ailing Edward the Black Prince died during the session. After Parliament dissolved, John of Gaunt had the Good Parliament declared void and its acts removed from the books.","citations":[{"url":"https://sourcebooks.fordham.edu/source/1376goodparliament.asp","title":"Thomas Walsingham: The Good Parliament of 1376","publisher":"Fordham University Internet Medieval Sourcebook","quote":"they most urgently petitioned that he should be deprived of his office; he was said often to have deceived the king and to have been false---let me not say traitorous---to his lord the king."},{"url":"https://en.wikipedia.org/wiki/Good_Parliament","title":"Good Parliament","publisher":"Wikipedia","quote":"Sitting in Westminster from April 28 to July 10, it was the longest Parliament up until that time."},{"url":"https://en.wikipedia.org/wiki/Good_Parliament","title":"Good Parliament — aftermath","publisher":"Wikipedia","quote":"John had the Good Parliament declared void and its acts removed from the books."}],"uncertain":"The British History Online edition of the Parliament Rolls for April 1376 — the preferred primary source — is paywalled and could not be read, so it is not cited. The Fordham/Walsingham text consulted covers Latimer's impeachment but does not mention Alice Perrers, so the Perrers strand of the scandal is omitted from the summary for want of a verified source."},{"id":"evt-1376-black-prince-death","title":"Death of Edward the Black Prince","date":"1376-06-08","endDate":null,"precision":"day","category":"dynastic","actors":["edward-black-prince","edward-iii"],"place":"Palace of Westminster, England","significance":4,"summary":"The death of Edward the Black Prince was announced at the Palace of Westminster on 8 June 1376, when he was 46, after a long illness traditionally attributed to dysentery, his fits of which had become so violent they sometimes made him faint. Because he predeceased his father Edward III, his young son Richard became heir apparent in his place and the Black Prince never reigned.","citations":[{"url":"https://en.wikipedia.org/wiki/Edward_the_Black_Prince","title":"Edward the Black Prince","publisher":"Wikipedia","quote":"His death was announced at the Palace of Westminster on 8 June 1376. His fits of dysentery had become so violent they sometimes made him faint."},{"url":"https://www.worldhistory.org/Edward_the_Black_Prince/","title":"Edward the Black Prince","publisher":"World History Encyclopedia","quote":"Prince Edward was 46 when he died on 8 June 1376 CE, probably of dysentery, and a nation mourned."},{"url":"https://www.medievalists.net/2022/12/death-of-edward-the-black-prince/","title":"New study re-examines the death of Edward the Black Prince","publisher":"Medievalists.net","quote":"\"chronic dysentery is probably unlikely,\" the authors write, noting that someone suffering from amoebic dysentery would likely not have been well enough to travel by ship to military campaigns in 1372."}],"uncertain":"The cause of death is disputed. The traditional account (chronic dysentery contracted on the 1367 Spanish campaign) is challenged by a 2022 study in BMJ Military Health, which considers chronic dysentery unlikely and proposes malaria, brucellosis, inflammatory bowel disease, or complications of an acute rather than chronic dysentery episode."},{"id":"evt-1377-edward-iii-death","title":"Death of Edward III","date":"1377-06-21","endDate":null,"precision":"day","category":"succession","actors":["edward-iii"],"place":"Sheen, Surrey, England","significance":4,"summary":"After a brief period of recovery in February 1377, Edward III died of a stroke at Sheen on 21 June 1377, aged 64. His reign, begun in January 1327, had lasted fifty years, the longest of any medieval English king to that point. He was succeeded by his ten-year-old grandson Richard II, son of the Black Prince, who had predeceased him the previous year.","citations":[{"url":"https://en.wikipedia.org/wiki/Edward_III","title":"Edward III","publisher":"Wikipedia","quote":"After a brief period of recovery in February 1377, the King died of a stroke at Sheen on 21 June. Edward III was succeeded by his ten-year-old grandson, King Richard II."},{"url":"https://www.worldhistory.org/Edward_III_of_England/","title":"Edward III of England","publisher":"World History Encyclopedia","quote":"Edward suffered a stroke in 1376 and, never really recovering, he died on 21 June 1377 at Sheen Palace in Surrey. He was 64."}],"uncertain":null},{"id":"evt-1377-richard-ii-accession","title":"Richard II's accession","date":"1377-06-21","endDate":null,"precision":"day","category":"succession","actors":["richard-ii","john-of-gaunt"],"place":"England","significance":4,"summary":"On 21 June 1377 the ten-year-old Richard II succeeded his grandfather Edward III as King of England, his father Edward the Black Prince having predeceased Edward III in 1376. Because of his minority, government was carried on through a series of 'continual councils' rather than a single regent, a structure from which his powerful uncle John of Gaunt was pointedly excluded.","citations":[{"url":"https://en.wikipedia.org/wiki/Richard_II_of_England","title":"Richard II of England - Wikipedia","publisher":"Wikipedia","quote":"On 21 June 1377, King Edward III, who was for some years frail and decrepit, died after a 50-year reign. This resulted in the 10-year-old Richard succeeding to the throne."},{"url":"https://en.wikipedia.org/wiki/Richard_II_of_England","title":"Richard II of England - Wikipedia","publisher":"Wikipedia","quote":"Instead, the King was nominally to exercise kingship with the help of a series of 'continual councils', from which Gaunt was excluded."},{"url":"https://www.royal.uk/richard-ii","title":"Richard II (r. 1377-1399) | The Royal Family","publisher":"The Royal Household","quote":"The king's grandson, Richard II, succeeded to the throne aged 10, on his grandfather's death in 1377."}],"uncertain":null},{"id":"evt-1381-peasants-revolt","title":"Peasants' Revolt","date":"1381-05","endDate":"1381-06","precision":"range","category":"rebellion","actors":["richard-ii"],"place":"Essex, Kent, and London, England","significance":5,"summary":"In May and June 1381 a mass uprising swept south-east England, triggered by a third poll tax since 1377 imposed on all peasants irrespective of wealth. Rebel bands from Kent and Essex, led by Wat Tyler among others, marched on London, and the 14-year-old Richard II met them first at Mile End and then at Smithfield. At Smithfield, after Tyler behaved disrespectfully toward the king, the Mayor of London, William Walworth, struck him down; Richard then rode forward to calm the rebels and lead them away, and, their leader dead, the revolt collapsed. Richard's promises of pardon and reform were revoked once order was restored.","citations":[{"url":"https://en.wikipedia.org/wiki/Peasants'_Revolt","title":"Peasants' Revolt - Wikipedia","publisher":"Wikipedia","quote":"Richard rode forward towards the crowd and persuaded them to follow him away from Smithfield, to Clerkenwell Fields, defusing the situation... Tyler's head was cut off and displayed on a pole and... the rebel movement began to collapse."},{"url":"https://www.worldhistory.org/Peasants'_Revolt/","title":"Peasants' Revolt - World History Encyclopedia","publisher":"World History Encyclopedia","quote":"a new poll tax imposed on all peasants irrespective of wealth (the third such tax since 1377)."}],"uncertain":null},{"id":"evt-1382-wycliffe-condemnation","title":"Blackfriars Council condemns Wycliffe's teachings","date":"1382-05-21","endDate":null,"precision":"day","category":"church","actors":[],"place":"Blackfriars, London","significance":4,"summary":"On 21 May 1382 Archbishop of Canterbury William Courtenay convened a council at the Blackfriars in London to examine the teachings of John Wycliffe. The synod condemned twenty-four of Wycliffe's theses, ten as heretical and the remainder as erroneous, several of which had already been condemned at a synod at St Paul's in February 1377, formalising a campaign against his followers that would become known as Lollardy. The session became known as the 'Earthquake Synod' after a strong earthquake was felt in London during its sitting, which both sides interpreted as a sign of divine judgment on the other.","citations":[{"url":"https://en.wikipedia.org/wiki/Earthquake_Synod","title":"Earthquake Synod - Wikipedia","publisher":"Wikipedia","quote":"The Earthquake Synod was an English synod that took place on 21 May 1382 in the Blackfriars area of London, England... the synod condemned John Wycliffe's twenty-four theses"},{"url":"https://christianhistoryinstitute.org/magazine/article/john-wycliffe-and-the-dawn-of-the-reformation","title":"John Wycliffe and the Dawn of the Reformation","publisher":"Christian History Institute","quote":"Courtenay asked for the judgment of the Blackfriars Synod on twenty-four of Wycliffe's conclusions. Ten of them were condemned as heretical, four of these relating to the Mass; and the rest were condemned as erroneous."}],"uncertain":null},{"id":"evt-1388-merciless-parliament","title":"The Merciless Parliament","date":"1388-02-03","endDate":"1388-06-04","precision":"range","category":"law","actors":["richard-ii","henry-iv"],"place":"Westminster, London","significance":4,"summary":"Between 3 February and 4 June 1388 the 'Merciless Parliament' sat in judgment on the associates of Richard II, following the Lords Appellant's seizure of power the previous winter. Five lords — Gloucester, Arundel, Warwick, Nottingham, and Henry Bolingbroke, Earl of Derby — had appealed several of the king's favourites of treason; the parliament convicted and executed figures including Chief Justice Robert Tresilian and the former mayor Nicholas Brembre, while others such as Alexander Neville were exiled, in a purge contemporaries judged to have shown little mercy to Richard's circle.","citations":[{"url":"https://en.wikipedia.org/wiki/Merciless_Parliament","title":"Merciless Parliament - Wikipedia","publisher":"Wikipedia","quote":"The Merciless Parliament was an English parliamentary session lasting from 3 February to 4 June 1388, at which many members of King Richard II's court were convicted of treason."},{"url":"https://historyofparliament.com/2023/02/16/the-capture-and-execution-of-sir-robert-tresilian-chief-justice-of-kings-bench-and-the-merciless-parliament-of-1388/","title":"The capture and execution of Sir Robert Tresilian, chief justice of King's bench, and the 'Merciless Parliament' of 1388","publisher":"The History of Parliament","quote":"The appropriately and contemporaneously named 'Merciless' Parliament of 1388 was among the most dramatic of medieval Parliaments"}],"uncertain":null},{"id":"evt-1389-richard-ii-majority","title":"Richard II asserts his majority","date":"1389-05-03","endDate":null,"precision":"day","category":"dynastic","actors":["richard-ii","john-of-gaunt"],"place":"England","significance":3,"summary":"On 3 May 1389 Richard II, now twenty-two, announced to his council that he was assuming full personal control of government, declaring that the troubles of the preceding years had stemmed from bad councillors rather than any fault of his own. The reconciliation that year of his uncle John of Gaunt, who returned to England and settled his differences with the king, helped stabilise Richard's renewed authority after the upheavals of the Lords Appellant and the Merciless Parliament.","citations":[{"url":"https://en.wikipedia.org/wiki/Richard_II_of_England","title":"Richard II of England - Wikipedia","publisher":"Wikipedia","quote":"Richard assumed full control of the government on 3 May 1389, claiming that the difficulties of the past years had been due solely to bad councillors."},{"url":"https://www.historic-uk.com/HistoryUK/HistoryofEngland/King-Richard-II/","title":"King Richard II","publisher":"Historic UK","quote":"By 1389, Richard had come of age and blamed past mistakes on his councillors."}],"uncertain":null},{"id":"evt-1393-statute-praemunire","title":"Statute of Praemunire","date":"1393","endDate":null,"precision":"year","category":"law","actors":["richard-ii"],"place":"England","significance":3,"summary":"In 1393 Richard II's parliament passed the Statute of Praemunire, the most sweeping of a series of fourteenth-century statutes restricting papal authority in England. It made it illegal to appeal an English court case to the pope if the king objected, or otherwise to act in a way that recognised papal authority over the king's own, reinforcing the principle that presentments to churches and benefices belonged to the king's court rather than Rome.","citations":[{"url":"https://en.wikipedia.org/wiki/Statute_of_Praemunire","title":"Statute of Praemunire - Wikipedia","publisher":"Wikipedia","quote":"Its intention was to limit the powers of the papacy in England, by making it illegal to appeal an English court case to the pope if the king objected"},{"url":"https://en.wikisource.org/wiki/1911_Encyclop%C3%A6dia_Britannica/Praemunire","title":"1911 Encyclopædia Britannica/Praemunire","publisher":"Wikisource","quote":"that the right of recovering the presentments to churches, prebends, and other benefices . . . belongeth only to the king's court"}],"uncertain":"Sources differ on whether to date the statute 1392 or 1393: it fell within the 16th regnal year of Richard II (22 June 1392 - 21 June 1393); the Statutes Project catalogues it as 1392, while it is more commonly called the 'Statute of Praemunire, 1393' in secondary accounts."},{"id":"evt-1397-revenge-parliament","title":"The 'Revenge Parliament' and Richard II's purge of the Lords Appellant","date":"1397-09","endDate":"1398-01","precision":"range","category":"law","actors":["richard-ii"],"place":"Westminster and Shrewsbury, England","significance":4,"summary":"In July 1397 Richard II had the three senior Lords Appellant of 1388 arrested. Arundel was tried and executed at the parliament held at Westminster in September 1397; Gloucester, held prisoner at Calais awaiting trial, was killed on the king's orders to avoid the disgrace of publicly executing a prince of the blood; and Warwick's death sentence was commuted to life imprisonment. The adjourned session at Shrewsbury in January 1398, remembered as the 'Revenge Parliament,' annulled the acts of the 1388 Merciless Parliament and declared that no legal restraint could be placed on the king.","citations":[{"url":"https://en.wikipedia.org/wiki/Richard_II_of_England","title":"Richard II of England - Wikipedia","publisher":"Wikipedia","quote":"Arundel was the first of the three to be brought to trial, at the parliament of September 1397. After a heated quarrel with the King, he was condemned and executed."},{"url":"https://en.wikipedia.org/wiki/Richard_II_of_England","title":"Richard II of England - Wikipedia","publisher":"Wikipedia","quote":"The 1398 Parliament of Shrewsbury, styled the \"Revenge Parliament,\" declared all the acts of the Merciless Parliament to be null and void, and announced that no restraint could legally be put on the King."}],"uncertain":null},{"id":"evt-1398-bolingbroke-banishment","title":"Banishment of Henry Bolingbroke and
