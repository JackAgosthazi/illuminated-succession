 of Gloucester. After Thomas's murder in 1397 she retired to Barking Abbey, where she died in October 1399.","citations":[{"url":"https://en.wikipedia.org/wiki/Eleanor_de_Bohun","title":"Eleanor de Bohun","publisher":"Wikipedia","quote":"Humphrey de Bohun, 7th Earl of Hereford"},{"url":"https://en.wikipedia.org/wiki/Eleanor_de_Bohun","title":"Eleanor de Bohun","publisher":"Wikipedia","quote":"Joan Fitzalan"}],"uncertain":"The year of the marriage to Thomas of Woodstock is not firmly recorded: this Wikipedia article gives 1376, while other sources point to a grant made in anticipation of the marriage on 3 April 1374; the couple were certainly married by 24 August 1376."},{"id":"joan-holland-york","name":"Joan Holland","fullName":"Joan Holland, Duchess of York","epithet":null,"house":"Holland","role":"Duchess of York","monarch":false,"reign":null,"birth":{"date":"1380","place":"Upholland, Lancashire","precision":"circa","citations":[{"url":"https://en.wikipedia.org/wiki/Joan_Holland","title":"Joan Holland","publisher":"Wikipedia","quote":"ca. 1380"}]},"death":{"date":"1434-04-12","place":null,"precision":"day","citations":[{"url":"https://en.wikipedia.org/wiki/Joan_Holland","title":"Joan Holland","publisher":"Wikipedia","quote":"12 April 1434"}]},"parents":[],"spouses":[{"id":"edmund-langley","married":"1393-11-04","ended":"1402-08-01","endedBy":"death","citations":[{"url":"https://en.wikipedia.org/wiki/Joan_Holland","title":"Joan Holland","publisher":"Wikipedia","quote":"ca. 4 November 1393"}]}],"titles":[{"title":"Duchess of York","from":"1393","to":"1402-08-01","citations":[{"url":"https://en.wikipedia.org/wiki/Joan_Holland","title":"Joan Holland","publisher":"Wikipedia","quote":"As a result of this marriage, she was styled Duchess of York"}]}],"summary":"Joan Holland was the third daughter of Thomas Holland, 2nd Earl of Kent, and Alice FitzAlan. Around 4 November 1393 she became the second wife of Edmund of Langley, 1st Duke of York, whose grandfather Edward II was the half-brother of her own great-grandfather; the marriage was childless. Widowed in 1402, she remarried three more times, to William Willoughby, Henry Scrope, and Henry Bromflete, none of these unions producing children either.","citations":[{"url":"https://en.wikipedia.org/wiki/Joan_Holland","title":"Joan Holland","publisher":"Wikipedia","quote":"Thomas Holland, 2nd Earl of Kent"},{"url":"https://en.wikipedia.org/wiki/Joan_Holland","title":"Joan Holland","publisher":"Wikipedia","quote":"Alice FitzAlan"}],"uncertain":null},{"id":"john-iv-brittany","name":"John IV, Duke of Brittany","fullName":"John IV, Duke of Brittany","epithet":null,"house":"Montfort","role":"Duke of Brittany","monarch":false,"reign":null,"birth":{"date":"1339","place":null,"precision":"year","citations":[{"url":"https://en.wikipedia.org/wiki/John_IV,_Duke_of_Brittany","title":"John IV, Duke of Brittany","publisher":"Wikipedia","quote":"September–December 1339"}]},"death":{"date":"1399-11-01","place":null,"precision":"day","citations":[{"url":"https://en.wikipedia.org/wiki/John_IV,_Duke_of_Brittany","title":"John IV, Duke of Brittany","publisher":"Wikipedia","quote":"1 November 1399 (aged 59–60)"}]},"parents":[],"spouses":[{"id":"mary-waltham","married":"1361-07-03","ended":"1361-09","endedBy":"death","citations":[{"url":"https://en.wikipedia.org/wiki/John_IV,_Duke_of_Brittany","title":"John IV, Duke of Brittany","publisher":"Wikipedia","quote":"m. 1361; died 1361"}]}],"titles":[{"title":"Duke of Brittany","from":"1365-04-12","to":"1399-11-01","citations":[{"url":"https://en.wikipedia.org/wiki/John_IV,_Duke_of_Brittany","title":"John IV, Duke of Brittany","publisher":"Wikipedia","quote":"12 April 1365 – 1 November 1399"}]}],"summary":"John IV, Duke of Brittany, was the son of John of Montfort and Joanna of Flanders, and won the Breton War of Succession to secure his duchy. His first wife, Mary of Waltham, daughter of Edward III and Philippa of Hainault, died within months of their 1361 marriage. He went on to marry Joan Holland in 1366 and, after her death, Joan of Navarre in 1386, and ruled Brittany until his death in 1399.","citations":[{"url":"https://en.wikipedia.org/wiki/John_IV,_Duke_of_Brittany","title":"John IV, Duke of Brittany","publisher":"Wikipedia","quote":"John of Montfort"},{"url":"https://en.wikipedia.org/wiki/John_IV,_Duke_of_Brittany","title":"John IV, Duke of Brittany","publisher":"Wikipedia","quote":"Joanna of Flanders"}],"uncertain":null},{"id":"louis-palatine","name":"Louis III, Elector Palatine","fullName":"Louis III, Elector Palatine","epithet":null,"house":"Wittelsbach","role":"Elector Palatine","monarch":false,"reign":null,"birth":{"date":"1378-01-23","place":null,"precision":"day","citations":[{"url":"https://en.wikipedia.org/wiki/Louis_III,_Elector_Palatine","title":"Louis III, Elector Palatine","publisher":"Wikipedia","quote":"23 January 1378"}]},"death":{"date":"1436-12-30","place":null,"precision":"day","citations":[{"url":"https://en.wikipedia.org/wiki/Louis_III,_Elector_Palatine","title":"Louis III, Elector Palatine","publisher":"Wikipedia","quote":"30 December 1436 (aged 58)"}]},"parents":[],"spouses":[{"id":"blanche-england","married":"1402-07-06","ended":"1409-05-22","endedBy":"death","citations":[{"url":"https://en.wikipedia.org/wiki/Louis_III,_Elector_Palatine","title":"Louis III, Elector Palatine","publisher":"Wikipedia","quote":"6 July 1402"}]}],"titles":[{"title":"Elector Palatine","from":"1410-05-18","to":"1436-12-30","citations":[{"url":"https://en.wikipedia.org/wiki/Louis_III,_Elector_Palatine","title":"Louis III, Elector Palatine","publisher":"Wikipedia","quote":"18 May 1410 – 30 December 1436"}]}],"summary":"Louis III, Elector Palatine, was the son of King Rupert of Germany and Elisabeth of Nuremberg. He married Blanche of England, eldest daughter of Henry IV, at Cologne Cathedral on 6 July 1402; she died in 1409 without surviving the marriage long. Louis became Elector Palatine in 1410 and later married Matilda of Savoy in 1417, having earlier served as imperial vicar during his father's Italian campaign of 1401–1402.","citations":[{"url":"https://en.wikipedia.org/wiki/Louis_III,_Elector_Palatine","title":"Louis III, Elector Palatine","publisher":"Wikipedia","quote":"Rupert of Germany"},{"url":"https://en.wikipedia.org/wiki/Louis_III,_Elector_Palatine","title":"Louis III, Elector Palatine","publisher":"Wikipedia","quote":"Elisabeth of Nuremberg"}],"uncertain":null},{"id":"erik-pomerania","name":"Erik of Pomerania","fullName":"Erik of Pomerania","epithet":null,"house":"Griffin","role":"King of Denmark, Norway and Sweden (Kalmar Union); Duke of Pomerania","monarch":false,"reign":null,"birth":{"date":"1381/1382","place":"Darlowo Castle, Pomerania","precision":"range","citations":[{"url":"https://en.wikipedia.org/wiki/Eric_of_Pomerania","title":"Eric of Pomerania","publisher":"Wikipedia","quote":"1381 or 1382"}]},"death":{"date":"1459-09-24","place":"Darlowo Castle, Pomerania","precision":"day","citations":[{"url":"https://en.wikipedia.org/wiki/Eric_of_Pomerania","title":"Eric of Pomerania","publisher":"Wikipedia","quote":"24 September 1459"}]},"parents":[],"spouses":[{"id":"philippa-england","married":"1406-10-26","ended":"1430-01-05","endedBy":"death","citations":[{"url":"https://en.wikipedia.org/wiki/Eric_of_Pomerania","title":"Eric of Pomerania","publisher":"Wikipedia","quote":"On 26 October 1406, he married the 12-year-old Philippa in Lund"}]}],"titles":[{"title":"King of Denmark, Norway and Sweden (Kalmar Union)","from":"1396","to":"1439","citations":[{"url":"https://en.wikipedia.org/wiki/Eric_of_Pomerania","title":"Eric of Pomerania","publisher":"Wikipedia","quote":"ruled over the Kalmar Union from 1396 until 1439"}]}],"summary":"Erik of Pomerania, son of Wartislaw VII, Duke of Pomerania, and Maria of Mecklenburg-Schwerin, was elected to rule the Kalmar Union of Denmark, Norway and Sweden, initially as co-ruler with his great-aunt Margaret I until her death in 1412. On 26 October 1406 he married the twelve-year-old Philippa of England, daughter of Henry IV, at Lund Cathedral; she died in 1430 without children. Erik was deposed from the union kingdoms between 1439 and 1442 and later ruled as Duke of Pomerania until his death in 1459.","citations":[{"url":"https://en.wikipedia.org/wiki/Eric_of_Pomerania","title":"Eric of Pomerania","publisher":"Wikipedia","quote":"Wartislaw VII, Duke of Pomerania"},{"url":"https://en.wikipedia.org/wiki/Eric_of_Pomerania","title":"Eric of Pomerania","publisher":"Wikipedia","quote":"ruled over the Kalmar Union from 1396 until 1439"}],"uncertain":"Erik's birth year is given only as 1381 or 1382 by the source consulted."},{"id":"owen-tudor","name":"Owen Tudor","fullName":"Owain ap Maredudd ap Tudur","epithet":null,"house":"Tudor","role":"Welsh courtier and soldier; second husband of Catherine of Valois","monarch":false,"reign":null,"birth":{"date":"1400","place":"Anglesey, Wales","precision":"circa","citations":[{"url":"https://en.wikipedia.org/wiki/Owen_Tudor","title":"Owen Tudor","publisher":"Wikipedia","quote":"c. 1400"}]},"death":{"date":"1461-02-02","place":"Hereford","precision":"day","citations":[{"url":"https://en.wikipedia.org/wiki/Owen_Tudor","title":"Owen Tudor","publisher":"Wikipedia","quote":"2 February 1461"}]},"parents":[],"spouses":[{"id":"catherine-valois","married":null,"ended":null,"endedBy":null,"citations":[{"url":"https://en.wikipedia.org/wiki/Catherine_of_Valois","title":"Catherine of Valois","publisher":"Wikipedia","quote":"There is no known date of Catherine's marriage to Owen."},{"url":"https://en.wikipedia.org/wiki/Owen_Tudor","title":"Owen Tudor","publisher":"Wikipedia","quote":"the second husband of Queen Catherine of Valois (1401–1437)"}]}],"titles":[],"summary":"Owen Tudor was a Welsh courtier and soldier from Penmynydd, Anglesey, descended from Ednyfed Fychan, seneschal of Gwynedd, and served as an officer of the household of Catherine of Valois, widow of Henry V. He entered a relationship with Catherine after Parliament restricted her remarriage without royal consent in 1427–28; no date or clear record of a formal marriage survives, though contemporaries do not appear to have contested the legitimacy of the children. Their sons Edmund and Jasper Tudor were later ennobled by their half-brother Henry VI, and Edmund's son became Henry VII, founder of the Tudor dynasty. Owen Tudor was captured fighting for the Lancastrian cause and executed at Hereford in 1461.","citations":[{"url":"https://en.wikipedia.org/wiki/Owen_Tudor","title":"Owen Tudor","publisher":"Wikipedia","quote":"Welsh courtier and soldier"},{"url":"https://en.wikipedia.org/wiki/Catherine_of_Valois","title":"Catherine of Valois","publisher":"Wikipedia","quote":"there is no contemporaneous evidence that the validity of the marriage and the legitimacy of her children were questioned in secular or canon law"}],"uncertain":"Whether Owen Tudor and Catherine of Valois ever contracted a legally valid marriage, and when, is not established by the sources: no date is recorded, Parliament had barred her remarriage without consent in 1427–28, and the union is known mainly through its consequences (the birth of Edmund and Jasper Tudor) rather than direct record of a ceremony."},{"id":"eleanor-cobham","name":"Eleanor Cobham","fullName":"Eleanor Cobham, Duchess of Gloucester","epithet":null,"house":null,"role":"Duchess of Gloucester","monarch":false,"reign":null,"birth":{"date":"1400","place":"Sterborough Castle, Surrey","precision":"circa","citations":[{"url":"https://en.wikipedia.org/wiki/Eleanor_Cobham","title":"Eleanor Cobham","publisher":"Wikipedia","quote":"c. 1400"}]},"death":{"date":"1452-07-07","place":"Beaumaris Castle, Anglesey","precision":"day","citations":[{"url":"https://en.wikipedia.org/wiki/Eleanor_Cobham","title":"Eleanor Cobham","publisher":"Wikipedia","quote":"7 July 1452 (aged c. 52)"}]},"parents":[],"spouses":[{"id":"humphrey-lancaster-gloucester","married":"1428","ended":"1441","endedBy":"annulment","citations":[{"url":"https://en.wikipedia.org/wiki/Eleanor_Cobham","title":"Eleanor Cobham","publisher":"Wikipedia","quote":"second wife of Humphrey, Duke of Gloucester"}]}],"titles":[],"summary":"Eleanor Cobham was the daughter of Sir Reynold Cobham of Sterborough Castle, Surrey. She entered the household of Jacqueline of Hainaut, first wife of Humphrey, Duke of Gloucester, and by 1428 had become Humphrey's second wife. In 1441, after she had reportedly consulted astrologers about the king's fortunes, she was tried and convicted of treasonable necromancy; the marriage was annulled and she was sentenced to life imprisonment, dying in custody at Beaumaris Castle in 1452.","citations":[{"url":"https://en.wikipedia.org/wiki/Eleanor_Cobham","title":"Eleanor Cobham","publisher":"Wikipedia","quote":"Sir Reynold Cobham (d. 1445)"},{"url":"https://en.wikipedia.org/wiki/Eleanor_Cobham","title":"Eleanor Cobham","publisher":"Wikipedia","quote":"In 1441, she was forcibly divorced and sentenced to life imprisonment for treasonable necromancy, a punishment likely to have been politically motivated."}],"uncertain":"The exact date of the marriage to Humphrey of Gloucester is given only as between 1428 and 1431 in the source consulted. The 1441 sorcery conviction falls after this dataset's 1042-1422 scope and is noted here only insofar as it is directly sourced."},{"id":"jacqueline-hainaut","name":"Jacqueline, Countess of Hainaut","fullName":"Jacqueline, Countess of Hainaut, Holland and Zeeland","epithet":null,"house":"Wittelsbach","role":"Countess of Hainaut, Holland and Zeeland; first wife of Humphrey, Duke of Gloucester","monarch":false,"reign":null,"birth":{"date":"1401-07-15","place":"Le Quesnoy, Nord","precision":"day","citations":[{"url":"https://en.wikipedia.org/wiki/Jacqueline,_Countess_of_Hainaut","title":"Jacqueline, Countess of Hainaut","publisher":"Wikipedia","quote":"15 July 1401"}]},"death":{"date":"1436-10-08","place":"Voorhout, Teylingen","precision":"day","citations":[{"url":"https://en.wikipedia.org/wiki/Jacqueline,_Countess_of_Hainaut","title":"Jacqueline, Countess of Hainaut","publisher":"Wikipedia","quote":"8 October 1436"}]},"parents":[],"spouses":[{"id":"humphrey-lancaster-gloucester","married":"1423-03","ended":"1428-07-03","endedBy":"annulment","citations":[{"url":"https://en.wikipedia.org/wiki/Jacqueline,_Countess_of_Hainaut","title":"Jacqueline, Countess of Hainaut","publisher":"Wikipedia","quote":"sometime between February and 7 March 1423"},{"url":"https://en.wikipedia.org/wiki/Jacqueline,_Countess_of_Hainaut","title":"Jacqueline, Countess of Hainaut","publisher":"Wikipedia","quote":"On 3 July 1428 Jacqueline had to agree to a peace treaty"}]}],"titles":[{"title":"Countess of Hainaut, Holland and Zeeland","from":"1417-05-30","to":"1433-04-12","citations":[{"url":"https://en.wikipedia.org/wiki/Jacqueline,_Countess_of_Hainaut","title":"Jacqueline, Countess of Hainaut","publisher":"Wikipedia","quote":"30 May 1417 – 12 April 1433"}]}],"summary":"Jacqueline of Hainaut was the daughter of William II, Duke of Bavaria and Count of Hainaut, Holland and Zeeland, and Margaret of Burgundy. Widowed young from her first marriage to the Dauphin John of France, she married Humphrey, Duke of Gloucester, in 1423 while contesting her uncle John of Bavaria's seizure of her lands, but the papacy regarded the union as illegitimate and by treaty in July 1428 it was effectively annulled. She married twice more, finally to Frank van Borssele, and died in 1436.","citations":[{"url":"https://en.wikipedia.org/wiki/Jacqueline,_Countess_of_Hainaut","title":"Jacqueline, Countess of Hainaut","publisher":"Wikipedia","quote":"William II, Duke of Bavaria"},{"url":"https://en.wikipedia.org/wiki/Jacqueline,_Countess_of_Hainaut","title":"Jacqueline, Countess of Hainaut","publisher":"Wikipedia","quote":"The Pope had also decreed the marriage illegitimate."}],"uncertain":null},{"id":"anne-burgundy","name":"Anne lisher":"Wikipedia","quote":"Duchess of Clarence"}]}],"summary":"Margaret Holland was a daughter of Thomas Holland, 2nd Earl of Kent, and Alice FitzAlan. She married John Beaufort, 1st Earl of Somerset, eldest of the Beaufort children of John of Gaunt and Katherine Swynford, in 1397, and had six children by him, including Cardinal Henry Beaufort's nephew John, Duke of Somerset, and Joan Beaufort, later queen of Scots. Widowed in 1410, she married Thomas, Duke of Clarence, second son of Henry IV, in late 1411; he died at the Battle of Baugé in 1421, and Margaret survived him until 1439.","citations":[{"url":"https://en.wikipedia.org/wiki/Margaret_Holland,_Duchess_of_Clarence","title":"Margaret Holland, Duchess of Clarence","publisher":"Wikipedia","quote":"Margaret was a daughter of Thomas Holland, 2nd Earl of Kent"},{"url":"https://en.wikipedia.org/wiki/Margaret_Holland,_Duchess_of_Clarence","title":"Margaret Holland, Duchess of Clarence","publisher":"Wikipedia","quote":"They had six children"}],"uncertain":null},{"id":"margaret-neville","name":"Margaret Neville","fullName":"Margaret Neville, Duchess of Exeter","epithet":null,"house":"Neville","role":"Duchess of Exeter; wife of Thomas Beaufort, Duke of Exeter","monarch":false,"reign":null,"birth":{"date":"1384","place":null,"precision":"circa","citations":[{"url":"https://en.wikipedia.org/wiki/Thomas_Beaufort,_Duke_of_Exeter","title":"Thomas Beaufort, Duke of Exeter","publisher":"Wikipedia","quote":"Margaret Neville (born c. 1384)"}]},"death":null,"parents":[],"spouses":[{"id":"thomas-beaufort","married":null,"ended":null,"endedBy":null,"citations":[{"url":"https://en.wikipedia.org/wiki/Thomas_Beaufort,_Duke_of_Exeter","title":"Thomas Beaufort, Duke of Exeter","publisher":"Wikipedia","quote":"He married the daughter of Sir Thomas Neville (died 1387) of Hornby, Margaret Neville (born c. 1384)."}]}],"titles":[],"summary":"Margaret Neville was the daughter of Sir Thomas Neville of Hornby, who died in 1387. She married Thomas Beaufort, later Duke of Exeter and youngest of the Beaufort children of John of Gaunt and Katherine Swynford; the couple had one son, Henry, who died in infancy. No date is recorded for the marriage or for Margaret's death.","citations":[{"url":"https://en.wikipedia.org/wiki/Thomas_Beaufort,_Duke_of_Exeter","title":"Thomas Beaufort, Duke of Exeter","publisher":"Wikipedia","quote":"He married the daughter of Sir Thomas Neville (died 1387) of Hornby, Margaret Neville (born c. 1384)."},{"url":"https://en.wikipedia.org/wiki/Thomas_Beaufort,_Duke_of_Exeter","title":"Thomas Beaufort, Duke of Exeter","publisher":"Wikipedia","quote":"Henry Beaufort, who died young"}],"uncertain":"No marriage date or death date for Margaret Neville is given in the source consulted; the article provides minimal biographical detail beyond her parentage and her one son who died in infancy."},{"id":"ralph-neville-westmorland","name":"Ralph Neville, 1st Earl of Westmorland","fullName":"Ralph de Neville, 1st Earl of Westmorland","epithet":null,"house":"Neville","role":"Earl of Westmorland","monarch":false,"reign":null,"birth":{"date":"1364","place":null,"precision":"circa","citations":[{"url":"https://en.wikipedia.org/wiki/Ralph_de_Neville,_1st_Earl_of_Westmorland","title":"Ralph de Neville, 1st Earl of Westmorland","publisher":"Wikipedia","quote":"c. 1364"}]},"death":{"date":"1425-10-21","place":null,"precision":"day","citations":[{"url":"https://en.wikipedia.org/wiki/Ralph_de_Neville,_1st_Earl_of_Westmorland","title":"Ralph de Neville, 1st Earl of Westmorland","publisher":"Wikipedia","quote":"21 October 1425"}]},"parents":[],"spouses":[{"id":"joan-beaufort","married":"1396-11","ended":"1425-10-21","endedBy":"death","citations":[{"url":"https://en.wikipedia.org/wiki/Ralph_de_Neville,_1st_Earl_of_Westmorland","title":"Ralph de Neville, 1st Earl of Westmorland","publisher":"Wikipedia","quote":"Neville married secondly, before 29 November 1396"}]}],"titles":[{"title":"Earl of Westmorland","from":"1397-09-29","to":"1425-10-21","citations":[{"url":"https://en.wikipedia.org/wiki/Ralph_de_Neville,_1st_Earl_of_Westmorland","title":"Ralph de Neville, 1st Earl of Westmorland","publisher":"Wikipedia","quote":"created Earl of Westmorland on 29 September"}]}],"summary":"Ralph Neville, son of John Neville, 3rd Baron Neville, and Maud Percy, was created Earl of Westmorland in 1397. His first wife, Margaret Stafford, died in June 1396, and before the end of that November he married Joan Beaufort, daughter of John of Gaunt, becoming a royal kinsman by marriage. He held high offices including Earl Marshal and played a leading role in northern politics and border warfare with Scotland until his death in 1425.","citations":[{"url":"https://en.wikipedia.org/wiki/Ralph_de_Neville,_1st_Earl_of_Westmorland","title":"Ralph de Neville, 1st Earl of Westmorland","publisher":"Wikipedia","quote":"John Neville, 3rd Baron Neville"},{"url":"https://en.wikipedia.org/wiki/Ralph_de_Neville,_1st_Earl_of_Westmorland","title":"Ralph de Neville, 1st Earl of Westmorland","publisher":"Wikipedia","quote":"As a royal kinsman through his marriage to Joan Beaufort, he was rewarded with high offices, including Earl Marshal, and played a central role in northern politics and border warfare with Scotland."}],"uncertain":null},{"id":"robert-ferrers","name":"Robert Ferrers","fullName":"Robert Ferrers of Wem","epithet":null,"house":null,"role":"Of Wem, Shropshire; first husband of Joan Beaufort","monarch":false,"reign":null,"birth":{"date":"1373","place":"Willisham","precision":"circa","citations":[{"url":"https://en.wikipedia.org/wiki/Robert_Ferrers,_5th_Baron_Boteler_of_Wem","title":"Robert Ferrers of Wem","publisher":"Wikipedia","quote":"Born c. 1373"}]},"death":{"date":"1396","place":null,"precision":"circa","citations":[{"url":"https://en.wikipedia.org/wiki/Robert_Ferrers,_5th_Baron_Boteler_of_Wem","title":"Robert Ferrers of Wem","publisher":"Wikipedia","quote":"bef. 29 November 1396"}]},"parents":[],"spouses":[{"id":"joan-beaufort","married":"1391","ended":"1396","endedBy":"death","citations":[{"url":"https://en.wikipedia.org/wiki/Joan_Beaufort,_Countess_of_Westmorland","title":"Joan Beaufort, Countess of Westmorland","publisher":"Wikipedia","quote":"The marriage took place in 1391/2 at Beaufort-en-Vallée, Anjou"}]}],"titles":[],"summary":"Robert Ferrers of Wem, whose father had once been summoned to Parliament as Lord Ferrers of Wem though Robert himself never was, married Joan Beaufort, daughter of John of Gaunt, in 1391 at Beaufort-en-Vallée in Anjou. The marriage produced two daughters, Elizabeth and Mary, before Robert died young, before 29 November 1396.","citations":[{"url":"https://en.wikipedia.org/wiki/Robert_Ferrers,_5th_Baron_Boteler_of_Wem","title":"Robert Ferrers of Wem","publisher":"Wikipedia","quote":"His father had been summoned to Parliament in 1375 as Robert Ferrers of Wem"},{"url":"https://en.wikipedia.org/wiki/Robert_Ferrers,_5th_Baron_Boteler_of_Wem","title":"Robert Ferrers of Wem","publisher":"Wikipedia","quote":"Mary or Margery (1394 – 25 January 1457/1458)"}],"uncertain":"Robert Ferrers's claim to the barony of Ferrers of Wem is unresolved in the source: his father was summoned to Parliament under that style, but Robert himself was never so summoned."},{"id":"anne-stafford","name":"Anne Stafford","fullName":"Anne Stafford, Countess of March","epithet":null,"house":"Stafford","role":"Countess of March; later Duchess of Exeter","monarch":false,"reign":null,"birth":{"date":"1400","place":null,"precision":"circa","citations":[{"url":"https://www.encyclopedia.com/women/encyclopedias-almanacs-transcripts-and-maps/stafford-anne-c-1400-1432","title":"Anne Stafford (c. 1400-1432)","publisher":"Encyclopedia.com","quote":"Born around 1400"}]},"death":{"date":"1432-09-20","place":null,"precision":"circa","citations":[{"url":"https://en.wikipedia.org/wiki/Edmund_Mortimer,_5th_Earl_of_March","title":"Edmund Mortimer, 5th Earl of March","publisher":"Wikipedia","quote":"She died on 20 or 24 September 1432, and was buried in the church of St Katharine's by the Tower."}]},"parents":[],"spouses":[{"id":"edmund-mortimer","married":"1415","ended":"1425-01-18","endedBy":"death","citations":[{"url":"https://en.wikipedia.org/wiki/Edmund_Mortimer,_5th_Earl_of_March","title":"Edmund Mortimer, 5th Earl of March","publisher":"Wikipedia","quote":"On 17 January 1415 Edmund obtained a papal dispensation to marry \"a fit woman\" related to him in the third degree of kindred or affinity."},{"url":"https://en.wikipedia.org/wiki/Edmund_Mortimer,_5th_Earl_of_March","title":"Edmund Mortimer, 5th Earl of March","publisher":"Wikipedia","quote":"This allowed him to marry his second cousin once removed, Anne Stafford (m. 1415)."}]}],"titles":[],"summary":"Anne Stafford was a daughter of Edmund Stafford, 5th Earl of Stafford, and Anne of Gloucester, herself a granddaughter of Edward III. In 1415, after a papal dispensation was obtained because the couple were related within the third degree, she married her second cousin once removed, Edmund Mortimer, 5th Earl of March; the marriage angered Henry V, who fined Mortimer 10,000 marks. The couple had no children, and after Edmund's death in 1425 Anne married John Holland, 2nd Duke of Exeter, before dying in September 1432.","citations":[{"url":"https://www.encyclopedia.com/women/encyclopedias-almanacs-transcripts-and-maps/stafford-anne-c-1400-1432","title":"Anne Stafford (c. 1400-1432)","publisher":"Encyclopedia.com","quote":"daughter of Edmund Stafford, 5th earl of Stafford, and Anne Plantagenet (1383–1438)"},{"url":"https://en.wikipedia.org/wiki/Edmund_Mortimer,_5th_Earl_of_March","title":"Edmund Mortimer, 5th Earl of March","publisher":"Wikipedia","quote":"The King was displeased, and imposed an enormous fine of 10,000 marks."}],"uncertain":"Sources disagree on the day of Anne Stafford's death, giving either 20 or 24 September 1432."},{"id":"eleanor-holland","name":"Eleanor Holland","fullName":"Eleanor (Alianore) Holland, Countess of March","epithet":null,"house":"Holland","role":"Countess of March; mother of Anne Mortimer and Edmund Mortimer, 5th Earl of March","monarch":false,"reign":null,"birth":{"date":"1370","place":null,"precision":"circa","citations":[{"url":"https://en.wikipedia.org/wiki/Roger_Mortimer,_4th_Earl_of_March","title":"Roger Mortimer, 4th Earl of March","publisher":"Wikipedia","quote":"On or about 7 October 1388, at the age of 14, Mortimer was married off to his warder's 18-year-old daughter Eleanor Holland."}]},"death":{"date":"1405-10-06","place":null,"precision":"circa","citations":[{"url":"https://en.wikipedia.org/wiki/Roger_Mortimer,_4th_Earl_of_March","title":"Roger Mortimer, 4th Earl of March","publisher":"Wikipedia","quote":"Alianor died on 6 or 18 October 1405."}]},"parents":[],"spouses":[{"id":"roger-mortimer","married":"1388-10-07","ended":"1398-07-20","endedBy":"death","citations":[{"url":"https://en.wikipedia.org/wiki/Roger_Mortimer,_4th_Earl_of_March","title":"Roger Mortimer, 4th Earl of March","publisher":"Wikipedia","quote":"On or about 7 October 1388, at the age of 14, Mortimer was married off to his warder's 18-year-old daughter Eleanor Holland."}]}],"titles":[],"summary":"Eleanor Holland, daughter of Thomas Holland, 2nd Earl of Kent, married Roger Mortimer, 4th Earl of March, on or about 7 October 1388, when she was about eighteen and he fourteen. Their children included Anne Mortimer and Edmund Mortimer, 5th Earl of March. After Roger's death in 1398 she remarried Edward Charleton, 5th Baron Cherleton, in June 1399, by whom she had two more daughters, and died in October 1405.","citations":[{"url":"https://en.wikipedia.org/wiki/Roger_Mortimer,_4th_Earl_of_March","title":"Roger Mortimer, 4th Earl of March","publisher":"Wikipedia","quote":"In June 1399, Roger Mortimer's widow, Alianor, married Edward Charleton, 5th Baron Cherleton, by whom she had two daughters."}],"uncertain":"Sources disagree on the day of Eleanor Holland's death, giving either 6 or 18 October 1405; her birth year is inferred only from the statement that she was eighteen in October 1388."},{"id":"edmund-mortimer-1352","name":"Edmund Mortimer, 3rd Earl of March","fullName":"Edmund Mortimer, 3rd Earl of March and Ulster","epithet":null,"house":"Mortimer","role":"Earl of March and Earl of Ulster; Lord Lieutenant of Ireland","monarch":false,"reign":null,"birth":{"date":"1352-02-01","place":"Llangoed, Llyswen, Brecknockshire, Wales","precision":"day","citations":[{"url":"https://en.wikipedia.org/wiki/Edmund_Mortimer,_3rd_Earl_of_March","title":"Edmund Mortimer, 3rd Earl of March","publisher":"Wikipedia","quote":"1 February 1352"}]},"death":{"date":"1381-12-27","place":"Cork, Ireland","precision":"day","citations":[{"url":"https://en.wikipedia.org/wiki/Edmund_Mortimer,_3rd_Earl_of_March","title":"Edmund Mortimer, 3rd Earl of March","publisher":"Wikipedia","quote":"27 December 1381"}]},"parents":[],"spouses":[{"id":"philippa-plantagenet","married":"1369-08-24","ended":"1377","endedBy":"death","citations":[{"url":"https://en.wikipedia.org/wiki/Edmund_Mortimer,_3rd_Earl_of_March","title":"Edmund Mortimer, 3rd Earl of March","publisher":"Wikipedia","quote":"married Philippa Plantagenet...on 24 August 1369"}]}],"titles":[{"title":"Earl of March and Earl of Ulster","from":"1360","to":"1381-12-27","citations":[{"url":"https://en.wikipedia.org/wiki/Edmund_Mortimer,_3rd_Earl_of_March","title":"Edmund Mortimer, 3rd Earl of March","publisher":"Wikipedia","quote":"Earl of March and Earl of Ulster"}]},{"title":"Lord Lieutenant of Ireland","from":"1379","to":"1381-12-27","citations":[{"url":"https://en.wikipedia.org/wiki/Edmund_Mortimer,_3rd_Earl_of_March","title":"Edmund Mortimer, 3rd Earl of March","publisher":"Wikipedia","quote":"Appointed Lord Lieutenant of Ireland in 1379"}]}],"summary":"Edmund Mortimer, 3rd Earl of March, was born at Llangoed in Brecknockshire on 1 February 1352. On 24 August 1369 he married Philippa, only child of Lionel of Antwerp, Duke of Clarence, uniting the Mortimer earldom of March with the Clarence claim descending from Edward III's second surviving son. Their son Roger succeeded as 4th Earl of March and Ulster. Edmund served as Lord Lieutenant of Ireland from 1379 until his death at Cork in December 1381.","citations":[{"url":"https://en.wikipedia.org/wiki/Edmund_Mortimer,_3rd_Earl_of_March","title":"Edmund Mortimer, 3rd Earl of March","publisher":"Wikipedia","quote":"Roger Mortimer, 2nd Earl of March"},{"url":"https://en.wikipedia.org/wiki/Edmund_Mortimer,_3rd_Earl_of_March","title":"Edmund Mortimer, 3rd Earl of March","publisher":"Wikipedia","quote":"Roger\" (1374–1398), who \"succeeded him as 4th Earl of March and Ulster"}],"uncertain":null},{"id":"isabella-castile-york","name":"Isabella of Castile","fullName":"Isabella of Castile, Duchess of York","epithet":null,"house":"Ivrea","role":"Duchess of York","monarch":false,"reign":null,"birth":{"date":"1355","place":null,"precision":"year","citations":[{"url":"https://en.wikipedia.org/wiki/Isabella_of_Castile,_Duchess_of_York","title":"Isabella of Castile, Duchess of York","publisher":"Wikipedia","quote":"1355"}]},"death":{"date":"1392-12-23","place":null,"precision":"day","citations":[{"url":"https://en.wikipedia.org/wiki/Isabella_of_Castile,_Duchess_of_York","title":"Isabella of Castile, Duchess of York","publisher":"Wikipedia","quote":"23 December 1392 (aged 36–37)"}]},"parents":[],"spouses":[{"id":"edmund-langley","married":"1372-07-11","ended":"1392-12-23","endedBy":"death","citations":[{"url":"https://en.wikipedia.org/wiki/Isabella_of_Castile,_Duchess_of_York","title":"Isabella of Castile, Duchess of York","publisher":"Wikipedia","quote":"on 11 July 1372, at about the age of 17, married John of Gaunt's younger brother, Edmund of Langley, 1st Duke of York"}]}],"titles":[{"title":"Lady of the Garter","from":"1379","to":null,"citations":[{"url":"https://en.wikipedia.org/wiki/Isabella_of_Castile,_Duchess_of_York","title":"Isabella of Castile, Duchess of York","publisher":"Wikipedia","quote":"appointed a Lady of the Garter in 1379"}]}],"summary":"Isabella of Castile was a daughter of King Peter of Castile and his mistress Maria de Padilla. On 11 July 1372 she married Edmund of Langley, 1st Duke of York, fourth surviving son of Edward III, becoming Duchess of York; their children included Edward of Norwich, 2nd Duke of York, Constance of York, and Richard of Conisburgh, 3rd Earl of Cambridge. Isabella's later life was clouded by rumours of an affair with Richard II's half-brother John Holland, and some scholars have suggested Holland rather than Edmund fathered her youngest son Richard; she died in December 1392.","citations":[{"url":"https://en.wikipedia.org/wiki/Isabella_of_Castile,_Duchess_of_York","title":"Isabella of Castile, Duchess of York","publisher":"Wikipedia","quote":"daughter of King Peter and his mistress María de Padilla (d. 1361)"},{"url":"https://en.wikipedia.org/wiki/Isabella_of_Castile,_Duchess_of_York","title":"Isabella of Castile, Duchess of York","publisher":"Wikipedia","quote":"As a result of her indiscretions, including an affair with King Richard II's half-brother, John Holland, 1st Duke of Exeter...Isabella left behind a tarnished reputation"}],"uncertain":"Some historians have suggested the possibility that John Holland, rather than Edmund of Langley, was the father of Isabella's son Richard of Conisburgh; this cannot be dismissed but is not established as fact."},{"id":"elizabeth-burgh-ulster","name":"Elizabeth de Burgh","fullName":"Elizabeth de Burgh, 4th Countess of Ulster","epithet":null,"house":"Burgh","role":"4th Countess of Ulster, suo jure; Duchess of Clarence","monarch":false,"reign":null,"birth":{"date":"1332-07-06","place":"Carrickfergus Castle, Ireland","precision":"day","citations":[{"url":"https://en.wikipedia.org/wiki/Elizabeth_de_Burgh,_4th_Countess_of_Ulster","title":"Elizabeth de Burgh, 4th Countess of Ulster","publisher":"Wikipedia","quote":"6 July 1332"}]},"death":{"date":"1363-12-10","place":"Dublin, Ireland","precision":"day","citations":[{"url":"https://en.wikipedia.org/wiki/Elizabeth_de_Burgh,_4th_Countess_of_Ulster","title":"Elizabeth de Burgh, 4th Countess of Ulster","publisher":"Wikipedia","quote":"10 December 1363 (aged 31)"}]},"parents":[],"spouses":[{"id":"lionel-antwerp","married":"1352","ended":"1363-12-10","endedBy":"death","citations":[{"url":"https://en.wikipedia.org/wiki/Lionel_of_Antwerp,_1st_Duke_of_Clarence","title":"Lionel of Antwerp, 1st Duke of Clarence","publisher":"Wikipedia","quote":"Elizabeth de Burgh, 4th Countess of Ulster (m. 1352; died 1363)"}]}],"titles":[{"title":"Countess of Ulster","from":null,"to":"1363-12-10","citations":[{"url":"https://en.wikipedia.org/wiki/Elizabeth_de_Burgh,_4th_Countess_of_Ulster","title":"Elizabeth de Burgh, 4th Countess of Ulster","publisher":"Wikipedia","quote":"4th Countess of Ulster and 5th Baroness of Connaught"}]}],"summary":"Elizabeth de Burgh, suo jure 4th Countess of Ulster, was the only child of William Donn de Burgh, 3rd Earl of Ulster, and Maud of Lancaster, born at Carrickfergus Castle in 1332. She was married to Lionel of Antwerp, second surviving son of Edward III, who became Duke of Clarence and Earl of Ulster in her right; their only child, Philippa, carried the Ulster and Clarence inheritance into the Mortimer family. Elizabeth died at Dublin in December 1363.","citations":[{"url":"https://en.wikipedia.org/wiki/Elizabeth_de_Burgh,_4th_Countess_of_Ulster","title":"Elizabeth de Burgh, 4th Countess of Ulster","publisher":"Wikipedia","quote":"William Donn de Burgh, 3rd Earl of Ulster"},{"url":"https://en.wikipedia.org/wiki/Elizabeth_de_Burgh,_4th_Countess_of_Ulster","title":"Elizabeth de Burgh, 4th Countess of Ulster","publisher":"Wikipedia","quote":"Philippa Plantagenet, 5th Countess of Ulster"}],"uncertain":"Sources disagree on the date of the marriage to Lionel of Antwerp: Lionel's own Wikipedia article (and the infobox figure used here) gives 1352, matching the mainstream historical dating; Elizabeth's own Wikipedia article instead states the wedding took place on 9 September 1342, which cannot be correct since Lionel was not born until November 1338 (so would have been under four), and appears to be an error, possibly for a childhood betrothal or a slip for 1352."},{"id":"hugh-bigod-norfolk","name":"Hugh Bigod","fullName":"Hugh Bigod, 3rd Earl of Norfolk","epithet":null,"house":"Bigod","role":"3rd Earl of Norfolk","monarch":false,"reign":null,"birth":{"date":"1182","place":null,"precision":"circa","citations":[{"url":"https://en.wikipedia.org/wiki/Hugh_Bigod,_3rd_Earl_of_Norfolk","title":"Hugh Bigod, 3rd Earl of Norfolk","publisher":"Wikipedia","quote":"Hugh Bigod (c. 1182 – 18 February 1225) was a member of the powerful early Norman Bigod family"}]},"death":{"date":"1225-02-18","place":null,"precision":"day","citations":[{"url":"https://en.wikipedia.org/wiki/Hugh_Bigod,_3rd_Earl_of_Norfolk","title":"Hugh Bigod, 3rd Earl of Norfolk","publisher":"Wikipedia","quote":"Hugh Bigod (c. 1182 – 18 February 1225) was a member of the powerful early Norman Bigod family"}]},"spouses":[{"id":"matilda-marshal","married":"1207","citations":[{"url":"https://en.wikipedia.org/wiki/Hugh_Bigod,_3rd_Earl_of_Norfolk","title":"Hugh Bigod, 3rd Earl of Norfolk","publisher":"Wikipedia","quote":"In late 1206 or early 1207, Hugh married Maud Marshal, also known as Matilda Marshall, (1192 – 27 March 1248), daughter of William Marshal, 1st Earl of Pembroke"}]}],"titles":[{"title":"Earl of Norfolk","from":"1221","to":"1225-02-18","citations":[{"url":"https://en.wikipedia.org/wiki/Hugh_Bigod,_3rd_Earl_of_Norfolk","title":"Hugh Bigod, 3rd Earl of Norfolk","publisher":"Wikipedia","quote":"He succeeded to his father's estates (including Framlingham Castle) in 1221."}]}],"summary":"Hugh Bigod, eldest son of Roger Bigod, 2nd Earl of Norfolk, and Ida de Tosny, married Maud (Matilda) Marshal, daughter of William Marshal, in late 1206 or early 1207. Like his father, he was named among the twenty-five sureties charged with enforcing Magna Carta in 1215. He succeeded to the Bigod estates, including Framlingham Castle, on his father's death in 1221, but held the earldom of Norfolk for only a short time before his own death in 1225.","citations":[{"url":"https://en.wikipedia.org/wiki/Hugh_Bigod,_3rd_Earl_of_Norfolk","title":"Hugh Bigod, 3rd Earl of Norfolk","publisher":"Wikipedia","quote":"In 1215, he and his father were one of the twenty-five sureties of Magna Carta"}],"uncertain":null,"parents":[]}],"events":[{"id":"evt-1042-edward-accession","title":"Edward the Confessor becomes King of England","date":"1042","endDate":null,"precision":"year","category":"succession","actors":["edward-confessor","godwin-wessex"],"place":"England","significance":4,"summary":"After the death of the childless Harthacnut, Edward — who had spent much of his life in Norman exile — was accepted as king with the backing of Earl Godwin of Wessex, restoring the West Saxon royal line. He was formally crowned at Winchester Cathedral on Easter Sunday, 3 April 1043.","citations":[{"url":"https://avalon.law.yale.edu/medieval/ang11.asp","title":"Avalon Project - The Anglo-Saxon Chronicle : Eleventh Century","publisher":"Avalon Project, Yale Law School","quote":"This year died King Hardacnute at Lambeth...and ere he was buried all people chose Edward for king in London."},{"url":"https://en.wikipedia.org/wiki/Edward_the_Confessor","title":"Edward the Confessor","publisher":"Wikipedia","quote":"Following Harthacnut's death on 8 June 1042, Godwin, the most powerful of the English earls, supported Edward, who succeeded to the throne."}],"uncertain":null},{"id":"evt-1051-godwin-exile","title":"Godwin family outlawed and exiled","date":"1051-09","endDate":null,"precision":"month","category":"rebellion","actors":["godwin-wessex","harold-godwinson","edward-confessor","eustace-boulogne"],"place":"England","significance":3,"summary":"A violent clash between the men of Dover and the retinue of Eustace of Boulogne led King Edward to order Earl Godwin to punish Dover; Godwin's refusal to comply was treated as open defiance of the king. Backed by rival earls, Edward outlawed Godwin and exiled him and his sons in September 1051.","citations":[{"url":"https://avalon.law.yale.edu/medieval/ang11.asp","title":"Avalon Project - The Anglo-Saxon Chronicle : Eleventh Century","publisher":"Avalon Project, Yale Law School","quote":"Then the king held a council, and proclaimed him an outlaw, with his whole army; himself and his wife, and all his three sons."},{"url":"https://en.wikipedia.org/wiki/Godwin,_Earl_of_Wessex","title":"Godwin, Earl of Wessex","publisher":"Wikipedia","quote":"After a violent clash between people of Dover and the visiting Eustace II, Count of Boulogne, Godwin was ordered to punish the people of Dover...This time, however, Godwin refused, choosing to champion his own countrymen against a visiting foreign power and defying his own king."}],"uncertain":null},{"id":"evt-1052-godwin-return","title":"Godwin family returns from exile in force","date":"1052","endDate":null,"precision":"year","category":"rebellion","actors":["godwin-wessex","harold-godwinson","edward-confessor"],"place":"England","significance":3,"summary":"Godwin and his sons returned from exile in 1052 with an armed fleet, gathering the support of the navy, burgesses and peasantry as they sailed up the Thames. Faced with this show of force, Edward restored Godwin's earldom and lands without battle.","citations":[{"url":"https://en.wikipedia.org/wiki/Godwin,_Earl_of_Wessex","title":"Godwin, Earl of Wessex","publisher":"Wikipedia","quote":"They all returned to England the next year with armed forces, gaining the support of the navy, burghers, and peasants, so compelling Edward to restore the earldom."},{"url":"https://avalon.law.yale.edu/medieval/ang11.asp","title":"Avalon Project - The Anglo-Saxon Chronicle : Eleventh Century","publisher":"Avalon Project, Yale Law School","quote":"Earl Godwin, and Harold, and the queen, sat in their stations"}],"uncertain":null},{"id":"evt-1065-westminster-abbey","title":"Consecration of Westminster Abbey","date":"1065-12-28","endDate":null,"precision":"day","category":"church","actors":["edward-confessor"],"place":"Westminster, London","significance":4,"summary":"Edward the Confessor's new Romanesque church at Westminster, built from 1042 as his royal burial church after Pope Leo IX released him from a pilgrimage vow, was consecrated on 28 December 1065 — Holy Innocents' Day. Edward, already ill, could not attend, and he died just over a week later.","citations":[{"url":"https://www.westminster-abbey.org/abbey-commemorations/royals/edward-the-confessor-and-edith","title":"Edward the Confessor and Edith","publisher":"Westminster Abbey","quote":"The Abbey at Westminster was consecrated on Holy Innocents' Day, 28th December 1065, but the king was ill and unable to be present at the service."},{"url":"https://en.wikipedia.org/wiki/Westminster_Abbey","title":"Westminster Abbey","publisher":"Wikipedia","quote":"Between 1042 and 1052, Edward the Confessor began rebuilding Saint Peter's Abbey to provide himself with a royal burial church."}],"uncertain":null},{"id":"evt-1066-harold-accession","title":"Death of Edward the Confessor and accession of Harold Godwinson","date":"1066-01-06","endDate":null,"precision":"day","category":"succession","actors":["harold-godwinson","edward-confessor"],"place":"Westminster, London","significance":5,"summary":"Edward the Confessor died at Westminster on 5 January 1066, having reportedly commended the kingdom to Harold Godwinson shortly before his death. The Witan elected Harold king the next day, and he was crowned in Westminster Abbey on 6 January 1066, the same day Edward was buried there.","citations":[{"url":"https://en.wikipedia.org/wiki/Edward_the_Confessor","title":"Edward the Confessor","publisher":"Wikipedia","quote":"Edward probably entrusted the kingdom to Harold and Edith shortly before he died at Westminster on 5 January 1066. On 6 January he was buried in Westminster Abbey, and Harold was crowned on the same day."},{"url":"https://en.wikipedia.org/wiki/Harold_Godwinson","title":"Harold Godwinson","publisher":"Wikipedia","quote":"When the Witan convened the next day they selected Harold to succeed"}],"uncertain":"Whether Edward genuinely bequeathed the throne to Harold, or had earlier promised it to Duke William of Normandy as Norman sources claimed, is disputed; the intent behind Edward's deathbed gesture is ambiguous and historians disagree on whether he ever seriously meant, or later abandoned, any promise to William."},{"id":"evt-1066-fulford-stamford-bridge","title":"Battles of Fulford and Stamford Bridge","date":"1066-09-20","endDate":"1066-09-25","precision":"range","category":"battle","actors":["harold-godwinson","tostig-godwinson"],"place":"Fulford and Stamford Bridge, Yorkshire","significance":4,"summary":"An invading Norwegian army under King Harald Hardrada, joined by Harold Godwinson's exiled brother Tostig, defeated the northern earls Edwin and Morcar at Fulford on 20 September 1066 and occupied York. King Harold marched his army north and destroyed the Norwegian force at Stamford Bridge on 25 September, killing both Hardrada and Tostig — but the victory left his army exhausted just as William of Normandy landed in the south.","citations":[{"url":"https://en.wikipedia.org/wiki/Battle_of_Fulford","title":"Battle of Fulford","publisher":"Wikipedia","quote":"King Harald III of Norway, also known as Harald Hardrada, a claimant to the English throne, and Tostig Godwinson, his English ally, fought and defeated the Northern Earls Edwin and Morcar."},{"url":"https://en.wikipedia.org/wiki/Battle_of_Stamford_Bridge","title":"Battle of Stamford Bridge","publisher":"Wikipedia","quote":"The Battle of Stamford Bridge took place at the village of Stamford Bridge, East Riding of Yorkshire, in England, on 25 September 1066, between an English army under King Harold Godwinson and an invading Norwegian force led by King Harald Hardrada and the English king's brother Tostig Godwinson."}],"uncertain":null},{"id":"evt-1066-hastings","title":"Battle of Hastings","date":"1066-10-14","endDate":null,"precision":"day","category":"battle","actors":["william-i","harold-godwinson"],"place":"Senlac Hill, Sussex","significance":5,"summary":"William, Duke of Normandy, landed at Pevensey and, on 14 October 1066, defeated and killed King Harold at Senlac Hill near Hastings. Harold's death left the English forces leaderless and broke organized resistance, opening the way to the Norman conquest of England.","citations":[{"url":"https://en.wikipedia.org/wiki/Battle_of_Hastings","title":"Battle of Hastings","publisher":"Wikipedia","quote":"The Battle of Hastings was fought on 14 October 1066 between the Norman-French army of William, Duke of Normandy, and an English army under the Anglo-Saxon King Harold Godwinson."},{"url":"https://en.wikisource.org/wiki/1911_Encyclop%C3%A6dia_Britannica/Hastings_(Sussex)","title":"1911 Encyclopædia Britannica/Hastings (Sussex)","publisher":"Wikisource (1911 Encyclopædia Britannica)","quote":"On the 28th of September 1066, William of Normandy, bent on asserting by arms his right to the English crown, landed at Pevensey."}],"uncertain":null},{"id":"evt-1066-william-coronation","title":"Coronation of William I","date":"1066-12-25","endDate":null,"precision":"day","category":"succession","actors":["william-i"],"place":"Westminster Abbey, London","significance":4,"summary":"William was crowned King of England by Ealdred, Archbishop of York, at Westminster Abbey on Christmas Day 1066. The ceremony was marred when Norman guards outside, mistaking the crowd's acclamations for an uprising, set fire to nearby houses.","citations":[{"url":"https://en.wikipedia.org/wiki/Norman_conquest_of_England","title":"Norman conquest of England","publisher":"Wikipedia","quote":"William was acclaimed King of England and crowned by Ealdred on 25 December 1066, in Westminster Abbey."},{"url":"https://en.wikipedia.org/wiki/William_the_Conqueror","title":"William the Conqueror","publisher":"Wikipedia","quote":"he was crowned at Westminster Abbey on Christmas Day 1066."}],"uncertain":null},{"id":"evt-1069-harrying-north","title":"The Harrying of the North","date":"1069","endDate":"1070","precision":"range","category":"rebellion","actors":["william-i"],"place":"Yorkshire and northern England","significance":5,"summary":"In the winter of 1069–1070, William I answered renewed northern rebellions with a scorched-earth campaign across Yorkshire and the north, destroying crops, herds and settlements and killing indiscriminately. The chronicler Orderic Vitalis, writing decades later, described enormous loss of life, and Domesday Book evidence from 1086 still shows large tracts of the region waste two decades afterward.","citations":[{"url":"https://en.wikipedia.org/wiki/Harrying_of_the_North","title":"Harrying of the North","publisher":"Wikipedia","quote":"More than 100,000 people perished of starvation"},{"url":"https://en.wikipedia.org/wiki/Yorkshire","title":"Yorkshire","publisher":"Wikipedia","quote":"From York to Durham, crops, domestic animals, and farming tools were scorched. Many villages between the towns were burnt and local northerners were indiscriminately murdered."}],"uncertain":"Orderic Vitalis's figure of over 100,000 dead is a chronicler's estimate written decades after the event and cannot be independently verified; modern historians treat it as illustrative of the campaign's severity rather than a precise count."},{"id":"evt-1086-domesday-book","title":"The Domesday Book survey","date":"1085","endDate":"1086","precision":"range","category":"economy","actors":["william-i"],"place":"England","significance":5,"summary":"At Christmas 1085 William I commissioned a comprehensive survey of landholding, population and resources across England to determine tax liability and consolidate Norman control after the Conquest. The resulting Domesday Book recorded holdings down to individual livestock, and survives as the oldest public record of England.","citations":[{"url":"https://sourcebooks.fordham.edu/source/1186aschron-domesday.asp","title":"Medieval Sourcebook: The Anglo-Saxon Chronicle: The Domesday Book, 1086","publisher":"Fordham University Internet Medieval Sourcebook","quote":"not even one ox, nor one cow, nor one pig which escaped notice in his survey"},{"url":"https://www.historic-uk.com/HistoryUK/HistoryofEngland/Domesday-Book/","title":"The Domesday Book","publisher":"Historic UK","quote":"the Domesday Book was commissioned in December 1085 by order of William The Conqueror."},{"url":"https://en.wikipedia.org/wiki/Domesday_Book","title":"Domesday Book","publisher":"Wikipedia","quote":"the king sent his agents to survey every shire in England, to list his holdings and dues owed to him."}],"uncertain":null},{"id":"evt-1087-william-i-death","title":"Death of William I","date":"1087-09-09","endDate":null,"precision":"day","category":"succession","actors":["william-i","william-ii","robert-curthose"],"place":"Priory of Saint-Gervase, Rouen","significance":4,"summary":"William I died on 9 September 1087 at the Priory of Saint-Gervase near Rouen after being injured during a campaign against Mantes. His lands were divided on his death: Normandy passed to his eldest son Robert Curthose, while England went to his second surviving son, William Rufus.","citations":[{"url":"https://en.wikipedia.org/wiki/William_the_Conqueror","title":"William the Conqueror","publisher":"Wikipedia","quote":"Died: 9 September 1087 (aged about 59) Priory of Saint Gervase, Rouen, Duchy of Normandy"},{"url":"https://en.wikipedia.org/wiki/William_the_Conqueror","title":"William the Conqueror","publisher":"Wikipedia","quote":"His lands were divided after his death: Normandy went to Robert, and England went to his second surviving son, William Rufus."}],"uncertain":null},{"id":"evt-1096-robert-curthose-crusade","title":"Robert Curthose mortgages Normandy to join the First Crusade","date":"1096","endDate":null,"precision":"year","category":"crusade","actors":["robert-curthose","william-ii"],"place":"Normandy","significance":3,"summary":"To fund his participation in the First Crusade, Robert Curthose, Duke of Normandy, mortgaged the duchy to his brother King William Rufus of England for 10,000 marks, temporarily uniting Norman and English resources under Rufus while Robert campaigned in the Holy Land.","citations":[{"url":"https://en.wikipedia.org/wiki/Robert_Curthose","title":"Robert Curthose","publisher":"Wikipedia","quote":"To raise money for the crusade he mortgaged his duchy to his brother William for the sum of 10,000 marks."},{"url":"https://en.wikipedia.org/wiki/First_Crusade","title":"First Crusade","publisher":"Wikipedia","quote":"Robert of Normandy loaned the Duchy of Normandy to his brother William II of England"}],"uncertain":null},{"id":"evt-1100-william-ii-death","title":"Death of William II in the New Forest","date":"1100-08-02","endDate":null,"precision":"day","category":"succession","actors":["william-ii","henry-i"],"place":"New Forest, Hampshire","significance":4,"summary":"William Rufus was killed by an arrow while hunting in the New Forest on 2 August 1100. His younger brother Henry, also present in the hunting party, moved immediately to secure the royal treasury at Winchester and the throne.","citations":[{"url":"https://en.wikipedia.org/wiki/William_II_of_England","title":"William II of England","publisher":"Wikipedia","quote":"William went hunting on 2 August 1100 in the New Forest, probably near Brockenhurst, and was killed by an arrow through the lung, although the circumstances remain unclear."},{"url":"https://en.wikipedia.org/wiki/New_Forest","title":"New Forest","publisher":"Wikipedia","quote":"Though many claim the latter was killed by an inaccurate arrow shot from his hunting companion, local folklore asserted that this was punishment for the crimes committed by William when he created his New Forest."}],"uncertain":"Whether William II's death was a hunting accident or an assassination is contested. Wikipedia notes that 'modern scholars have reopened the question, and some have found the assassination theory credible or compelling, but the theory is not universally accepted' — this dataset takes no position on which is correct."},{"id":"evt-1100-henry-i-charter-liberties","title":"Henry I's Charter of Liberties","date":"1100-08-05","endDate":null,"precision":"day","category":"law","actors":["henry-i"],"place":"London","significance":5,"summary":"Immediately after seizing the throne on William Rufus's death, Henry I issued a coronation charter promising to end oppressive exactions, free the church from arbitrary royal demands, and restore the laws of Edward the Confessor. Copied widely during his reign, it later served as a direct model for Magna Carta.","citations":[{"url":"https://sourcebooks.web.fordham.edu/source/hcoronation.asp","title":"Medieval Sourcebook: Charter of Liberties of Henry I, 1100","publisher":"Fordham University Internet Medieval Sourcebook","quote":"Know that by the mercy of God and the common counsel of the barons of the whole kingdom of England I have been crowned king of said kingdom; and because the kingdom had been oppressed by unjust exactions, I...make the holy church of God free...And I take away all the bad customs by which the kingdom of England was unjustly oppressed"},{"url":"https://en.wikipedia.org/wiki/Charter_of_Liberties","title":"Charter of Liberties","publisher":"Wikipedia","quote":"a landmark document in English legal history and a forerunner of Magna Carta."}],"uncertain":null},{"id":"evt-1101-treaty-alton","title":"Treaty of Alton","date":"1101","endDate":null,"precision":"year","category":"treaty","actors":["henry-i","robert-curthose"],"place":"Alton, Hampshire","significance":3,"summary":"After Robert Curthose invaded England to press his claim to the throne, the brothers negotiated the Treaty of Alton in 1101: Robert renounced his claim to the English crown in return for an annual payment and Henry's cession of most of his remaining lands in Normandy, with each naming the other his heir.","citations":[{"url":"https://en.wikipedia.org/wiki/Treaty_of_Alton","title":"Treaty of Alton","publisher":"Wikipedia","quote":"The Treaty of Alton was an agreement signed in 1101 between Henry Beauclerc and his older brother Robert Curthose in which Robert agreed to recognize Henry as the king of England in exchange for a yearly stipend and other concessions."},{"url":"https://en.wikipedia.org/wiki/Robert_Curthose","title":"Robert Curthose","publisher":"Wikipedia","quote":"Robert released Henry from his 1088 homage and recognized his crown, in exchange for 3000 livres and that Henry surrender all of his landholdings within Normandy, save for Domfront."}],"uncertain":null},{"id":"evt-1106-tinchebray","title":"Battle of Tinchebray","date":"1106-09-28","endDate":null,"precision":"day","category":"battle","actors":["henry-i","robert-curthose"],"place":"Tinchebray, Normandy","significance":4,"summary":"Henry I invaded Normandy and decisively defeated his brother Robert Curthose at the Battle of Tinchebray on 28 September 1106, capturing Robert and reuniting Normandy with the English crown. Robert remained a prisoner for the rest of his life, dying in captivity in 1134.","citations":[{"url":"https://en.wikipedia.org/wiki/Battle_of_Tinchebray","title":"Battle of Tinchebray","publisher":"Wikipedia","quote":"Henry's knights won a decisive victory: they captured Robert, and Henry imprisoned him in England (in Devizes Castle) and then in Wales until Robert's death (in Cardiff Castle) in 1134."},{"url":"https://en.wikipedia.org/wiki/Robert_Curthose","title":"Robert Curthose","publisher":"Wikipedia","quote":"In 1106, Henry defeated Robert's army decisively at the Battle of Tinchebray and claimed Normandy as a possession of the English crown."}],"uncertain":null},{"id":"evt-1120-white-ship","title":"The White Ship disaster","date":"1120-11-25","endDate":null,"precision":"day","category":"dynastic","actors":["william-adelin","henry-i"],"place":"English Channel, off Barfleur","significance":5,"summary":"The White Ship sank in the Channel on 25 November 1120 with the loss of nearly everyone aboard, including William Adelin, Henry I's only legitimate son and heir, who drowned after turning back to try to rescue his half-sister. The disaster left Henry without a male heir and precipitated the succession crisis that erupted into the Anarchy after his death in 1135.","citations":[{"url":"https://en.wikipedia.org/wiki/White_Ship","title":"White Ship","publisher":"Wikipedia","quote":"Out of approximately 300 people aboard, only one – a butcher from Rouen – survived."},{"url":"https://en.wikipedia.org/wiki/William_Adelin","title":"William Adelin","publisher":"Wikipedia","quote":"the drunken helmsman, captained by Thomas FitzStephen, rammed the ship into a rock in the bay"}],"uncertain":null},{"id":"evt-1127-oath-for-matilda","title":"Barons swear to recognize Empress Matilda as heir","date":"1127","endDate":null,"precision":"year","category":"succession","actors":["henry-i","matilda-empress"],"place":"Westminster, London","significance":4,"summary":"Having lost his only legitimate son in the White Ship disaster, Henry I had his barons swear an oath to recognize his daughter, Empress Matilda, as his heir to England and Normandy.","citations":[{"url":"https://en.wikipedia.org/wiki/Henry_I_of_England","title":"Henry I of England","publisher":"Wikipedia","quote":"In 1127, Henry gathered his barons together and made them swear an oath to recognize his daughter Matilda as his heir to both England and Normandy."},{"url":"https://en.wikipedia.org/wiki/Empress_Matilda","title":"Empress Matilda","publisher":"Wikipedia","quote":"The Anglo-Norman barons were gathered together at Westminster on Christmas 1126, where they swore in January to recognise Matilda and any future legitimate heir she might have."}],"uncertain":"Sources differ on the precise date: one account places the barons' gathering at Christmas 1126 with the oath itself sworn in January (1127), while another dates the whole event to 1127. A further renewal of the oath is recorded in 1131."},{"id":"evt-1135-stephen-accession","title":"Death of Henry I and Stephen's seizure of the throne","date":"1135-12-22","endDate":null,"precision":"day","category":"succession","actors":["henry-i","stephen"],"place":"Lyons-la-Forêt, Normandy; Westminster, London","significance":5,"summary":"Henry I died unexpectedly near Lyons-la-Forêt in Normandy on 1 December 1135. Despite the barons' earlier oaths to recognize Empress Matilda, Henry's nephew Stephen of Blois crossed to England, secured London's backing, and was crowned at Westminster Abbey on 22 December 1135, precipitating the succession dispute that became the Anarchy.","citations":[{"url":"https://avalon.law.yale.edu/medieval/ang12.asp","title":"Avalon Project - The Anglo-Saxon Chronicle : Twelfth Century","publisher":"Avalon Project, Yale Law School","quote":"Stephen de Blois...came to London, and the people of London received him...and hallowed him to king on midwinter day."},{"url":"https://en.wikipedia.org/wiki/Stephen,_King_of_England","title":"Stephen, King of England","publisher":"Wikipedia","quote":"In the middle of this confrontation, Henry unexpectedly fell ill and died near Lyons-la-Forêt."}],"uncertain":null},{"id":"evt-1138-battle-standard","title":"Battle of the Standard","date":"1138-08-22","endDate":null,"precision":"day","category":"battle","actors":[],"place":"Cowton Moor, near Northallerton, Yorkshire","significance":3,"summary":"An invading Scottish army under King David I, supporting his niece Empress Matilda's cause, was defeated by English levies under local barons and clergy at the Battle of the Standard near Northallerton on 22 August 1138, securing northern England for Stephen during the early years of the Anarchy.","citations":[{"url":"https://en.wikipedia.org/wiki/Battle_of_the_Standard","title":"Battle of the Standard","publisher":"Wikipedia","quote":"English forces under William of Aumale repelled a Scottish army led by King David I of Scotland."},{"url":"https://www.britishbattles.com/norman-conquest/battle-of-the-standard/","title":"Battle of the Standard","publisher":"British Battles","quote":"The Scots failed to break up the English line and were forced to retreat with heavy casualties."}],"uncertain":null},{"id":"evt-1141-battle-lincoln","title":"Battle of Lincoln and capture of King Stephen","date":"1141-02-02","endDate":null,"precision":"day","category":"battle","actors":["stephen","robert-gloucester","matilda-empress"],"place":"Lincoln","significance":5,"summary":"On 2 February 1141, forces loyal to Empress Matilda under Robert of Gloucester defeated King Stephen's army at Lincoln; most of Stephen's magnates fled the field, and Stephen himself was captured and imprisoned while Matilda took control of the government for several months.","citations":[{"url":"https://en.wikipedia.org/wiki/Battle_of_Lincoln_(1141)","title":"Battle of Lincoln (1141)","publisher":"Wikipedia","quote":"Stephen was captured during the battle, imprisoned, and effectively deposed while Matilda ruled for a short time."},{"url":"https://en.wikipedia.org/wiki/Battle_of_Lincoln_(1141)","title":"Battle of Lincoln (1141)","publisher":"Wikipedia","quote":"As soon as the battle was joined, the majority of the leading magnates fled the king."}],"uncertain":null},{"id":"evt-1141-rout-winchester","title":"Rout of Winchester","date":"1141-09-14","endDate":null,"precision":"day","category":"battle","actors":["robert-gloucester","matilda-empress","matilda-boulogne"],"place":"Winchester and Stockbridge, Hampshire","significance":4,"summary":"Queen Matilda of Boulogne's relief army routed the Empress's forces besieging Winchester on 14 September 1141. Robert of Gloucester was captured nearby at Stockbridge while covering Empress Matilda's retreat, and the two sides subsequently exchanged Robert for the still-captive King Stephen, restoring Stephen to the throne and ending Matilda's best chance of becoming queen.","citations":[{"url":"https://en.wikipedia.org/wiki/Rout_of_Winchester","title":"Rout of Winchester","publisher":"Wikipedia","quote":"the queen's army destroyed the Angevin main body as an effective fighting force"},{"url":"https://en.wikipedia.org/wiki/Robert,_1st_Earl_of_Gloucester","title":"Robert, 1st Earl of Gloucester","publisher":"Wikipedia","quote":"Her forces were defeated at the Rout of Winchester on 14 September 1141, and Robert of Gloucester was captured nearby at Stockbridge."}],"uncertain":null},{"id":"evt-1142-matilda-oxford-escape","title":"Empress Matilda's escape from Oxford Castle","date":"1142-12","endDate":null,"precision":"month","category":"battle","actors":["matilda-empress","stephen"],"place":"Oxford","significance":3,"summary":"Besieged by King Stephen at Oxford Castle for three months in late 1142, Empress Matilda slipped out with a handful of knights just before Christmas, crossed the frozen river, and made her way past the royal army on foot to reach safety at Abingdon-on-Thames; the castle surrendered the next day.","citations":[{"url":"https://en.wikipedia.org/wiki/Empress_Matilda","title":"Empress Matilda","publisher":"Wikipedia","quote":"Just before Christmas, Matilda sneaked out of the castle with a handful of knights (probably via a postern gate), crossed the icy river and made her escape past the royal army on foot to Abingdon-on-Thames."},{"url":"https://en.wikipedia.org/wiki/Oxford_Castle","title":"Oxford Castle","publisher":"Wikipedia","quote":"did not descend the walls, but instead escaped from one of the gates"}],"uncertain":"The popular tradition that Matilda was lowered from the walls in a white cloak for camouflage in the snow is contested; the contemporary chronicler William of Malmesbury instead says she left through a gate rather than descending the walls, so the exact manner of her escape is uncertain."},{"id":"evt-1153-treaty-wallingford","title":"Treaty of Wallingford","date":"1153","endDate":null,"precision":"year","category":"treaty","actors":["stephen","henry-ii"],"place":"Wallingford / Winchester","significance":5,"summary":"After years of inconclusive civil war and the death of Stephen's son and heir Eustace, the exhausted parties concluded the Treaty of Wallingford in 1153: Stephen would remain king for the rest of his life, but recognized Henry FitzEmpress, the future Henry II, as his successor, effectively ending the Anarchy.","citations":[{"url":"https://en.wikipedia.org/wiki/Treaty_of_Wallingford","title":"Treaty of Wallingford","publisher":"Wikipedia","quote":"allowed Stephen to retain the throne but recognised Henry as his successor."},{"url":"https://en.wikipedia.org/wiki/The_Anarchy","title":"The Anarchy","publisher":"Wikipedia","quote":"The Anarchy was a civil war in England and Normandy between 1138 and 1153 which resulted in a widespread breakdown in law and order."}],"uncertain":null},{"id":"evt-1154-stephen-death","title":"Death of Stephen and accession of Henry II","date":"1154-10-25","endDate":null,"precision":"day","category":"succession","actors":["stephen","henry-ii"],"place":"Dover, Kent","significance":4,"summary":"Stephen died at Dover on 25 October 1154, less than a year after the Treaty of Wallingford. Per its terms, Henry FitzEmpress succeeded peacefully as Henry II, ending the Anarchy and founding the Angevin dynasty; he was crowned at Westminster Abbey that December alongside his wife Eleanor.","citations":[{"url":"https://en.wikipedia.org/wiki/Stephen,_King_of_England","title":"Stephen, King of England","publisher":"Wikipedia","quote":"25 October 1154 (aged 57–58 or 61–62)"},{"url":"https://en.wikipedia.org/wiki/Henry_II_of_England","title":"Henry II of England","publisher":"Wikipedia","quote":"Stephen fell ill with a stomach disorder and died on 25 October 1154, allowing Henry to inherit the throne sooner than had been expected."}],"uncertain":null},{"id":"evt-1154-henry-ii-coronation","title":"Coronation of Henry II","date":"1154-12-19","endDate":null,"precision":"day","category":"succession","actors":["henry-ii","eleanor-aquitaine"],"place":"Westminster Abbey, London","significance":4,"summary":"Henry II landed in England on 8 December 1154 and, after receiving oaths of loyalty from barons, was crowned King of England alongside his wife Eleanor of Aquitaine at Westminster Abbey on 19 December 1154. His accession, following the civil war of Stephen's reign, founded Angevin (Plantagenet) rule in England.","citations":[{"url":"https://en.wikipedia.org/wiki/Henry_II_of_England","title":"Henry II of England","publisher":"Wikipedia","quote":"On landing in England on 8 December 1154, Henry quickly took oaths of loyalty from some of the barons and was then crowned alongside Eleanor at Westminster Abbey on 19 December."},{"url":"https://www.westminster-abbey.org/abbey-commemorations/royals/henry-ii","title":"Henry II | Westminster Abbey","publisher":"Westminster Abbey","quote":"Henry and his queen Eleanor of Aquitaine were crowned in Westminster Abbey on Sunday 19th December 1154 by Theobald, Archbishop of Canterbury."}],"uncertain":null},{"id":"evt-1164-constitutions-clarendon","title":"Constitutions of Clarendon","date":"1164","endDate":null,"precision":"year","category":"church","actors":["henry-ii"],"place":"Clarendon Palace, Wiltshire","significance":4,"summary":"In 1164 Henry II issued the Constitutions of Clarendon, a set of articles asserting royal authority over disputes between crown and church, including limits on appeals to Rome and on the trial of clergy accused of crimes. The document, intended to restore royal customs from the reign of Henry I, provoked fierce resistance from Archbishop Thomas Becket and became a central grievance in his conflict with the king.","citations":[{"url":"https://avalon.law.yale.edu/medieval/constcla.asp","title":"The Avalon Project : Constitutions of Clarendon. 1164.","publisher":"Yale Law School Avalon Project","quote":"In the year 1164 from the Incarnation of our Lord, in the fourth year of the papacy of Alexander, in the tenth year of the most illustrious king of the English, Henry II"},{"url":"https://sourcebooks.web.fordham.edu/source/cclarendon.asp","title":"Constitutions of Clarendon, 1164","publisher":"Internet History Sourcebooks Project, Fordham University","quote":"Representative of the initial stages of the epic battle between Henry II and archbishop Thomas a Becket, the Constitutions were an attempt by Henry II to define the royal prerogatives as they existed before the anarchy of Stephen's reign."}],"uncertain":"The Avalon Project text dates the Constitutions to Clarendon in 1164 by a liturgical formula ('the fourth day before the Purification of the blessed Mary'), which implies late January, but converting that formula to a modern calendar day is interpretive and the secondary sources consulted (including Wikipedia) give only the year. Year-level precision is therefore used rather than upgrading on a reconstructed date."},{"id":"evt-1166-assize-clarendon","title":"Assize of Clarendon","date":"1166","endDate":null,"precision":"year","category":"law","actors":["henry-ii"],"place":"Clarendon Palace, Wiltshire","significance":4,"summary":"The Assize of Clarendon (1166) was a set of legal reforms issued by Henry II establishing a jury of presentment — twelve men from each hundred sworn to report accusations of serious crimes — and instituting itinerant royal justices to try the accused. It was a foundational step toward the common-law jury system and toward greater royal, rather than baronial or ecclesiastical, control of criminal justice.","citations":[{"url":"https://avalon.law.yale.edu/medieval/assizecl.asp","title":"The Avalon Project : Assize of Clarendon, 1166.","publisher":"Yale Law School Avalon Project","quote":"In the first place the aforesaid king Henry...has decreed that an inquest shall be made throughout the separate counties...through twelve of the more lawful men of the hundred...upon oath that they will speak the truth"},{"url":"https://en.wikipedia.org/wiki/Assize_of_Clarendon","title":"Assize of Clarendon","publisher":"Wikipedia","quote":"The Assize of Clarendon was an act of Henry II of England in 1166 that began a transformation of English law."}],"uncertain":null},{"id":"evt-1169-anglo-norman-invasion-ireland","title":"Anglo-Norman Invasion of Ireland","date":"1169-05","endDate":"1171-10-17","precision":"range","category":"battle","actors":["henry-ii"],"place":"Ireland (Wexford, Waterford, Dublin)","significance":4,"summary":"Beginning in May 1169, Anglo-Norman mercenaries invited by the deposed King of Leinster, Diarmait Mac Murchada, landed in Ireland and rapidly seized Waterford and Dublin under Richard \"Strongbow\" de Clare. Concerned that his vassals might carve out an independent Norman lordship, Henry II landed at Waterford on 17 October 1171 with a large army, becoming the first English king to set foot in Ireland and beginning centuries of English involvement there.","citations":[{"url":"https://en.wikipedia.org/wiki/Anglo-Norman_invasion_of_Ireland","title":"Anglo-Norman invasion of Ireland","publisher":"Wikipedia","quote":"In May 1169, Anglo-Norman mercenaries landed in Ireland at the request of Diarmait mac Murchada (Dermot MacMurragh), the deposed King of Leinster."},{"url":"https://en.wikipedia.org/wiki/Diarmait_Mac_Murchada","title":"Diarmait Mac Murchada","publisher":"Wikipedia","quote":"After Strongbow's successful invasion, Henry II mounted a second and larger invasion in 1171 to ensure his control over his subjects, which succeeded."}],"uncertain":null},{"id":"evt-1170-murder-thomas-becket","title":"Murder of Thomas Becket","date":"1170-12-29","endDate":null,"precision":"day","category":"church","actors":["henry-ii"],"place":"Canterbury Cathedral","significance":5,"summary":"On 29 December 1170, four knights of Henry II's household — Reginald FitzUrse, Hugh de Morville, William de Tracy, and Richard le Breton — confronted and murdered Archbishop Thomas Becket inside Canterbury Cathedral, the culmination of his years-long conflict with the king over the rights of the church. Becket was canonised in 1173, and Henry performed public penance at his tomb in 1174.","citations":[{"url":"https://en.wikipedia.org/wiki/Thomas_Becket","title":"Thomas Becket","publisher":"Wikipedia","quote":"The four knights, wielding drawn swords, ran into the room crying, 'Where is Thomas Becket, traitor to the king and country?'"},{"url":"https://www.historic-uk.com/HistoryUK/HistoryofEngland/Thomas-Becket/","title":"The Death of Thomas Becket in Canterbury Cathedral","publisher":"Historic UK","quote":"They reached Canterbury Cathedral on December 29th, where they found Becket before the High Altar, as he had gone there to hear Vespers."}],"uncertain":"The famous line attributed to Henry II, 'Will no one rid me of this turbulent priest?', is not a verified contemporary quotation. Per Wikipedia's article on Thomas Becket, the exact wording of Henry's outburst is disputed and several versions were reported by contemporaries; the popularly quoted phrasing is a later embellishment first recorded centuries after the murder, so it is not treated as fact here."},{"id":"evt-1173-great-revolt","title":"Great Revolt of 1173–74","date":"1173-04","endDate":"1174-09-30","precision":"range","category":"rebellion","actors":["henry-ii","eleanor-aquitaine","henry-young-king","richard-i","geoffrey-brittany"],"place":"England, Normandy, Anjou, Brittany, Scotland","significance":4,"summary":"From April 1173 to September 1174, Henry II's eldest sons — Henry the Young King, Richard, and Geoffrey — rebelled against him with the support of their mother, Eleanor of Aquitaine, and King Louis VII of France, after Henry granted three castles intended for the Young King's inheritance to his youngest son John. Henry II defeated the eighteen-month rebellion, capturing and imprisoning Eleanor and forcing his sons to submit by 30 September 1174.","citations":[{"url":"https://en.wikipedia.org/wiki/Revolt_of_1173%E2%80%931174","title":"Revolt of 1173–1174","publisher":"Wikipedia","quote":"Henry the Young King was therefore anxious to take control of some of his ancestral inheritances to rule in his own right."},{"url":"https://en.wikipedia.org/wiki/Revolt_of_1173%E2%80%931174","title":"Revolt of 1173–1174","publisher":"Wikipedia","quote":"King Henry, the king's son, and his brothers, returned to their father and to his service, as their lord."}],"uncertain":null},{"id":"evt-1189-death-henry-ii","title":"Death of Henry II","date":"1189-07-06","endDate":null,"precision":"day","category":"succession","actors":["henry-ii","richard-i"],"place":"Chinon Castle, Anjou","significance":4,"summary":"Henry II died at Chinon Castle on 6 July 1189, having been decisively defeated in his final campaign by his son Richard, allied with King Philip II of France. He was buried at Fontevraud Abbey and was succeeded as King of England by Richard I.","citations":[{"url":"https://en.wikipedia.org/wiki/Henry_II_of_England","title":"Henry II of England","publisher":"Wikipedia","quote":"decisively defeated by Philip and Richard"},{"url":"https://www.worldhistory.org/Henry_II_of_England/","title":"Henry II of England","publisher":"World History Encyclopedia","quote":"Henry died of natural causes on 6 July 1189 CE at Chinon Castle, Anjou."}],"uncertain":"A purported deathbed remark ('Shame, shame on a vanquished king') appears in some secondary accounts as legend; it is not treated as a verified quotation here."},{"id":"evt-1189-marriage-marshal-clare","title":"Marriage of William Marshal and Isabel de Clare","date":"1189-08","endDate":null,"precision":"month","category":"dynastic","actors":["william-marshal","isabel-de-clare"],"place":"London","significance":4,"summary":"On his accession, Richard I confirmed a promise made by the dying Henry II and granted William Marshal the hand of Isabel de Clare, heiress of Pembroke, Striguil, and Leinster. Marshal, until then a landless household knight, married her in London in August 1189, acquiring through her inheritance great estates in Wales, Ireland, and Normandy and becoming one of the wealthiest magnates in the Angevin realm.","citations":[{"url":"https://en.wikisource.org/wiki/Dictionary_of_National_Biography,_1885-1900/Marshal,_William_(d.1219)","title":"Dictionary of National Biography, 1885-1900/Marshal, William (d.1219)","publisher":"Wikisource (Dictionary of National Biography, 1885-1900)","quote":"Richard sent him over to England to take charge for him, but first, at the request of Geoffrey, his father's chancellor, confirmed the grant of the heiress of Pembroke... Thence he went on to London, and at once married his bride Isabella, daughter of Richard de Clare, earl of Pembroke and Striguil."},{"url":"https://en.wikisource.org/wiki/Dictionary_of_National_Biography,_1885-1900/Marshal,_William_(d.1219)","title":"Dictionary of National Biography, 1885-1900/Marshal, William (d.1219)","publisher":"Wikisource (Dictionary of National Biography, 1885-1900)","quote":"a great position and wide lands in four countries"}],"uncertain":null},{"id":"evt-1189-siege-of-acre","title":"Siege of Acre","date":"1189-08-28","endDate":"1191-07-12","precision":"day","category":"crusade","actors":["richard-i"],"place":"Acre, Kingdom of Jerusalem","significance":4,"summary":"Crusader forces under Guy of Lusignan besieged the port of Acre from August 1189, with Saladin's relief army encircling the besiegers in turn. Richard I arrived in June 1191 with a large fleet and reinvigorated
