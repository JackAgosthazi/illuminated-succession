 Duke of Clarence - Wikipedia","publisher":"Wikipedia","quote":"On 9 July, while the army was assembling at Southampton, the king created Thomas Duke of Clarence, a title previously held by Lionel of Antwerp."},{"url":"https://en.wikipedia.org/wiki/Thomas,_Duke_of_Clarence","title":"Thomas, Duke of Clarence - Wikipedia","publisher":"Wikipedia","quote":"22 March 1421 (aged 33)"}]},{"id":"john-lancaster-bedford","name":"John, Duke of Bedford","house":"Lancaster","monarch":false,"reign":null,"birth":{"date":"1389-06-20","place":null,"precision":"day","citations":[{"url":"https://en.wikipedia.org/wiki/John,_Duke_of_Bedford","title":"John, Duke of Bedford - Wikipedia","publisher":"Wikipedia","quote":"20 June 1389"}]},"death":{"date":"1435-09-14","place":"Rouen","precision":"day","citations":[{"url":"https://en.wikipedia.org/wiki/John,_Duke_of_Bedford","title":"John, Duke of Bedford - Wikipedia","publisher":"Wikipedia","quote":"John died in Rouen on 14 September 1435, and was buried in the choir of Cathedral of Notre-Dame de Rouen"}]},"parents":["henry-iv","mary-bohun"],"spouses":[{"id":"anne-burgundy","married":"1423-05-13","ended":"1432-11-13","endedBy":"death","citations":[{"url":"https://en.wikipedia.org/wiki/John,_Duke_of_Bedford","title":"John, Duke of Bedford - Wikipedia","publisher":"Wikipedia","quote":"Anne of Burgundy...on 13 May 1423 in Troyes"},{"url":"https://en.wikipedia.org/wiki/Anne_of_Burgundy","title":"Anne of Burgundy - Wikipedia","publisher":"Wikipedia","quote":"Anne died on 13 November 1432 in Paris, at the Hôtel de Bourbon, adjoining the Louvre Palace"}]},{"id":"jacquetta-luxembourg","married":"1433-04-20","ended":"1435-09-14","endedBy":"death","citations":[{"url":"https://en.wikipedia.org/wiki/John,_Duke_of_Bedford","title":"John, Duke of Bedford - Wikipedia","publisher":"Wikipedia","quote":"Jacquetta of Luxembourg...on 20 April 1433"}]}],"summary":"John of Lancaster, Duke of Bedford, third son of Henry IV and Mary de Bohun, was born on 20 June 1389. Created Duke of Bedford by his brother Henry V in 1414, he became regent of France for his nephew Henry VI after Henry V's death in 1422. He married Anne of Burgundy in 1423 and, after her death in 1432, Jacquetta of Luxembourg in 1433. He died at Rouen on 14 September 1435.","citations":[{"url":"https://en.wikipedia.org/wiki/John,_Duke_of_Bedford","title":"John, Duke of Bedford - Wikipedia","publisher":"Wikipedia","quote":"created Earl of Kendal, Earl of Richmond and Duke of Bedford in 1414 by his brother, King Henry V"},{"url":"https://en.wikipedia.org/wiki/John,_Duke_of_Bedford","title":"John, Duke of Bedford - Wikipedia","publisher":"Wikipedia","quote":"regent of France for his nephew Henry VI"}]},{"id":"humphrey-lancaster-gloucester","name":"Humphrey, Duke of Gloucester","house":"Lancaster","monarch":false,"reign":null,"birth":{"date":"1390-10-03","place":null,"precision":"day","citations":[{"url":"https://en.wikipedia.org/wiki/Humphrey,_Duke_of_Gloucester","title":"Humphrey, Duke of Gloucester - Wikipedia","publisher":"Wikipedia","quote":"3 October 1390"}]},"death":{"date":"1447-02-23","place":"Bury St Edmunds, Suffolk","precision":"day","citations":[{"url":"https://en.wikipedia.org/wiki/Humphrey,_Duke_of_Gloucester","title":"Humphrey, Duke of Gloucester - Wikipedia","publisher":"Wikipedia","quote":"23 February 1447"}]},"parents":["henry-iv","mary-bohun"],"spouses":[{"id":"jacqueline-hainaut","married":"1423-03","ended":"1428","endedBy":"annulment","citations":[{"url":"https://en.wikipedia.org/wiki/Jacqueline,_Countess_of_Hainaut","title":"Jacqueline, Countess of Hainaut - Wikipedia","publisher":"Wikipedia","quote":"sometime between February and 7 March 1423"},{"url":"https://en.wikipedia.org/wiki/Jacqueline,_Countess_of_Hainaut","title":"Jacqueline, Countess of Hainaut - Wikipedia","publisher":"Wikipedia","quote":"Her marriage to Humphrey was annulled in this same year."}]},{"id":"eleanor-cobham","married":"1428","ended":"1441","endedBy":"annulment","citations":[{"url":"https://en.wikipedia.org/wiki/Humphrey,_Duke_of_Gloucester","title":"Humphrey, Duke of Gloucester - Wikipedia","publisher":"Wikipedia","quote":"In 1428 Humphrey married, secondly, Eleanor Cobham"},{"url":"https://en.wikipedia.org/wiki/Humphrey,_Duke_of_Gloucester","title":"Humphrey, Duke of Gloucester - Wikipedia","publisher":"Wikipedia","quote":"annulled in 1441"}]}],"summary":"Humphrey, Duke of Gloucester, youngest son of Henry IV and Mary de Bohun, was born on 3 October 1390. Created Duke of Gloucester in 1414, he married Jacqueline, Countess of Hainaut, in 1423, a marriage annulled in 1428 after papal ruling upheld her earlier marriage; he then married Eleanor Cobham in 1428, a marriage annulled in 1441. He died at Bury St Edmunds, Suffolk, on 23 February 1447.","citations":[{"url":"https://en.wikipedia.org/wiki/Humphrey,_Duke_of_Gloucester","title":"Humphrey, Duke of Gloucester - Wikipedia","publisher":"Wikipedia","quote":"Created Duke of Gloucester in 1414"},{"url":"https://en.wikipedia.org/wiki/Humphrey,_Duke_of_Gloucester","title":"Humphrey, Duke of Gloucester - Wikipedia","publisher":"Wikipedia","quote":"3 October 1390"}]},{"id":"blanche-england","name":"Blanche of England","house":"Lancaster","monarch":false,"reign":null,"birth":{"date":"1392","place":null,"precision":"circa","citations":[{"url":"https://en.wikipedia.org/wiki/Blanche_of_England","title":"Blanche of England - Wikipedia","publisher":"Wikipedia","quote":"spring 1392"}]},"death":{"date":"1409-05-22","place":"Haguenau","precision":"day","citations":[{"url":"https://en.wikipedia.org/wiki/Blanche_of_England","title":"Blanche of England - Wikipedia","publisher":"Wikipedia","quote":"22 May 1409"}]},"parents":["henry-iv","mary-bohun"],"spouses":[{"id":"louis-palatine","married":"1402-07-06","ended":"1409-05-22","endedBy":"death","citations":[{"url":"https://en.wikipedia.org/wiki/Blanche_of_England","title":"Blanche of England - Wikipedia","publisher":"Wikipedia","quote":"The formal marriage between Blanche and Louis took place on 6 July 1402 at Cologne Cathedral, Germany."}]}],"summary":"Blanche of England, elder daughter of Henry IV and Mary de Bohun, was born in the spring of 1392. She married Louis III, Elector Palatine, at Cologne Cathedral on 6 July 1402. She died at Haguenau on 22 May 1409, while expecting her third child.","citations":[{"url":"https://en.wikipedia.org/wiki/Blanche_of_England","title":"Blanche of England - Wikipedia","publisher":"Wikipedia","quote":"spring 1392"},{"url":"https://en.wikipedia.org/wiki/Blanche_of_England","title":"Blanche of England - Wikipedia","publisher":"Wikipedia","quote":"22 May 1409"}]},{"id":"philippa-england","name":"Philippa of England","house":"Lancaster","monarch":false,"reign":null,"birth":{"date":"1394-06-04","place":null,"precision":"day","citations":[{"url":"https://en.wikipedia.org/wiki/Mary_de_Bohun","title":"Mary de Bohun - Wikipedia","publisher":"Wikipedia","quote":"died at Peterborough Castle, giving birth to her daughter Philippa"},{"url":"https://en.wikipedia.org/wiki/Philippa_of_England","title":"Philippa of England - Wikipedia","publisher":"Wikipedia","quote":"mid-1394"}]},"death":{"date":"1430-01-05","place":"Vadstena Abbey, Sweden","precision":"day","citations":[{"url":"https://en.wikipedia.org/wiki/Philippa_of_England","title":"Philippa of England - Wikipedia","publisher":"Wikipedia","quote":"She died on 5 January 1430 at the age of 35"}]},"parents":["henry-iv","mary-bohun"],"spouses":[{"id":"erik-pomerania","married":"1406-10-26","ended":"1430-01-05","endedBy":"death","citations":[{"url":"https://en.wikipedia.org/wiki/Philippa_of_England","title":"Philippa of England - Wikipedia","publisher":"Wikipedia","quote":"The wedding between Philippa and Erik of Pomerania took place on 26 October 1406 in Lund Cathedral."}]}],"summary":"Philippa of England, younger daughter of Henry IV and Mary de Bohun, was born on 4 June 1394, the day her mother died giving birth to her. She married Erik of Pomerania, king of Denmark, Norway and Sweden, at Lund Cathedral on 26 October 1406. She died at Vadstena Abbey in Sweden on 5 January 1430.","citations":[{"url":"https://en.wikipedia.org/wiki/Philippa_of_England","title":"Philippa of England - Wikipedia","publisher":"Wikipedia","quote":"mid-1394"},{"url":"https://en.wikipedia.org/wiki/Philippa_of_England","title":"Philippa of England - Wikipedia","publisher":"Wikipedia","quote":"The wedding between Philippa and Erik of Pomerania took place on 26 October 1406 in Lund Cathedral."}]},{"id":"katherine-swynford","name":"Katherine Swynford","house":"Roet","monarch":false,"reign":null,"birth":{"date":"1350","place":null,"precision":"circa","citations":[{"url":"https://en.wikisource.org/wiki/Dictionary_of_National_Biography,_1885-1900/Swynford,_Catherine","title":"Dictionary of National Biography, 1885-1900/Swynford, Catherine","publisher":"Wikisource (Dictionary of National Biography)","quote":"Catherine was born about 1350"},{"url":"https://en.wikipedia.org/wiki/Katherine_Swynford","title":"Katherine Swynford - Wikipedia","publisher":"Wikipedia","quote":"c. 1349"}]},"death":{"date":"1403-05-10","place":"Lincoln","precision":"day","citations":[{"url":"https://en.wikisource.org/wiki/Dictionary_of_National_Biography,_1885-1900/Swynford,_Catherine","title":"Dictionary of National Biography, 1885-1900/Swynford, Catherine","publisher":"Wikisource (Dictionary of National Biography)","quote":"Catherine died at Lincoln on 10 May 1403, and was buried in the angel choir of the cathedral"},{"url":"https://en.wikipedia.org/wiki/Katherine_Swynford","title":"Katherine Swynford - Wikipedia","publisher":"Wikipedia","quote":"Katherine Swynford died on 10 May 1403 at Lincoln"}]},"parents":[],"spouses":[{"id":"hugh-swynford","married":"1367","ended":"1372","endedBy":"death","citations":[{"url":"https://en.wikisource.org/wiki/Dictionary_of_National_Biography,_1885-1900/Swynford,_Catherine","title":"Dictionary of National Biography, 1885-1900/Swynford, Catherine","publisher":"Wikisource (Dictionary of National Biography)","quote":"in or shortly before 1367 married Sir Hugh Swynford (1340–1372) of Coleby and Ketelthorp, Lincolnshire"}]},{"id":"john-of-gaunt","married":"1396-01-13","ended":"1399-02-03","endedBy":"death","citations":[{"url":"https://en.wikisource.org/wiki/Dictionary_of_National_Biography,_1885-1900/Swynford,_Catherine","title":"Dictionary of National Biography, 1885-1900/Swynford, Catherine","publisher":"Wikisource (Dictionary of National Biography)","quote":"on 13 Jan. 1396 he married Catherine Swynford at Lincoln"},{"url":"https://en.wikipedia.org/wiki/John_of_Gaunt","title":"John of Gaunt - Wikipedia","publisher":"Wikipedia","quote":"John of Gaunt died of natural causes on 3 February 1399 at Leicester Castle, with his third wife Katherine by his side."}]}],"summary":"Katherine Swynford, born about 1350, daughter of Sir Payne Roelt, a herald from Hainault, first married Sir Hugh Swynford, who died in 1372. She subsequently became the long-standing mistress of John of Gaunt, Duke of Lancaster, bearing him four children before he married her at Lincoln Cathedral on 13 January 1396. Their children, the Beauforts, were legitimated by papal bull later that year and by royal proclamation in 1397. She died at Lincoln on 10 May 1403.","citations":[{"url":"https://en.wikisource.org/wiki/Dictionary_of_National_Biography,_1885-1900/Swynford,_Catherine","title":"Dictionary of National Biography, 1885-1900/Swynford, Catherine","publisher":"Wikisource (Dictionary of National Biography)","quote":"mother of John Beaufort, earl of Somerset...Henry Beaufort...Thomas Beaufort...and Joan"},{"url":"https://en.wikipedia.org/wiki/Katherine_Swynford","title":"Katherine Swynford - Wikipedia","publisher":"Wikipedia","quote":"On 1 September 1396 Pope Boniface IX declared the marriage of John of Gaunt and Katherine Swynford as valid by a bull. In addition, he legitimized their children born before marriage."}],"uncertain":"Sources vary slightly on Katherine's birth year (c. 1349 vs. c. 1350) and on the exact date of her first marriage to Hugh Swynford (the DNB says 'in or shortly before 1367'; other accounts place it as early as 1362/63)."},{"id":"john-beaufort","name":"John Beaufort, 1st Earl of Somerset","house":"Beaufort","monarch":false,"reign":null,"birth":{"date":"1373","place":null,"precision":"circa","citations":[{"url":"https://en.wikipedia.org/wiki/John_Beaufort,_1st_Earl_of_Somerset","title":"John Beaufort, 1st Earl of Somerset - Wikipedia","publisher":"Wikipedia","quote":"c. 1373"}]},"death":{"date":"1410-03-16","place":"Hospital of St Katharine's by the Tower, London","precision":"day","citations":[{"url":"https://en.wikipedia.org/wiki/John_Beaufort,_1st_Earl_of_Somerset","title":"John Beaufort, 1st Earl of Somerset - Wikipedia","publisher":"Wikipedia","quote":"16 March 1410"}]},"parents":["john-of-gaunt","katherine-swynford"],"spouses":[{"id":"margaret-holland","married":"1397-09-27","ended":"1410-03-16","endedBy":"death","citations":[{"url":"https://en.wikipedia.org/wiki/John_Beaufort,_1st_Earl_of_Somerset","title":"John Beaufort, 1st Earl of Somerset - Wikipedia","publisher":"Wikipedia","quote":"he married the king's niece, Margaret Holland"}]}],"titles":[{"title":"Earl of Somerset","from":"1397","to":"1410","citations":[{"url":"https://en.wikipedia.org/wiki/John_Beaufort,_1st_Earl_of_Somerset","title":"John Beaufort, 1st Earl of Somerset - Wikipedia","publisher":"Wikipedia","quote":"John was created Earl of Somerset on 10 February 1397"}]}],"summary":"John Beaufort, eldest child of John of Gaunt and Katherine Swynford, was born about 1373. Declared legitimate by King Richard II in 1397, he was created Earl of Somerset on 10 February that year and shortly afterwards married Margaret Holland, niece of Richard II. He died on 16 March 1410 at the Hospital of St Katharine's by the Tower, London.","citations":[{"url":"https://en.wikipedia.org/wiki/John_Beaufort,_1st_Earl_of_Somerset","title":"John Beaufort, 1st Earl of Somerset - Wikipedia","publisher":"Wikipedia","quote":"The Beaufort children were declared legitimate twice by parliament, first during the reign of King Richard II, in 1397"},{"url":"https://en.wikisource.org/wiki/Dictionary_of_National_Biography,_1885-1900/Swynford,_Catherine","title":"Dictionary of National Biography, 1885-1900/Swynford, Catherine","publisher":"Wikisource (Dictionary of National Biography)","quote":"mother of John Beaufort, earl of Somerset"}],"uncertain":"In 1407 Henry IV had the 1397 legitimation of his Beaufort half-siblings reaffirmed by Parliament but with a proviso barring them from claiming the crown; Wikipedia's House of Beaufort article states 'in 1406, Henry IV decided that although the Beauforts were legitimate, their line could not be used to make any claim to the throne', but the legal force and later relevance of this bar (invoked against the Beauforts' Tudor descendants) is debated by historians."},{"id":"henry-beaufort","name":"Henry Beaufort","house":"Beaufort","monarch":false,"reign":null,"birth":{"date":"1375","place":null,"precision":"circa","citations":[{"url":"https://en.wikipedia.org/wiki/Henry_Beaufort","title":"Henry Beaufort - Wikipedia","publisher":"Wikipedia","quote":"Born c. 1375"}]},"death":{"date":"1447-04-11","place":"Wolvesey Castle, Winchester","precision":"day","citations":[{"url":"https://en.wikipedia.org/wiki/Henry_Beaufort","title":"Henry Beaufort - Wikipedia","publisher":"Wikipedia","quote":"He died on 11 April 1447"}]},"parents":["john-of-gaunt","katherine-swynford"],"spouses":[],"titles":[{"title":"Bishop of Winchester","from":"1404","to":"1447","citations":[{"url":"https://en.wikipedia.org/wiki/Henry_Beaufort","title":"Henry Beaufort - Wikipedia","publisher":"Wikipedia","quote":"appointed Bishop of Winchester on 19 November"}]},{"title":"Cardinal","from":"1426","to":"1447","citations":[{"url":"https://en.wikipedia.org/wiki/Henry_Beaufort","title":"Henry Beaufort - Wikipedia","publisher":"Wikipedia","quote":"Pope Martin V finally appointed Beaufort as Cardinal in 1426"}]}],"summary":"Henry Beaufort, second son of John of Gaunt and Katherine Swynford, was born about 1375. He was appointed Bishop of Winchester on 19 November 1404 and served three times as Lord Chancellor of England, and was elevated to cardinal by Pope Martin V in 1426. He died at Wolvesey Castle, Winchester, on 11 April 1447.","citations":[{"url":"https://en.wikipedia.org/wiki/Henry_Beaufort","title":"Henry Beaufort - Wikipedia","publisher":"Wikipedia","quote":"served three times as Lord Chancellor"},{"url":"https://en.wikisource.org/wiki/Dictionary_of_National_Biography,_1885-1900/Swynford,_Catherine","title":"Dictionary of National Biography, 1885-1900/Swynford, Catherine","publisher":"Wikisource (Dictionary of National Biography)","quote":"mother of John Beaufort, earl of Somerset...Henry Beaufort"}]},{"id":"thomas-beaufort","name":"Thomas Beaufort, Duke of Exeter","house":"Beaufort","monarch":false,"reign":null,"birth":{"date":"1377","place":null,"precision":"circa","citations":[{"url":"https://en.wikipedia.org/wiki/Thomas_Beaufort,_Duke_of_Exeter","title":"Thomas Beaufort, Duke of Exeter - Wikipedia","publisher":"Wikipedia","quote":"c. January 1377"}]},"death":{"date":"1426-12-31","place":"Greenwich manor, Kent","precision":"day","citations":[{"url":"https://en.wikipedia.org/wiki/Thomas_Beaufort,_Duke_of_Exeter","title":"Thomas Beaufort, Duke of Exeter - Wikipedia","publisher":"Wikipedia","quote":"30 or 31 December 1426"}]},"parents":["john-of-gaunt","katherine-swynford"],"spouses":[{"id":"margaret-neville","married":null,"ended":null,"endedBy":null,"citations":[{"url":"https://en.wikipedia.org/wiki/Thomas_Beaufort,_Duke_of_Exeter","title":"Thomas Beaufort, Duke of Exeter - Wikipedia","publisher":"Wikipedia","quote":"He married the daughter of Sir Thomas Neville (died 1387) of Hornby, Margaret Neville (born c. 1384)."}]}],"titles":[{"title":"Duke of Exeter","from":"1416","to":"1426","citations":[{"url":"https://en.wikipedia.org/wiki/Thomas_Beaufort,_Duke_of_Exeter","title":"Thomas Beaufort, Duke of Exeter - Wikipedia","publisher":"Wikipedia","quote":"18 November 1416 – 1426"}]}],"summary":"Thomas Beaufort, youngest son of John of Gaunt and Katherine Swynford, was born about January 1377. A career soldier, he served as captain of Harfleur after its capture in 1415 and led sieges at Evreux, Ivry and Rouen, and was created Duke of Exeter on 18 November 1416. He married Margaret Neville, and died at Greenwich manor, Kent, on 30 or 31 December 1426.","citations":[{"url":"https://en.wikipedia.org/wiki/Thomas_Beaufort,_Duke_of_Exeter","title":"Thomas Beaufort, Duke of Exeter - Wikipedia","publisher":"Wikipedia","quote":"captain of Harfleur in 1415"},{"url":"https://en.wikipedia.org/wiki/Thomas_Beaufort,_Duke_of_Exeter","title":"Thomas Beaufort, Duke of Exeter - Wikipedia","publisher":"Wikipedia","quote":"John of Gaunt, Duke of Lancaster, and his mistress Katherine Swynford"}]},{"id":"joan-beaufort","name":"Joan Beaufort, Countess of Westmorland","house":"Beaufort","monarch":false,"reign":null,"birth":{"date":"1379","place":null,"precision":"circa","citations":[{"url":"https://en.wikipedia.org/wiki/Joan_Beaufort,_Countess_of_Westmorland","title":"Joan Beaufort, Countess of Westmorland - Wikipedia","publisher":"Wikipedia","quote":"c. 1379"}]},"death":{"date":"1440-11-13","place":"Howden, Yorkshire","precision":"day","citations":[{"url":"https://en.wikipedia.org/wiki/Joan_Beaufort,_Countess_of_Westmorland","title":"Joan Beaufort, Countess of Westmorland - Wikipedia","publisher":"Wikipedia","quote":"Joan died on 13 November 1440 at Howden in Yorkshire"}]},"parents":["john-of-gaunt","katherine-swynford"],"spouses":[{"id":"robert-ferrers","married":"1391","ended":null,"endedBy":null,"citations":[{"url":"https://en.wikipedia.org/wiki/Joan_Beaufort,_Countess_of_Westmorland","title":"Joan Beaufort, Countess of Westmorland - Wikipedia","publisher":"Wikipedia","quote":"The marriage took place in 1391/2 at Beaufort-en-Vallée, Anjou"}]},{"id":"ralph-neville-westmorland","married":"1396-11","ended":"1440-11-13","endedBy":"death","citations":[{"url":"https://en.wikipedia.org/wiki/Joan_Beaufort,_Countess_of_Westmorland","title":"Joan Beaufort, Countess of Westmorland - Wikipedia","publisher":"Wikipedia","quote":"In November 1396 Joan married, secondly, to the recently widowed Ralph Neville"}]}],"summary":"Joan Beaufort, only daughter of John of Gaunt and Katherine Swynford, was born about 1379. She first married Robert Ferrers around 1391/92, and after his death married Ralph Neville, 1st Earl of Westmorland, in November 1396. She died at Howden, Yorkshire, on 13 November 1440.","citations":[{"url":"https://en.wikipedia.org/wiki/Joan_Beaufort,_Countess_of_Westmorland","title":"Joan Beaufort, Countess of Westmorland - Wikipedia","publisher":"Wikipedia","quote":"John of Gaunt, 1st Duke of Lancaster"},{"url":"https://en.wikisource.org/wiki/Dictionary_of_National_Biography,_1885-1900/Swynford,_Catherine","title":"Dictionary of National Biography, 1885-1900/Swynford, Catherine","publisher":"Wikisource (Dictionary of National Biography)","quote":"and Joan"}],"uncertain":"Joan's birth year is given as c. 1379, though the article notes that the historian Alison Weir suggests 1377 may be more accurate."},{"id":"catherine-valois","name":"Catherine of Valois","house":"Valois","monarch":false,"reign":null,"birth":{"date":"1401-10-27","place":null,"precision":"day","citations":[{"url":"https://en.wikipedia.org/wiki/Catherine_of_Valois","title":"Catherine of Valois - Wikipedia","publisher":"Wikipedia","quote":"27 October 1401"}]},"death":{"date":"1437-01-03","place":"London","precision":"day","citations":[{"url":"https://en.wikipedia.org/wiki/Catherine_of_Valois","title":"Catherine of Valois - Wikipedia","publisher":"Wikipedia","quote":"Catherine died on 3 January 1437, shortly after childbirth, in London"}]},"parents":[],"spouses":[{"id":"henry-v","married":"1420-06-02","ended":"1422-08-31","endedBy":"death","citations":[{"url":"https://en.wikipedia.org/wiki/Catherine_of_Valois","title":"Catherine of Valois - Wikipedia","publisher":"Wikipedia","quote":"Catherine and Henry were married at the Parish Church of St John or at Troyes Cathedral on 2 June 1420."}]},{"id":"owen-tudor","married":null,"ended":null,"endedBy":null,"citations":[{"url":"https://en.wikipedia.org/wiki/Catherine_of_Valois","title":"Catherine of Valois - Wikipedia","publisher":"Wikipedia","quote":"There is no known date of Catherine's marriage to Owen."}]}],"summary":"Catherine of Valois was born on 27 October 1401, daughter of Charles VI of France and Isabeau of Bavaria. Under the Treaty of Troyes she married Henry V of England at Troyes on 2 June 1420, and on 6 December 1421 bore him a son, the future Henry VI. After Henry's death in 1422 she entered into a relationship, and reportedly a secret marriage of unknown date, with the Welshman Owen Tudor, by whom she had several more children. She died in London on 3 January 1437, shortly after childbirth.","citations":[{"url":"https://en.wikipedia.org/wiki/Catherine_of_Valois","title":"Catherine of Valois - Wikipedia","publisher":"Wikipedia","quote":"gave birth to a son, whom she named Henry, on 6 December 1421 at Windsor"},{"url":"https://en.wikipedia.org/wiki/Catherine_of_Valois","title":"Catherine of Valois - Wikipedia","publisher":"Wikipedia","quote":"Catherine entered into a sexual relationship with Welshman Owen Maredudd Tudor"}]},{"id":"henry-vi","name":"Henry VI","house":"Lancaster","monarch":true,"reign":{"start":"1422-09-01","end":null,"citations":[{"url":"https://en.wikipedia.org/wiki/Henry_VI_of_England","title":"Henry VI of England - Wikipedia","publisher":"Wikipedia","quote":"He succeeded to the throne as King of England at the age of eight months on 1 September 1422, the day after his father's death; he remains the youngest person ever to succeed to the English throne."}]},"birth":{"date":"1421-12-06","place":"Windsor Castle","precision":"day","citations":[{"url":"https://en.wikipedia.org/wiki/Henry_VI_of_England","title":"Henry VI of England - Wikipedia","publisher":"Wikipedia","quote":"Henry was born on 6 December 1421 at Windsor Castle."},{"url":"https://en.wikisource.org/wiki/Dictionary_of_National_Biography,_1885-1900/Henry_V","title":"Dictionary of National Biography, 1885-1900/Henry V","publisher":"Wikisource (Dictionary of National Biography)","quote":"her infant son, born at Windsor on 6 Dec. 1421"}]},"parents":["henry-v","catherine-valois"],"spouses":[],"summary":"Henry VI was born at Windsor Castle on 6 December 1421, the only child of Henry V and Catherine of Valois. He succeeded to the English throne at the age of eight months on 1 September 1422, the day after his father's death, becoming the youngest person ever to succeed to the English throne. This dataset ends with Henry V's death in 1422; Henry VI's subsequent reign and life fall outside its scope.","citations":[{"url":"https://en.wikipedia.org/wiki/Henry_VI_of_England","title":"Henry VI of England - Wikipedia","publisher":"Wikipedia","quote":"the only child and heir-apparent of King Henry V"},{"url":"https://en.wikipedia.org/wiki/Henry_VI_of_England","title":"Henry VI of England - Wikipedia","publisher":"Wikipedia","quote":"He succeeded to the throne as King of England at the age of eight months on 1 September 1422, the day after his father's death"}],"uncertain":"This record covers only Henry VI's birth and accession, the point at which this dataset (Richard II–Henry V, ending 1422) closes. His subsequent reign, deposition (1461), brief readeption (1470–71), and death are outside this shard's scope and are left for a later shard covering the Yorkist period."},{"id":"philippa-plantagenet","name":"Philippa, 5th Countess of Ulster","fullName":"Philippa of Clarence","house":"Plantagenet","monarch":false,"reign":null,"birth":{"date":"1355-08-16","place":"Eltham Palace, Kent","precision":"day","citations":[{"url":"https://en.wikipedia.org/wiki/Philippa,_5th_Countess_of_Ulster","title":"Philippa, 5th Countess of Ulster - Wikipedia","publisher":"Wikipedia","quote":"16 August 1355"}]},"death":{"date":"1377","place":null,"precision":"circa","citations":[{"url":"https://en.wikipedia.org/wiki/Philippa,_5th_Countess_of_Ulster","title":"Philippa, 5th Countess of Ulster - Wikipedia","publisher":"Wikipedia","quote":"certainly died by December 1379"}]},"parents":["lionel-antwerp"],"spouses":[{"id":"edmund-mortimer-1352","married":"1369-08-24","ended":"1377","endedBy":"death","citations":[{"url":"https://en.wikipedia.org/wiki/Edmund_Mortimer,_3rd_Earl_of_March","title":"Edmund Mortimer, 3rd Earl of March - Wikipedia","publisher":"Wikipedia","quote":"married Philippa Plantagenet...on 24 August 1369"}]}],"summary":"Philippa, 5th Countess of Ulster, was born at Eltham Palace on 16 August 1355, the only child of Lionel of Antwerp, Duke of Clarence, and Elizabeth de Burgh, and so the eldest grandchild of Edward III. She married Edmund Mortimer, 3rd Earl of March, in 1369, and their son Roger Mortimer inherited the earldom. She died young, by December 1379 at the latest. Because her father was Edward III's second surviving son, her descendants' claim through her was later cited as senior to that of the Lancastrian kings descended from Edward III's third son, John of Gaunt.","citations":[{"url":"https://en.wikipedia.org/wiki/Philippa,_5th_Countess_of_Ulster","title":"Philippa, 5th Countess of Ulster - Wikipedia","publisher":"Wikipedia","quote":"Her father was the second surviving son of King Edward III of England."},{"url":"https://en.wikipedia.org/wiki/Philippa,_5th_Countess_of_Ulster","title":"Philippa, 5th Countess of Ulster - Wikipedia","publisher":"Wikipedia","quote":"the Yorkist claim to the crown was based on descent from Edward III through Philippa...her son Roger Mortimer...and granddaughter Anne Mortimer"}],"uncertain":"Her exact death date is unclear: Wikipedia gives c. 1377 (aged 22) but notes she 'certainly died by December 1379'."},{"id":"roger-mortimer","name":"Roger Mortimer, 4th Earl of March","house":"Mortimer","monarch":false,"reign":null,"birth":{"date":"1374-04-11","place":"Usk, Monmouthshire","precision":"day","citations":[{"url":"https://en.wikipedia.org/wiki/Roger_Mortimer,_4th_Earl_of_March","title":"Roger Mortimer, 4th Earl of March - Wikipedia","publisher":"Wikipedia","quote":"11 April 1374"}]},"death":{"date":"1398-07-20","place":"Kellistown, County Carlow, Ireland","precision":"day","citations":[{"url":"https://en.wikipedia.org/wiki/Roger_Mortimer,_4th_Earl_of_March","title":"Roger Mortimer, 4th Earl of March - Wikipedia","publisher":"Wikipedia","quote":"20 July 1398, at the age of 24, Mortimer was slain at The Battle of Kellistown"}]},"parents":["edmund-mortimer-1352","philippa-plantagenet"],"spouses":[{"id":"eleanor-holland","married":"1388-10-07","ended":"1398-07-20","endedBy":"death","citations":[{"url":"https://en.wikipedia.org/wiki/Roger_Mortimer,_4th_Earl_of_March","title":"Roger Mortimer, 4th Earl of March - Wikipedia","publisher":"Wikipedia","quote":"Married Alianore Holland...on or about 7 October 1388"}]}],"summary":"Roger Mortimer, 4th Earl of March, was born on 11 April 1374 at Usk in Monmouthshire, son of Edmund Mortimer, 3rd Earl of March, and Philippa Plantagenet, herself granddaughter of Edward III through his second surviving son, Lionel of Antwerp. He married Alianore (Eleanor) Holland in 1388. Some sources hold that Richard II proclaimed him heir presumptive to the throne in 1385, though this is disputed by modern historians. He was killed fighting at the Battle of Kellistown in County Carlow, Ireland, on 20 July 1398.","citations":[{"url":"https://en.wikipedia.org/wiki/Roger_Mortimer,_4th_Earl_of_March","title":"Roger Mortimer, 4th Earl of March - Wikipedia","publisher":"Wikipedia","quote":"Edmund Mortimer, 3rd Earl of March"},{"url":"https://en.wikipedia.org/wiki/Roger_Mortimer,_4th_Earl_of_March","title":"Roger Mortimer, 4th Earl of March - Wikipedia","publisher":"Wikipedia","quote":"in October 1385 Mortimer was proclaimed by the king as heir presumptive to the crown"}],"uncertain":"Whether Richard II ever formally proclaimed Roger Mortimer heir presumptive is disputed: G. E. Cokayne states 'in October 1385 Mortimer was proclaimed by the king as heir presumptive to the crown', but the historian R. R. Davies is quoted as calling 'the story that Richard publicly proclaimed Mortimer as heir presumptive in Parliament in October 1385...baseless'. Regardless, as descendants of Edward III's second surviving son Lionel of Antwerp, the Mortimers had a genealogically senior claim to that of the Lancastrian kings (descended from Edward III's third son, John of Gaunt) — a claim later inherited by the Yorkist line."},{"id":"edmund-mortimer","name":"Edmund Mortimer, 5th Earl of March","house":"Mortimer","monarch":false,"reign":null,"birth":{"date":"1391-11-06","place":"New Forest, Westmeath, Ireland","precision":"day","citations":[{"url":"https://en.wikipedia.org/wiki/Edmund_Mortimer,_5th_Earl_of_March","title":"Edmund Mortimer, 5th Earl of March - Wikipedia","publisher":"Wikipedia","quote":"6 November 1391"}]},"death":{"date":"1425-01-18","place":"Trim Castle, Ireland","precision":"day","citations":[{"url":"https://en.wikipedia.org/wiki/Edmund_Mortimer,_5th_Earl_of_March","title":"Edmund Mortimer, 5th Earl of March - Wikipedia","publisher":"Wikipedia","quote":"On 18 or 19 January 1425 died of plague at Trim Castle"}]},"parents":["roger-mortimer","eleanor-holland"],"spouses":[{"id":"anne-stafford","married":"1415-01-17","ended":"1425-01-18","endedBy":"death","citations":[{"url":"https://en.wikipedia.org/wiki/Edmund_Mortimer,_5th_Earl_of_March","title":"Edmund Mortimer, 5th Earl of March - Wikipedia","publisher":"Wikipedia","quote":"On 17 January 1415 Edmund obtained a papal dispensation...to marry his second cousin once removed, Anne Stafford"}]}],"summary":"Edmund Mortimer, 5th Earl of March, was born on 6 November 1391 at New Forest, County Westmeath, Ireland, son of Roger Mortimer, 4th Earl of March, and Eleanor Holland. As a great-great-grandson of Edward III, he was regarded as heir presumptive to Richard II at the time of Richard's deposition by Henry IV in 1399, and was kept, though treated honourably, in wardship during Henry IV's reign. He obtained a papal dispensation to marry Anne Stafford in January 1415, and remained loyal to Henry V, never asserting any claim to the throne even though the Southampton Plot of 1415 sought to place him on it. He died of plague at Trim Castle, Ireland, on 18 or 19 January 1425.","citations":[{"url":"https://en.wikipedia.org/wiki/Edmund_Mortimer,_5th_Earl_of_March","title":"Edmund Mortimer, 5th Earl of March - Wikipedia","publisher":"Wikipedia","quote":"he was heir presumptive to King Richard II of England...when the latter was deposed in favour of Henry IV"},{"url":"https://en.wikipedia.org/wiki/Edmund_Mortimer,_5th_Earl_of_March","title":"Edmund Mortimer, 5th Earl of March - Wikipedia","publisher":"Wikipedia","quote":"Edmund Mortimer was entirely loyal to Henry V. He never made any claim to the throne"}]},{"id":"anne-mortimer","name":"Anne Mortimer","house":"Mortimer","monarch":false,"reign":null,"birth":{"date":"1388-12-27","place":null,"precision":"day","citations":[{"url":"https://en.wikipedia.org/wiki/Anne_Mortimer","title":"Anne Mortimer - Wikipedia","publisher":"Wikipedia","quote":"Born 27 December 1388"}]},"death":{"date":"1411-09-22","place":null,"precision":"day","citations":[{"url":"https://en.wikipedia.org/wiki/Anne_Mortimer","title":"Anne Mortimer - Wikipedia","publisher":"Wikipedia","quote":"Anne de Mortimer died soon after the birth of her son Richard, on 22 September 1411"}]},"parents":["roger-mortimer","eleanor-holland"],"spouses":[{"id":"richard-conisburgh","married":"1408","ended":"1411-09-22","endedBy":"death","citations":[{"url":"https://en.wikipedia.org/wiki/Anne_Mortimer","title":"Anne Mortimer - Wikipedia","publisher":"Wikipedia","quote":"Around early 1408 (probably after 8 January)...Anne married Richard of Conisburgh"}]}],"summary":"Anne Mortimer was born on 27 December 1388, daughter of Roger Mortimer, 4th Earl of March, and Eleanor Holland. She married Richard of Conisburgh, later Earl of Cambridge, around early 1408, a union validated by papal dispensation on 23 May 1408. She died on 22 September 1411, shortly after giving birth to her son Richard, later 3rd Duke of York, whose descent from her carried the Mortimer claim to the throne into the Yorkist cause of the Wars of the Roses.","citations":[{"url":"https://en.wikipedia.org/wiki/Anne_Mortimer","title":"Anne Mortimer - Wikipedia","publisher":"Wikipedia","quote":"It was her line of descent which gave the Yorkist dynasty its claim to the throne."},{"url":"https://en.wikipedia.org/wiki/Anne_Mortimer","title":"Anne Mortimer - Wikipedia","publisher":"Wikipedia","quote":"Richard of York, 3rd Duke of York (22 September 1411 – 30 December 1460)"}],"uncertain":"The precise date of Anne's marriage to Richard of Conisburgh is imprecisely recorded: sources place it 'around early 1408 (probably after 8 January)', with papal dispensation validating it only on 23 May 1408."},{"id":"richard-conisburgh","name":"Richard of Conisburgh, 3rd Earl of Cambridge","house":"York","monarch":false,"reign":null,"birth":{"date":"1385-07-20","place":"Conisbrough Castle, Yorkshire","precision":"day","citations":[{"url":"https://en.wikipedia.org/wiki/Richard_of_Conisburgh,_3rd_Earl_of_Cambridge","title":"Richard of Conisburgh, 3rd Earl of Cambridge - Wikipedia","publisher":"Wikipedia","quote":"20 July 1385"}]},"death":{"date":"1415-08-05","place":"Southampton","precision":"day","citations":[{"url":"https://en.wikipedia.org/wiki/Richard_of_Conisburgh,_3rd_Earl_of_Cambridge","title":"Richard of Conisburgh, 3rd Earl of Cambridge - Wikipedia","publisher":"Wikipedia","quote":"He was beheaded on 5 August 1415"}]},"parents":["edmund-langley"],"spouses":[{"id":"anne-mortimer","married":"1408","ended":"1411-09-22","endedBy":"death","citations":[{"url":"https://en.wikipedia.org/wiki/Richard_of_Conisburgh,_3rd_Earl_of_Cambridge","title":"Richard of Conisburgh, 3rd Earl of Cambridge - Wikipedia","publisher":"Wikipedia","quote":"Early in 1408 Richard married Anne de Mortimer"}]}],"summary":"Richard of Conisburgh, 3rd Earl of Cambridge, was born on 20 July 1385 at Conisbrough Castle, Yorkshire, younger son of Edmund of Langley, 1st Duke of York, and Isabella of Castile. He married Anne Mortimer around 1408; their son Richard, Duke of York, later pursued the Mortimer claim to the throne. In 1415 Richard conspired with Lord Scrope and Sir Thomas Grey to depose Henry V and place his late wife's brother, Edmund Mortimer, 5th Earl of March, on the throne. The plot was discovered, and he was beheaded at Southampton on 5 August 1415.","citations":[{"url":"https://en.wikipedia.org/wiki/Richard_of_Conisburgh,_3rd_Earl_of_Cambridge","title":"Richard of Conisburgh, 3rd Earl of Cambridge - Wikipedia","publisher":"Wikipedia","quote":"conspired with Lord Scrope and Sir Thomas Grey to depose Henry V of England and place his late wife Anne's brother Edmund Mortimer, 5th Earl of March, on the throne"},{"url":"https://en.wikipedia.org/wiki/Richard_of_Conisburgh,_3rd_Earl_of_Cambridge","title":"Richard of Conisburgh, 3rd Earl of Cambridge - Wikipedia","publisher":"Wikipedia","quote":"Edmund of Langley, 1st Duke of York"}]},{"id":"edward-norwich","name":"Edward of Norwich, 2nd Duke of York","house":"York","monarch":false,"reign":null,"birth":{"date":"1373","place":"Kings Langley, Hertfordshire","precision":"circa","citations":[{"url":"https://en.wikipedia.org/wiki/Edward_of_Norwich,_2nd_Duke_of_York","title":"Edward of Norwich, 2nd Duke of York - Wikipedia","publisher":"Wikipedia","quote":"c. 1373"}]},"death":{"date":"1415-10-25","place":"Battle of Agincourt, France","precision":"day","citations":[{"url":"https://en.wikipedia.org/wiki/Edward_of_Norwich,_2nd_Duke_of_York","title":"Edward of Norwich, 2nd Duke of York - Wikipedia","publisher":"Wikipedia","quote":"He commanded the right wing at the Battle of Agincourt on 25 October 1415, during which he became the highest-ranking English casualty."}]},"parents":["edmund-langley"],"spouses":[],"summary":"Edward of Norwich, 2nd Duke of York, was born about 1373 at Kings Langley, Hertfordshire, elder son of Edmund of Langley, 1st Duke of York, and Isabella of Castile. He succeeded his father as Duke of York on 1 August 1402. At the Battle of Agincourt on 25 October 1415 he commanded the right wing of the English army and was killed, becoming its highest-ranking English casualty; one account holds his intervention saved Henry V's life at the cost of his own. He was buried at the Church of St Mary and All Saints, Fotheringhay, on 1 December 1415.","citations":[{"url":"https://en.wikipedia.org/wiki/Edward_of_Norwich,_2nd_Duke_of_York","title":"Edward of Norwich, 2nd Duke of York - Wikipedia","publisher":"Wikipedia","quote":"he succeeded to the Duchy of York"},{"url":"https://en.wikipedia.org/wiki/Edward_of_Norwich,_2nd_Duke_of_York","title":"Edward of Norwich, 2nd Duke of York - Wikipedia","publisher":"Wikipedia","quote":"York's intervention saved the King's life but cost Edward his own"}]},{"id":"william-marshal","name":"William Marshal","fullName":"William Marshal, 1st Earl of Pembroke","epithet":null,"house":"Marshal","role":"Earl of Pembroke; Regent of England","monarch":false,"reign":null,"birth":{"date":"1146","place":null,"precision":"circa","citations":[{"url":"https://en.wikipedia.org/wiki/William_Marshal,_1st_Earl_of_Pembroke","title":"William Marshal, 1st Earl of Pembroke","publisher":"Wikipedia","quote":"William Marshal, 1st Earl of Pembroke (1146 or 1147 – 14 May 1219)"},{"url":"https://en.wikisource.org/wiki/Dictionary_of_National_Biography,_1885-1900/Marshal,_William_(d.1219)","title":"Dictionary of National Biography, 1885-1900/Marshal, William (d.1219)","publisher":"Wikisource (Dictionary of National Biography, 1885-1900)","quote":"1146 is a more likely date for his birth"}]},"death":{"date":"1219-05-14","place":"Caversham, near Reading","precision":"day","citations":[{"url":"https://en.wikisource.org/wiki/Dictionary_of_National_Biography,_1885-1900/Marshal,_William_(d.1219)","title":"Dictionary of National Biography, 1885-1900/Marshal, William (d.1219)","publisher":"Wikisource (Dictionary of National Biography, 1885-1900)","quote":"On 14 May 1219 Marshal died at Caversham, near Reading."},{"url":"https://en.wikipedia.org/wiki/William_Marshal,_1st_Earl_of_Pembroke","title":"William Marshal, 1st Earl of Pembroke","publisher":"Wikipedia","quote":"He died peacefully on 14 May 1219 at Caversham, surrounded by his friends and family."}]},"parents":["john-marshal-fitzgilbert","sibyl-salisbury"],"spouses":[{"id":"isabel-de-clare","married":"1189-08","ended":"1219-05-14","endedBy":"death","citations":[{"url":"https://en.wikisource.org/wiki/Dictionary_of_National_Biography,_1885-1900/Marshal,_William_(d.1219)","title":"Dictionary of National Biography, 1885-1900/Marshal, William (d.1219)","publisher":"Wikisource (Dictionary of National Biography, 1885-1900)","quote":"Marshal himself remained with Richard in England...at once married his bride Isabella, daughter of Richard de Clare, earl of Pembroke and Striguil"}]}],"titles":[{"title":"Marshal of England","from":"1194","citations":[{"url":"https://en.wikipedia.org/wiki/William_Marshal,_1st_Earl_of_Pembroke","title":"William Marshal, 1st Earl of Pembroke","publisher":"Wikipedia","quote":"Richard allowed William to succeed his brother in the hereditary marshalship and his paternal honour of Hamstead Marshall."}]},{"title":"Earl of Pembroke","from":"1199","to":"1219-05-14","citations":[{"url":"https://en.wikipedia.org/wiki/William_Marshal,_1st_Earl_of_Pembroke","title":"William Marshal, 1st Earl of Pembroke","publisher":"Wikipedia","quote":"Marshal did not obtain Pembroke and the title of earl, which his father-in-law had enjoyed, until 1199, as it had been taken into the king's hand in 1154."}]},{"title":"Regent of England (rector regis et regni)","from":"1216-11-11","to":"1219-05-14","citations":[{"url":"https://en.wikisource.org/wiki/Dictionary_of_National_Biography,_1885-1900/Marshal,_William_(d.1219)","title":"Dictionary of National Biography, 1885-1900/Marshal, William (d.1219)","publisher":"Wikisource (Dictionary of National Biography, 1885-1900)","quote":"Marshal was formally chosen by the common consent to be 'rector regis et regni'"}]}],"summary":"William Marshal rose from a landless younger son of a minor Anglo-Norman baron to become one of the most powerful magnates in England, serving Henry II, Richard I, John, and Henry III across more than four decades. His 1189 marriage to Isabel de Clare, heiress of Pembroke and Leinster, made him one of the richest men in the realm. Named among King John's counsellors in the preamble of Magna Carta in 1215, he was chosen regent and protector of the boy king Henry III on John's death in 1216, led the royalist victory at the Battle of Lincoln in 1217, and reissued Magna Carta to secure the peace that ended the First Barons' War.","citations":[{"url":"https://en.wikipedia.org/wiki/William_Marshal,_1st_Earl_of_Pembroke","title":"William Marshal, 1st Earl of Pembroke","publisher":"Wikipedia","quote":"William Marshal, 1st Earl of Pembroke (1146 or 1147 – 14 May 1219)"},{"url":"https://en.wikisource.org/wiki/Dictionary_of_National_Biography,_1885-1900/Marshal,_William_(d.1219)","title":"Dictionary of National Biography, 1885-1900/Marshal, William (d.1219)","publisher":"Wikisource (Dictionary of National Biography, 1885-1900)","quote":"Marshal was formally chosen by the common consent to be 'rector regis et regni'"}],"uncertain":"Sources disagree on William Marshal's exact birth year: Wikipedia gives '1146 or 1147', while the Dictionary of National Biography argues 1146 is more likely despite Marshal's own reported claim to be over eighty years old in 1216."},{"id":"john-marshal-fitzgilbert","name":"John Marshal","fullName":"John FitzGilbert, Marshal of England","epithet":null,"house":"Marshal","role":"Royal Marshal","monarch":false,"reign":null,"death":{"date":"1165-07-22","place":null,"precision":"day","citations":[{"url":"https://en.wikipedia.org/wiki/John_Marshal_(Marshal_of_England)","title":"John Marshal (died 1165)","publisher":"Wikipedia","quote":"John Marshal died on 22 July 1165"}]},"spouses":[{"id":"sibyl-salisbury","married":"1141","citations":[{"url":"https://en.wikipedia.org/wiki/Patrick,_1st_Earl_of_Salisbury","title":"Patrick, 1st Earl of Salisbury","publisher":"Wikipedia","quote":"That year, Patrick married his sister, Sibyl, to John fitzGilbert the Marshal, who had been a local rival of his, and transferred his allegiance from King Stephen to the Empress Matilda."},{"url":"https://en.wikipedia.org/wiki/John_Marshal_(Marshal_of_England)","title":"John Marshal (died 1165)","publisher":"Wikipedia","quote":"He later married \"Sybil, sister of Patrick of Salisbury\" after being forced to annul his first marriage on consanguinity grounds."}]}],"titles":[{"title":"Marshal of England","citations":[{"url":"https://en.wikipedia.org/wiki/John_Marshal_(Marshal_of_England)","title":"John Marshal (died 1165)","publisher":"Wikipedia","quote":"He served as marshal of England, inheriting the position from his father Gilbert Giffard, who held it under King Henry I."}]}],"summary":"John Marshal was a minor Anglo-Norman baron who served as marshal of England and fought for the Empress Matilda during the civil war of Stephen's reign known as the Anarchy. When King Stephen besieged him at Newbury Castle in 1152, John surrendered his young son William as a hostage to secure a truce but had no intention of honouring its terms; according to William's biographer, when Stephen threatened to hang the boy, John replied that he still had the means to father more sons. Stephen spared William. John died on 22 July 1165.","citations":[{"url":"https://en.wikisource.org/wiki/Dictionary_of_National_Biography,_1885-1900/Marshal,_William_(d.1219)","title":"Dictionary of National Biography, 1885-1900/Marshal, William (d.1219)","publisher":"Wikisource (Dictionary of National Biography, 1885-1900)","quote":"the young William was given as hostage for a truce and the surrender of the castle. John Marshal refused to keep the terms, and his son's life would have been sacrificed had not Stephen...protected him."},{"url":"https://en.wikipedia.org/wiki/John_Marshal_(Marshal_of_England)","title":"John Marshal (died 1165)","publisher":"Wikipedia","quote":"Though Stephen threatened to execute the boy, he ultimately took pity on William, keeping him at court until after the civil war ended in 1153."}],"uncertain":"The anecdote of John's 'hammer and anvil' reply to Stephen's threat to hang William is preserved by the Dictionary of National Biography as coming from 'William's biographer' — i.e. the History of William Marshal, a 13th-century verse biography commissioned by the family after his death — and is reported here as that source's account rather than settled fact.","parents":[]},{"id":"sibyl-salisbury","name":"Sibyl of Salisbury","fullName":"Sibyl of Salisbury","epithet":null,"house":"Marshal","role":null,"monarch":false,"reign":null,"spouses":[{"id":"john-marshal-fitzgilbert","married":"1141","endedBy":"death","ended":"1165-07-22","citations":[{"url":"https://en.wikipedia.org/wiki/Patrick,_1st_Earl_of_Salisbury","title":"Patrick, 1st Earl of Salisbury","publisher":"Wikipedia","quote":"That year, Patrick married his sister, Sibyl, to John fitzGilbert the Marshal, who had been a local rival of his, and transferred his allegiance from King Stephen to the Empress Matilda."}]}],"summary":"Sibyl was the sister of Patrick, Earl of Salisbury. In 1141 her brother married her to John FitzGilbert the Marshal, a local rival he was reconciling to the Empress Matilda's cause during the Anarchy. She was the mother of William Marshal, later Earl of Pembroke and regent of England.","citations":[{"url":"https://en.wikisource.org/wiki/Dictionary_of_National_Biography,_1885-1900/Marshal,_William_(d.1219)","title":"Dictionary of National Biography, 1885-1900/Marshal, William (d.1219)","publisher":"Wikisource (Dictionary of National Biography, 1885-1900)","quote":"second son of John Marshal (d. 1164?) [q. v.], by his second wife, Sibyl, sister of Patrick, earl of Salisbury."},{"url":"https://en.wikipedia.org/wiki/Patrick,_1st_Earl_of_Salisbury","title":"Patrick, 1st Earl of Salisbury","publisher":"Wikipedia","quote":"That year, Patrick married his sister, Sibyl, to John fitzGilbert the Marshal, who had been a local rival of his, and transferred his allegiance from King Stephen to the Empress Matilda."}],"uncertain":"No reliable primary or reference source consulted gives Sibyl of Salisbury's birth or death date; both are omitted rather than guessed.","parents":[]},{"id":"isabel-de-clare","name":"Isabel de Clare","fullName":"Isabel de Clare, 4th Countess of Pembroke","epithet":null,"house":"de Clare","role":"Countess of Pembroke","monarch":false,"reign":null,"birth":{"date":"1172","place":"Leinster","precision":"circa","citations":[{"url":"https://en.wikipedia.org/wiki/Isabel_de_Clare,_4th_Countess_of_Pembroke","title":"Isabel de Clare, 4th Countess of Pembroke","publisher":"Wikipedia","quote":"c. 1172 Leinster"}]},"death":{"date":"1220-03-11","place":"Chepstow, Wales","precision":"day","citations":[{"url":"https://en.wikipedia.org/wiki/Isabel_de_Clare,_4th_Countess_of_Pembroke","title":"Isabel de Clare, 4th Countess of Pembroke","publisher":"Wikipedia","quote":"11 March 1220 Chepstow, Wales"}]},"parents":["richard-strongbow","aoife-macmurrough"],"spouses":[{"id":"william-marshal","married":"1189-08","ended":"1219-05-14","endedBy":"death","citations":[{"url":"https://en.wikipedia.org/wiki/Isabel_de_Clare,_4th_Countess_of_Pembroke","title":"Isabel de Clare, 4th Countess of Pembroke","publisher":"Wikipedia","quote":"her marriage in August 1189 to William Marshal"}]}],"titles":[{"title":"4th Countess of Pembroke and Striguil (suo jure)","citations":[{"url":"https://en.wikipedia.org/wiki/Isabel_de_Clare,_4th_Countess_of_Pembroke","title":"Isabel de Clare, 4th Countess of Pembroke","publisher":"Wikipedia","quote":"suo jure 4th Countess of Pembroke and Striguil"}]}],"summary":"Isabel de Clare, born about 1172 in Leinster, was the daughter and heiress of Richard 'Strongbow' de Clare and Aoife of Leinster. Her 1189 marriage to the household knight William Marshal transferred to him the vast de Clare lordships of Pembroke, Striguil, and Leinster, making him one of the greatest magnates in the realm. She bore William ten children and died on 11 March 1220 at Chepstow.","citations":[{"url":"https://en.wikipedia.org/wiki/Isabel_de_Clare,_4th_Countess_of_Pembroke","title":"Isabel de Clare, 4th Countess of Pembroke","publisher":"Wikipedia","quote":"suo jure 4th Countess of Pembroke and Striguil"}],"uncertain":null},{"id":"richard-strongbow","name":"Richard de Clare","fullName":"Richard de Clare, 2nd Earl of Pembroke","epithet":"Strongbow","house":"de Clare","role":"Earl of Pembroke; Lord of Leinster; Justiciar of Ireland","monarch":false,"reign":null,"birth":{"date":"1130","place":"Tonbridge, Kent, England","precision":"circa","citations":[{"url":"https://en.wikipedia.org/wiki/Richard_de_Clare,_2nd_Earl_of_Pembroke","title":"Richard de Clare, 2nd Earl of Pembroke","publisher":"Wikipedia","quote":"Born c. 1130 Tonbridge, Kent, England"}]},"death":{"date":"1176-04-20","place":"Dublin, Ireland","precision":"day","citations":[{"url":"https://en.wikipedia.org/wiki/Richard_de_Clare,_2nd_Earl_of_Pembroke","title":"Richard de Clare, 2nd Earl of Pembroke","publisher":"Wikipedia","quote":"Died (1176-04-20)20 April 1176 (aged 45 or 46) Dublin, Ireland"}]},"spouses":[{"id":"aoife-macmurrough","married":"1170-08-25","ended":"1176-04-20","endedBy":"death","citations":[{"url":"https://en.wikipedia.org/wiki/Aoife_of_Leinster","title":"Aoife of Leinster","publisher":"Wikipedia","quote":"Aoife married Richard almost immediately after on 25 August in Christchurch Cathedral in Waterford."}]}],"titles":[{"title":"Justiciar of Ireland","from":"1173","to":"1176","citations":[{"url":"https://en.wikipedia.org/wiki/Richard_de_Clare,_2nd_Earl_of_Pembroke","title":"Richard de Clare, 2nd Earl of Pembroke","publisher":"Wikipedia","quote":"Justiciar of Ireland"}]},{"title":"Lord of Leinster","citations":[{"url":"https://en.wikipedia.org/wiki/Richard_de_Clare,_2nd_Earl_of_Pembroke","title":"Richard de Clare, 2nd Earl of Pembroke","publisher":"Wikipedia","quote":"also Lord of Leinster and Justiciar of Ireland"}]}],"summary":"Richard de Clare, known as Strongbow, was the second Earl of Pembroke. Recruited by the deposed King of Leinster, Diarmait Mac Murchada, to help retake his kingdom in exchange for marriage to Mac Murchada's daughter Aoife and succession to Leinster, Strongbow led Anglo-Norman forces that seized Waterford and Dublin in 1169-70. He married Aoife at Waterford in August 1170 and served as Justiciar of Ireland under Henry II until his death in Dublin in 1176. His daughter Isabel de Clare inherited his lordships and later married William Marshal.","citations":[{"url":"https://en.wikipedia.org/wiki/Richard_de_Clare,_2nd_Earl_of_Pembroke","title":"Richard de Clare, 2nd Earl of Pembroke","publisher":"Wikipedia","quote":"Dermot came to an agreement with Richard: If the latter helped the deposed king in the retaking of Leinster, he could have Aoife, Dermot's eldest daughter, in marriage, along with the succession to the crown if it was regained."},{"url":"https://en.wikipedia.org/wiki/Anglo-Norman_invasion_of_Ireland","title":"Anglo-Norman invasion of Ireland","publisher":"Wikipedia","quote":"In 1170, there were further Norman landings, led by the Earl of Pembroke, Richard 'Strongbow' de Clare."}],"uncertain":"Wikipedia's Richard de Clare article dates the marriage to Aoife to 'about 26 August 1171' at Reginald's Tower, while its Aoife of Leinster article dates it to 25 August 1170 at Christchurch Cathedral, Waterford, immediately after the fall of the city; this record follows the 1170/Christchurch Cathedral account, which aligns with the wider chronology of the 1169-71 invasion.","parents":[]},{"id":"aoife-macmurrough","name":"Aoife of Leinster","fullName":"Aoife MacMurrough, Countess of Pembroke","epithet":"Red Eva","house":"de Clare","role":"Countess of Pembroke; Lady of Leinster","monarch":false,"reign":null,"birth":{"date":"1153","precision":"circa","citations":[{"url":"https://en.wikipedia.org/wiki/Aoife_of_Leinster","title":"Aoife of Leinster","publisher":"Wikipedia","quote":"Aoife MacMurrough (Irish: Aoife Nic Murchada; c. 1153 – c. 1188), also known as Eva of Leinster or Red Eva, was an Irish noblewoman."}]},"death":{"date":"1188","place":"Monmouthshire, Wales","precision":"circa","citations":[{"url":"https://en.wikipedia.org/wiki/Aoife_of_Leinster","title":"Aoife of Leinster","publisher":"Wikipedia","quote":"Died c. 1188 (aged about 35) Monmouthshire, Wales"}]},"spouses":[{"id":"richard-strongbow","married":"1170-08-25","ended":"1176-04-20","endedBy":"death","citations":[{"url":"https://en.wikipedia.org/wiki/Aoife_of_Leinster","title":"Aoife of Leinster","publisher":"Wikipedia","quote":"Aoife married Richard almost immediately after on 25 August in Christchurch Cathedral in Waterford."}]}],"summary":"Aoife MacMurrough, also called Eva of Leinster, was the daughter of Diarmait Mac Murchada, King of Leinster. Under an agreement between her father and the Anglo-Norman lord Richard 'Strongbow' de Clare, she married Strongbow at Waterford in August 1170, shortly after his forces captured the city duri nders_(died_1095)","title":"Judith of Flanders (died 1095) - Wikipedia","publisher":"Wikipedia","quote":"On an unknown date before September 1051, she married her first husband, Tostig Godwinson, brother of King Harold II of England."},{"url":"https://en.wikipedia.org/wiki/Judith_of_Flanders_(died_1095)","title":"Judith of Flanders (died 1095) - Wikipedia","publisher":"Wikipedia","quote":"they were both killed on 25 September 1066 at the Battle of Stamford Bridge by the forces of King Harold."}]}],"titles":[{"title":"Countess of Northumbria","from":"1055","to":"1065","citations":[{"url":"https://en.wikipedia.org/wiki/Judith_of_Flanders_(died_1095)","title":"Judith of Flanders (died 1095) - Wikipedia","publisher":"Wikipedia","quote":"He was created Earl of Northumbria in 1055, making Judith the Countess of Northumbria, from that date."}]}],"summary":"Judith of Flanders, only child of Baldwin IV, Count of Flanders, was born at Bruges between 1030 and 1035. She married Tostig Godwinson before September 1051, becoming Countess of Northumbria when he was made earl in 1055, and was widowed when Tostig fell at Stamford Bridge on 25 September 1066. She later married Welf I, Duke of Bavaria, and died on 5 March 1095, bequeathing her celebrated collection of illuminated manuscripts to Weingarten Abbey, where she was buried.","citations":[{"url":"https://en.wikipedia.org/wiki/Judith_of_Flanders_(died_1095)","title":"Judith of Flanders (died 1095) - Wikipedia","publisher":"Wikipedia","quote":"the only child of Baldwin IV, Count of Flanders"}],"uncertain":"Her birth is bounded only to between 1030 and 1035, and the exact date of her marriage to Tostig is unknown — the source says only 'on an unknown date before September 1051'. Her second husband Welf I of Bavaria and her father Baldwin IV of Flanders are not given entries in this dataset, so that marriage and her parents are not recorded here.","parents":[]},{"id":"gruffydd-ap-llywelyn","name":"Gruffudd ap Llywelyn","fullName": dia","quote":"The young couple were married in June 1119, when Matilda was around eight years old."},{"url":"https://en.wikipedia.org/wiki/Matilda_of_Anjou","title":"Matilda of Anjou - Wikipedia","publisher":"Wikipedia","quote":"On the evening of 25 November 1120, returning from Normandy to England, William Adelin chose to sail aboard the White Ship and subsequently drowned when that ship sank in the English Channel just outside Barfleur harbour."}]}],"titles":[{"title":"Duchess consort of the Normans","from":"1119","to":"1120","citations":[{"url":"https://en.wikipedia.org/wiki/Matilda_of_Anjou","title":"Matilda of Anjou - Wikipedia","publisher":"Wikipedia","quote":"Duchess consort of the Normans 1119 – 25 Nov 1120"}]},{"title":"Abbess of Fontevrault","from":"1150","to":"1154","citations":[{"url":"https://en.wikipedia.org/wiki/Matilda_of_Anjou","title":"Matilda of Anjou - Wikipedia","publisher":"Wikipedia","quote":"She became the second abbess of Fontevrault in 1150."}]}],"summary":"Matilda of Anjou, daughter of Fulk V of Anjou, was born around 1111 and married William Adelin, heir apparent to Henry I of England, in June 1119 while still a child, becoming duchess consort of the Normans. William drowned in the White Ship disaster on 25 November 1120, leaving her widowed at about nine years old. In 1128 she took vows as a nun at Fontevrault Abbey, rose to become its second abbess in 1150, and died there in 1154.","citations":[{"url":"https://en.wikipedia.org/wiki/Matilda_of_Anjou","title":"Matilda of Anjou - Wikipedia","publisher":"Wikipedia","quote":"took her vows as a nun at Fontevrault Abbey in 1128 at the age of 17"}],"uncertain":"Her birth year is approximate (c. 1111) and no day or month is given for her death, which is recorded only to the year 1154. Her father Fulk V of Anjou is not given an entry in this dataset, so no parents are recorded.","parents":[]},{"id":"sybilla-conversano","name":"Sibylla of Conversano","fullName":"Sibylla of Conversano","role":"Duch versano","title":"Sibylla of Conversano - Wikipedia","publisher":"Wikipedia","quote":"On 25 October 1102, their son was born."}],"uncertain":"Her birth year is approximate (c. 1080). Chroniclers disagree sharply on the cause of her death: William of Malmesbury attributed it to binding her breasts too tightly, while Robert of Torigny and Orderic Vitalis suggested she was murdered by noblewomen led by her husband's mistress, a theory the modern historian William M. Aird treats as implausible. The marriage year is given as 1100 on her own page, though the Robert Curthose article suggests late 1099 or early 1100. Her father Geoffrey of Conversano is not given an entry in this dataset, so no parents are recorded.","parents":[]},{"id":"william-fitz-robert-gloucester","name":"William Fitz Robert","fullName":"William FitzRobert, 2nd Earl of Gloucester","role":"2nd Earl of Gloucester","monarch":false,"reign":null,"birth":{"date":"1116-01-22","precision":"day","citations":[{"url":"https://en.wikipedia.org/wiki/William_FitzRobert,_2nd_Earl_of_Gloucester","title":"William FitzRobert, 2nd Earl of Gloucester - Wikipedia","publisher":"Wikipedia","quote":"22 January 1116"}]},"death":{"date":"1183-11-23","precision":"day","citations":[{"url":"https://en.wikipedia.org/wiki/William_FitzRobert,_2nd_Earl_of_Gloucester","title":"William FitzRobert, 2nd Earl of Gloucester - Wikipedia","publisher":"Wikipedia","quote":"23 November 1183(1183-11-23) (aged 67)"}]},"parents":["robert-gloucester"],"spouses":[{"id":"hawise-beaumont","ended":"1183-11-23","endedBy":"death","citations":[{"url":"https://en.wikipedia.org/wiki/William_FitzRobert,_2nd_Earl_of_Gloucester","title":"William FitzRobert, 2nd Earl of Gloucester - Wikipedia","publisher":"Wikipedia","quote":"He was married to Hawise de Beaumont of Leicester, daughter of Robert de Beaumont, 2nd Earl of Leicester."}]}],"titles":[{"title":"Earl of Gloucester","from":"1147-10-31","to":"1183-11-23","citations":[{"url":"https://en.wikipedia.org/wiki/ s a milestone in the growth of parliamentary government. He was defeated and killed at the Battle of Evesham on 4 August 1265.","citations":[{"url":"https://en.wikipedia.org/wiki/Simon_de_Montfort,_6th_Earl_of_Leicester","title":"Simon de Montfort, 6th Earl of Leicester","publisher":"Wikipedia","quote":"who led the baronial opposition to the rule of King Henry III, culminating in the Second Barons' War"},{"url":"https://en.wikipedia.org/wiki/Simon_de_Montfort,_6th_Earl_of_Leicester","title":"Simon de Montfort, 6th Earl of Leicester","publisher":"Wikipedia","quote":"Montfort sent his summons, in the king's name, to each county and to a select list of boroughs, asking each to send two representatives."},{"url":"https://en.wikisource.org/wiki/Dictionary_of_National_Biography,_1885-1900/Montfort,_Simon_of_(1208%3F-1265)","title":"Montfort, Simon of (1208?-1265) (DNB00)","publisher":"Wikisource (Dictionary of National Biography, 1885-1900)","quote":"At the close of a three hours massacre...he fell, almost the last of his little band, crying 'God's grace!' as he passed away."}],"uncertain":"His birth year is not firmly attested; the DNB states only that he was 'probably born about 1208.'","parents":[]},{"id":"raymond-berenguer-v-provence","name":"Raymond Berenguer V","fullName":"Ramon Berenguer V, Count of Provence","epithet":null,"house":"Barcelona","role":"Count of Provence and Forcalquier","monarch":false,"reign":null,"birth":{"date":"1198","place":null,"precision":"year","citations":[{"url":"https://en.wikipedia.org/wiki/Ramon_Berenguer_V,_Count_of_Provence","title":"Ramon Berenguer V, Count of Provence","publisher":"Wikipedia","quote":"Ramon Berenguar IV or V (French: Raimond-Berenger; 1198 - 19 August 1245) was a member of the House of Barcelona who ruled as count of Provence and Forcalquier."}]},"death":{"date":"1245-08-19","place":"Aix-en-Provence","precision":"day","citations":[{"url":"https://en.wikipedia.org/wiki/Ramon_Berenguer_V,_Count_of_Provence","title":"R "Wikipedia","quote":"Born...1340...Coucy Castle, Picardy, France"}]},"death":{"date":"1397-02-18","place":"Bursa, Ottoman Empire","precision":"day","citations":[{"url":"https://en.wikipedia.org/wiki/Enguerrand_VII,_Lord_of_Coucy","title":"Enguerrand VII de Coucy","publisher":"Wikipedia","quote":"Died 18 February 1397 (aged 56-57) Bursa, Ottoman Empire In captivity, of bubonic plague"}]},"spouses":[{"id":"isabella-england","married":"1365-07-27","ended":null,"endedBy":null,"citations":[{"url":"https://en.wikipedia.org/wiki/Enguerrand_VII,_Lord_of_Coucy","title":"Enguerrand VII de Coucy","publisher":"Wikipedia","quote":"the wealthy Coucy was betrothed and married to the 33-year-old Isabella of England"}]}],"titles":[{"title":"Lord of Coucy","from":"1346-08-25","to":"1397-02-18","citations":[{"url":"https://en.wikipedia.org/wiki/Enguerrand_VII,_Lord_of_Coucy","title":"Enguerrand VII de Coucy","publisher":"Wikipedia","quote":"Lord of Coucy held 25 August 1346 - 18 February 1397"}]},{"title":"Earl of Bedford","from":"1366","to":null,"citations":[{"url":"https://en.wikipedia.org/wiki/Enguerrand_VII,_Lord_of_Coucy","title":"Enguerrand VII de Coucy","publisher":"Wikipedia","quote":"Earl of Bedford (granted during a visit to England following his 1365 marriage)"}]}],"summary":"Enguerrand VII, Lord of Coucy, one of the great nobles of France, married Isabella of England, eldest daughter of Edward III, at Windsor in 1365 and was made Earl of Bedford in England the following year. He remained active in French politics and warfare, and was captured at the Battle of Nicopolis in 1396 during a crusade against the Ottomans; weakened by his wounds, he died in captivity at Bursa of bubonic plague in February 1397.","citations":[{"url":"https://en.wikipedia.org/wiki/Enguerrand_VII,_Lord_of_Coucy","title":"Enguerrand VII de Coucy","publisher":"Wikipedia","quote":"Captured at the Battle of Nicopolis in 1396"}],"uncertain":"As with Isabella of England's own record, the end of the marriage is left unresolved: Isabella's date of death is genuinely disputed between sources (1379 or 1382), predating Enguerrand's own death in 1397, and no source consulted here states when his English earldom of Bedford lapsed.","parents":[]},{"id":"thomas-holland-kent","name":"Thomas Holland","fullName":"Thomas Holland, 1st Earl of Kent","epithet":null,"house":"Holland","role":"1st Earl of Kent jure uxoris (1st husband of Joan of Kent)","monarch":false,"reign":null,"birth":{"date":"1314","place":"Upholland, Lancashire","precision":"circa","citations":[{"url":"https://en.wikipedia.org/wiki/Thomas_Holland,_1st_Earl_of_Kent","title":"Thomas Holland, 1st Earl of Kent","publisher":"Wikipedia","quote":"c. 1314"}]},"death":{"date":"1360-12-28","place":"Normandy","precision":"day","citations":[{"url":"https://en.wikipedia.org/wiki/Thomas_Holland,_1st_Earl_of_Kent","title":"Thomas Holland, 1st Earl of Kent","publisher":"Wikipedia","quote":"28 December 1360 (aged around 46)"}]},"spouses":[{"id":"joan-plantagenet","married":"1340","ended":"1360-12-28","endedBy":"death","citations":[{"url":"https://en.wikipedia.org/wiki/Joan_of_Kent","title":"Joan of Kent","publisher":"Wikipedia","quote":"In 1340, at the age of about twelve, Joan secretly married 26-year-old Thomas Holland"}]}],"titles":[],"summary":"Thomas Holland, a soldier who fought at the Battle of Crecy and the siege of Caen and was a founding Knight of the Order of the Garter in 1348, secretly married Joan of Kent, granddaughter of Edward I, in 1340 while both were young; the marriage was contested for years by a rival match forced on Joan with William Montagu, and only settled in Holland's favour by papal ruling in 1349. Through Joan he was recognised as Earl of Kent jure uxoris shortly before his death on campaign in Normandy in December 1360.","citations":[{"url":"https://en.wikipedia.org/wiki/Thomas_Holland,_1st_Earl_of_Kent","title":"Thomas Holland, 1st Earl of Kent","publisher":"Wikipedia","quote":"In 1348, he was invested as one of the founders and 13th Knight of the new Order of the Garter"}],"uncertain":"Joan of Kent's marital history is genuinely contested in the sources: she secretly married Holland in 1340, was separately married to William Montagu while Holland was overseas, and the dispute between the two unions went to the papal curia, which ruled for Holland's marriage as valid in 1349. This record does not attempt to resolve the underlying contemporary confusion beyond reporting the papal ruling.","parents":[]},{"id":"william-montagu-salisbury","name":"William Montagu","fullName":"William Montagu, 2nd Earl of Salisbury","epithet":null,"house":"Montagu","role":"2nd Earl of Salisbury (contested husband of Joan of Kent)","monarch":false,"reign":null,"birth":{"date":"1328-06-25","place":"Donyatt, Somerset, England","precision":"day","citations":[{"url":"https://en.wikipedia.org/wiki/William_de_Montacute,_2nd_Earl_of_Salisbury","title":"William Montagu, 2nd Earl of Salisbury","publisher":"Wikipedia","quote":"25 June 1328 in Donyatt in Somerset, England"}]},"death":{"date":"1397-06-03","place":null,"precision":"day","citations":[{"url":"https://en.wikipedia.org/wiki/William_de_Montacute,_2nd_Earl_of_Salisbury","title":"William Montagu, 2nd Earl of Salisbury","publisher":"Wikipedia","quote":"3 June 1397 (aged 68)"}]},"spouses":[{"id":"joan-plantagenet","married":"1341","ended":"1349","endedBy":"annulment","citations":[{"url":"https://en.wikipedia.org/wiki/Joan_of_Kent","title":"Joan of Kent","publisher":"Wikipedia","quote":"In 1349, the proceedings ruled in Holland's favour. Pope Clement VI annulled Joan's marriage to Salisbury."}]}],"titles":[{"title":"Earl of Salisbury","from":"1344","to":"1397-06-03","citations":[{"url":"https://en.wikipedia.org/wiki/William_de_Montacute,_2nd_Earl_of_Salisbury","title":"William Montagu, 2nd Earl of Salisbury","publisher":"Wikipedia","quote":"Earl of Salisbury and Baron Montagu from 1344-1397"}]}],"summary":"William Montagu, 2nd Earl of Salisbury, married Joan of Kent while both were teenagers in the early 1340s, unaware, on his side, that she had already secretly married Thomas Holland. When Holland returned from campaign in 1348 and pressed his claim, an ecclesiastical inquiry found in Holland's favour, and the Pope annulled Joan's marriage to Montagu in 1349. Montagu later married Elizabeth Mohun and lived at Bisham Manor in Berkshire; he died in 1397.","citations":[{"url":"https://en.wikipedia.org/wiki/William_de_Montacute,_2nd_Earl_of_Salisbury","title":"William Montagu, 2nd Earl of Salisbury","publisher":"Wikipedia","quote":"Following the findings of the inquiry, Lord Salisbury's marriage with Joan, Fair Maid of Kent, was annulled by the Pope in 1349."}],"uncertain":"Joan of Kent's marital status between 1340 and 1349 is a genuinely contested case that went to the Pope; contemporaries and later historians differ on whether Montagu's marriage was ever valid or merely a family-arranged match made while Holland was believed permanently absent. This record reports the papal ruling without treating the underlying contemporary dispute as settled. His second marriage, to Elizabeth Mohun, is not recorded as a spouse entry because she is not otherwise part of this dataset.","parents":[]},{"id":"hugh-swynford","name":"Hugh Swynford","fullName":"Sir Hugh Swynford","epithet":null,"house":null,"role":"Knight; of Kettlethorpe and Coleby, Lincolnshire","monarch":false,"reign":null,"birth":{"date":"1340","place":null,"precision":"year","citations":[{"url":"https://en.wikisource.org/wiki/Dictionary_of_National_Biography,_1885-1900/Swynford,_Catherine","title":"Dictionary of National Biography, 1885-1900/Swynford, Catherine","publisher":"Wikisource (Dictionary of National Biography)","quote":"Sir Hugh Swynford (1340–1372) of Coleby and Ketelthorp, Lincolnshire"}]},"death":{"date":"1372","place":null,"precision":"year","citations":[{"url":"https://en.wikisource.org/wiki/Dictionary_of_National_Biography,_1885-1900/Swynford,_Catherine","title":"Dictionary of National Biography, 1885-1900/Swynford, Catherine","publisher":"Wikisource (Dictionary of National Biography)","quote":"Sir Hugh Swynford (1340–1372) of Coleby and Ketelthorp, Lincolnshire"}]},"parents":[],"spouses":[{"id":"katherine-swynford","married":"1367","ended":"1372","endedBy":"death","citations":[{"url":"https://en.wikisource.org/wiki/Dictionary_of_National_Biography,_1885-1900/Swynford,_Catherine","title":"Dictionary of National Biography, 1885-1900/Swynford, Catherine","publisher":"Wikisource (Dictionary of National Biography)","quote":"in or shortly before 1367 married Sir Hugh Swynford (1340–1372) of Coleby and Ketelthorp, Lincolnshire"}]}],"titles":[],"summary":"Hugh Swynford was an English knight holding the Lincolnshire manors of Kettlethorpe and Coleby, and served in the retinue of John of Gaunt in Gascony in 1366. He married Katherine de Roet in or shortly before 1367; their son Thomas Swynford was born soon after. Hugh died in 1372, after which Katherine became governess to John of Gaunt's daughters, his long-term mistress, and eventually his third wife.","citations":[{"url":"https://en.wikisource.org/wiki/Dictionary_of_National_Biography,_1885-1900/Swynford,_Catherine","title":"Dictionary of National Biography, 1885-1900/Swynford, Catherine","publisher":"Wikisource (Dictionary of National Biography)","quote":"Hugh Swynford was in the retinue of John of Gaunt in Gascony in February 1366"}],"uncertain":"The DNB gives only bare years (1340–1372) for Hugh Swynford's birth and death; no day- or month-level date, nor place of death, is established in the sources consulted."},{"id":"constance-castile","name":"Constance of Castile","fullName":"Constance of Castile, Duchess of Lancaster","epithet":null,"house":"Ivrea","role":"Duchess of Lancaster; claimant to the throne of Castile","monarch":false,"reign":null,"birth":{"date":"1354","place":null,"precision":"year","citations":[{"url":"https://en.wikipedia.org/wi
