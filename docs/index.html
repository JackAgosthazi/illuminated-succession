<style>/* The Illuminated Succession — scriptorium palette.
 *
 * Pigments, not a generic "parchment" theme: vellum ground, iron-gall ink
 * (brown-black, as it actually oxidises), lapis lazuli ultramarine, vermilion
 * (cinnabar), gold leaf, verdigris. The neutrals are ochre-biased so nothing
 * reads as an untouched default grey.
 *
 * Dark theme is a candlelit scriptorium: smoke-darkened ground, vellum-coloured
 * text, gold brightened to hold up against it. Tokens redefine; components never
 * restyle inside a media query.
 */

:root {
  --vellum:      #e8dec4;
  --vellum-deep: #ded0ac;
  --vellum-edge: #cdbc92;
  --ink:         #2a211a;
  --ink-soft:    #5c4b3a;
  --ink-faint:   #8a7659;
  --lapis:       #1f3a73;
  --lapis-bright:#3159a8;
  --vermilion:   #b02e1a;
  --gold:        #b8912b;
  --gold-bright: #d9b44a;
  --verdigris:   #4a6b4f;
  --murex:       #6b3a5b;

  --ground:      var(--vellum);
  --panel:       #efe7d3;
  --panel-deep:  var(--vellum-deep);
  --rule:        #c3b28c;
  --rule-faint:  #d5c7a5;
  --text:        var(--ink);
  --text-soft:   var(--ink-soft);
  --text-faint:  var(--ink-faint);
  --accent:      var(--lapis);
  --link-hue:    var(--vermilion);
  --reign:       var(--gold);
  --shadow:      rgba(42, 33, 26, .16);
  --glow:        rgba(184, 145, 43, .22);

  --display: 'UnifrakturMaguntia', 'Old English Text MT', serif;
  --body: 'Cardo', 'Iowan Old Style', 'Palatino Linotype', Palatino, Georgia, serif;

  --s1: .25rem; --s2: .5rem; --s3: .75rem; --s4: 1rem;
  --s5: 1.5rem; --s6: 2rem; --s7: 3rem;
  --gloss-w: 27rem;
}

@media (prefers-color-scheme: dark) {
  :root {
    --ground:     #17120e;
    --panel:      #201913;
    --panel-deep: #2b2119;
    --rule:       #4a3c2c;
    --rule-faint: #352a1f;
    --text:       #e3d7b8;
    --text-soft:  #a8967b;
    --text-faint: #7d6c53;
    --accent:     #6b8fd4;
    --link-hue:   #e05a3f;
    --reign:      var(--gold-bright);
    --lapis:      #6b8fd4;
    --lapis-bright: #8fabe0;
    --vermilion:  #e05a3f;
    --gold:       #d9b44a;
    --verdigris:  #7fa383;
    --murex:      #b07496;
    --shadow:     rgba(0, 0, 0, .5);
    --glow:       rgba(217, 180, 74, .3);
  }
}

/* The viewer's toggle stamps data-theme on :root and must beat the media
   query in both directions. */
:root[data-theme="light"] {
  --ground: var(--vellum); --panel: #efe7d3; --panel-deep: var(--vellum-deep);
  --rule: #c3b28c; --rule-faint: #d5c7a5;
  --text: var(--ink); --text-soft: var(--ink-soft); --text-faint: var(--ink-faint);
  --accent: #1f3a73; --link-hue: #b02e1a; --reign: #b8912b;
  --lapis: #1f3a73; --lapis-bright: #3159a8; --vermilion: #b02e1a;
  --gold: #b8912b; --verdigris: #4a6b4f; --murex: #6b3a5b;
  --shadow: rgba(42, 33, 26, .16); --glow: rgba(184, 145, 43, .22);
}
:root[data-theme="dark"] {
  --ground: #17120e; --panel: #201913; --panel-deep: #2b2119;
  --rule: #4a3c2c; --rule-faint: #352a1f;
  --text: #e3d7b8; --text-soft: #a8967b; --text-faint: #7d6c53;
  --accent: #6b8fd4; --link-hue: #e05a3f; --reign: #d9b44a;
  --lapis: #6b8fd4; --lapis-bright: #8fabe0; --vermilion: #e05a3f;
  --gold: #d9b44a; --verdigris: #7fa383; --murex: #b07496;
  --shadow: rgba(0, 0, 0, .5); --glow: rgba(217, 180, 74, .3);
}

* { box-sizing: border-box; }

body {
  margin: 0;
  background: var(--ground);
  color: var(--text);
  font-family: var(--body);
  font-size: 17px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}

/* Vellum tooth. Two offset radial fields plus a fibre streak — cheap, and it
   keeps the ground from reading as flat #hex. Hidden in dark mode where the
   ground is meant to fall away into candle-shadow. */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  opacity: .5;
  background:
    radial-gradient(circle at 18% 12%, rgba(184,145,43,.10), transparent 42%),
    radial-gradient(circle at 82% 78%, rgba(107,58,91,.07), transparent 46%),
    repeating-linear-gradient(94deg, transparent 0 3px, rgba(90,70,40,.028) 3px 4px);
}
@media (prefers-color-scheme: dark) { body::before { opacity: .3; } }
:root[data-theme="dark"] body::before { opacity: .3; }
:root[data-theme="light"] body::before { opacity: .5; }

a { color: var(--accent); text-decoration-thickness: 1px; text-underline-offset: 2px; }
a:hover { color: var(--link-hue); }

:focus-visible {
  outline: 2px solid var(--link-hue);
  outline-offset: 2px;
  border-radius: 1px;
}

.u-caps {
  font-variant: small-caps;
  letter-spacing: .09em;
  font-size: .8rem;
  color: var(--text-faint);
}
.nums { font-variant-numeric: tabular-nums lining-nums; }

/* ─────────────────────────────── shell ─────────────────────────────── */

#app {
  position: relative;
  z-index: 1;
  display: grid;
  grid-template-rows: auto 1fr;
  height: 100vh;
  height: 100dvh;
}

header.codex-head {
  display: flex;
  align-items: baseline;
  gap: var(--s5);
  padding: var(--s3) var(--s5);
  border-bottom: 1px solid var(--rule);
  background: linear-gradient(var(--panel), var(--panel-deep));
  box-shadow: 0 1px 0 var(--rule-faint), 0 6px 18px -14px var(--shadow);
  flex-wrap: wrap;
}

h1 {
  font-family: var(--display);
  font-weight: 400;
  font-size: clamp(1.5rem, 2.6vw, 2.1rem);
  margin: 0;
  line-height: 1;
  color: var(--text);
  text-wrap: balance;
}
h1 .rubric { color: var(--vermilion); }

.head-sub {
  font-variant: small-caps;
  letter-spacing: .1em;
  font-size: .78rem;
  color: var(--text-faint);
  margin: 0;
}

.head-tools { margin-left: auto; display: flex; gap: var(--s2); align-items: center; flex-wrap: wrap; }

.control {
  font-family: var(--body);
  font-size: .84rem;
  background: var(--ground);
  color: var(--text);
  border: 1px solid var(--rule);
  padding: .3rem .55rem;
  border-radius: 2px;
}
.control:hover { border-color: var(--accent); }

button.control { cursor: pointer; }
button.control[aria-pressed="true"] {
  background: var(--accent);
  border-color: var(--accent);
  color: var(--ground);
}

#search { min-width: 12rem; }

/* ──────────────────────────── main split ──────────────────────────── */

main {
  position: relative;
  display: grid;
  grid-template-columns: 1fr var(--gloss-w);
  min-height: 0;
}
@media (max-width: 900px) {
  main { grid-template-columns: 1fr; }
  aside.gloss { position: absolute; inset: auto 0 0 0; max-height: 62%; border-left: 0; border-top: 2px solid var(--rule); }
  aside.gloss[hidden] { display: none; }
}

#stage {
  position: relative;
  overflow: hidden;
  cursor: grab;
  min-height: 0;
}
#stage.dragging { cursor: grabbing; }
#stage:focus-visible { outline: 2px solid var(--link-hue); outline-offset: -2px; }

svg#codex { display: block; width: 100%; height: 100%; touch-action: none; }

/* ── SVG furniture ── */

.year-rule { stroke: var(--rule-faint); stroke-width: 1; }
.year-rule.decade { stroke: var(--rule); }
.year-label {
  font-family: var(--body);
  font-size: 11px;
  fill: var(--text-faint);
  font-variant-numeric: tabular-nums;
}
.century-band { fill: var(--text); opacity: .028; }
.gutter-rule { stroke: var(--rule); stroke-width: 1; }

.rail-title {
  font-family: var(--display);
  font-size: 15px;
  fill: var(--text-faint);
}

/* lifespan bars */
.life { stroke: var(--text-soft); stroke-width: 5; stroke-linecap: butt; opacity: .5; }
.life.is-monarch { stroke: var(--text); opacity: .75; }
.life.is-magnate { stroke: var(--verdigris); opacity: .8; stroke-width: 6; }
.reign-bar { stroke: var(--reign); stroke-width: 9; stroke-linecap: butt; }
.reign-bar.disputed { stroke-dasharray: 5 4; }

.person-hit { fill: transparent; cursor: pointer; }

.pname {
  font-family: var(--body);
  font-size: 12px;
  fill: var(--text-soft);
  pointer-events: none;
  paint-order: stroke;
  stroke: var(--ground);
  stroke-width: 3px;
  stroke-linejoin: round;
}
.pname.is-monarch { fill: var(--text); font-size: 13px; font-weight: 700; }
.pname.is-magnate { fill: var(--verdigris); font-style: italic; }

/* genealogy edges */
.edge {
  fill: none;
  stroke: var(--text-faint);
  stroke-width: 1.1;
  opacity: .55;
}
.edge.spouse { stroke: var(--murex); stroke-dasharray: 4 3; opacity: .7; }
.edge-hit { fill: none; stroke: transparent; stroke-width: 11; cursor: pointer; }

/* the gold succession thread */
.succession { fill: none; stroke: var(--reign); stroke-width: 2; opacity: .75; }

/* events */
.evt-tick { stroke: var(--rule); stroke-width: 1; }
.evt-dot { cursor: pointer; stroke: var(--ground); stroke-width: 1.5; }
.evt-label {
  font-family: var(--body);
  font-size: 12px;
  fill: var(--text-soft);
  cursor: pointer;
}
.evt-leader { stroke: var(--rule); stroke-width: .8; fill: none; }
.evt-year { fill: var(--text-faint); font-size: 11px; font-variant-numeric: tabular-nums; }

/* correlations */
.corr {
  fill: none;
  stroke: var(--link-hue);
  stroke-width: 1.4;
  opacity: .5;
}
.corr.attributed { stroke-dasharray: 5 3; opacity: .42; }
.corr-hit { fill: none; stroke: transparent; stroke-width: 12; cursor: pointer; }

/* selection + dimming */
svg#codex.has-focus .dimmable { opacity: .1; }
svg#codex.has-focus .lit { opacity: 1; }
.corr.lit { stroke-width: 2.4; opacity: 1; }
.life.lit { opacity: 1; stroke: var(--accent); }
.edge.lit { stroke: var(--accent); stroke-width: 2.2; opacity: 1; }
.evt-dot.lit { stroke: var(--accent); stroke-width: 2.5; }
.pname.lit { fill: var(--text); }
.sel-ring { fill: none; stroke: var(--accent); stroke-width: 2; }

/* ─────────────────────────── gloss (margin) ─────────────────────────── */

aside.gloss {
  border-left: 1px solid var(--rule);
  background: linear-gradient(var(--panel), var(--panel-deep));
  overflow-y: auto;
  padding: var(--s5) var(--s5) var(--s7);
  box-shadow: -8px 0 24px -20px var(--shadow);
  min-height: 0;
}

.gloss-empty { color: var(--text-faint); }
.gloss-empty h2 { font-family: var(--display); font-weight: 400; font-size: 1.3rem; color: var(--text-soft); margin: 0 0 var(--s3); }
.gloss-empty ul { padding-left: 1.1rem; margin: var(--s2) 0 var(--s5); }
.gloss-empty li { margin-bottom: var(--s2); font-size: .92rem; }

.gloss h2.gl-title {
  font-family: var(--display);
  font-weight: 400;
  font-size: 1.55rem;
  line-height: 1.15;
  margin: 0 0 var(--s1);
  text-wrap: balance;
}
.gl-kicker { margin: 0 0 var(--s4); }
.gl-close { float: right; margin-left: var(--s3); }

/* Historiated initial: the first letter of the summary, in the manuscript
   manner — blackletter, gold, set into the text block. */
.gl-body { font-size: .97rem; }
.gl-body > p:first-of-type::first-letter {
  font-family: var(--display);
  font-size: 3.1em;
  float: left;
  line-height: .78;
  padding: .06em .12em 0 0;
  color: var(--reign);
  text-shadow: 0 1px 0 var(--shadow);
}

dl.gl-facts {
  display: grid;

  gap: var(--s1) var(--s3);
  margin: var(--s4) 0;

  border-bottom: 1px solid var(--rule-faint);

}
dl.gl-facts dt { font-variant: small-caps; letter-spacing: .06em; color: var(--text-faint); }
dl.gl-facts dd { margin: 0; font-variant-numeric: tabular-nums; }

.gl-sect {

  letter-spacing: .09em;

  color: var(--text-faint);
  margin: var(--s5) 0 var(--s2);

}

.rel-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 2px; }
.rel-list button {
  all: unset;
  cursor: pointer;
  font-family: var(--body);
  font-size: .9rem;
  padding: .18rem .3rem;
  border-radius: 2px;

.rel-list button:focus-visible { outline: 2px solid var(--link-hue); }
.rel-list .rel-year { color: var(--text-faint); font-size: .8rem; font-variant-numeric: tabular-nums; margin-left: auto; }

/* citations — the audit trail */
.cite {
  border-left: 2px solid var(--reign);
  padding: var(--s1) 0 var(--s1) var(--s3);
  margin-bottom: var(--s3);
  font-size: .84rem;
}
.cite blockquote {
  margin: 0 0 var(--s1);

.cite blockquote::before { content: open-quote; }
.cite blockquote::after { content: close-quote; }
.cite .cite-src { color: var(--text-faint); font-size: .8rem; }
.cite .cite-src a { font-style: normal; }

.uncertain {
  background: var(--glow);
  border-left: 2px solid var(--murex);
  padding: var(--s2) var(--s3);
  font-size: .85rem;
  margin: var(--s4) 0;
  color: var(--text-soft);
}
.uncertain strong { color: var(--murex); font-variant: small-caps; letter-spacing: .05em; }

.pill {
  display: inline-block;
  font-variant: small-caps;
  letter-spacing: .06em;
  font-size: .72rem;
  padding: .05rem .4rem;
  border: 1px solid currentColor;
  border-radius: 2px;
  vertical-align: .1em;
}
.pill.explicit { color: var(--verdigris); }
.pill.attributed { color: var(--murex); }
.pill.editorial { color: var(--text-faint); }

.claim {

  line-height: 1.45;
  margin: 0 0 var(--s3);
  padding-left: var(--s3);
  border-left: 2px solid var(--link-hue);
}

/* legend */
.legend { display: flex; gap: var(--s4); flex-wrap: wrap; font-size: .76rem; color: var(--text-faint); padding: var(--s2) var(--s5); border-top: 1px solid var(--rule-faint); background: var(--panel); }
.legend span { display: inline-flex; align-items: center; gap: .35rem; }
.legend i { width: 15px; height: 0; border-top-width: 3px; border-top-style: solid; display: inline-block; }

.hint { position: absolute; bottom: var(--s3); left: var(--s4); font-size: .74rem; color: var(--text-faint); pointer-events: none; background: var(--ground); padding: 2px 6px; border-radius: 2px; opacity: .85; }

@media (prefers-reduced-motion: no-preference) {
  .corr, .life, .edge, .evt-dot, .dimmable { transition: opacity .22s ease, stroke-width .22s ease, stroke .22s ease; }
  aside.gloss { scroll-behavior: smooth; }
}

.sr-only {
  position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
  overflow: hidden; clip: rect(0 0 0 0); white-space: nowrap; border: 0;
}

ia","publisher":"Wikipedia","quote":"From 26 September 1087 until his death in 1100"},{"url":"https://www.royal.uk/william-rufus","title":"William II (Known as William Rufus) (r. 1087-1100) | The Royal Family","publisher":"The Royal Family (royal.uk)","quote":"William II (reigned 1087-1100)"}]},"birth":{"date":"1057","precision":"circa","citations":[{"url":"https://en.wikipedia.org/wiki/William_II_of_England","title":"William II of England - Wikipedia","publisher":"Wikipedia","quote":"c. 1057"}]},"death":{"date":"1100-08-02","place":"New Forest","precision":"day","citations":[{"url":"https://www.royal.uk/william-rufus","title":"William II (Known as William Rufus) (r. 1087-1100) | The Royal Family","publisher":"The Royal Family (royal.uk)","quote":"William died on 2 August 1100, after being shot by an arrow whilst hunting in the New Forest."},{"url":"https://en.wikipedia.org/wiki/William_II_of_England","title":"William II of England - Wikipedia","publisher":"Wikipedia","quote":"was killed by an arrow through the lung"}]},"parents":["william-i","matilda-flanders"],"spouses":[],"summary":"William II, known as William Rufus for his ruddy complexion, was the third son of William the Conqueror and Matilda of Flanders. He reigned as King of England from 26 September 1087 until his death, never marrying or fathering children. He was killed by an arrow while hunting in the New Forest on 2 August 1100, in circumstances that remain disputed.","citations":[{"url":"https://en.wikipedia.org/wiki/William_II_of_England","title":"William II of England - Wikipedia","publisher":"Wikipedia","quote":"did not marry or have children"}],"uncertain":"William Rufus's exact birth date is unknown (c. 1057). The circumstances of his death in the New Forest are disputed: chroniclers named Walter Tirel as responsible, but modern historians debate whether it was accident or assassination."},{"id":"henry-i","name":"Henry I","fullName":"Henry Beauclerc","epithet":"Beauclerc","house":"Normandy","mona nuary 1121"}]}],"summary":"Henry I, fourth son of William the Conqueror and Matilda of Flanders, was born around 1068. He was crowned King of England on 5 August 1100, days after the death of his brother William II. He married Matilda of Scotland in 1100 and, after her death, Adeliza of Louvain in 1121. His only legitimate son, William Adelin, drowned in the White Ship disaster of 1120, precipitating the succession crisis resolved only after Henry's own death on 1 December 1135.","citations":[{"url":"https://en.wikipedia.org/wiki/Henry_I_of_England","title":"Henry I of England - Wikipedia","publisher":"Wikipedia","quote":"The couple soon had two children, Matilda, born in 1102, and William Adelin, born in 1103."}],"uncertain":"Henry's exact birthplace is uncertain; sources say only that he was 'probably' born in England, possibly at Selby."},{"id":"stephen","name":"Stephen","fullName":"Stephen of Blois","house":"Blois","monarch":true,"reign":{"start":"1135-12-22","end":"1154-10-25","citations":[{"url":"https://en.wikipedia.org/wiki/Stephen,_King_of_England","title":"Stephen, King of England - Wikipedia","publisher":"Wikipedia","quote":"King of England from 22 December 1135 to his death in 1154"},{"url":"https://avalon.law.yale.edu/medieval/ang12.asp","title":"The Avalon Project - The Anglo-Saxon Chronicle : Twelfth Century","publisher":"Avalon Project, Yale Law School","quote":"Meanwhile was his nephew come to England, Stephen de Blois. He came to London, and the people of London received him, and sent after the Archbishop William Curboil, and hallowed him to king on midwinter day."}]},"birth":{"date":"1096","precision":"circa","citations":[{"url":"https://en.wikipedia.org/wiki/Stephen,_King_of_England","title":"Stephen, King of England - Wikipedia","publisher":"Wikipedia","quote":"Stephen (1092 or 1096 – 25 October 1154), often referred to as Stephen of Blois"}]},"death":{"date":"1154-10-25","place":"Dover, Kent","precision":"day","citations":[{"url":"https://en.wikipedia.org/wiki/Stephen,_King_of_England","title":"Stephen, King of England - Wikipedia","publisher":"Wikipedia","quote":"Died 25 October 1154 (aged 57–58 or 61–62) Dover, Kent, Kingdom of England"}]},"parents":["stephen-blois","adela-normandy"],"spouses":[{"id":"matilda-boulogne","married":"1125","ended":"1152-05-03","endedBy":"death","citations":[{"url":"https://en.wikipedia.org/wiki/Stephen,_King_of_England","title":"Stephen, King of England - Wikipedia","publisher":"Wikipedia","quote":"The King arranged for Stephen to marry in 1125 to Matilda"}]}],"summary":"Stephen of Blois, son of Stephen-Henry, Count of Blois, and Adela of Normandy (a daughter of William the Conqueror), was crowned King of England on 22 December 1135 after seizing the throne from his cousin Empress Matilda. His reign was dominated by the civil war remembered as the Anarchy, described by the Anglo-Saxon Chronicle as 'the nineteen winters while Stephen was king'. He married Matilda of Boulogne in 1125; their eldest son and heir Eustace died in 1153, and Stephen agreed that Empress Matilda's son Henry would succeed him. Stephen died at Dover on 25 October 1154.","citations":[{"url":"https://en.wikipedia.org/wiki/Stephen,_King_of_England","title":"Stephen, King of England - Wikipedia","publisher":"Wikipedia","quote":"His father was Stephen-Henry, Count of Blois and Chartres"},{"url":"https://avalon.law.yale.edu/medieval/ang12.asp","title":"The Avalon Project - The Anglo-Saxon Chronicle : Twelfth Century","publisher":"Avalon Project, Yale Law School","quote":"This lasted the nineteen winters while Stephen was king; and it grew continually worse and worse."},{"url":"https://www.royal.uk/stephen-and-matilda","title":"Stephen and Matilda (r. 1135-1154) | The Royal Family","publisher":"The Royal Family (royal.uk)","quote":"Though charming, attractive and (when required) a brave warrior, Stephen (reigned 1135-54) lacked ruthlessness and failed to inspire loyalty."}],"uncertain":"Stephen's birth year is uncertain (1092 or 1096, depending on the source)."},{"id":"matilda-empress","name":"Empress Matilda","fullName":"Matilda","epithet":"the Empress","house":"Normandy","monarch":false,"reign":null,"birth":{"date":"1102-02-07","precision":"circa","citations":[{"url":"https://en.wikipedia.org/wiki/Empress_Matilda","title":"Empress Matilda - Wikipedia","publisher":"Wikipedia","quote":"c. 7 February 1102"}]},"death":{"date":"1167-09-10","place":"Rouen","precision":"day","citations":[{"url":"https://en.wikipedia.org/wiki/Empress_Matilda","title":"Empress Matilda - Wikipedia","publisher":"Wikipedia","quote":"Matilda died on 10 September 1167 in Rouen"}]},"parents":["henry-i","matilda-scotland"],"spouses":[{"id":"geoffrey-anjou","married":"1128-06-17","ended":"1151-09-07","endedBy":"death","citations":[{"url":"https://en.wikipedia.org/wiki/Empress_Matilda","title":"Empress Matilda - Wikipedia","publisher":"Wikipedia","quote":"Matilda and Geoffrey were married a week later on 17 June 1128 in Le Mans"}]}],"titles":[{"title":"Lady of the English","from":"1141","to":"1141","citations":[{"url":"https://en.wikipedia.org/wiki/Empress_Matilda","title":"Empress Matilda - Wikipedia","publisher":"Wikipedia","quote":"she was styled as Lady of the English (Latin: domina Anglorum) rather than queen, since she was never formally declared Queen of England"}]}],"summary":"Empress Matilda, daughter and designated heir of Henry I and Matilda of Scotland, was previously married to the Holy Roman Emperor Henry V and, after his death, married Geoffrey of Anjou in 1128. On her father's death in 1135 she claimed the English throne, but her cousin Stephen of Blois was crowned instead, precipitating the civil war known as the Anarchy. She controlled much of England briefly in 1141, styled 'Lady of the English', but was never crowned queen. Her son by Geoffrey became King Henry II. She died at Rouen on 10 September 1167.","citations":[{"url":"https://en.wikipedia.org/wiki/Empress_Matilda","title":"Empress Matilda - Wikipedia","publisher":"Wikipedia","quote":"Following the death of her father, King Henry I of England, as his only surviving child and nominated heir, she asserted her right to the English throne"},{"url":"https://www.royal.uk/stephen-and-matilda","title":"Stephen and Matilda (r. 1135-1154) | The Royal Family","publisher":"The Royal Family (royal.uk)","quote":"Henry I's daughter Matilda invaded England in 1139 to claim the throne, and the country was plunged into civil war."}],"uncertain":"Matilda's claim to the English throne is genuinely disputed in the sources: her cousin Stephen was crowned and reigned as king, while she was never crowned and held only the style 'Lady of the English' during her ascendancy in 1141. She is recorded here as monarch: false to reflect that Stephen, not she, held the crown, even though she is her father's designated heir in her own telling and that of her supporters."},{"id":"aethelred-unraed","name":"Æthelred the Unready","fullName":"Æthelred II","epithet":"the Unready","house":"Wessex","monarch":false,"reign":null,"birth":{"date":"968","precision":"circa","citations":[{"url":"https://en.wikipedia.org/wiki/%C3%86thelred_the_Unready","title":"Æthelred the Unready - Wikipedia","publisher":"Wikipedia","quote":"Æthelred II (c. 968 – 23 April 1016), known as Æthelred the Unready"}]},"death":{"date":"1016-04-23","place":"London","precision":"day","citations":[{"url":"https://en.wikipedia.org/wiki/%C3%86thelred_the_Unready","title":"Æthelred the Unready - Wikipedia","publisher":"Wikipedia","quote":"Æthelred died on 23 April 1016"}]},"spouses":[{"id":"emma-normandy","married":"1002","ended":"1016-04-23","endedBy":"death","citations":[{"url":"https://en.wikipedia.org/wiki/Emma_of_Normandy","title":"Emma of Normandy - Wikipedia","publisher":"Wikipedia","quote":"King Æthelred of England married Emma in 1002 AD"}]}],"summary":"Æthelred II, called 'the Unready', was King of the English from 978 to his death in 1016, his reign briefly interrupted by Sweyn Forkbeard's conquest in 1013–1014. He married Emma of Normandy in 1002; their son was Edward the Confessor. He died in London on 23 April 1016.","citations":[{"url":"https://en.wikipedia.org/wiki/%C3%86thelred_the_Unready","title":"Æthelred the Unready - Wikipedia","publisher":"Wikipedia","quote":"Ælfgifu of York"}],"uncertain":"Æthelred's reign was interrupted by Sweyn Forkbeard's invasion in 1013–1014. He also had numerous children by an earlier marriage to Ælfgifu of York, including Edmund Ironside; these half-siblings of Edward the Confessor are not given individual entries in this dataset for reasons of scope.","role":"King of the English, 978–1013 and 1014–1016","parents":[]},{"id":"emma-normandy","name":"Emma of Normandy","fullName":"Emma of Normandy","house":"Normandy","monarch":false,"birth":{"date":"984","precision":"circa","citations":[{"url":"https://en.wikipedia.org/wiki/Emma_of_Normandy","title":"Emma of Normandy - Wikipedia","publisher":"Wikipedia","quote":"c. 984"}]},"death":{"date":"1052","place":"Winchester","precision":"year","citations":[{"url":"https://en.wikipedia.org/wiki/Emma_of_Normandy","title":"Emma of Normandy - Wikipedia","publisher":"Wikipedia","quote":"After her death in 1052"}]},"parents":[],"spouses":[{"id":"aethelred-unraed","married":"1002","ended":"1016-04-23","endedBy":"death","citations":[{"url":"https://en.wikipedia.org/wiki/Emma_of_Normandy","title":"Emma of Normandy - Wikipedia","publisher":"Wikipedia","quote":"King Æthelred of England married Emma in 1002 AD"}]},{"id":"cnut","married":"1017","citations":[{"url":"https://en.wikipedia.org/wiki/Emma_of_Normandy","title":"Emma of Normandy - Wikipedia","publisher":"Wikipedia","quote":"At the time of their marriage in 1017"}]}],"summary":"Emma of Normandy, daughter of Richard I, Duke of Normandy, married King Æthelred the Unready in 1002 and, after the Danish conquest, King Cnut in 1017, becoming queen consort of England twice over. Her son by Æthelred was Edward the Confessor; her children by Cnut included Harthacnut and Gunhilda of Denmark. She died in 1052.","citations":[{"url":"https://en.wikipedia.org/wiki/Emma_of_Normandy","title":"Emma of Normandy - Wikipedia","publisher":"Wikipedia","quote":"Edward the Confessor"}],"uncertain":"Her exact birth year is approximate (c. 984)."},{"id":"godwin-wessex","name":"Godwin, Earl of Wessex","fullName":"Godwin of Wessex","house":"Godwin","monarch":false,"death":{"date":"1053-04-15","place":"Winchester","precision":"day","citations":[{"url":"https://en.wikipedia.org/wiki/Godwin,_Earl_of_Wessex","title":"Godwin, Earl of Wessex - Wikipedia","publisher":"Wikipedia","quote":"Godwin died 15 April 1053"}]},"parents":[],"spouses":[{"id":"gytha-thorkelsdottir","married":"1020","citations":[{"url":"https://en.wikipedia.org/wiki/Godwin,_Earl_of_Wessex","title":"Godwin, Earl of Wessex - Wikipedia","publisher":"Wikipedia","quote":"Gytha Thorkelsdóttir"}],"precision":"circa"}],"titles":[{"title":"Earl of Wessex","from":"1020","to":"1053","citations":[{"url":"https://en.wikipedia.org/wiki/Godwin,_Earl_of_Wessex","title":"Godwin, Earl of Wessex - Wikipedia","publisher":"Wikipedia","quote":"the first Earl of Wessex"}]}],"summary":"Godwin, Earl of Wessex, the most powerful nobleman in England under Edward the Confessor, married the Danish noblewoman Gytha Thorkelsdóttir. Their children included Harold II, Edith of Wessex, Tostig, Gyrth, and Leofwine. He died suddenly at Winchester on 15 April 1053, four days after collapsing at the king's table.","citations":[{"url":"https://en.wikipedia.org/wiki/Godwin,_Earl_of_Wessex","title":"Godwin, Earl of Wessex - Wikipedia","publisher":"Wikipedia","quote":"According to the Anglo-Saxon Chronicle"}],"uncertain":"Godwin's exact birth year is not established in the sources consulted; he is generally placed in the first decade of the eleventh century. He had further children (including Sweyn, Wulfnoth, and Gunhilda) not given individual entries here for reasons of scope."},{"id":"gytha-thorkelsdottir","name":"Gytha Thorkelsdóttir","fullName":"Gytha Thorkelsdóttir","monarch":false,"birth":{"date":"997","precision":"circa","citations":[{"url":"https://en.wikipedia.org/wiki/Gytha_Thorkelsd%C3%B3ttir","title":"Gytha Thorkelsdóttir - Wikipedia","publisher":"Wikipedia","quote":"Gytha Thorkelsdóttir (c. 997 – c. 1069), also called Githa, was a Danish noblewoman."}]},"death":{"date":"1069","precision":"circa","citations":[{"url":"https://en.wikipedia.org/wiki/Gytha_Thorkelsd%C3%B3ttir","title":"Gytha Thorkelsdóttir - Wikipedia","publisher":"Wikipedia","quote":"Gytha Thorkelsdóttir (c. 997 – c. 1069), also called Githa, was a Danish noblewoman."}]},"parents":[],"spouses":[{"id":"godwin-wessex","married":"1020","ended":"1053-04-15","endedBy":"death","citations":[{"url":"https://en.wikipedia.org/wiki/Gytha_Thorkelsd%C3%B3ttir","title":"Gytha Thorkelsdóttir - Wikipedia","publisher":"Wikipedia","quote":"She married the Anglo-Saxon nobleman Godwin of Wessex."}],"precision":"circa"}],"summary":"Gytha Thorkelsdóttir, a Danish noblewoman and daughter of the chieftain Thorgil Sprakling, married Godwin, Earl of Wessex. She was the mother of King Harold II and at least eight other children, including Edith of Wessex, Tostig, Gyrth, and Leofwine Godwinson.","citations":[{"url":"https://en.wikipedia.org/wiki/Gytha_Thorkelsd%C3%B3ttir","title":"Gytha Thorkelsdóttir - Wikipedia","publisher":"Wikipedia","quote":"Gytha Thorkelsdóttir was the daughter of Danish chieftain Thorgil Sprakling (also called Thorkel)."}],"uncertain":"Her birth and death dates are approximate (c. 997 – c. 1069)."},{"id":"edith-wessex","name":"Edith of Wessex","fullName":"Edith of Wessex","house":"Godwin","monarch":false,"birth":{"date":"1027","precision":"circa","citations":[{"url":"https://en.wikipedia.org/wiki/Edith_of_Wessex","title":"Edith of Wessex - Wikipedia","publisher":"Wikipedia","quote":"She was probably born in or before 1027."}]},"death":{"date":"1075-12-18","place":"Winchester","precision":"day","citations":[{"url":"https://en.wikipedia.org/wiki/Edith_of_Wessex","title":"Edith of Wessex - Wikipedia","publisher":"Wikipedia","quote":"She died at Winchester on 18 December 1075."}]},"parents":["godwin-wessex","gytha-thorkelsdottir"],"spouses":[{"id":"edward-confessor","married":"1045-01-23","ended":"1066-01-05","endedBy":"death","citations":[{"url":"https://en.wikipedia.org/wiki/Edith_of_Wessex","title":"Edith of Wessex - Wikipedia","publisher":"Wikipedia","quote":"Edith married Edward on 23 January 1045."}]}],"summary":"Edith of Wessex, daughter of Godwin, Earl of Wessex, and Gytha Thorkelsdóttir, married King Edward the Confessor on 23 January 1045. The marriage produced no children. She died at Winchester on 18 December 1075.","citations":[{"url":"https://en.wikipedia.org/wiki/Edith_of_Wessex","title":"Edith of Wessex - Wikipedia","publisher":"Wikipedia","quote":"Edith was the daughter of Godwin, the most powerful earl in England."}],"uncertain":"Sources debate why the marriage was childless; ecclesiastical writers variously attributed it to a vow of celibacy by Edward or to estrangement from the Godwin family."},{"id":"tostig-godwinson","name":"Tostig Godwinson","fullName":"Tostig Godwinson","house":"Godwin","monarch":false,"birth":{"date":"1029","precision":"circa","citations":[{"url":"https://en.wikipedia.org/wiki/Tostig_Godwinson","title":"Tostig Godwinson - Wikipedia","publisher":"Wikipedia","quote":"Tostig Godwinson (c. 1029 – 25 September 1066)"}]},"death":{"date":"1066-09-25","place":"Stamford Bridge","precision":"day","citations":[{"url":"https://en.wikipedia.org/wiki/Tostig_Godwinson","title":"Tostig Godwinson - Wikipedia","publisher":"Wikipedia","quote":"Hardrada, Tostig, and many of their men were killed"},{"url":"https://en.wikisource.org/wiki/Page:The_Anglo-Saxon_Chronicle_(Giles).djvu/156","title":"The Anglo-Saxon Chronicle (Giles)","publisher":"Wikisource","quote":"Harold the Fair-haired, and Tosty the earl"}]},"parents":["godwin-wessex","gytha-thorkelsdottir"],"spouses":[{"id":"judith-flanders","married":"1051","citations":[{"url":"https://en.wikipedia.org/wiki/Tostig_Godwinson","title":"Tostig Godwinson - Wikipedia","publisher":"Wikipedia","quote":"In 1051, he married Judith of Flanders, the only child of Baldwin IV, Count of Flanders"}]}],"titles":[{"title":"Earl of Northumbria","from":"1055","to":"1065","citations":[{"url":"https://en.wikipedia.org/wiki/Tostig_Godwinson","title":"Tostig Godwinson - Wikipedia","publisher":"Wikipedia","quote":"Three years later in 1055, Tostig became the Earl of Northumbria upon the death of Earl Siward."},{"url":"https://en.wikipedia.org/wiki/Tostig_Godwinson","title":"Tostig Godwinson - Wikipedia","publisher":"Wikipedia","quote":"they killed Tostig's officials and supporters, then declared Tostig outlawed for his unlawful actions"}]}],"summary":"Tostig Godwinson, son of Godwin and Gytha and younger brother of Harold II, was Earl of Northumbria from 1055 until his deposition by rebellious Northumbrian thegns in 1065. He allied with Harald Hardrada of Norway and invaded northern England in September 1066, but was defeated and killed alongside Hardrada by his brother Harold at the Battle of Stamford Bridge on 25 September 1066.","citations":[{"url":"https://en.wikipedia.org/wiki/Tostig_Godwinson","title":"Tostig Godwinson - Wikipedia","publisher":"Wikipedia","quote":"Tostig was the third son of the Anglo-Saxon nobleman Godwin, Earl of Wessex and Gytha Thorkelsdóttir"}]},{"id":"gyrth-godwinson","name":"Gyrth Godwinson","fullName":"Gyrth Godwinson","house":"Godwin","monarch":false,"birth":{"date":"1032","precision":"circa","citations":[{"url":"https://en.wikipedia.org/wiki/Gyrth_Godwinson","title":"Gyrth Godwinson - Wikipedia","publisher":"Wikipedia","quote":"c. 1032"}]},"death":{"date":"1066-10-14","place":"Battle of Hastings","precision":"day","citations":[{"url":"https://en.wikisource.org/wiki/Page:The_Anglo-Saxon_Chronicle_(Giles).djvu/157","title":"The Anglo-Saxon Chronicle (Giles)","publisher":"Wikisource","quote":"There was slain king Harold, and Leofwin the earl, his brother, and Girth the earl, his brother, and many good men"},{"url":"https://en.wikipedia.org/wiki/Gyrth_Godwinson","title":"Gyrth Godwinson - Wikipedia","publisher":"Wikipedia","quote":"Gyrth fought at and was killed in the Battle of Hastings alongside his brothers Harold and Leofwine"}]},"parents":["godwin-wessex","gytha-thorkelsdottir"],"spouses":[],"titles":[{"title":"Earl of East Anglia","from":"1055","to":"1066","citations":[{"url":"https://en.wikipedia.org/wiki/Gyrth_Godwinson","title":"Gyrth Godwinson - Wikipedia","publisher":"Wikipedia","quote":"Gyrth was made Earl of East Anglia, Cambridgeshire and Oxfordshire some time between 1055 and 1057."}]}],"summary":"Gyrth Godwinson, fourth son of Godwin, Earl of Wessex, held the earldom of East Anglia from the mid-1050s. He died fighting alongside his brothers King Harold II and Leofwine at the Battle of Hastings on 14 October 1066.","citations":[{"url":"https://en.wikipedia.org/wiki/Gyrth_Godwinson","title":"Gyrth Godwinson - Wikipedia","publisher":"Wikipedia","quote":"the fourth son of Earl Godwin"}]},{"id":"leofwine-godwinson","name":"Leofwine Godwinson","fullName":"Leofwine Godwinson","house":"Godwin","monarch":false,"birth":{"date":"1035","precision":"circa","citations":[{"url":"https://en.wikipedia.org/wiki/Leofwine_Godwinson","title":"Leofwine Godwinson - Wikipedia","publisher":"Wikipedia","quote":"Leofwine Godwinson (c. 1035"}]},"death":{"date":"1066-10-14","place":"Battle of Hastings","precision":"day","citations":[{"url":"https://en.wikisource.org/wiki/Page:The_Anglo-Saxon_Chronicle_(Giles).djvu/157","title":"The Anglo-Saxon Chronicle (Giles)","publisher":"Wikisource","quote":"There was slain king Harold, and Leofwin the earl, his brother, and Girth the earl, his brother, and many good men"},{"url":"https://en.wikipedia.org/wiki/Leofwine_Godwinson","title":"Leofwine Godwinson - Wikipedia","publisher":"Wikipedia","quote":"He was killed alongside his brothers Harold and Gyrth in the Battle of Hastings"}]},"parents":["godwin-wessex","gytha-thorkelsdottir"],"spouses":[],"titles":[{"title":"Earl of Kent","from":"1055","to":"1066","citations":[{"url":"https://en.wikipedia.org/wiki/Leofwine_Godwinson","title":"Leofwine Godwinson - Wikipedia","publisher":"Wikipedia","quote":"Leofwine was made Earl of Kent"}]}],"summary":"Leofwine Godwinson, fifth son of Godwin, Earl of Wessex, held the earldom of Kent from the mid-1050s. He died fighting alongside his brothers King Harold II and Gyrth at the Battle of Hastings on 14 October 1066.","citations":[{"url":"https://en.wikipedia.org/wiki/Leofwine_Godwinson","title":"Leofwine Godwinson - Wikipedia","publisher":"Wikipedia","quote":"the fifth son of Earl Godwin"}]},{"id":"edith-swanneck","name":"Edith Swanneck","fullName":"Edith Swannesha","epithet":"the Fair","monarch":false,"birth":{"date":"1025","precision":"circa","citations":[{"url":"https://en.wikipedia.org/wiki/Edith_Swannesha","title":"Edith Swannesha - Wikipedia","publisher":"Wikipedia","quote":"c. 1025 – c. 1086"}]},"death":{"date":"1086","precision":"circa","citations":[{"url":"https://en.wikipedia.org/wiki/Edith_Swannesha","title":"Edith Swannesha - Wikipedia","publisher":"Wikipedia","quote":"c. 1025 – c. 1086"}]},"parents":[],"spouses":[{"id":"harold-godwinson","married":"1046","ended":"1066-10-14","endedBy":"death","citations":[{"url":"https://en.wikipedia.org/wiki/Edith_Swannesha","title":"Edith Swannesha - Wikipedia","publisher":"Wikipedia","quote":"his long-time common-law marriage with Edith the Fair"}]}],"summary":"Edith Swanneck (Edith the Fair) had a decades-long customary union with Harold Godwinson, the future Harold II, and is traditionally credited with several of his children. According to legend, she identified Harold's mutilated body on the battlefield of Hastings by marks known only to her, allowing him a Christian burial.","citations":[{"url":"https://en.wikipedia.org/wiki/Edith_Swannesha","title":"Edith Swannesha - Wikipedia","publisher":"Wikipedia","quote":"Edith the Fair walked through the carnage of the battle so that she might identify Harold by markings on his chest, known only to her"}],"uncertain":"Whether Edith was Harold's first wife or an unmarried consort is disputed; her union with him was a customary (more danico) relationship, not a church-sanctioned marriage, and even the identity of the mother of some of Harold's children (Edith versus others) is not settled in the sources. Her death date is approximate and her later life poorly documented."},{"id":"ealdgyth-mercia","name":"Ealdgyth of Mercia","fullName":"Ealdgyth of Mercia","monarch":false,"parents":[],"spouses":[{"id":"gruffydd-ap-llywelyn","married":"1057","citations":[{"url":"https://en.wikipedia.org/wiki/Ealdgyth_of_Mercia","title":"Ealdgyth of Mercia - Wikipedia","publisher":"Wikipedia","quote":"It was presumably in the year of her father's appointment (c. 1057) that Ealdgyth married his political ally, King Gruffudd ap Llywelyn."}],"precision":"circa"},{"id":"harold-godwinson","married":"1066","ended":"1066-10-14","endedBy":"death","citations":[{"url":"https://en.wikipedia.org/wiki/Ealdgyth_of_Mercia","title":"Ealdgyth of Mercia - Wikipedia","publisher":"Wikipedia","quote":"Ealdgyth later became the wife and queen consort of her late husband's enemy Harold."}]}],"summary":"Ealdgyth of Mercia, daughter of Ælfgar, Earl of Mercia, was first married to the Welsh king Gruffudd ap Llywelyn, and after his death in 1063 married Harold Godwinson, becoming queen consort in early 1066. After Harold's death at Hastings her brothers took her to Chester for safety, and her subsequent fate is unrecorded.","citations":[{"url":"https://en.wikipedia.org/wiki/Ealdgyth_of_Mercia","title":"Ealdgyth of Mercia - Wikipedia","publisher":"Wikipedia","quote":"Ealdgyth was the daughter of Ælfgar, who had been earl of East Anglia a number of times in the 1050s and was appointed earl of Mercia in c. 1057"}],"uncertain":"Ealdgyth's birth and death dates are unknown. Whether her marriage to Harold produced any children is disputed; a suggestion that she was the mother of Harold's son Harold is not universally accepted. Her fate after October 1066 is unrecorded."},{"id":"edward-exile","name":"Edward the Exile","fullName":"Edward the Exile","house":"Wessex","monarch":false,"birth":{"date":"1016","precision":"circa","citations":[{"url":"https://en.wikipedia.org/wiki/Edward_the_Exile","title":"Edward the Exile - Wikipedia","publisher":"Wikipedia","quote":"Edward the Exile (c. 1016 – 19 April 1057), also called Edward Ætheling, was the son of King Edmund Ironside and of Ealdgyth"}]},"death":{"date":"1057-04-19","place":"England","precision":"day","citations":[{"url":"https://en.wikipedia.org/wiki/Edward_the_Exile","title":"Edward the Exile - Wikipedia","publisher":"Wikipedia","quote":"The Exile finally arrived in England in 1057 with his wife and children, but died within a few days, on 19 April, without meeting the King."}]},"parents":[],"spouses":[{"id":"agatha-exile","citations":[{"url":"https://en.wikipedia.org/wiki/Edward_the_Exile","title":"Edward the Exile - Wikipedia","publisher":"Wikipedia","quote":"Edward's wife was named Agatha; her origins are disputed."}]}],"summary":"Edward the Exile, son of King Edmund Ironside, was sent from England as an infant after the Danish conquest of 1016 and spent decades in exile in Hungary and Kievan lands. Recalled to England in 1057 as a potential heir to Edward the Confessor, he died within days of his arrival without meeting the king. His son was Edgar Ætheling.","citations":[{"url":"https://en.wikipedia.org/wiki/Edward_the_Exile","title":"Edward the Exile - Wikipedia","publisher":"Wikipedia","quote":"Edgar Ætheling (c. 1051 – c. 1126)"}],"uncertain":"Edward's birth year is approximate (c. 1016). His wife Agatha's origins are disputed among modern historians (German, Hungarian, Kievan Rus, Bulgarian, and Polish ancestries have all been proposed)."},{"id":"agatha-exile","name":"Agatha","fullName":"Agatha, wife of Edward the Exile","monarch":false,"birth":{"date":"1030","precision":"before","citations":[{"url":"https://en.wikipedia.org/wiki/Agatha_(wife_of_Edward_the_Exile)","title":"Agatha (wife of Edward the Exile) - Wikipedia","publisher":"Wikipedia","quote":"Agatha (before 1030 – after 1070)"}]},"death":{"date":"1070","precision":"after","citations":[{"url":"https://en.wikipedia.org/wiki/Agatha_(wife_of_Edward_the_Exile)","title":"Agatha (wife of Edward the Exile) - Wikipedia","publisher":"Wikipedia","quote":"Agatha (before 1030 – after 1070)"}]},"parents":[],"spouses":[{"id":"edward-exile","ended":"1057-04-19","endedBy":"death","citations":[{"url":"https://en.wikipedia.org/wiki/Agatha_(wife_of_Edward_the_Exile)","title":"Agatha (wife of Edward the Exile) - Wikipedia","publisher":"Wikipedia","quote":"she was married to Edward the Exile, a candidate for the throne of England"}]}],"summary":"Agatha, wife of Edward the Exile, came to England with her husband and children in 1057 but was widowed within days of arrival. Her own parentage is unresolved: theories connect her variously to the German imperial house, the Hungarian royal line, the Kievan Rurikids, Bulgaria, or Poland. Her children were Edgar Ætheling, Margaret of Scotland, and Cristina.","citations":[{"url":"https://en.wikipedia.org/wiki/Agatha_(wife_of_Edward_the_Exile)","title":"Agatha (wife of Edward the Exile) - Wikipedia","publisher":"Wikipedia","quote":"Her antecedents are unclear and the subject of much speculation."}],"uncertain":"Agatha's parentage and ethnic origin are unresolved; this is one of the most disputed genealogical questions of the period, with German, Hungarian, Kievan Rus, Bulgarian, and Polish theories all having scholarly advocates. Her birth and death dates are only loosely bounded (before 1030; after 1070)."},{"id":"margaret-scotland","name":"Margaret of Scotland","fullName":"Saint Margaret of Scotland","monarch":false,"birth":{"date":"1045","place":"Kingdom of Hungary","precision":"circa","citations":[{"url":"https://en.wikipedia.org/wiki/Saint_Margaret_of_Scotland","title":"Saint Margaret of Scotland - Wikipedia","publisher":"Wikipedia","quote":"c. 1045"}]},"death":{"date":"1093-11-16","precision":"day","citations":[{"url":"https://en.wikipedia.org/wiki/Saint_Margaret_of_Scotland","title":"Saint Margaret of Scotland - Wikipedia","publisher":"Wikipedia","quote":"16 November 1093"}]},"parents":["edward-exile","agatha-exile"],"spouses":[{"id":"malcolm-iii-scotland","married":"1070","ended":"1093-11-13","endedBy":"death","citations":[{"url":"https://en.wikipedia.org/wiki/Saint_Margaret_of_Scotland","title":"Saint Margaret of Scotland - Wikipedia","publisher":"Wikipedia","quote":"The marriage of Malcolm and Margaret occurred in 1070"}]}],"summary":"Margaret of Scotland, daughter of Edward the Exile and Agatha and sister of Edgar Ætheling, fled to Scotland after the Norman Conquest and married King Malcolm III in 1070. Her daughter Edith, renamed Matilda, became queen consort of Henry I of England. Margaret died on 16 November 1093, days after her husband and eldest son were killed at the Battle of Alnwick.","citations":[{"url":"https://en.wikipedia.org/wiki/Saint_Margaret_of_Scotland","title":"Saint Margaret of Scotland - Wikipedia","publisher":"Wikipedia","quote":"renamed Matilda, queen of England"}]},{"id":"robert-i-normandy","name":"Robert I, Duke of Normandy","fullName":"Robert the Magnificent","house":"Normandy","monarch":false,"birth":{"date":"1000-06-22","precision":"day","citations":[{"url":"https://en.wikipedia.org/wiki/Robert_I,_Duke_of_Normandy","title":"Robert I, Duke of Normandy - Wikipedia","publisher":"Wikipedia","quote":"Born 22 June 1000"}]},"death":{"date":"1035-07-02","place":"Nicaea","precision":"day","citations":[{"url":"https://en.wikipedia.org/wiki/Robert_I,_Duke_of_Normandy","title":"Robert I, Duke of Normandy - Wikipedia","publisher":"Wikipedia","quote":"died on the return journey at Nicaea on 2 July 1035"}]},"parents":[],"spouses":[{"id":"herleva","citations":[{"url":"https://en.wikipedia.org/wiki/Robert_I,_Duke_of_Normandy","title":"Robert I, Duke of Normandy - Wikipedia","publisher":"Wikipedia","quote":"By his mistress or concubine, Herleva of Falaise, he was father of: William the Conqueror (c. 1028–1087)."}]}],"titles":[{"title":"Duke of Normandy","from":"1027","to":"1035","citations":[{"url":"https://en.wikipedia.org/wiki/Robert_I,_Duke_of_Normandy","title":"Robert I, Duke of Normandy - Wikipedia","publisher":"Wikipedia","quote":"Duke of Normandy from 1027 to 1035"}]}],"summary":"Robert I, Duke of Normandy, was the father of William the Conqueror by his mistress Herleva. He named William his heir before departing on pilgrimage to Jerusalem, and died on the return journey at Nicaea on 2 July 1035.","citations":[{"url":"https://en.wikipedia.org/wiki/Robert_I,_Duke_of_Normandy","title":"Robert I, Duke of Normandy - Wikipedia","publisher":"Wikipedia","quote":"Robert was the son of Richard II of Normandy and Judith, daughter of Conan I, Duke of Brittany"}]},{"id":"herleva","name":"Herleva","fullName":"Herleva of Falaise","monarch":false,"birth":{"date":"1005","precision":"circa","citations":[{"url":"https://en.wikipedia.org/wiki/Herleva","title":"Herleva - Wikipedia","publisher":"Wikipedia","quote":"Herleva (c. 1005 – c. 1050) was an 11th-century Norman woman"}]},"death":{"date":"1050","precision":"circa","citations":[{"url":"https://en.wikipedia.org/wiki/Herleva","title":"Herleva - Wikipedia","publisher":"Wikipedia","quote":"Herleva (c. 1005 – c. 1050) was an 11th-century Norman woman"}]},"parents":[],"spouses":[{"id":"robert-i-normandy","citations":[{"url":"https://en.wikipedia.org/wiki/Herleva","title":"Herleva - Wikipedia","publisher":"Wikipedia","quote":"she had an extramarital relationship with Robert I, Duke of Normandy"}]},{"id":"herluin-conteville","married":"1031","citations":[{"url":"https://en.wikipedia.org/wiki/Herleva","title":"Herleva - Wikipedia","publisher":"Wikipedia","quote":"Herleva later married Herluin de Conteville in 1031."}]}],"summary":"Herleva, the mother of William the Conqueror, bore him to an extramarital relationship with Robert I, Duke of Normandy. She later married Herluin de Conteville, with whom she had further children including Odo, Bishop of Bayeux, and Robert, Count of Mortain.","citations":[{"url":"https://en.wikipedia.org/wiki/Herleva","title":"Herleva - Wikipedia","publisher":"Wikipedia","quote":"the mother of William the Conqueror, born to an extramarital relationship with Robert I, Duke of Normandy"}],"uncertain":"Herleva's father's occupation is disputed by sources, with tanner, furrier, embalmer, and apothecary all proposed; some scholars argue circumstantial evidence points to a burgher-class rather than lowly origin. Her birth and death dates are approximate."},{"id":"matilda-flanders","name":"Matilda of Flanders","fullName":"Matilda of Flanders","house":"Flanders","monarch":false,"birth":{"date":"1031","precision":"circa","citations":[{"url":"https://en.wikipedia.org/wiki/Matilda_of_Flanders","title":"Matilda of Flanders - Wikipedia","publisher":"Wikipedia","quote":"c. 1031"}]},"death":{"date":"1083-11-02","precision":"day","citations":[{"url":"https://en.wikipedia.org/wiki/Matilda_of_Flanders","title":"Matilda of Flanders - Wikipedia","publisher":"Wikipedia","quote":"2 November 1083"}]},"parents":[],"spouses":[{"id":"william-i","married":"1051","ended":"1083-11-02","endedBy":"death","citations":[{"url":"https://en.wikipedia.org/wiki/Matilda_of_Flanders","title":"Matilda of Flanders - Wikipedia","publisher":"Wikipedia","quote":"William and Matilda were married after a delay in c. 1051–2"}]}],"summary":"Matilda of Flanders, daughter of Count Baldwin V of Flanders and Adela of France, married William the Conqueror around 1051–1052. Their children included Robert Curthose, William II, Henry I, and Adela of Normandy. She died on 2 November 1083.","citations":[{"url":"https://en.wikipedia.org/wiki/Matilda_of_Flanders","title":"Matilda of Flanders - Wikipedia","publisher":"Wikipedia","quote":"Count Baldwin V of Flanders and Adela of France"}]},{"id":"robert-curthose","name":"Robert Curthose","fullName":"Robert II, Duke of Normandy","epithet":"Curthose","house":"Normandy","monarch":false,"birth":{"date":"1052","precision":"circa","citations":[{"url":"https://en.wikipedia.org/wiki/Robert_Curthose","title":"Robert Curthose - Wikipedia","publisher":"Wikipedia","quote":"His birth has been dated to between 1051 and 1053."}]},"death":{"date":"1134-02-03","place":"Cardiff Castle","precision":"circa","citations":[{"url":"https://en.wikipedia.org/wiki/Robert_Curthose","title":"Robert Curthose - Wikipedia","publisher":"Wikipedia","quote":"Robert died in Cardiff Castle, probably on 3 February 1134."}]},"parents":["william-i","matilda-flanders"],"spouses":[{"id":"sybilla-conversano","citations":[{"url":"https://en.wikipedia.org/wiki/Robert_Curthose","title":"Robert Curthose - Wikipedia","publisher":"Wikipedia","quote":"Robert married Sybilla of Conversano"}]}],"titles":[{"title":"Duke of Normandy","from":"1087","to":"1106","citations":[{"url":"https://en.wikipedia.org/wiki/Robert_Curthose","title":"Robert Curthose - Wikipedia","publisher":"Wikipedia","quote":"Duke of Normandy as Robert II from 1087 to 1106."}]}],"summary":"Robert Curthose, eldest son of William the Conqueror and Matilda of Flanders, inherited Normandy on his father's death in 1087 while his brother William Rufus took England. He repeatedly clashed with his brothers, and in 1106 was defeated and captured by his youngest brother Henry I at the Battle of Tinchebray, spending the rest of his life imprisoned until his death in 1134.","citations":[{"url":"https://en.wikipedia.org/wiki/Robert_Curthose","title":"Robert Curthose - Wikipedia","publisher":"Wikipedia","quote":"In 1106, Henry defeated Robert's army decisively at the Battle of Tinchebray and claimed Normandy as a possession of the English crown."}],"uncertain":"Robert's birth year is uncertain, dated by sources to somewhere between 1051 and 1053. His date of death, 3 February 1134, is qualified by sources as 'probably' correct."},{"id":"adela-normandy","name":"Adela of Normandy","fullName":"Adela of Normandy, Countess of Blois","house":"Normandy","monarch":false,"birth":{"date":"1068","precision":"circa","citations":[{"url":"https://en.wikipedia.org/wiki/Adela_of_Normandy","title":"Adela of Normandy - Wikipedia","publisher":"Wikipedia","quote":"It is generally believed that Adela was born between 1066 and 1070"}]},"death":{"date":"1137-03-08","place":"Marcigny-sur-Loire","precision":"day","citations":[{"url":"https://en.wikipedia.org/wiki/Adela_of_Normandy","title":"Adela of Normandy - Wikipedia","publisher":"Wikipedia","quote":"Died 8 March 1137 (aged 69–70) Marcigny-sur-Loire, Kingdom of France"}]},"parents":["william-i","matilda-flanders"],"spouses":[{"id":"stephen-blois","married":"1090","ended":"1102-05-19","endedBy":"death","citations":[{"url":"https://en.wikipedia.org/wiki/Adela_of_Normandy","title":"Adela of Normandy - Wikipedia","publisher":"Wikipedia","quote":"Adela married Stephen Henry, son and heir to the count of Blois, between 1080 and 1083"}]}],"summary":"Adela of Normandy, daughter of William the Conqueror and Matilda of Flanders, married Stephen-Henry, Count of Blois. Their sons included Stephen, King of England, and Henry of Blois, Bishop of Winchester. She died at the priory of Marcigny-sur-Loire on 8 March 1137.","citations":[{"url":"https://en.wikipedia.org/wiki/Adela_of_Normandy","title":"Adela of Normandy - Wikipedia","publisher":"Wikipedia","quote":"Stephen, King of England"}],"uncertain":"Adela's birth year is only loosely bounded, between 1066 and 1070, and her marriage date to Stephen-Henry is likewise given as a range (1080–1083). She is also referred to in some sources as Adela of Blois; this dataset treats that as the same person under the id adela-normandy, reflecting her natal house."},{"id":"matilda-scotland","name":"Matilda of Scotland","fullName":"Edith of Scotland","house":"Scotland","monarch":false,"birth":{"date":"1080","place":"Dunfermline, Scotland","precision":"year","citations":[{"url":"https://en.wikipedia.org/wiki/Matilda_of_Scotland","title":"Matilda of Scotland - Wikipedia","publisher":"Wikipedia","quote":"Born in 1080, in Dunfermline, Scotland"}]},"death":{"date":"1118-05-01","place":"Westminster Palace","precision":"day","citations":[{"url":"https://en.wikipedia.org/wiki/Matilda_of_Scotland","title":"Matilda of Scotland - Wikipedia","publisher":"Wikipedia","quote":"On 1 May 1118, Matilda died at Westminster Palace."}]},"parents":["malcolm-iii-scotland","margaret-scotland"],"spouses":[{"id":"henry-i","married":"1100-11-11","ended":"1118-05-01","endedBy":"death","citations":[{"url":"https://en.wikipedia.org/wiki/Matilda_of_Scotland","title":"Matilda of Scotland - Wikipedia","publisher":"Wikipedia","quote":"Edith and Henry were married on 11 November 1100 at Westminster Abbey"}]}],"summary":"Matilda of Scotland, born Edith, daughter of King Malcolm III of Scotland and Margaret of Scotland, married Henry I of England in 1100. Their children who reached adulthood were Empress Matilda and William Adelin. She died at Westminster Palace on 1 May 1118.","citations":[{"url":"https://en.wikipedia.org/wiki/Matilda_of_Scotland","title":"Matilda of Scotland - Wikipedia","publisher":"Wikipedia","quote":"two children who reached adulthood: Matilda (7 February 1102 – 10 September 1167)"}]},{"id":"william-adelin","name":"William Adelin","fullName":"William Adelin","house":"Normandy","monarch":false,"birth":{"date":"1103-08-05","place":"Winchester, Hampshire","precision":"day","citations":[{"url":"https://en.wikipedia.org/wiki/William_Adelin","title":"William Adelin - Wikipedia","publisher":"Wikipedia","quote":"5 August 1103"}]},"death":{"date":"1120-11-25","place":"near Barfleur, Normandy","precision":"day","citations":[{"url":"https://en.wikipedia.org/wiki/William_Adelin","title":"William Adelin - Wikipedia","publisher":"Wikipedia","quote":"William died in the White Ship tragedy of 25 November 1120"}]},"parents":["henry-i","matilda-scotland"],"spouses":[{"id":"matilda-anjou","married":"1119-06","ended":"1120-11-25","endedBy":"death","citations":[{"url":"https://en.wikipedia.org/wiki/William_Adelin","title":"William Adelin - Wikipedia","publisher":"Wikipedia","quote":"Their marriage took place in June 1119 in Lisieux"}]}],"summary":"William Adelin, the only legitimate son of Henry I of England and Matilda of Scotland, was heir apparent to the English throne. He drowned in the wreck of the White Ship off Barfleur on 25 November 1120, a disaster that left Henry without a male heir and precipitated the succession crisis that became the Anarchy.","citations":[{"url":"https://en.wikipedia.org/wiki/William_Adelin","title":"William Adelin - Wikipedia","publisher":"Wikipedia","quote":"the son of Henry I of England by his wife Matilda of Scotland"}]},{"id":"robert-gloucester","name":"Robert of Gloucester","fullName":"Robert FitzRoy, 1st Earl of Gloucester","house":"Normandy","monarch":false,"birth":{"date":"1090","precision":"circa","citations":[{"url":"https://en.wikipedia.org/wiki/Robert,_1st_Earl_of_Gloucester","title":"Robert, 1st Earl of Gloucester - Wikipedia","publisher":"Wikipedia","quote":"Robert FitzRoy, 1st Earl of Gloucester (c. 1090 – 31 October 1147)"}]},"death":{"date":"1147-10-31","place":"Bristol Castle","precision":"day","citations":[{"url":"https://en.wikipedia.org/wiki/Robert,_1st_Earl_of_Gloucester","title":"Robert, 1st Earl of Gloucester - Wikipedia","publisher":"Wikipedia","quote":"Robert of Gloucester died in 1147 at Bristol Castle"}]},"parents":["henry-i"],"spouses":[],"titles":[{"title":"Earl of Gloucester","from":"1121","to":"1147","citations":[{"url":"https://en.wikipedia.org/wiki/Robert,_1st_Earl_of_Gloucester","title":"Robert, 1st Earl of Gloucester - Wikipedia","publisher":"Wikipedia","quote":"In either 1121 or 1122, his father created him the 1st Earl of Gloucester."}]}],"summary":"Robert of Gloucester was an illegitimate son of Henry I of England. Created Earl of Gloucester by his father, he became the chief military supporter of his half-sister Empress Matilda during the civil war known as the Anarchy. He died at Bristol Castle on 31 October 1147.","citations":[{"url":"https://en.wikipedia.org/wiki/Robert,_1st_Earl_of_Gloucester","title":"Robert, 1st Earl of Gloucester - Wikipedia","publisher":"Wikipedia","quote":"he was the half-brother of the Empress Matilda, and her chief military supporter during the civil war known as the Anarchy"}],"uncertain":"Robert's mother is not securely identified in the sources; he is sometimes, likely erroneously, said to be a son of Nest ferch Rhys."},{"id":"geoffrey-anjou","name":"Geoffrey of Anjou","fullName":"Geoffrey V, Count of Anjou","epithet":"Plantagenet","house":"Anjou","monarch":false,"birth":{"date":"1113-08-24","precision":"day","citations":[{"url":"https://en.wikipedia.org/wiki/Geoffrey_of_Anjou","title":"Geoffrey V, Count of Anjou - Wikipedia","publisher":"Wikipedia","quote":"Geoffrey V (24 August 1113 – 7 September 1151)"}]},"death":{"date":"1151-09-07","precision":"day","citations":[{"url":"https://en.wikipedia.org/wiki/Geoffrey_of_Anjou","title":"Geoffrey V, Count of Anjou - Wikipedia","publisher":"Wikipedia","quote":"Geoffrey died suddenly on 7 September 1151"}]},"parents":[],"spouses":[{"id":"matilda-empress","married":"1128-06-17","ended":"1151-09-07","endedBy":"death","citations":[{"url":"https://en.wikipedia.org/wiki/Geoffrey_of_Anjou","title":"Geoffrey V, Count of Anjou - Wikipedia","publisher":"Wikipedia","quote":"Geoffrey and Matilda's marriage took place in 1128"}]}],"titles":[{"title":"Count of Anjou","from":"1129","to":"1151","citations":[{"url":"https://en.wikipedia.org/wiki/Geoffrey_of_Anjou","title":"Geoffrey V, Count of Anjou - Wikipedia","publisher":"Wikipedia","quote":"count of Anjou and Maine by inheritance from 1129"}]}],"summary":"Geoffrey of Anjou, son of Fulk V of Anjou, married Empress Matilda in 1128 and became Count of Anjou in 1129. Their eldest son, Henry, became King Henry II of England. Geoffrey conquered Normandy in the early 1140s and died suddenly on 7 September 1151.","citations":[{"url":"https://en.wikipedia.org/wiki/Geoffrey_of_Anjou","title":"Geoffrey V, Count of Anjou - Wikipedia","publisher":"Wikipedia","quote":"Henry II, King of England (1133–1189)"}]},{"id":"stephen-blois","name":"Stephen II, Count of Blois","fullName":"Stephen-Henry, Count of Blois and Chartres","house":"Blois","monarch":false,"birth":{"date":"1045","place":"Blois, Kingdom of France","precision":"circa","citations":[{"url":"https://en.wikipedia.org/wiki/Stephen_II,_Count_of_Blois","title":"Stephen II, Count of Blois - Wikipedia","publisher":"Wikipedia","quote":"c. 1045"}]},"death":{"date":"1102-05-19","place":"Ascalon","precision":"circa","citations":[{"url":"https://en.wikipedia.org/wiki/Stephen_II,_Count_of_Blois","title":"Stephen II, Count of Blois - Wikipedia","publisher":"Wikipedia","quote":"taken prisoner and executed, probably in Ascalon on 19 May"}]},"parents":[],"spouses":[{"id":"adela-normandy","married":"1090","ended":"1102-05-19","endedBy":"death","citations":[{"url":"https://en.wikipedia.org/wiki/Stephen_II,_Count_of_Blois","title":"Stephen II, Count of Blois - Wikipedia","publisher":"Wikipedia","quote":"He married Adela of Normandy around 1090 in Chartres, daughter of William the Conqueror."}]}],"summary":"Stephen-Henry, Count of Blois and Chartres, married Adela of Normandy, daughter of William the Conqueror, around 1090. Their sons included Stephen, King of England, and Henry of Blois, Bishop of Winchester. Stephen-Henry led a major contingent on the First Crusade and was killed fighting the Fatimids at the Second Battle of Ramla in 1102.","citations":[{"url":"https://en.wikipedia.org/wiki/Stephen_II,_Count_of_Blois","title":"Stephen II, Count of Blois - Wikipedia","publisher":"Wikipedia","quote":"Stephen, King of England"}],"uncertain":"The exact date and place of Stephen-Henry's death are hedged by sources as 'probably' 19 May 1102 at Ascalon."},{"id":"matilda-boulogne","name":"Matilda of Boulogne","fullName":"Matilda I, Countess of Boulogne","house":"Boulogne","monarch":false,"birth":{"date":"1105","precision":"circa","citations":[{"url":"https://en.wikipedia.org/wiki/Matilda_I,_Countess_of_Boulogne","title":"Matilda I, Countess of Boulogne - Wikipedia","publisher":"Wikipedia","quote":"Matilda of Boulogne (c. 1105 – 3 May 1152)"}]},"death":{"date":"1152-05-03","place":"Hedingham Castle, Essex","precision":"day","citations":[{"url":"https://en.wikipedia.org/wiki/Matilda_I,_Countess_of_Boulogne","title":"Matilda I, Countess of Boulogne - Wikipedia","publisher":"Wikipedia","quote":"she died on 3 May"}]},"parents":[],"spouses":[{"id":"stephen","married":"1125","ended":"1152-05-03","endedBy":"death","citations":[{"url":"https://en.wikipedia.org/wiki/Matilda_I,_Countess_of_Boulogne","title":"Matilda I, Countess of Boulogne - Wikipedia","publisher":"Wikipedia","quote":"Around 1125, Count Eustace and King Henry arranged for Matilda to marry Henry's nephew Stephen of Blois."}]}],"summary":"Matilda of Boulogne, daughter of Eustace III, Count of Boulogne, and Mary of Scotland, married Stephen of Blois around 1125. As queen consort she was a vigorous supporter of Stephen's cause during the Anarchy, notably after his capture in 1141. Her children included Eustace IV, William, and Marie of Boulogne. She died at Hedingham Castle on 3 May 1152.","citations":[{"url":"https://en.wikipedia.org/wiki/Matilda_I,_Countess_of_Boulogne","title":"Matilda I, Countess of Boulogne - Wikipedia","publisher":"Wikipedia","quote":"daughter of the count of Bo nd Geoffrey Plantagenet, Count of Anjou, born at Le Mans on 5 March 1133. In May 1152 he added the duchy of Aquitaine to his domains by marrying its duchess, Eleanor, recently divorced from the French king, and on 19 December 1154 he was crowned king of England at Westminster. He died at Chinon on 6 July 1189.","citations":[{"url":"https://en.wikisource.org/wiki/Dictionary_of_National_Biography,_1885-1900/Henry_II","title":"Dictionary of National Biography, 1885-1900/Henry II","publisher":"Wikisource (Dictionary of National Biography)","quote":"Henry II (1133-1189), king of England, was the eldest child of Matilda, daughter of Henry I, and Geoffrey Plantagenet (1113-1150), count of Anjou."},{"url":"https://en.wikipedia.org/wiki/Henry_II_of_England","title":"Henry II of England - Wikipedia","publisher":"Wikipedia","quote":"Geoffrey Plantagenet, Count of Anjou and Empress Matilda"}]},{"id":"richard-i","name":"Richard I","epithet":"Coeur de Lion","house":"Plantagenet","monarch":true,"reign":{"start":"1189","end":"1199","citations":[{"url":"https://en.wikipedia.org/wiki/Richard_I_of_England","title":"Richard I of England - Wikipedia","publisher":"Wikipedia","quote":"1189 - 1199"}]},"birth":{"date":"1157-09-08","place":"Oxford","precision":"day","citations":[{"url":"https://en.wikisource.org/wiki/Dictionary_of_National_Biography,_1885-1900/Richard_I","title":"Dictionary of National Biography, 1885-1900/Richard I","publisher":"Wikisource (Dictionary of National Biography)","quote":"born at Oxford 8 Sept. 1157"},{"url":"https://en.wikipedia.org/wiki/Richard_I_of_England","title":"Richard I of England - Wikipedia","publisher":"Wikipedia","quote":"8 September 1157 Beaumont Palace, Oxford, England"}]},"death":{"date":"1199-04-06","place":"Chalus, Aquitaine","precision":"day","citations":[{"url":"https://en.wikisource.org/wiki/Dictionary_of_National_Biography,_1885-1900/Richard_I","title":"Dictionary of National Biography, 1885-1900/Richard I","publisher":"Wikisource (Dictiona ublisher":"Wikipedia","quote":"Edward I (17/18 June 1239 – 7 July 1307), also known as Edward Longshanks and the Hammer of the Scots"}]},"death":{"date":"1307-07-07","place":"Burgh by Sands, Cumberland","precision":"day","citations":[{"url":"https://en.wikipedia.org/wiki/Edward_I_of_England","title":"Edward I of England","publisher":"Wikipedia","quote":"Died: 7 July 1307 (aged 68) [at] Burgh by Sands, Cumberland, England"},{"url":"https://www.historic-uk.com/HistoryUK/HistoryofEngland/Edward-I/","title":"Edward I","publisher":"Historic UK","quote":"Edward I continued to reign until 7th July 1307, when on his way to engage in conflict with Robert the Bruce in Scotland, he died."}]},"parents":["henry-iii","eleanor-provence"],"spouses":[{"id":"eleanor-castile","married":"1254-11-01","ended":"1290-11-28","endedBy":"death","citations":[{"url":"https://en.wikipedia.org/wiki/Edward_I_of_England","title":"Edward I of England","publisher":"Wikipedia","quote":"They were married on 1 November 1254 in the Abbey of Santa María la Real de Las Huelgas in Castile."},{"url":"https://en.wikisource.org/wiki/Dictionary_of_National_Biography,_1885-1900/Edward_I","title":"Dictionary of National Biography, 1885-1900/Edward I","publisher":"Wikisource (Dictionary of National Biography, 1885–1900)","quote":"He was married to Eleanor at the end of October in the monastery of Las Huelgas"}]},{"id":"margaret-france","married":"1299-09-10","ended":"1307-07-07","endedBy":"death","citations":[{"url":"https://en.wikipedia.org/wiki/Margaret_of_France,_Queen_of_England","title":"Margaret of France, Queen of England","publisher":"Wikipedia","quote":"Edward was then 60 years old, at least 40 years older than his bride"}]}],"titles":[{"title":"King of England","from":"1272","to":"1307","citations":[{"url":"https://www.historic-uk.com/HistoryUK/HistoryofEngland/Edward-I/","title":"Edward I","publisher":"Historic UK","quote":"reigned as King of England from 1272 until 1307"}]}],"summary":"Edward I, known as Longshanks for his height and as the Hammer of the Scots, was the eldest son of Henry III and Eleanor of Provence, and reigned from 1272 to 1307. He is credited with restoring royal authority after his father's troubled reign and with establishing Parliament as a permanent institution, and was regarded by the Victorian Dictionary of National Biography as a lawgiver by instinct. He died at Burgh by Sands in Cumberland on 7 July 1307 while marching against Robert the Bruce.","citations":[{"url":"https://en.wikipedia.org/wiki/Edward_I_of_England","title":"Edward I of England","publisher":"Wikipedia","quote":"Edward is credited with many accomplishments, including restoring royal authority after the reign of Henry III and establishing Parliament as a permanent institution"},{"url":"https://en.wikisource.org/wiki/Dictionary_of_National_Biography,_1885-1900/Edward_I","title":"Dictionary of National Biography, 1885-1900/Edward I","publisher":"Wikisource (Dictionary of National Biography, 1885–1900)","quote":"He was 'by instinct a lawgiver'"},{"url":"https://www.historic-uk.com/HistoryUK/HistoryofEngland/Edward-I/","title":"Edward I","publisher":"Historic UK","quote":"'Longshanks', meaning 'long legs'"}],"uncertain":"Sources give his birth as 17/18 June 1239 without resolving the day; the DNB states \"17-18 June 1239\" and Wikipedia \"17/18 June 1239\". His marriage to Eleanor of Castile is dated 1 November 1254 by Wikipedia but placed \"at the end of October\" by the DNB."},{"id":"eleanor-castile","name":"Eleanor of Castile","fullName":null,"epithet":null,"house":"Ivrea","monarch":false,"reign":null,"birth":{"date":"1241","place":"Burgos, Castile","precision":"year","citations":[{"url":"https://en.wikipedia.org/wiki/Eleanor_of_Castile","title":"Eleanor of Castile","publisher":"Wikipedia","quote":"Eleanor was born in Burgos to Ferdinand III of Castile and Joan, Countess of Ponthieu."},{"url":"https://www.encyclopedia.com/women/encyclopedias-almanacs-transcripts-and-maps/ f Castile died at the age of 49 at Harby in Nottinghamshire, and the king lost his most devoted and trusted partner."}],"uncertain":"Sources disagree on the number of her children: Historic UK gives sixteen while Encyclopedia.com states \"She gave birth to 15 in all\". The wedding is dated 1 November 1254 by Wikipedia but placed at the end of October 1254 by the Dictionary of National Biography."},{"id":"margaret-france","name":"Margaret of France","fullName":null,"epithet":null,"house":"Capet","monarch":false,"reign":null,"birth":{"date":"1279","place":"Paris","precision":"circa","citations":[{"url":"https://en.wikipedia.org/wiki/Margaret_of_France,_Queen_of_England","title":"Margaret of France, Queen of England","publisher":"Wikipedia","quote":"Margaret's year of birth is variously given as 1277, 1279, and 1282"}]},"death":{"date":"1318-02-14","place":"Marlborough Castle, Wiltshire","precision":"day","citations":[{"url":"https://en.wikipedia.org/wiki/Margaret_of_France,_Queen_of_England","title":"Margaret of France, Queen of England","publisher":"Wikipedia","quote":"14 February 1318 (aged 38–39)"}]},"parents":[],"spouses":[{"id":"edward-i","married":"1299-09-10","ended":"1307-07-07","endedBy":"death","citations":[{"url":"https://en.wikipedia.org/wiki/Margaret_of_France,_Queen_of_England","title":"Margaret of France, Queen of England","publisher":"Wikipedia","quote":"Edward was then 60 years old, at least 40 years older than his bride"}]}],"titles":[],"summary":"Margaret of France, daughter of Philip III of France and Maria of Brabant, became the second wife of Edward I of England when they married at Canterbury in September 1299. Edward was around sixty and Margaret at least forty years his junior, yet the marriage was reportedly a contented one. She bore Edward two sons who survived to adulthood, Thomas of Brotherton and Edmund of Woodstock, and outlived him by eleven years, dying at Marlborough Castle in 1318.","citations":[{"url":"https://en.wikipedia.org/wiki/
