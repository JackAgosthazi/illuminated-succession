,"publisher":"Wikipedia","quote":"After Isabella's death in 1392, Langley married his second cousin once removed, Joan Holland"}]}],"titles":[{"title":"Duke of York","from":"1385-08-06","to":"1402-08-01","citations":[{"url":"https://en.wikipedia.org/wiki/Edmund_of_Langley,_1st_Duke_of_York","title":"Edmund of Langley, 1st Duke of York","publisher":"Wikipedia","quote":"On 6 August 1385, he was elevated to Duke of York."}]}],"summary":"Edmund of Langley, fourth surviving son of Edward III and Philippa of Hainault, was born at Kings Langley in Hertfordshire in 1341 and took his name from his birthplace. Elevated to Duke of York in 1385, he was a comparatively unambitious figure who served his brothers and his nephew Richard II without seeking dominance himself. His first marriage, to Isabella of Castile, produced three children, while his second, to Joan Holland, was childless. He died at Epworth in 1402, and his descendants became the House of York that contested the throne in the Wars of the Roses.","citations":[{"url":"https://en.wikipedia.org/wiki/Edmund_of_Langley,_1st_Duke_of_York","title":"Edmund of Langley, 1st Duke of York","publisher":"Wikipedia","quote":"Edward of Norwich, 2nd Duke of York (c. 1373 – 25 October 1415)"},{"url":"https://en.wikipedia.org/wiki/Edmund_of_Langley,_1st_Duke_of_York","title":"Edmund of Langley, 1st Duke of York","publisher":"Wikipedia","quote":"Richard of Conisburgh, 3rd Earl of Cambridge (c. 20 July 1385 – 5 August 1415)"}],"uncertain":"The marriage years, 1372 to Isabella of Castile and 1393 to Joan Holland, are taken from the article's infobox rather than from a narrative sentence giving a full date; the body text confirms only that the second marriage followed \"Isabella's death in 1392\"."},{"id":"thomas-woodstock","name":"Thomas of Woodstock","fullName":"Thomas of Woodstock, 1st Duke of Gloucester","epithet":null,"house":"Plantagenet","monarch":false,"reign":null,"birth":{"date":"1355-01-07","place":"Woodstock Palace, Oxfordshire","precision":"day","citations":[{"url":"https://en.wikipedia.org/wiki/Thomas_of_Woodstock,_1st_Duke_of_Gloucester","title":"Thomas of Woodstock, 1st Duke of Gloucester","publisher":"Wikipedia","quote":"Born: 7 January 1355 Woodstock Palace, England"},{"url":"https://en.wikipedia.org/wiki/Philippa_of_Hainault","title":"Philippa of Hainault","publisher":"Wikipedia","quote":"Thomas, 1st Duke of Gloucester (7 January 1355)"}]},"death":{"date":"1397-09","place":"Pale of Calais","precision":"month","citations":[{"url":"https://en.wikipedia.org/wiki/Thomas_of_Woodstock,_1st_Duke_of_Gloucester","title":"Thomas of Woodstock, 1st Duke of Gloucester","publisher":"Wikipedia","quote":"Died: 8 or 9 September 1397 (aged 42) Pale of Calais"}]},"parents":["edward-iii","philippa-hainault"],"spouses":[{"id":"eleanor-bohun","married":"1374","ended":"1397-09","endedBy":"death","citations":[{"url":"https://en.wikipedia.org/wiki/Thomas_of_Woodstock,_1st_Duke_of_Gloucester","title":"Thomas of Woodstock, 1st Duke of Gloucester","publisher":"Wikipedia","quote":"He married Eleanor de Bohun in 1374"}]}],"titles":[{"title":"Duke of Gloucester","from":"1385","to":"1397","citations":[{"url":"https://en.wikipedia.org/wiki/Thomas_of_Woodstock,_1st_Duke_of_Gloucester","title":"Thomas of Woodstock, 1st Duke of Gloucester","publisher":"Wikipedia","quote":"In 1385, he received the title Duke of Aumale, and at about the same time was created Duke of Gloucester."}]},{"title":"Duke of Aumale","from":"1385","to":"1397","citations":[{"url":"https://en.wikipedia.org/wiki/Thomas_of_Woodstock,_1st_Duke_of_Gloucester","title":"Thomas of Woodstock, 1st Duke of Gloucester","publisher":"Wikipedia","quote":"In 1385, he received the title Duke of Aumale, and at about the same time was created Duke of Gloucester."}]}],"summary":"Thomas of Woodstock, the youngest son of Edward III and Philippa of Hainault, was born at Woodstock Palace in 1355 and created Duke of Gloucester in 1385. He became the leading figure among the Lords Appellant who curbed the power of his nephew Richard II in the late 1380s, an opposition the king never forgave. In September 1397, during Richard's reassertion of authority, Thomas died at Calais, according to the traditional account smothered between two feather beds. His marriage to Eleanor de Bohun produced four children.","citations":[{"url":"https://en.wikipedia.org/wiki/Thomas_of_Woodstock,_1st_Duke_of_Gloucester","title":"Thomas of Woodstock, 1st Duke of Gloucester","publisher":"Wikipedia","quote":"On 9 September 1397, he was murdered by being smothered between two feather beds, probably by a group of men led by Thomas de Mowbray, 1st Duke of Norfolk, and the knight Sir Nicholas Colfox, presumably on behalf of Richard II"},{"url":"https://en.wikipedia.org/wiki/Thomas_of_Woodstock,_1st_Duke_of_Gloucester","title":"Thomas of Woodstock, 1st Duke of Gloucester","publisher":"Wikipedia","quote":"Thomas of Woodstock and his wife Eleanor had issue as follows: Humphrey, 2nd Earl of Buckingham... Anne of Gloucester... Joan... Isabel"}],"uncertain":"His day of death is not fixed, the infobox giving \"8 or 9 September 1397\" while the body text asserts 9 September, so only the month is recorded here. The agency behind his death is also hedged by the source itself, which says he was murdered \"probably\" by men led by Thomas de Mowbray and \"presumably on behalf of Richard II\". His marriage year is inconsistent across sources, given as 1374 in the body text and 1376 elsewhere."},{"id":"mary-waltham","name":"Mary of Waltham","fullName":null,"epithet":null,"house":"Plantagenet","monarch":false,"reign":null,"birth":{"date":"1344-10-10","place":"Waltham, Hampshire","precision":"day","citations":[{"url":"https://en.wikipedia.org/wiki/Mary_of_Waltham","title":"Mary of Waltham","publisher":"Wikipedia","quote":"10 October 1344"},{"url":"https://en.wikipedia.org/wiki/Philippa_of_Hainault","title":"Philippa of Hainault","publisher":"Wikipedia","quote":"Mary (10 October 1344)"}]},"death":{"date":"1361-09","place":null,"precision":"month","citations":[{"url":"https://en.wikipedia.org/wiki/Mary_of_Waltham","title":"Mary of Waltham","publisher":"Wikipedia","quote":"a lethargic disease from which it was impossible to rouse her"}]},"parents":["edward-iii","philippa-hainault"],"spouses":[{"id":"john-iv-brittany","married":"1361-07-03","ended":"1361-09","endedBy":"death","citations":[{"url":"https://en.wikipedia.org/wiki/Mary_of_Waltham","title":"Mary of Waltham","publisher":"Wikipedia","quote":"around 3 July 1361"}]}],"titles":[],"summary":"Mary of Waltham was a daughter of Edward III and Philippa of Hainault, born at Waltham in Hampshire in 1344. In the summer of 1361, aged sixteen, she married John IV, Duke of Brittany, at Woodstock Palace, but died only weeks later of what was described as a lethargic disease, never having travelled to Brittany. She was buried at Abingdon Abbey and left no children.","citations":[{"url":"https://en.wikipedia.org/wiki/Mary_of_Waltham","title":"Mary of Waltham","publisher":"Wikipedia","quote":"They had no children."},{"url":"https://en.wikipedia.org/wiki/Mary_of_Waltham","title":"Mary of Waltham","publisher":"Wikipedia","quote":"a lethargic disease from which it was impossible to rouse her"}],"uncertain":"Her exact date of death is not attested; the source indicates only that she died shortly before 13 September 1361, so the month is recorded here. Her marriage date is likewise approximate, the source giving \"around 3 July 1361\", and no place of death was stated."},{"id":"margaret-england-1346","name":"Margaret of England","fullName":"Margaret, Countess of Pembroke","epithet":null,"house":"Plantagenet","monarch":false,"reign":null,"birth":{"date":"1346-07-20","place":"Windsor, Berkshire","precision":"day","citations":[{"url":"https://en.wikipedia.org/wiki/Margaret,_Countess_of_Pembroke","title":"Margaret, Countess of Pembroke","publisher":"Wikipedia","quote":"20 July 1346"},{"url":"https://en.wikipedia.org/wiki/Philippa_of_Hainault","title":"Philippa of Hainault","publisher":"Wikipedia","quote":"Margaret (20 July 1346)"}]},"death":{"date":"1361-10-01/1361-12-25","place":null,"precision":"range","citations":[{"url":"https://en.wikipedia.org/wiki/Margaret,_Countess_of_Pembroke","title":"Margaret, Countess of Pembroke","publisher":"Wikipedia","quote":"last mentioned as living on 1 October 1361"}]},"parents":["edward-iii","philippa-hainault"],"spouses":[{"id":"john-hastings-pembroke","married":"1359-05-13","ended":"1361","endedBy":"death","citations":[{"url":"https://en.wikipedia.org/wiki/Margaret,_Countess_of_Pembroke","title":"Margaret, Countess of Pembroke","publisher":"Wikipedia","quote":"13 May 1359"}]}],"titles":[],"summary":"Margaret of England, sometimes called Margaret of Windsor, was a younger daughter of Edward III and Philippa of Hainault, born at Windsor in July 1346. She married John Hastings, 2nd Earl of Pembroke, at Reading in May 1359, in the same week that her brother John of Gaunt married Blanche of Lancaster; the pair had been raised together beforehand. She died late in 1361 at about fifteen, without children, and was buried at Abingdon Abbey.","citations":[{"url":"https://en.wikipedia.org/wiki/Margaret,_Countess_of_Pembroke","title":"Margaret, Countess of Pembroke","publisher":"Wikipedia","quote":"last mentioned as living on 1 October 1361"},{"url":"https://en.wikipedia.org/wiki/Margaret,_Countess_of_Pembroke","title":"Margaret, Countess of Pembroke","publisher":"Wikipedia","quote":"20 July 1346"}],"uncertain":"Her date of death is known only within a window; the source records that she was \"last mentioned as living on 1 October 1361\" and places her death between about 1 October and 25 December 1361, so only the year is recorded here."},{"id":"richard-ii","name":"Richard II","fullName":"Richard of Bordeaux","house":"Plantagenet","monarch":true,"reign":{"start":"1377-06-21","end":"1399-09-29","citations":[{"url":"https://en.wikipedia.org/wiki/Richard_II_of_England","title":"Richard II of England - Wikipedia","publisher":"Wikipedia","quote":"Reign: 21 June 1377 – 29 September 1399"},{"url":"https://en.wikisource.org/wiki/Dictionary_of_National_Biography,_1885-1900/Richard_II","title":"Dictionary of National Biography, 1885-1900/Richard II","publisher":"Wikisource (Dictionary of National Biography)","quote":"The lords of parliament assembled next day round a vacant throne in Westminster Hall, accepted his resignation, and decided that the thirty-three counts of accusation drawn up by the committee formed sufficient grounds for his deposition."}]},"birth":{"date":"1367-01-06","place":"Bordeaux","precision":"day","citations":[{"url":"https://en.wikisource.org/wiki/Dictionary_of_National_Biography,_1885-1900/Richard_II","title":"Dictionary of National Biography, 1885-1900/Richard II","publisher":"Wikisource (Dictionary of National Biography)","quote":"He was born in the abbey of St. Andrew at Bordeaux on 6 Jan. 1367, and was baptised in the cathedral three days later by the archbishop."},{"url":"https://en.wikipedia.org/wiki/Richard_II_of_England","title":"Richard II of England - Wikipedia","publisher":"Wikipedia","quote":"6 January 1367 Bordeaux, France"}]},"death":{"date":"1400-02-14","place":"Pontefract Castle","precision":"day","citations":[{"url":"https://en.wikisource.org/wiki/Dictionary_of_National_Biography,_1885-1900/Richard_II","title":"Dictionary of National Biography, 1885-1900/Richard II","publisher":"Wikisource (Dictionary of National Biography)","quote":"The official version seems to have been that, on hearing of the death of his supporters, Richard declined food and drink, and gradually pined away 'for-hungered'"},{"url":"https://en.wikipedia.org/wiki/Richard_II_of_England","title":"Richard II of England - Wikipedia","publisher":"Wikipedia","quote":"He is thought to have starved to death in captivity...although there is some question over the date and manner of his death."}]},"parents":["edward-black-prince","joan-plantagenet"],"spouses":[{"id":"anne-bohemia","married":"1382-01-20","ended":"1394-06-07","endedBy":"death","citations":[{"url":"https://en.wikipedia.org/wiki/Anne_of_Bohemia","title":"Anne of Bohemia - Wikipedia","publisher":"Wikipedia","quote":"20 January 1382"}]},{"id":"isabella-valois","married":"1396-10-31","ended":"1400-02-14","endedBy":"death","citations":[{"url":"https://en.wikipedia.org/wiki/Isabella_of_Valois","title":"Isabella of Valois - Wikipedia","publisher":"Wikipedia","quote":"the wedding ceremony was performed on 31 October 1396"}]}],"summary":"Richard II was born at Bordeaux on 6 January 1367, the younger son of Edward, the Black Prince, and Joan of Kent, and succeeded his grandfather Edward III as king on 21 June 1377. He married Anne of Bohemia in 1382 and, after her death in 1394, Isabella of Valois in 1396, but had no children by either. Deposed by his cousin Henry Bolingbroke in September 1399, he died in captivity at Pontefract Castle on 14 February 1400.","citations":[{"url":"https://en.wikisource.org/wiki/Dictionary_of_National_Biography,_1885-1900/Richard_II","title":"Dictionary of National Biography, 1885-1900/Richard II","publisher":"Wikisource (Dictionary of National Biography)","quote":"He was born in the abbey of St. Andrew at Bordeaux on 6 Jan. 1367, and was baptised in the cathedral three days later by the archbishop."},{"url":"https://en.wikipedia.org/wiki/Richard_II_of_England","title":"Richard II of England - Wikipedia","publisher":"Wikipedia","quote":"Reign: 21 June 1377 – 29 September 1399"}],"uncertain":"Chroniclers disagree on the manner of Richard's death at Pontefract: some accounts hold he refused food and starved himself in despair, others that he was deliberately starved by his captors, and a later tradition alleges violent murder. The exact circumstances are unresolved."},{"id":"henry-iv","name":"Henry IV","fullName":"Henry Bolingbroke","epithet":"Bolingbroke","house":"Lancaster","monarch":true,"reign":{"start":"1399-09-30","end":"1413-03-20","citations":[{"url":"https://en.wikipedia.org/wiki/Henry_IV_of_England","title":"Henry IV of England - Wikipedia","publisher":"Wikipedia","quote":"30 September 1399 – 20 March 1413"},{"url":"https://en.wikisource.org/wiki/Dictionary_of_National_Biography,_1885-1900/Henry_IV","title":"Dictionary of National Biography, 1885-1900/Henry IV","publisher":"Wikisource (Dictionary of National Biography)","quote":"crowned with extraordinary splendour by Arundel"}]},"birth":{"date":"1367-04-03","place":"Bolingbroke Castle, Lincolnshire","precision":"day","citations":[{"url":"https://en.wikisource.org/wiki/Dictionary_of_National_Biography,_1885-1900/Henry_IV","title":"Dictionary of National Biography, 1885-1900/Henry IV","publisher":"Wikisource (Dictionary of National Biography)","quote":"born on 3 April 1367...at his father's castle of Bolingbroke, near Spilsby, Lincolnshire"}]},"death":{"date":"1413-03-20","place":"Westminster","precision":"day","citations":[{"url":"https://en.wikisource.org/wiki/Dictionary_of_National_Biography,_1885-1900/Henry_IV","title":"Dictionary of National Biography, 1885-1900/Henry IV","publisher":"Wikisource (Dictionary of National Biography)","quote":"died in the Jerusalem Chamber"},{"url":"https://en.wikipedia.org/wiki/Henry_IV_of_England","title":"Henry IV of England - Wikipedia","publisher":"Wikipedia","quote":"Died 20 March 1413 (aged 45) in the Jerusalem Chamber, Westminster"}]},"parents":["john-of-gaunt","blanche-lancaster"],"spouses":[{"id":"mary-bohun","married":"1381-02-05","ended":"1394-06-04","endedBy":"death","citations":[{"url":"https://en.wikipedia.org/wiki/Mary_de_Bohun","title":"Mary de Bohun - Wikipedia","publisher":"Wikipedia","quote":"Mary married Henry—then known as Bolingbroke—on 5 February 1381."}]},{"id":"joan-navarre","married":"1403-02-07","ended":"1413-03-20","endedBy":"death","citations":[{"url":"https://en.wikisource.org/wiki/Dictionary_of_National_Biography,_1885-1900/Henry_IV","title":"Dictionary of National Biography, 1885-1900/Henry IV","publisher":"Wikisource (Dictionary of National Biography)","quote":"7 Feb. 1403"},{"url":"https://en.wikipedia.org/wiki/Joan_of_Navarre,_Queen_of_England","title":"Joan of Navarre, Queen of England - Wikipedia","publisher":"Wikipedia","quote":"On 7 February 1403, Joan married Henry IV at Winchester Cathedral"}]}],"summary":"Henry IV, known as Henry Bolingbroke, was born on 3 April 1367 at Bolingbroke Castle in Lincolnshire, the son of John of Gaunt and Blanche of Lancaster. He married Mary de Bohun in 1381, with whom he had six children before her death in 1394, and after forcing the deposition of his cousin Richard II he was crowned king on 13 October 1399. In 1403 he took as his second wife Joan of Navarre, widow of the Duke of Brittany. He died at Westminster on 20 March 1413.","citations":[{"url":"https://en.wikisource.org/wiki/Dictionary_of_National_Biography,_1885-1900/Henry_IV","title":"Dictionary of National Biography, 1885-1900/Henry IV","publisher":"Wikisource (Dictionary of National Biography)","quote":"eldest surviving son of John of Gaunt...by his first wife, Blanche, daughter and heiress of Henry, duke of Lancaster"},{"url":"https://en.wikipedia.org/wiki/Henry_IV_of_England","title":"Henry IV of England - Wikipedia","publisher":"Wikipedia","quote":"Son of John of Gaunt, Duke of Lancaster and Blanche of Lancaster"}]},{"id":"henry-v","name":"Henry V","fullName":"Henry of Monmouth","epithet":"Henry of Monmouth","house":"Lancaster","monarch":true,"reign":{"start":"1413-03-21","end":"1422-08-31","citations":[{"url":"https://en.wikipedia.org/wiki/Henry_V_of_England","title":"Henry V of England - Wikipedia","publisher":"Wikipedia","quote":"21 March 1413 – 31 August 1422"},{"url":"https://en.wikisource.org/wiki/Dictionary_of_National_Biography,_1885-1900/Henry_V","title":"Dictionary of National Biography, 1885-1900/Henry V","publisher":"Wikisource (Dictionary of National Biography)","quote":"On 20 March 1413 Henry IV died, and his son succeeded as king. On Passion Sunday (9 April) he was crowned at Westminster"}]},"birth":{"date":"1386-09-16","place":"Monmouth","precision":"day","citations":[{"url":"https://en.wikipedia.org/wiki/Henry_V_of_England","title":"Henry V of England - Wikipedia","publisher":"Wikipedia","quote":"Henry was born on 16 September 1386 in the tower above the gatehouse of Monmouth Castle in Monmouthshire."},{"url":"https://en.wikisource.org/wiki/Dictionary_of_National_Biography,_1885-1900/Henry_V","title":"Dictionary of National Biography, 1885-1900/Henry V","publisher":"Wikisource (Dictionary of National Biography)","quote":"born at Monmouth, according to the most commonly accepted date, on 9 Aug. 1387"}]},"death":{"date":"1422-08-31","place":"Bois de Vincennes","precision":"day","citations":[{"url":"https://en.wikisource.org/wiki/Dictionary_of_National_Biography,_1885-1900/Henry_V","title":"Dictionary of National Biography, 1885-1900/Henry V","publisher":"Wikisource (Dictionary of National Biography)","quote":"he breathed his last about two o'clock on the morning of 31 Aug. 1422"},{"url":"https://en.wikipedia.org/wiki/Henry_V_of_England","title":"Henry V of England - Wikipedia","publisher":"Wikipedia","quote":"Henry died in the early hours of 31 August 1422, aged 35"}]},"parents":["henry-iv","mary-bohun"],"spouses":[{"id":"catherine-valois","married":"1420-06-02","ended":"1422-08-31","endedBy":"death","citations":[{"url":"https://en.wikisource.org/wiki/Dictionary_of_National_Biography,_1885-1900/Henry_V","title":"Dictionary of National Biography, 1885-1900/Henry V","publisher":"Wikisource (Dictionary of National Biography)","quote":"Henry and Catherine were married in the church of St. John at Troyes on Trinity Sunday, 2 June"},{"url":"https://en.wikipedia.org/wiki/Henry_V_of_England","title":"Henry V of England - Wikipedia","publisher":"Wikipedia","quote":"The wedding between Henry and Catherine took place at Troyes Cathedral on 2 June 1420."}]}],"summary":"Henry V, sometimes called Henry of Monmouth, was born at Monmouth Castle, the eldest son of Henry IV and Mary de Bohun; sources disagree on whether the year was 1386 or 1387. He succeeded his father on 20 March 1413 and was crowned at Westminster on 9 April 1413. Under the Treaty of Troyes he married Catherine of Valois, daughter of Charles VI of France, at Troyes on 2 June 1420; their son, the future Henry VI, was born at Windsor on 6 December 1421. Henry V died at the Bois de Vincennes, near Paris, on 31 August 1422.","citations":[{"url":"https://en.wikisource.org/wiki/Dictionary_of_National_Biography,_1885-1900/Henry_V","title":"Dictionary of National Biography, 1885-1900/Henry V","publisher":"Wikisource (Dictionary of National Biography)","quote":"eldest son of Henry IV, by his first wife, Mary, second daughter and coheiress of Humphrey de Bohun"},{"url":"https://en.wikipedia.org/wiki/Henry_V_of_England","title":"Henry V of England - Wikipedia","publisher":"Wikipedia","quote":"her infant son, born at Windsor on 6 Dec"}],"uncertain":"Henry V's year of birth is disputed: the Dictionary of National Biography gives 9 August 1387 as the most commonly accepted date, while modern scholarship (reflected on Wikipedia) favours 16 September 1386. The dataset follows the modern consensus but the dispute is unresolved in the sources."},{"id":"anne-bohemia","name":"Anne of Bohemia","house":"Luxembourg","monarch":false,"reign":null,"birth":{"date":"1366-05-11","place":"Prague","precision":"day","citations":[{"url":"https://en.wikipedia.org/wiki/Anne_of_Bohemia","title":"Anne of Bohemia - Wikipedia","publisher":"Wikipedia","quote":"11 May 1366"}]},"death":{"date":"1394-06-07","place":"Sheen Palace","precision":"day","citations":[{"url":"https://en.wikipedia.org/wiki/Anne_of_Bohemia","title":"Anne of Bohemia - Wikipedia","publisher":"Wikipedia","quote":"7 June 1394 (aged 28)"}]},"parents":[],"spouses":[{"id":"richard-ii","married":"1382-01-20","ended":"1394-06-07","endedBy":"death","citations":[{"url":"https://en.wikipedia.org/wiki/Anne_of_Bohemia","title":"Anne of Bohemia - Wikipedia","publisher":"Wikipedia","quote":"20 January 1382"}]}],"summary":"Anne of Bohemia was born in Prague on 11 May 1366, daughter of the Holy Roman Emperor Charles IV and Elizabeth of Pomerania. She married Richard II of England on 20 January 1382 at Westminster Abbey, becoming his queen consort, and died childless of plague at Sheen Palace on 7 June 1394, aged 28.","citations":[{"url":"https://en.wikipedia.org/wiki/Anne_of_Bohemia","title":"Anne of Bohemia - Wikipedia","publisher":"Wikipedia","quote":"Charles IV, Holy Roman Emperor"},{"url":"https://en.wikipedia.org/wiki/Anne_of_Bohemia","title":"Anne of Bohemia - Wikipedia","publisher":"Wikipedia","quote":"believed to have been caused by plague"}]},{"id":"isabella-valois","name":"Isabella of Valois","house":"Valois","monarch":false,"reign":null,"birth":{"date":"1389-11-09","place":null,"precision":"day","citations":[{"url":"https://en.wikipedia.org/wiki/Isabella_of_Valois","title":"Isabella of Valois - Wikipedia","publisher":"Wikipedia","quote":"9 November 1389"}]},"death":{"date":"1409-09-13","place":"Blois","precision":"day","citations":[{"url":"https://en.wikipedia.org/wiki/Isabella_of_Valois","title":"Isabella of Valois - Wikipedia","publisher":"Wikipedia","quote":"13 September 1409 (aged 19)"}]},"parents":[],"spouses":[{"id":"richard-ii","married":"1396-10-31","ended":"1400-02-14","endedBy":"death","citations":[{"url":"https://en.wikipedia.org/wiki/Isabella_of_Valois","title":"Isabella of Valois - Wikipedia","publisher":"Wikipedia","quote":"the wedding ceremony was performed on 31 October 1396"}]}],"summary":"Isabella of Valois, daughter of Charles VI of France and Isabeau of Bavaria, was born on 9 November 1389. She married Richard II of England at Calais on 31 October 1396 as a child of six, becoming queen consort of England, though the marriage was never consummated because of her age and Richard's death in 1400. She later married Charles of Orleans and died in childbirth at Blois on 13 September 1409.","citations":[{"url":"https://en.wikipedia.org/wiki/Isabella_of_Valois","title":"Isabella of Valois - Wikipedia","publisher":"Wikipedia","quote":"Charles VI, King of France"},{"url":"https://en.wikipedia.org/wiki/Isabella_of_Valois","title":"Isabella of Valois - Wikipedia","publisher":"Wikipedia","quote":"the marriage was never sexually consummated"}]},{"id":"mary-bohun","name":"Mary de Bohun","house":"Bohun","monarch":false,"reign":null,"birth":{"date":"1369","place":null,"precision":"circa","citations":[{"url":"https://en.wikipedia.org/wiki/Mary_de_Bohun","title":"Mary de Bohun - Wikipedia","publisher":"Wikipedia","quote":"c. 1369/70"}]},"death":{"date":"1394-06-04","place":"Peterborough Castle","precision":"day","citations":[{"url":"https://en.wikipedia.org/wiki/Mary_de_Bohun","title":"Mary de Bohun - Wikipedia","publisher":"Wikipedia","quote":"died at Peterborough Castle, giving birth to her daughter Philippa"}]},"parents":[],"spouses":[{"id":"henry-iv","married":"1381-02-05","ended":"1394-06-04","endedBy":"death","citations":[{"url":"https://en.wikipedia.org/wiki/Mary_de_Bohun","title":"Mary de Bohun - Wikipedia","publisher":"Wikipedia","quote":"Mary married Henry—then known as Bolingbroke—on 5 February 1381."}]}],"summary":"Mary de Bohun, born about 1369/70, was a daughter of Humphrey de Bohun, 7th Earl of Hereford, and Joan FitzAlan. She married Henry Bolingbroke, later Henry IV, on 5 February 1381, and bore him six children including the future Henry V. She died at Peterborough Castle on 4 June 1394 while giving birth to her last child, Philippa, before her husband became king.","citations":[{"url":"https://en.wikipedia.org/wiki/Mary_de_Bohun","title":"Mary de Bohun - Wikipedia","publisher":"Wikipedia","quote":"Humphrey de Bohun, 7th Earl of Hereford"},{"url":"https://en.wikipedia.org/wiki/Mary_de_Bohun","title":"Mary de Bohun -
