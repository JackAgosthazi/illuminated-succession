Mortimer!' Mortimer was speedily executed as a traitor."}]},{"id":"lnk-059","from":{"kind":"person","id":"isabella-france"},"to":{"kind":"event","id":"evt-1327-edward-ii-death"},"relation":"death-precipitated","claim":"According to the traditional account, fearing her deposed husband endangered her rule, Isabella had his gaolers treat him with severity and procured his death in September 1327; modern historians dispute both the manner and the fact of his death.","strength":"attributed","citations":[{"url":"https://en.wikisource.org/wiki/Dictionary_of_National_Biography,_1885-1900/Isabella_of_France_(1292-1358)","title":"Dictionary of National Biography, 1885-1900/Isabella of France (1292-1358)","publisher":"Wikisource (Dictionary of National Biography, 1885-1900)","quote":"she urged on his gaolers to treat him with the utmost severity, and in September 1327 procured his murder"}]},{"id":"lnk-060","from":{"kind":"person","id":"edward-i"},"to":{"kind":"event","id":"evt-1291-great-cause"},"relation":"overlordship-asserted","claim":"Edward I made his arbitration of the vacant Scottish succession conditional on the competitors and Scottish leaders first recognising his feudal overlordship of Scotland.","strength":"explicit","citations":[{"url":"https://en.wikipedia.org/wiki/Competitors_for_the_Crown_of_Scotland","title":"Competitors for the Crown of Scotland","publisher":"Wikipedia","quote":"Edward demanded in May 1291 that his claim of feudal overlordship of Scotland be recognised before he would step in and act as arbiter."}]},{"id":"lnk-061","from":{"kind":"person","id":"edward-i"},"to":{"kind":"event","id":"evt-1305-wallace-execution"},"relation":"treason-law-invoked","claim":"Edward I has been accused of abusing treason law against his enemies in Scotland and Wales, most notably in his execution of William Wallace in 1305.","strength":"attributed","citations":[{"url":"https://www.historyhit.com/a-history-of-treason-in-documents/","title":"A History of Treason in 5 Documents","publisher":"History Hit","quote":"Edward's grandfather, Edward I, had been accused of abusing treason laws to persecute his enemies in Scotland and Wales, perhaps most notably by executing William Wallace in 1305."}]},{"id":"lnk-062","from":{"kind":"person","id":"edward-i"},"to":{"kind":"event","id":"evt-1284-statute-rhuddlan"},"relation":"conquest-consolidated","claim":"After Dafydd ap Gruffudd's rebellion against the terms Edward I had imposed at Aberconwy escalated into a war that killed Llywelyn ap Gruffudd, Edward completed the conquest of Wales and issued the Statute of Rhuddlan annexing the principality to the English crown by law.","strength":"explicit","citations":[{"url":"https://en.wikipedia.org/wiki/Treaty_of_Aberconwy","title":"Treaty of Aberconwy","publisher":"Wikipedia","quote":"Llywelyn's brother Dafydd was discontented with the reward he had received from Edward under the treaty. As a consequence, he rebelled against Edward in 1282."},{"url":"https://en.wikipedia.org/wiki/Statute_of_Rhuddlan","title":"Statute of Rhuddlan","publisher":"Wikipedia","quote":"The statute followed the Conquest of Wales by Edward I and the killing of the last Welsh prince to rule the whole Principality, Llywelyn ap Gruffudd in 1282."}]},{"id":"lnk-063","from":{"kind":"person","id":"edward-i"},"to":{"kind":"event","id":"evt-1295-model-parliament"},"relation":"war-financing-required","claim":"Edward I's paramount goal in summoning the Model Parliament of 1295 was to raise funds for his wars against France and Scotland and to counter the insurgency in Wales.","strength":"explicit","citations":[{"url":"https://en.wikipedia.org/wiki/Parliament_of_1295","title":"Parliament of 1295","publisher":"Wikipedia","quote":"Edward's paramount goal in summoning the parliament was to raise funds for his wars, specifically the planned campaigns against the French and the Scots for the forthcoming year and countering an insurgency in Wales."}]},{"id":"lnk-064","from":{"kind":"person","id":"edward-i"},"to":{"kind":"event","id":"evt-1290-expulsion-jews"},"relation":"tax-grant-secured","claim":"Contemporary chronicles closely link Edward I's 1290 expulsion of the Jews to Parliament's unusually large tax grant that year, suggesting the expulsion was the price of the Commons' unprecedented subsidy.","strength":"attributed","citations":[{"url":"https://en.wikipedia.org/wiki/Edict_of_Expulsion","title":"Edict of Expulsion","publisher":"Wikipedia","quote":"The link between these seems certain given the evidence of contemporaneous chronicles and the speed at which orders to expel the Jews of England were made, possibly after an agreement was reached."}]},{"id":"lnk-065","from":{"kind":"person","id":"edward-black-prince"},"to":{"kind":"event","id":"evt-1346-crecy"},"relation":"valor-proven","claim":"The sixteen-year-old Black Prince commanded a division at Crécy, and when he came under heavy French assault Edward III refused to send help, declaring he should be left to win his spurs and have the honour of the day.","strength":"explicit","citations":[{"url":"https://history.hanover.edu/courses/excerpts/211froi.html","title":"Froissart's Chronicles (excerpt): the Battle of Crécy","publisher":"Hanover Historical Texts Project","quote":"return to him and to them that sent you hither, and say to them that they send no more to me for any adventure that falleth, as long as my son is alive: and also say to them that they suffer him this day to win his spurs"}]},{"id":"lnk-066","from":{"kind":"person","id":"edward-black-prince"},"to":{"kind":"event","id":"evt-1356-poitiers"},"relation":"capture-secured","claim":"Edward the Black Prince commanded the Anglo-Gascon army at Poitiers, where King John II of France was surrounded and forced to surrender to the Prince's forces.","strength":"explicit","citations":[{"url":"https://en.wikipedia.org/wiki/Battle_of_Poitiers","title":"Battle of Poitiers","publisher":"Wikipedia","quote":"a French army commanded by King John II and an Anglo-Gascon force under Edward, the Black Prince... Surrounded by enemies, John and his youngest son, Philip, surrendered."}]},{"id":"lnk-067","from":{"kind":"person","id":"edward-black-prince"},"to":{"kind":"event","id":"evt-1360-treaty-bretigny"},"relation":"capture-enabled","claim":"The Black Prince's capture of King John II at Poitiers in 1356 set in motion the ransom negotiations that culminated in the Treaty of Brétigny of 1360.","strength":"explicit","citations":[{"url":"https://en.wikipedia.org/wiki/Treaty_of_Br%C3%A9tigny","title":"Treaty of Brétigny","publisher":"Wikipedia","quote":"King John II of France, taken as a prisoner of war at the Battle of Poitiers (19 September 1356), worked with King Edward III of England to write out the Treaty of London."}]},{"id":"lnk-068","from":{"kind":"person","id":"edward-iii"},"to":{"kind":"event","id":"evt-1360-treaty-bretigny"},"relation":"claim-renounced","claim":"Under the Treaty of Brétigny, Edward III renounced his claim to the French throne in exchange for full sovereignty over an enlarged Aquitaine and the ransom of the captive King John II.","strength":"explicit","citations":[{"url":"https://en.wikipedia.org/wiki/Treaty_of_Br%C3%A9tigny","title":"Treaty of Brétigny","publisher":"Wikipedia","quote":"For his part, the king of England renounced all claims to the French throne."}]},{"id":"lnk-069","from":{"kind":"person","id":"edward-black-prince"},"to":{"kind":"event","id":"evt-1376-good-parliament"},"relation":"succession-secured","claim":"Dying through most of the Good Parliament's sittings, the Black Prince summoned Edward III and John of Gaunt to his London house and made them swear to recognise his son Richard as heir; his death on 8 June 1376 then robbed the Parliament's reformers of a key supporter.","strength":"explicit","citations":[{"url":"https://en.wikipedia.org/wiki/Richard_II_of_England","title":"Richard II of England","publisher":"Wikipedia","quote":"During the Good Parliament of 1376 the Black Prince was dying. Having taken a house in London, he summoned both Edward III and John of Gaunt and made them swear to recognise his son, the future Richard II, as successor to Edward."},{"url":"https://en.wikipedia.org/wiki/Good_Parliament","title":"Good Parliament","publisher":"Wikipedia","quote":"The Black Prince's death on June 8 robbed the Parliament of one of its strongest supports."}]},{"id":"lnk-070","from":{"kind":"person","id":"john-of-gaunt"},"to":{"kind":"event","id":"evt-1376-good-parliament"},"relation":"dominance-feared","claim":"The Commons in the Good Parliament feared that John of Gaunt, left presiding for his dying father and brother, would try to seize the throne, and so moved quickly to have young Richard invested as Prince of Wales and publicly recognised as heir.","strength":"attributed","citations":[{"url":"https://en.wikipedia.org/wiki/Richard_II_of_England","title":"Richard II of England","publisher":"Wikipedia","quote":"The Commons in the Good Parliament genuinely feared that Richard's uncle, John of Gaunt, would usurp the throne. For this reason, Richard was quickly invested with the princedom of Wales... and publicly recognised as heir."}]},{"id":"lnk-071","from":{"kind":"edge","id":"edward-black-prince--richard-ii"},"to":{"kind":"event","id":"evt-1377-richard-ii-accession"},"relation":"succession-triggered","claim":"Because the Black Prince predeceased his father, the throne passed on Edward III's death in 1377 to the Black Prince's ten-year-old son Richard rather than to a grown heir.","strength":"explicit","citations":[{"url":"https://en.wikipedia.org/wiki/Richard_II_of_England","title":"Richard II of England","publisher":"Wikipedia","quote":"On 21 June 1377, King Edward III, who was for some years frail and decrepit, died after a 50-year reign. This resulted in the 10-year-old Richard succeeding to the throne."}]},{"id":"lnk-072","from":{"kind":"edge","id":"edward-iii~philippa-hainault"},"to":{"kind":"event","id":"evt-1327-edward-ii-deposition"},"relation":"alliance-sealed","claim":"Isabella arranged Prince Edward's betrothal to Philippa of Hainault in exchange for Count William of Hainault's military assistance, which financed and supplied the 1326 invasion that deposed Edward II.","strength":"explicit","citations":[{"url":"https://en.wikipedia.org/wiki/Philippa_of_Hainault","title":"Philippa of Hainault","publisher":"Wikipedia","quote":"Isabella of France, the Queen of England, arrived at the court of Hainaut to seek aid from Count William in order to depose her husband, Edward II... where she arranged the betrothal to 13-year-old Philippa in exchange for assistance."}]},{"id":"lnk-073","from":{"kind":"person","id":"edward-iii"},"to":{"kind":"event","id":"evt-1337-hundred-years-war"},"relation":"claim-asserted-via","claim":"When Philip VI ordered the confiscation of Gascony in 1337 over a dispute concerning Edward III's feudal obligations, Edward declared war in response, opening the Hundred Years' War.","strength":"explicit","citations":[{"url":"https://en.wikipedia.org/wiki/English_claims_to_the_French_throne","title":"English claims to the French throne","publisher":"Wikipedia","quote":"In 1337, a dispute arose between Philip and Edward regarding Edward's feudal obligations which resulted in Philip ordering the confiscation of Gascony. Edward declared war on Philip in response."}]},{"id":"lnk-074","from":{"kind":"person","id":"edward-ii"},"to":{"kind":"event","id":"evt-1314-bannockburn"},"relation":"support-withheld","claim":"Four earls, including Lancaster and Warwick, refused to join the Bannockburn campaign, citing Edward II's cancellation of parliament as a breach of the Ordinances' requirement of parliamentary sanction for war; their absence was an important factor in Edward's defeat.","strength":"explicit","citations":[{"url":"https://historyofparliament.com/2014/06/23/parliament-and-bannockburn/","title":"Parliament and Bannockburn","publisher":"The History of Parliament","quote":"Four earls, including Lancaster and Warwick, used this as an excuse not to go on campaign, claiming that it had not been sanctioned by parliament... The earls' absence from Bannockburn... was an important factor in Edward's defeat"}]},{"id":"lnk-075","from":{"kind":"person","id":"edmund-woodstock"},"to":{"kind":"event","id":"evt-1327-edward-ii-death"},"relation":"rumor-provoked","claim":"Edmund of Woodstock was convinced by rumours, later shown to have been planted by Roger Mortimer as entrapment, that his half-brother Edward II was still alive after his reported 1327 death, and plotted to free him.","strength":"attributed","citations":[{"url":"https://en.wikipedia.org/wiki/Edmund_of_Woodstock,_1st_Earl_of_Kent","title":"Edmund of Woodstock, 1st Earl of Kent","publisher":"Wikipedia","quote":"At this point he became involved in another plot against the court, when he was convinced by rumours that his brother was still alive... Roger Mortimer himself was responsible for leading Edmund into this belief, in a form of entrapment."}]},{"id":"lnk-076","from":{"kind":"person","id":"edmund-woodstock"},"to":{"kind":"event","id":"evt-1330-mortimer-coup"},"relation":"execution-avenged","claim":"Edmund of Woodstock's March 1330 execution, procured by Mortimer's entrapment, was itself named among the charges against Mortimer when Edward III's October 1330 coup brought him down; Kent's own attainder was then annulled.","strength":"explicit","citations":[{"url":"https://en.wikipedia.org/wiki/Edmund_of_Woodstock,_1st_Earl_of_Kent","title":"Edmund of Woodstock, 1st Earl of Kent","publisher":"Wikipedia","quote":"Among the charges against Mortimer was that of procuring Edmund's death, and the charges against the late Earl of Kent were annulled."}]},{"id":"lnk-077","from":{"kind":"edge","id":"edward-black-prince--richard-ii"},"to":{"kind":"event","id":"evt-1377-richard-ii-accession"},"relation":"succession-triggered","claim":"Because Edward the Black Prince died in 1376, before his father Edward III, the crown passed to the Black Prince's young son Richard rather than to a surviving adult son of Edward III.","strength":"explicit","citations":[{"url":"https://en.wikipedia.org/wiki/Richard_II_of_England","title":"Richard II of England","publisher":"Wikipedia","quote":"The Black Prince died in 1376, leaving Richard as heir apparent to his grandfather, King Edward III."}]},{"id":"lnk-078","from":{"kind":"person","id":"john-of-gaunt"},"to":{"kind":"event","id":"evt-1377-richard-ii-accession"},"relation":"minority-caused","claim":"John of Gaunt had already been effectively head of the English government before 1377, a position of dominance that carried over into his nephew Richard II's minority.","strength":"explicit","citations":[{"url":"https://en.wikipedia.org/wiki/John_of_Gaunt","title":"John of Gaunt","publisher":"Wikipedia","quote":"From then until 1377, he was effectively the head of the English government owing to the illness of his father and elder brother."}]},{"id":"lnk-079","from":{"kind":"person","id":"john-of-gaunt"},"to":{"kind":"event","id":"evt-1381-peasants-revolt"},"relation":"grievance-targeted","claim":"Rebels in the Peasants' Revolt blamed John of Gaunt for the poll tax, named him a traitor to be beheaded, and destroyed his Savoy Palace.","strength":"explicit","citations":[{"url":"https://en.wikipedia.org/wiki/John_of_Gaunt","title":"John of Gaunt","publisher":"Wikipedia","quote":"During the Peasants' Revolt of 1381, John of Gaunt … was among those named by the rebels as a traitor to be beheaded as soon as he could be found. The Savoy Palace was systematically destroyed by the mob and burned to the ground."},{"url":"https://en.wikipedia.org/wiki/Savoy_Palace","title":"Savoy Palace","publisher":"Wikipedia","quote":"the rioters from the surrounding rural areas, who blamed John of Gaunt for the introduction of the poll tax that had precipitated the revolt, systematically demolished the Savoy and everything in it."}]},{"id":"lnk-080","from":{"kind":"person","id":"richard-ii"},"to":{"kind":"event","id":"evt-1381-peasants-revolt"},"relation":"revolt-quelled","claim":"After Wat Tyler was killed at Smithfield, the young Richard II personally rode forward and persuaded the rebel crowd to disperse, a decisive act that helped collapse the revolt.","strength":"explicit","citations":[{"url":"https://en.wikipedia.org/wiki/Peasants%27_Revolt","title":"Peasants' Revolt","publisher":"Wikipedia","quote":"Richard rode forward towards the crowd and persuaded them to follow him away from Smithfield, to Clerkenwell Fields, defusing the situation."}]},{"id":"lnk-081","from":{"kind":"person","id":"thomas-woodstock"},"to":{"kind":"event","id":"evt-1388-merciless-parliament"},"relation":"purge-orchestrated","claim":"Thomas of Woodstock, Duke of Gloucester, led the Lords Appellant in the Merciless Parliament of February 1388, which was packed with his supporters and took revenge on Richard II's allies.","strength":"explicit","citations":[{"url":"https://en.wikipedia.org/wiki/Thomas_of_Woodstock,_Duke_of_Gloucester","title":"Thomas of Woodstock, Duke of Gloucester","publisher":"Wikipedia","quote":"as the leader of the \"Lords Appellant\" in the \"Merciless Parliament,\" which met in February 1388 and was packed with his supporters, he took revenge upon his enemies"}]},{"id":"lnk-082","from":{"kind":"person","id":"thomas-woodstock"},"to":{"kind":"event","id":"evt-1397-revenge-parliament"},"relation":"revenge-enacted","claim":"Richard II had Thomas of Woodstock arrested in 1397 and murdered at Calais; contemporaries and the Dictionary of National Biography attribute this to the king's long-nursed desire for revenge for his humiliation in 1388.","strength":"attributed","citations":[{"url":"https://en.wikisource.org/wiki/Dictionary_of_National_Biography,_1885-1900/Richard_II","title":"Dictionary of National Biography, 1885-1900/Richard II","publisher":"Wikisource","quote":"Richard was too often reminded that he had injuries unavenged."},{"url":"https://en.wikipedia.org/wiki/Thomas_of_Woodstock,_Duke_of_Gloucester","title":"Thomas of Woodstock, Duke of Gloucester","publisher":"Wikipedia","quote":"On 9 September 1397, he was murdered by being smothered between two feather beds, probably by a group of men led by Thomas de Mowbray, 1st Duke of Norfolk, and the knight Sir Nicholas Colfox, presumably on behalf of Richard II"}]},{"id":"lnk-083","from":{"kind":"edge","id":"anne-bohemia~richard-ii"},"to":{"kind":"event","id":"evt-1397-revenge-parliament"},"relation":"temperament-embittered","claim":"The Dictionary of National Biography attributes Richard II's deteriorating relations with Arundel, which culminated in the 1397 purge, in part to the shock of his queen Anne of Bohemia's sudden death in 1394.","strength":"attributed","citations":[{"url":"https://en.wikisource.org/wiki/Dictionary_of_National_Biography,_1885-1900/Richard_II","title":"Dictionary of National Biography, 1885-1900/Richard II","publisher":"Wikisource","quote":"The sudden death of the young queen on 7 June proved a doubly unfortunate event, for it not only removed an influence which constantly made for peace, but indirectly aggravated the quarrel with Arundel."}]},{"id":"lnk-084","from":{"kind":"person","id":"henry-iv"},"to":{"kind":"event","id":"evt-1398-bolingbroke-banishment"},"relation":"banishment-imposed","claim":"Richard II banished Henry Bolingbroke (the future Henry IV) for ten years following his quarrel with Thomas Mowbray, Duke of Norfolk.","strength":"explicit","citations":[{"url":"https://en.wikisource.org/wiki/Dictionary_of_National_Biography,_1885-1900/Richard_II","title":"Dictionary of National Biography, 1885-1900/Richard II","publisher":"Wikisource","quote":"the king banished Hereford for ten years, and with more equanimity that the unpopular Norfolk was to go into exile for a 'hundred wynter.'"}]},{"id":"lnk-085","from":{"kind":"edge","id":"blanche-lancaster~john-of-gaunt"},"to":{"kind":"event","id":"evt-1399-gaunt-death-inheritance"},"relation":"inheritance-source","claim":"John of Gaunt's marriage to Blanche of Lancaster was the foundation of the Lancastrian fortune and titles that Richard II confiscated on Gaunt's death in 1399.","strength":"explicit","citations":[{"url":"https://en.wikipedia.org/wiki/Blanche_of_Lancaster","title":"Blanche of Lancaster","publisher":"Wikipedia","quote":"The wealth she brought to the marriage was the foundation of John's fortune."}]},{"id":"lnk-086","from":{"kind":"person","id":"john-of-gaunt"},"to":{"kind":"event","id":"evt-1399-gaunt-death-inheritance"},"relation":"death-precipitated","claim":"John of Gaunt's death on 3 February 1399 was the immediate trigger for Richard II's seizure of the Lancastrian inheritance from the exiled Bolingbroke.","strength":"explicit","citations":[{"url":"https://en.wikisource.org/wiki/Dictionary_of_National_Biography,_1885-1900/Richard_II","title":"Dictionary of National Biography, 1885-1900/Richard II","publisher":"Wikisource","quote":"On the death of John of Gaunt (3 Feb. 1399) Richard and the parliamentary committee took the fatal step (18 March) of quashing the letters patent granted to Hereford"}]},{"id":"lnk-087","from":{"kind":"edge","id":"john-of-gaunt--henry-iv"},"to":{"kind":"event","id":"evt-1399-henry-iv-usurpation"},"relation":"usurpation-enabled","claim":"Richard II's confiscation of Bolingbroke's inheritance as John of Gaunt's son and heir to the Duchy of Lancaster prompted Bolingbroke's return from exile, which culminated in Richard's deposition and Henry's accession as Henry IV.","strength":"explicit","citations":[{"url":"https://en.wikisource.org/wiki/Dictionary_of_National_Biography,_1885-1900/Richard_II","title":"Dictionary of National Biography, 1885-1900/Richard II","publisher":"Wikisource","quote":"On the death of John of Gaunt (3 Feb. 1399) Richard and the parliamentary committee took the fatal step (18 March) of quashing the letters patent granted to Hereford"},{"url":"https://en.wikisource.org/wiki/Dictionary_of_National_Biography,_1885-1900/Richard_II","title":"Dictionary of National Biography, 1885-1900/Richard II","publisher":"Wikisource","quote":"Henry then seated himself in the vacant throne."}]},{"id":"lnk-088","from":{"kind":"person","id":"lionel-antwerp"},"to":{"kind":"event","id":"evt-1399-henry-iv-usurpation"},"relation":"claim-asserted-via","claim":"Because Henry IV's father John of Gaunt was Edward III's third surviving son while the Mortimer earls of March descended from the second surviving son, Lionel of Antwerp, the new Lancastrian king's title was vulnerable to a senior rival claim from the outset.","strength":"explicit","citations":[{"url":"https://en.wikipedia.org/wiki/Edmund_Mortimer,_5th_Earl_of_March","title":"Edmund Mortimer, 5th Earl of March","publisher":"Wikipedia","quote":"Thus, in terms of male primogeniture Edmund was heir-presumptive to the throne over and above the house of Lancaster, the children of Edward III's third son John of Gaunt, Duke of Lancaster."},{"url":"https://en.wikipedia.org/wiki/Edmund_Mortimer,_5th_Earl_of_March","title":"Edmund Mortimer, 5th Earl of March","publisher":"Wikipedia","quote":"a descendant of King Edward III through his paternal grandmother Philippa of Clarence, only child of King Edward III's second surviving son, Lionel of Antwerp, Duke of Clarence."}]},{"id":"lnk-089","from":{"kind":"person","id":"edmund-langley"},"to":{"kind":"event","id":"evt-1399-henry-iv-usurpation"},"relation":"defection-enabled","claim":"Left in charge of England as Custodian of the Realm while Richard II campaigned in Ireland in 1399, Edmund of Langley raised an army against the returning Henry Bolingbroke but abandoned resistance and joined him instead, easing Bolingbroke's path to the throne.","strength":"explicit","citations":[{"url":"https://en.wikipedia.org/wiki/Edmund_of_Langley,_1st_Duke_of_York","title":"Edmund of Langley, 1st Duke of York","publisher":"Wikipedia","quote":"The duke was left as Custodian of the Realm in the summer of 1399 when Richard II departed for another extended campaign in Ireland."},{"url":"https://en.wikipedia.org/wiki/Edmund_of_Langley,_1st_Duke_of_York","title":"Edmund of Langley, 1st Duke of York","publisher":"Wikipedia","quote":"Edmund raised an army to resist Bolingbroke, then decided instead to join him, for which he was well rewarded."}]},{"id":"lnk-090","from":{"kind":"person","id":"richard-ii"},"to":{"kind":"event","id":"evt-1400-epiphany-rising"},"relation":"restoration-attempted","claim":"The Epiphany Rising was a plot by former courtiers of the deposed Richard II to seize and kill Henry IV and restore Richard to the throne.","strength":"explicit","citations":[{"url":"https://en.wikipedia.org/wiki/Epiphany_Rising","title":"Epiphany Rising","publisher":"Wikipedia","quote":"The Epiphany Rising was a failed rebellion against King Henry IV of England in early January 1400."},{"url":"https://en.wikipedia.org/wiki/Epiphany_Rising","title":"Epiphany Rising","publisher":"Wikipedia","quote":"hoped to seize the king during a tournament, kill him, and restore Richard II to the throne."}]},{"id":"lnk-091","from":{"kind":"person","id":"henry-iv"},"to":{"kind":"event","id":"evt-1400-richard-ii-death"},"relation":"threat-eliminated","claim":"The Epiphany Rising, which sought to restore Richard II, is said to have convinced Henry IV that the deposed king was too dangerous to leave alive; Richard died at Pontefract Castle weeks later.","strength":"attributed","citations":[{"url":"https://en.wikipedia.org/wiki/Epiphany_Rising","title":"Epiphany Rising","publisher":"Wikipedia","quote":"The rebellion also convinced Henry IV that a deposed, imprisoned and alive King Richard was a very dangerous liability for him."}]},{"id":"lnk-092","from":{"kind":"person","id":"lionel-antwerp"},"to":{"kind":"event","id":"evt-1415-southampton-plot"},"relation":"claim-asserted-via","claim":"The Southampton Plot sought to depose Henry V in favour of Edmund Mortimer, Earl of March, whose claim to the throne, as a descendant of Lionel of Antwerp, Edward III's second surviving son, was considered superior to the Lancastrian kings' claim through the third son, John of Gaunt.","strength":"explicit","citations":[{"url":"https://en.wikipedia.org/wiki/Southampton_Plot","title":"Southampton Plot","publisher":"Wikipedia","quote":"Edmund Mortimer, 5th Earl of March, was the great-grandson of Lionel of Antwerp, Duke of Clarence, second surviving son of King Edward III, and his claim to the throne was thus superior"}]},{"id":"lnk-093","from":{"kind":"person","id":"henry-v"},"to":{"kind":"event","id":"evt-1415-southampton-plot"},"relation":"plot-foiled-before-departure","claim":"The Southampton Plot to depose Henry V was uncovered just as he was about to sail for France on the Agincourt campaign.","strength":"explicit","citations":[{"url":"https://en.wikipedia.org/wiki/Southampton_Plot","title":"Southampton Plot","publisher":"Wikipedia","quote":"The Southampton Plot was a conspiracy to depose King Henry V of England, revealed in 1415 just as the King was about to sail on campaign to France as part of the Hundred Years' War."}]},{"id":"lnk-094","from":{"kind":"person","id":"henry-v"},"to":{"kind":"event","id":"evt-1420-treaty-troyes"},"relation":"military-success-enabled","claim":"Under the Treaty of Troyes, Charles VI agreed that the French crown would pass not to his own son the Dauphin but to Henry V, who would marry Charles's daughter Catherine, following Henry's military campaigns in France.","strength":"explicit","citations":[{"url":"https://historyofparliament.com/2016/07/20/treaty-of-troyes/","title":"European diplomacy: the 'double monarchy' of England and France envisaged in the treaty of Troyes of 1420","publisher":"The History of Parliament","quote":"Charles VI of France … agreed that, on his death, the kingdom of France would not be inherited by his son and heir, the Dauphin, Charles … but would pass instead to Henry V, who would take as his wife the Dauphin's sister, Katherine."}]},{"id":"lnk-095","from":{"kind":"edge","id":"henry-iv--henry-v"},"to":{"kind":"event","id":"evt-1413-henry-v-accession"},"relation":"succession-triggered","claim":"Henry V acceded to the throne immediately upon his father Henry IV's death on 20 March 1413.","strength":"explicit","citations":[{"url":"https://en.wikipedia.org/wiki/Henry_V_of_England","title":"Henry V of England","publisher":"Wikipedia","quote":"Henry acceded to the throne after his father Henry IV's death on 20 March 1413; the new king was twenty-six years old."}]},{"id":"lnk-096","from":{"kind":"person","id":"john-lancaster-bedford"},"to":{"kind":"event","id":"evt-1422-henry-v-death"},"relation":"regency-appointed","claim":"On Henry V's death, arrangements were made naming John, Duke of Bedford, guardian of the kingdom and, when Burgundy declined the office, regent in France for the infant Henry VI.","strength":"explicit","citations":[{"url":"https://en.wikipedia.org/wiki/John_of_Lancaster,_Duke_of_Bedford","title":"John of Lancaster, Duke of Bedford","publisher":"Wikipedia","quote":"Henry V's last wish was that Bedford should be guardian of the kingdom and of the young king, and that Philip the Good, Duke of Burgundy, should act as regent in France."},{"url":"https://en.wikipedia.org/wiki/John_of_Lancaster,_Duke_of_Bedford","title":"John of Lancaster, Duke of Bedford","publisher":"Wikipedia","quote":"the English parliament had decided that Bedford should be Lord Protector of the kingdom, and that in his absence the office should devolve upon his brother Humphrey, Duke of Gloucester."}]},{"id":"lnk-097","from":{"kind":"person","id":"humphrey-lancaster-gloucester"},"to":{"kind":"event","id":"evt-1422-henry-v-death"},"relation":"regency-appointed","claim":"Following Henry V's death, Parliament arranged that Humphrey, Duke of Gloucester, would act as Lord Protector of the realm in England whenever his brother Bedford was absent, ruling for the infant Henry VI.","strength":"explicit","citations":[{"url":"https://en.wikipedia.org/wiki/John_of_Lancaster,_Duke_of_Bedford","title":"John of Lancaster, Duke of Bedford","publisher":"Wikipedia","quote":"the English parliament had decided that Bedford should be Lord Protector of the kingdom, and that in his absence the office should devolve upon his brother Humphrey, Duke of Gloucester."},{"url":"https://en.wikipedia.org/wiki/Humphrey,_Duke_of_Gloucester","title":"Humphrey, Duke of Gloucester","publisher":"Wikipedia","quote":"Upon the death of his brother in 1422, Humphrey became Lord Protector to his young nephew Henry VI, then a baby."}]},{"id":"lnk-098","from":{"kind":"person","id":"thomas-beaufort"},"to":{"kind":"event","id":"evt-1422-henry-v-death"},"relation":"executor-appointed","claim":"Thomas Beaufort, Duke of Exeter, was an executor of Henry V's will and returned to England on the king's death to serve on the governing council of the infant Henry VI.","strength":"explicit","citations":[{"url":"https://en.wikipedia.org/wiki/Thomas_Beaufort,_Duke_of_Exeter","title":"Thomas Beaufort, Duke of Exeter","publisher":"Wikipedia","quote":"Beaufort was one of the executors of Henry V's will, and so returned to England in 1422 after the latter's death. He served on the governing council for the infant King Henry VI."}]},{"id":"lnk-099","from":{"kind":"edge","id":"henry-v--henry-vi"},"to":{"kind":"event","id":"evt-1422-henry-v-death"},"relation":"succession-triggered","claim":"Henry V's death passed the English crown to his only son, Henry VI, who succeeded at the age of eight months.","strength":"explicit","citations":[{"url":"https://en.wikipedia.org/wiki/Henry_VI_of_England","title":"Henry VI of England","publisher":"Wikipedia","quote":"He succeeded to the throne as King of England at the age of eight months on 1 September 1422, the day after his father's death"}]},{"id":"lnk-100","from":{"kind":"edge","id":"catherine-valois~henry-v"},"to":{"kind":"ev /* Date handling and escaping.
 *

 * silently upgrading it into false precision:
 *   "1066-10-14"      settled to the day
 *   "1156"            settled only to the year
 *   "1156-04/1156-12" an uncertainty WINDOW — the year is agreed, the month is not

const MON = ['January', 'February', 'March', 'April', 'May', 'June', 'July',
  'August', 'September', 'October', 'November', 'December'];

const CUM = [0, 31, 59, 90, 120, 151, 181, 212, 243, 273, 304, 334];

/* Fractional year, for placing a date on the vertical axis.
 * "1066-10-14" -> 1066.78. A year-only date lands on the year boundary, which is
 * the honest reading of a year-only source. A window resolves to its EARLIEST
 * bound — the only end we can place without inventing a date. */
function frac(date) {
  if (!date) return null;
  const s = String(date);
  if (s.includes('/')) {
    const r = s.match(/^(\d{4}(?:-\d{2}(?:-\d{2})?)?)\//);
    return r ? frac(r[1]) : null;
  }
  const m = s.match(/^(\d{4})(?:-(\d{2}))?(?:-(\d{2}))?$/);
  if (!m) return null;
  const y = +m[1], mo = m[2] ? +m[2] : null, d = m[3] ? +m[3] : null;
  if (mo == null) return y;
  return y + (CUM[mo - 1] + (d ? d - 1 : 15)) / 365;

 * shown a single settled date the sources don't actually agree on:
 *   circa   -> "c. 1003"
 *   range   -> "between 1379 and 1382"      (one moment, unknown where in a window)
 *   after   -> "after 1070"                 (bounded on one side only)
 *   before  -> "before 8 July 1332"

function fmtDate(date, precision) {
  if (!date) return 'unknown';
  const s = String(date);
  if (s.includes('/')) {
    const [a, b] = s.split('/');
    return `between ${fmtDate(a)} and ${fmtDate(b)}`;

  p._fuzzyEnd = oneSided(p.death?.precision);

  if (p._undated) { p._y0 = p._y1 = null; continue; }
  // An open end gets a short stub off the nearest sourced anchor, drawn dashed.
  // The stub is a drawing decision, not a claim about when they were born.
  p._y0 = b != null ? b : Math.min(...anchors) - 8;
  p._y1 = d != null ? d : Math.max(...anchors) + 8;
  if (p._y1 < p._y0) p._y1 = p._y0 + 1;
}

/** People with at least one sourced date — the only ones we can place on a time axis. */
const placed = people.filter((p) => !p._undated);
/** People we refuse to place, listed honestly in the gloss instead of guessed at. */
const undated = people.filter((p) => p._undated);

for (const p of placed) {
  p._claim = null;
  if (p.monarch) continue;
  const t = (p.titles || []).find((t) => REGNAL.test(t.title || '') && t.from && frac(t.from) != null);
  if (t) p._claim = { s: frac(t.from), e: frac(t.to) ?? frac(t.from) + 1, title: t.title };
}

// ── relationship indexes

/** parentId -> [childId] (the schema stores descent on the child, as `parents`). */
const childrenOf = new Map();
for (const p of people) {
  for (const par of p.parents || []) {
    if (!P.has(par)) continue;
    if (!childrenOf.has(par)) childrenOf.set(par, []);
    childrenOf.get(par).push(p.id);
  }
}

/** Descent edges. A child's birth year is where the edge meets both bars, so the
 *  line is horizontal by construction — no generation rows, no fudging.
 *  `kind` lives on the edge itself: consumers resolve edges out of `edgeById` and
 *  must be able to tell descent from marriage without a parallel lookup. */
const pcEdges = [];
for (const p of placed) {
  for (const par of p.parents || []) {
    const q = P.get(par);
    if (!q || q._undated || p._b == null) continue;
    pcEdges.push({ id: `${par}--${p.id}`, kind: 'pc', parent: q, child: p, y: p._b });
  }
}

/** Marriage edges, deduped — either partner may record the marriage. */
const spEdges = [];
const spSeen = new Set();
for (const p of placed) {
  for (const s of p.spouses || []) {
    const q = P.get(s.id);
    if (!q || q._undated) continue;
    const key = [p.id, s.id].sort().join('~');
    if (spSeen.has(key)) continue;
    const y = frac(s.married);
    if (y == null) continue;   // an undated marriage has no y, so it cannot be drawn
    spSeen.add(key);
    spEdges.push({ id: key, kind: 'sp', a: p, b: q, y, rec: s });
  }
}

const edgeById = new Map([...pcEdges, ...spEdges].map((e) => [e.id, e]));

/** "person:id" | "event:id" | "edge:id" -> [link] */
const linksByNode = new Map();
for (const l of links) {
  for (const side of [l.from, l.to]) {
    const key = `${side.kind}:${side.id}`;
    if (!linksByNode.has(key)) linksByNode.set(key, []);
    linksByNode.get(key).push(l);
  }
}

/** personId -> [eventId] they were directly involved in. */
const eventsByActor = new Map();
for (const e of events) {
  for (const a of e.actors || []) {
    if (!eventsByActor.has(a)) eventsByActor.set(a, []);
    eventsByActor.get(a).push(e.id);
  }
}

/** Monarchs in reign order — the spine the gold succession thread is drawn along. */
const monarchs = placed
  .filter((p) => p.monarch && p._rs != null)
  .sort((a, b) => a._rs - b._rs);
// ══════════════════════════ src/layout.js ══════════════════════════
/* Layout: the shared time axis, lane packing, and who is on screen.
 *
 * WHY PACK A SUBSET rather than everyone: ~110 people with overlapping lives need
 * ~30 lanes, which is ~3,500px of genealogy — that shoves the event rail off screen
 * and defeats the entire point of the app, which is seeing descent, chronology, and
 * the links between them AT ONCE. At any given year only a handful of MONARCHS are
 * alive, so the default view packs into ~6 lanes and everything fits. Kin fan out on
 * selection, and the `kin` toggle shows all of them for those who want the thicket.
 */



/** Mutable view state. Panning and zooming mutate this; nothing else should. */
const view = { scale: DEFAULT_SCALE, tx: 0, ty: 0 };

/* The axis spans the data, not the title: ancestors predate 1042 and heirs outlive
 * 1422, and showing their real lifespans is more honest than clipping them. */
const YEAR_MIN = Math.min(
  ...placed.map((p) => p._y0), ...events.map((e) => frac(e.date)));
const YEAR_MAX = Math.max(
  ...placed.map((p) => p._y1), ...events.map((e) => frac(e.endDate || e.date)));

const yPx = (year) => (year - YEAR_MIN) * view.scale;
const laneX = (i) => -(GEN_PAD + i * LANE_W);

const lanes = [];
/** x of the outermost lane in use — the left edge of the drawn world. */
let worldLeft = laneX(0);

/* Greedy interval packing over the VISIBLE people. Monarchs go first so the
 * succession sits nearest the gutter. A monarch's life overlaps their successor's,
 * so monarchs legitimately spread across the first few lanes — that overlap is
 * information (two kings alive at once), not a defect to be packed away. */
function relayout(visibleIds) {
  const vis = placed.filter((p) => visibleIds.has(p.id));
  const order = [
    ...vis.filter((p) => p.monarch).sort((a, b) => (a._rs ?? a._y0) - (b._rs ?? b._y0)),
    ...vis.filter((p) => !p.monarch).sort((a, b) => a._y0 - b._y0),
  ];
  lanes.length = 0;
  for (const p of order) {
    const top = p._y0 - LANE_PAD_Y;   // clearance for the name label above the bar
    const bot = p._y1;
    let li = lanes.findIndex((lane) => lane.every((q) => bot < q.top || top > q.bot));
    if (li === -1) { lanes.push([]); li = lanes.length - 1; }
    lanes[li].push({ top, bot, p });
    p._lane = li;
    p._x = laneX(li);
  }
  worldLeft = laneX(Math.max(0, lanes.length - 1)) - LANE_W * 0.5;
}

// ── visibility

/** Always shown: the monarchs, the disputed claimants, and the magnates. */
const baseVisible = new Set(
  placed.filter((p) => p.monarch || p._claim || p.role).map((p) => p.id));

const vis = { showAllKin: false, ids: new Set(baseVisible) };

function kinOf(id) {
  const p = P.get(id);
  if (!p) return [];
  return [
    id,
    ...(p.parents || []),
    ...(p.spouses || []).map((s) => s.id),
    ...(childrenOf.get(id) || []),
  ].filter((x) => P.has(x) && !P.get(x)._undated);
}

/** The two person ids a genealogical edge joins, whichever kind it is. */
function edgeEnds(edgeId) {
  const e = edgeById.get(edgeId);
  if (!e) return [];
  return e.kind === 'pc' ? [e.parent.id, e.child.id] : [e.a.id, e.b.id];
}

/** Who should be on screen given the current selection. */
function computeVisible(sel) {
  if (vis.showAllKin) return new Set(placed.map((p) => p.id));
  const v = new Set(baseVisible);
  if (!sel) return v;

  if (sel.kind === 'person') {
    for (const x of kinOf(sel.id)) v.add(x);
  } else if (sel.kind === 'edge') {
    for (const end of edgeEnds(sel.id)) for (const k of kinOf(end)) v.add(k);
  } else if (sel.kind === 'event') {
    for (const a of E.get(sel.id)?.actors || []) v.add(a);
  } else if (sel.kind === 'link') {
    const l = L.get(sel.id);
    for (const side of [l?.from, l?.to].filter(Boolean)) {
      if (side.kind === 'person') for (const k of kinOf(side.id)) v.add(k);
      if (side.kind === 'edge') for (const end of edgeEnds(side.id)) v.add(end);
    }
  }
  return v;
}

/** Is this link's geometry drawable right now? Events are always present; a person
 *  or edge endpoint may be fanned out of view. */
function linkReachable(side) {
  if (side.kind === 'person') return vis.ids.has(side.id);
  if (side.kind === 'edge') {
    const ends = edgeEnds(side.id);
    return ends.length > 0 && ends.every((id) => vis.ids.has(id));
  }
  return true;
}

/** Where a link attaches. A person attaches on their own bar at the year of the
 *  event it links to, clamped to their lifespan — so the connector stays as short
 *  and as literal as the geometry allows. */
function anchor(side, otherYear) {
  if (side.kind === 'person') {
    const p = P.get(side.id);
    if (!p || p._undated) return null;
    return { x: p._x, y: Math.max(p._y0, Math.min(p._y1, otherYear ?? p._y0)) };
  }
  if (side.kind === 'event') {
    const e = E.get(side.id);
    return e ? { x: 0, y: frac(e.date) } : null;   // x replaced by EVT_X at draw time
  }
  if (side.kind === 'edge') {
    const e = edgeById.get(side.id);
    if (!e) return null;
    return e.kind === 'pc'
      ? { x: (e.parent._x + e.child._x) / 2, y: e.y }
      : { x: (e.a._x + e.b._x) / 2, y: e.y };
  }
  return null;
}

/** Keep the axis reachable and the event rail on screen. The rail's bound WINS when
 *  the two conflict (min before max): being able to see the chronology beside the
 *  descent is the point of the page. */
function clampPan(stageW, stageH, evtLabelX, evtLabelRoom) {
  const contentH = (YEAR_MAX - YEAR_MIN) * view.scale;
  view.ty = Math.min(60, Math.max(stageH - contentH - 60, view.ty));
  const minTx = stageW - (evtLabelX + evtLabelRoom);
  const maxTx = AXIS_W + 16 - worldLeft;
  view.tx = Math.max(minTx, Math.min(maxTx, view.tx));
}
// ══════════════════════════ src/scene.js ══════════════════════════
/* Scene construction: build every SVG node once, and keep handles to them.
 *
 * We deliberately build the DOM a single time and thereafter only rewrite
 * attributes. The alternative — re-rendering on zoom — would drop selection state
 * and re-bind hundreds of listeners on every wheel tick.
 *
 * Layer order is the drawing order, so it is load-bearing: correlations sit UNDER
 * the bars they connect, and all text sits on top of everything.
 */


const svg = document.getElementById('codex');
const gAxis = document.getElementById('axis');
const gWorld = document.getElementById('world');
const stage = document.getElementById('stage');
const glossEl = document.getElementById('gloss');

function el(name, attrs = {}, parent = null) {
  const e = document.createElementNS(SVG_NS, name);
  for (const [k, v] of Object.entries(attrs)) if (v != null) e.setAttribute(k, v);
  if (parent) parent.appendChild(e);
  return e;
}

const layers = {};
for (const name of ['bands', 'corr', 'edges', 'succession', 'bars', 'events', 'labels']) {
  layers[name] = el('g', { class: `layer-${name}` }, gWorld);
}

/** kind -> Map(id -> {handles}) */
const nodes = { person: new Map(), event: new Map(), edge: new Map(), link: new Map() };
let succPath = null;

/**
 * @param {(kind: string, id: string) => void} onSelect
 * @param {(kind: string|null, id?: string) => void} onHover
 */
function buildScene(onSelect, onHover) {
  // ── genealogy edges. A transparent fat `-hit` path sits under each thin visible
  //    line: a 1px line is unclickable, but the user must be able to click descent.
  for (const e of [...pcEdges, ...spEdges]) {
    const g = el('g', { class: 'edge-g' }, layers.edges);
    const path = el('path', {
      class: 'edge dimmable' + (e.kind === 'sp' ? ' spouse' : ''),
    }, g);
    const hit = el('path', { class: 'edge-hit' }, g);
    hit.addEventListener('click', (ev) => { ev.stopPropagation(); onSelect('edge', e.id); });
    nodes.edge.set(e.id, { g, path, hit, kind: e.kind, data: e });
  }

  succPath = el('path', { class: 'succession dimmable' }, layers.succession);

  // ── person bars
  for (const p of placed) {
    const g = el('g', { class: 'person-g' }, layers.bars);
    // A magnate (role set, no crown) is tinted verdigris: they have no descent line
    // to the throne, so the bar must read as a different kind of thing.
    const cls = p.monarch ? ' is-monarch' : p.role ? ' is-magnate' : '';
    const life = el('line', { class: 'life dimmable' + cls }, g);
    const reign = (p.monarch && p._rs != null)
      ? el('line', { class: 'reign-bar dimmable' }, g) : null;
    const claim = p._claim
      ? el('line', { class: 'reign-bar disputed dimmable' }, g) : null;
    const hit = el('rect', { class: 'person-hit', width: 16 }, g);
    hit.addEventListener('click', (ev) => { ev.stopPropagation(); onSelect('person', p.id); });
    hit.addEventListener('mouseenter', () => onHover('person', p.id));
    hit.addEventListener('mouseleave', () => onHover(null));

    const label = el('text', { class: 'pname dimmable' + cls, 'text-anchor': 'end' }, layers.labels);
    // A trailing "?" marks a bar whose extent is open because a date is unsourced.
    label.textContent = p.name + (p._openStart || p._openEnd ? ' ?' : '');

    nodes.person.set(p.id, { g, life, reign, claim, hit, label, p });
  }

  // ── events
  for (const e of events) {
    const g = el('g', { class: 'event-g' }, layers.events);
    const span = (e.endDate) ? el('line', { class: 'evt-tick dimmable' }, g) : null;
    const leader = el('path', { class: 'evt-leader dimmable' }, g);
    const dot = el('circle', {
      class: 'evt-dot dimmable', r: SIG_R[e.significance] || 3,
      fill: CAT_COLOR[e.category] || 'var(--text-soft)',
    }, g);
    const label = el('text', { class: 'evt-label dimmable' }, layers.labels);
    const go = (ev) => { ev.stopPropagation(); onSelect('event', e.id); };
    dot.addEventListener('click', go);
    label.addEventListener('click', go);
    dot.addEventListener('mouseenter', () => onHover('event', e.id));
    dot.addEventListener('mouseleave', () => onHover(null));
    nodes.event.set(e.id, { g, dot, label, leader, span, e });
  }

  // ── correlations
  for (const l of links) {
    const g = el('g', { class: 'corr-g' }, layers.corr);
    const path = el('path', {
      class: 'corr dimmable' + (l.strength === 'attributed' ? ' attributed' : ''),
    }, g);
    const hit = el('path', { class: 'corr-hit' }, g);
    hit.addEventListener('click', (ev) => { ev.stopPropagation(); onSelect('link', l.id); });
    nodes.link.set(l.id, { g, path, hit, l });
  }
}
// ══════════════════════════ src/position.js ══════════════════════════
/* Positioning: write geometry onto the scene for the current scale.
 *
 * Text and strokes must not stretch, so the world group NEVER carries a scale() —
 * only a translate() for panning. Everything vertical is therefore recomputed in JS
 * whenever the zoom changes.
 */





function applyTransform() {
  gWorld.setAttribute('transform', `translate(${view.tx},${view.ty})`);
  gAxis.setAttribute('transform', `translate(0,${view.ty})`);
}

/* Progressive disclosure by zoom: at 440 years on one screen, 103 event labels are
 * an unreadable stack, so only the heaviest survive. Returns the minimum
 * significance whose labels are shown. */
function labelLOD() {
  if (view.scale < 4) return 5;
  if (view.scale < 7.5) return 4;
  if (view.scale < 13) return 3;
  return 1;
}

/* Year rules and labels live in a viewport-fixed group that only pans vertically,
 * so the axis stays legible against the left edge however far you scroll sideways. */
function positionAxis() {
  gAxis.textContent = '';
  const vw = stage.clientWidth;
  const s = view.scale;
  const step = s < 3.5 ? 50 : s < 8 ? 20 : s < 18 ? 10 : 5;
  const start = Math.floor(YEAR_MIN / step) * step;

  for (let y = start; y <= YEAR_MAX; y += step) {
    const py = yPx(y);
    const century = y % 100 === 0;
    gAxis.appendChild(rule(AXIS_W, py, vw, century));
    const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    t.setAttribute('class', 'year-label');
    t.setAttribute('x', AXIS_W - 8);
    t.setAttribute('y', py + 3.5);
    t.setAttribute('text-anchor', 'end');
    t.textContent = y;
    gAxis.appendChild(t);
  }
  // Alternating century bands, so the eye can hold its place while panning.
  for (let c = Math.floor(YEAR_MIN / 100) * 100; c <= YEAR_MAX; c += 200) {
    const r = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    r.setAttribute('class', 'century-band');
    r.setAttribute('x', AXIS_W);
    r.setAttribute('y', yPx(c));
    r.setAttribute('width', Math.max(0, vw - AXIS_W));
    r.setAttribute('height', 100 * view.scale);
    gAxis.insertBefore(r, gAxis.firstChild);
  }
}

function rule(x1, y, x2, century) {
  const l = document.createElementNS('http://www.w3.org/2000/svg', 'line');
  l.setAttribute('class', 'year-rule' + (century ? ' decade' : ''));
  l.setAttribute('x1', x1); l.setAttribute('y1', y);
  l.setAttribute('x2', x2); l.setAttribute('y2', y);
  return l;
}

function positionPeople() {
  for (const [, n] of nodes.person) {
    const { p, life, reign, claim, hit, label } = n;
    const on = vis.ids.has(p.id);
    n.g.style.display = on ? '' : 'none';
    label.style.display = on ? '' : 'none';
    if (!on) continue;

    const a = yPx(p._y0), b = yPx(p._y1);
    life.setAttribute('x1', p._x); life.setAttribute('x2', p._x);
    life.setAttribute('y1', a); life.setAttribute('y2', b);
    // Dashed where an end is unsourced OR only one-sidedly bounded: in both cases the
    // bar's extent there is a drawing choice, not a claim about a date.
    if (p._openStart || p._openEnd || p._fuzzyStart || p._fuzzyEnd) {
      life.setAttribute('stroke-dasharray', '2 3');
    }
    if (reign) {
      reign.setAttribute('x1', p._x); reign.setAttribute('x2', p._x);
      reign.setAttribute('y1', yPx(p._rs));
      reign.setAttribute('y2', yPx(p._re ?? p._y1));
    }
    if (claim) {
      claim.setAttribute('x1', p._x); claim.setAttribute('x2', p._x);
      claim.setAttribute('y1', yPx(p._claim.s));
      claim.setAttribute('y2', yPx(p._claim.e));
    }
    hit.setAttribute('x', p._x - 8);
    hit.setAttribute('y', a - 4);
    hit.setAttribute('height', Math.max(8, b - a + 8));

    // Monarchs and magnates are always named; ordinary kin resolve in on zoom.
    const named = p.monarch || !!p.role || !!p._claim || view.scale >= 10;
    label.style.display = named ? '' : 'none';
    if (named) {
      label.setAttribute('x', p._x - 7);
      label.setAttribute('y', a + 4);
    }
  }
}

function positionEdges() {
  for (const [, n] of nodes.edge) {
    const e = n.data;
    const ends = n.kind === 'pc' ? [e.parent.id, e.child.id] : [e.a.id, e.b.id];
    const on = ends.every((id) => vis.ids.has(id));
    n.g.style.display = on ? '' : 'none';
    if (!on) continue;

    let d;
    if (n.kind === 'pc') {
      const x1 = e.parent._x, x2 = e.child._x, y = yPx(e.y);
      // Both ends sit at the child's birth year, so the line is horizontal. A slight
      // sag proportional to the span separates siblings born the same year.
      const bow = Math.min(16, Math.abs(x2 - x1) * 0.07);
      d = `M${x1},${y} Q${(x1 + x2) / 2},${y + bow} ${x2},${y}`;
    } else {
      d = `M${e.a._x},${yPx(e.y)} L${e.b._x},${yPx(e.y)}`;
    }
    n.path.setAttribute('d', d);
    n.hit.setAttribute('d', d);
  }
}

/* The gold thread: each monarch's reign, joined to the next. Read top to bottom it
 * is the succession itself — and every kink is a discontinuity worth asking about. */
function positionSuccession() {
  let d = '';
  for (let i = 0; i < monarchs.length; i++) {
    const m = monarchs[i];
    d += `${i === 0 ? 'M' : 'L'}${m._x},${yPx(m._rs)} L${m._x},${yPx(m._re ?? m._y1)} `;
    const next = monarchs[i + 1];
    if (next) d += `L${next._x},${yPx(next._rs)} `;
  }
  succPath.setAttribute('d', d.trim());
}

function positionEvents() {
  const lod = labelLOD();
  const shown = events.filter((e) => (e.significance || 0) >= lod);
  const shownIds = new Set(shown.map((e) => e.id));

  // Declutter in screen space: push each label below the previous one if they would
  // collide. Dots stay at their true year; a leader line owns the discrepancy.
  const labelY = new Map();
  let prev = -Infinity;
  for (const e of [...shown].sort((a, b) => frac(a.date) - frac(b.date))) {
    const y = Math.max(yPx(frac(e.date)), prev + MIN_LABEL_GAP);
    labelY.set(e.id, y);
    prev = y;
  }

  for (const [, n] of nodes.event) {
    const { e, dot, label, leader, span } = n;
    const y = yPx(frac(e.date));
    dot.setAttribute('cx', EVT_X);
    dot.setAttribute('cy', y);
    if (span) {
      const end = frac(e.endDate);
      const has = end != null && end > frac(e.date);
      span.style.display = has ? '' : 'none';
      if (has) {
        span.setAttribute('x1', EVT_X); span.setAttribute('x2', EVT_X);
        span.setAttribute('y1', y); span.setAttribute('y2', yPx(end));
        span.setAttribute('stroke-width', 2);
      }
    }
    const on = shownIds.has(e.id);
    label.style.display = on ? '' : 'none';
    leader.style.display = on ? '' : 'none';
    if (!on) continue;

    const ly = labelY.get(e.id);
    // SVG text neither wraps nor ellipsises; cut to the reserved column or it runs
    // under the gloss panel.
    label.textContent = truncate(e.title, EVT_LABEL_CHARS);
    label.setAttribute('x', EVT_LABEL_X);
    label.setAttribute('y', ly + 4);
    leader.setAttribute('d',
      `M${EVT_X + 7},${y} C${EVT_X + 13},${y} ${EVT_LABEL_X - 8},${ly} ${EVT_LABEL_X - 3},${ly}`);
  }
}

function positionLinks() {
  for (const [, n] of nodes.link) {
    const l = n.l;
    const on = linkReachable(l.from) && linkReachable(l.to);
    n.g.style.display = on ? '' : 'none';
    if (!on) continue;

    const toY = l.to.kind === 'event' ? frac(E.get(l.to.id)?.date) : null;
    const frY = l.from.kind === 'event' ? frac(E.get(l.from.id)?.date) : null;
    const A = anchor(l.from, toY);
    const B = anchor(l.to, frY ?? A?.y);
    if (!A || !B) { n.path.removeAttribute('d'); n.hit.removeAttribute('d'); continue; }

    const ax = l.from.kind === 'event' ? EVT_X : A.x;
    const bx = l.to.kind === 'event' ? EVT_X : B.x;
    const ay = yPx(A.y), by = yPx(B.y);
    const mx = (ax + bx) / 2;
    const d = `M${ax},${ay} C${mx},${ay} ${mx},${by} ${bx},${by}`;
    n.path.setAttribute('d', d);
    n.hit.setAttribute('d', d);
  }
}

function position() {
  positionAxis();
  positionPeople();
  positionEdges();
  positionSuccession();
  positionEvents();
  positionLinks();
  applyTransform();
}

/* The gloss: what a reader sees when they click something.
 *
 * Manuscripts put commentary in the margin, so that is where this lives. Pure HTML
 * generation — no selection logic, no listeners — which keeps it free of a cycle with
 * select.js (whose delegated handler reads the data-attributes these buttons carry).
 *
 * The citation block is the whole point of the project: a verbatim quote from the
 * source sits directly beside the link, so a reader can click through and find those
 * words. Never render a factual claim here without one.
 */


function citeHTML(cits) {
  if (!cits?.length) return '';
  return cits.map((c) => `
    <div class="cite">
      ${c.quote ? `<blockquote>${esc(c.quote)}</blockquote>` : ''}
      <div class="cite-src">
        <a href="${esc(c.url)}" target="_blank" rel="noopener noreferrer">${esc(c.title || c.url)}</a>${
          c.publisher ? ` &middot; ${esc(c.publisher)}` : ''}
      </div>
    </div>`).join('');
}

const relBtn = (kind, id, label, year) =>
  `<li><button data-kind="${kind}" data-id="${esc(id)}">
     <span>${esc(label)}</span>${year ? `<span class="rel-year">${esc(String(year))}</span>` : ''}
   </button></li>`;

const section = (title, items) =>
  items.length ? `<div class="gl-sect">${title}</div><ul class="rel-list">${items.join('')}</ul>` : '';

const factList = (facts) =>
  `<dl class="gl-facts">${facts.map(([k, v]) => `<dt>${k}</dt><dd>${v}</dd>`).join('')}</dl>`;

const contested = (note) =>
  note ? `<div class="uncertain"><strong>Contested</strong> — ${esc(note)}</div>` : '';

const closeBtn = '<button class="control gl-close" data-close>close</button>';

const linkLabel = (l) => truncate(l.claim, 70);

// ── person

function personGloss(p) {
  const kids = (childrenOf.get(p.id) || []).map((c) => P.get(c)).filter(Boolean)
    .sort((a, b) => (a._b ?? 9e9) - (b._b ?? 9e9));
  const parents = (p.parents || []).map((x) => P.get(x)).filter(Boolean);
  const spouses = (p.spouses || []).map((s) => ({ s, q: P.get(s.id) })).filter((x) => x.q);
  const evs = (eventsByActor.get(p.id) || []).map((x) => E.get(x)).filter(Boolean)
    .sort((a, b) => String(a.date).localeCompare(String(b.date)));
  const ls = linksByNode.get(`person:${p.id}`) || [];

  const facts = [
    ['Born', `${fmtDate(p.birth?.date, p.birth?.precision)}${p.birth?.place ? `, ${esc(p.birth.place)}` : ''}`],
    ['Died', `${fmtDate(p.death?.date, p.death?.precision)}${p.death?.place ? `, ${esc(p.death.place)}` : ''}`],
  ];
  if (p.monarch && p.reign) {
    facts.push(['Reigned', `${fmtDate(p.reign.start)} – ${p.reign.end ? fmtDate(p.reign.end) : '?'}`]);
  }
  if (p.house) facts.push(['House', esc(p.house)]);
  if (p._claim) facts.push(['Claimed', esc(p._claim.title)]);

  return `
    ${closeBtn}
    <h2 class="gl-title">${esc(p.name)}</h2>
    <p class="gl-kicker u-caps">${
      p.monarch ? 'Monarch of England' : esc(p.role || 'Royal kin')}${
      p.epithet ? ` &middot; ${esc(p.epithet)}` : ''}</p>
    ${factList(facts)}
    <div class="gl-body"><p>${esc(p.summary)}</p></div>
    ${contested(p.uncertain)}
    ${section('Parents', parents.map((q) => relBtn('person', q.id, q.name, q._b ? Math.floor(q._b) : '')))}
    ${section('Married', spouses.map(({ s, q }) =>
      relBtn('person', q.id, q.name, s.married ? String(s.married).slice(0, 4) : '')))}
    ${section('Children', kids.map((q) => relBtn('person', q.id, q.name, q._b ? Math.floor(q._b) : '')))}
    ${section('Present at', evs.map((e) => relBtn('event', e.id, e.title, yearOf(e.date))))}
    ${section('Correlations', ls.map((l) => relBtn('link', l.id, linkLabel(l), '')))}
    <div class="gl-sect">Sources</div>
    ${citeHTML([...(p.citations || []), ...(p.birth?.citations || []),
      ...(p.death?.citations || []), ...(p.reign?.citations || [])])}
  `;
}

// ── event

function eventGloss(e) {
  const actors = (e.actors || []).map((a) => P.get(a)).filter(Boolean);
  const ls = linksByNode.get(`event:${e.id}`) || [];
  const facts = [['Date', fmtDate(e.date, e.precision) + (e.endDate ? ` – ${fmtDate(e.endDate)}` : '')]];
  if (e.place) facts.push(['Place', esc(e.place)]);
  facts.push(['Kind', esc(e.category)]);
  // `significance` is the one editorial field in the dataset, so the UI says so.
  facts.push(['Weight', `${'✦'.repeat(e.significance || 0)}
    <span class="pill editorial" style="margin-left:.4rem">editorial</span>`]);

  return `
    ${closeBtn}
    <h2 class="gl-title">${esc(e.title)}</h2>
    <p class="gl-kicker u-caps">Event &middot; ${esc(String(yearOf(e.date)))}</p>
    ${factList(facts)}
    <div class="gl-body"><p>${esc(e.summary)}</p></div>
    ${contested(e.uncertain)}
    ${section('Who was there', actors.map((p) => relBtn('person', p.id, p.name, '')))}
    ${section('Correlations', ls.map((l) => relBtn('link', l.id, linkLabel(l), '')))}
    <div class="gl-sect">Sources</div>
    ${citeHTML(e.citations)}
  `;
}

// ── correlation

function sideLabel(side) {
  if (side.kind === 'person') return P.get(side.id)?.name || side.id;
  if (side.kind === 'event') return E.get(side.id)?.title || side.id;
  const e = edgeById.get(side.id);
  if (!e) return side.id;
  return e.kind === 'pc' ? `${e.parent.name} → ${e.child.name}` : `${e.a.name} ~ ${e.b.name}`;
}

function linkGloss(l) {
  return `
    ${closeBtn}
    <h2 class="gl-title">A correlation</h2>
    <p class="gl-kicker u-caps">${esc(sideLabel(l.from))} &rarr; ${esc(sideLabel(l.to))}</p>
    <p class="claim">${esc(l.claim)}</p>
    ${factList([
      ['Relation', esc(l.relation.replace(/-/g, ' '))],
      ['Standing', `<span class="pill ${esc(l.strength)}">${esc(l.strength)}</span>`],
    ])}
    <p style="font-size:.85rem;color:var(--text-soft)">${
      l.strength === 'explicit'
        ? 'The cited source states this connection outright.'
        : 'The cited source reports this connection as a contemporary or historiographical claim, not as settled fact.'}</p>
    ${section('Endpoints', [l.from, l.to].map((s) => relBtn(s.kind, s.id, sideLabel(s), '')))}
    <div class="gl-sect">Sources for the connection</div>
    ${citeHTML(l.citations)}
  `;
}

// ── genealogical edge

function edgeGloss(id) {
  const e = edgeById.get(id);
  if (!e) return '';
  const ls = linksByNode.get(`edge:${id}`) || [];
  const corr = section('Correlations', ls.map((l) => relBtn('link', l.id, linkLabel(l), '')));

  if (e.kind === 'pc') {
    return `
      ${closeBtn}
      <h2 class="gl-title">Descent</h2>
      <p class="gl-kicker u-caps">${esc(e.parent.name)} &rarr; ${esc(e.child.name)}</p>
      <div class="gl-body"><p>${esc(e.child.name)} was born to ${esc(e.parent.name)}
        in ${esc(fmtDate(e.child.birth?.date, e.child.birth?.precision))}.</p></div>
      ${corr}
      ${section('Endpoints', [relBtn('person', e.parent.id, e.parent.name, ''),
        relBtn('person', e.child.id, e.child.name, '')])}
      <div class="gl-sect">Sources</div>
      ${citeHTML(e.child.birth?.citations?.length ? e.child.birth.citations : e.child.citations)}`;
  }

  const rec = e.rec;
  return `
    ${closeBtn}
    <h2 class="gl-title">Marriage</h2>
    <p class="gl-kicker u-caps">${esc(e.a.name)} &amp; ${esc(e.b.name)}</p>
    ${factList([
      ['Married', esc(fmtDate(rec.married, rec.precision))],
      ...(rec.ended ? [['Ended', `${esc(fmtDate(rec.ended))}${rec.endedBy ? ` (${esc(rec.endedBy)})` : ''}`]] : []),
    ])}
    ${corr}
    ${section('Endpoints', [relBtn('person', e.a.id, e.a.name, ''),
      relBtn('person', e.b.id, e.b.name, '')])}
    <div class="gl-sect">Sources</div>
    ${citeHTML(rec.citations)}`;
}

// ── empty state: explains the one idea the reader needs

const EMPTY = `
  <div class="gloss-empty">
    <h2>The Gloss</h2>
    <p style="font-size:.92rem">Genealogy and chronology share one vertical axis: <em>y is a year</em>.
    Each person is a lifespan; the gold stretch is a reign. Events sit right of the gutter.
    Because both leaves share the axis, a correlation is a short link across it.</p>
    <ul>
      <li>Click a <strong>lifespan</strong>, an <strong>event</strong>, a <strong>descent line</strong>,
          or a <strong>vermilion correlation</strong> to read it here.</li>
      <li>Every claim carries its source and a verbatim quote. Nothing here is unsourced.</li>
      <li>The chart holds the monarchs, the disputed claimants and the magnates. Select one and
          their kin fan out; <strong>kin</strong> shows all of them at once.</li>
      <li>Drag to pan; scroll or <kbd>+</kbd>/<kbd>−</kbd> to zoom the centuries.</li>
    </ul>
    <p class="u-caps" style="border-top:1px solid var(--rule-faint);padding-top:.5rem">
      ${meta.counts.people} people &middot; ${meta.counts.events} events &middot;
      ${meta.counts.links} correlations</p>
    ${undated.length ? `<p style="font-size:.8rem;color:var(--text-faint)">
      ${undated.length} ${undated.length === 1 ? 'person is' : 'people are'} absent from the chart
      for want of any sourced date: ${undated.map((p) => esc(p.name)).join(', ')}.</p>` : ''}
  </div>`;

/** @returns {string} HTML for the margin panel. */
function glossHTML(kind, id) {
  if (!kind) return EMPTY;
  if (kind === 'person') return personGloss(P.get(id));
  if (kind === 'event') return eventGloss(E.get(id));
  if (kind === 'link') return linkGloss(L.get(id));
  if (kind === 'edge') return edgeGloss(id);
  return EMPTY;
}
// ══════════════════════════ src/select.js ══════════════════════════
/* Selection, focus lighting, and the gloss panel.
 *
 * Selecting is not just a highlight: it changes WHO IS ON SCREEN (kin fan out),
 * which changes lane packing, which moves every x. So the order in `select` is
 * load-bearing — decide visibility, repack, place, and only then centre on the
 * node's NEW position.
 */







const state = { sel: null, hoverKey: null };

/* Everything that should stay lit while one thing is focused: the node itself, the
 * correlations touching it AND their far ends, its family edges, and the events it
 * took part in. Anything not in this set is dimmed, which is what makes a single
 * thread legible in a chart of ~500 marks. */
function relatedSet(kind, id) {
  const lit = new Set([`${kind}:${id}`]);
  const addLinks = (key) => {
    for (const l of linksByNode.get(key) || []) {
      lit.add(`link:${l.id}`);
      lit.add(`${l.from.kind}:${l.from.id}`);
      lit.add(`${l.to.kind}:${l.to.id}`);
      for (const side of [l.from, l.to]) {
        if (side.kind === 'edge') for (const e of edgeEnds(side.id)) lit.add(`person:${e}`);
      }
    }
  };

  if (kind === 'person') {
    const p = P.get(id);
    addLinks(`person:${id}`);
    for (const par of p?.parents || []) {
      lit.add(`person:${par}`);
      lit.add(`edge:${par}--${id}`);
    }
    for (const c of childrenOf.get(id) || []) {
      lit.add(`person:${c}`);
      lit.add(`edge:${id}--${c}`);
    }
    for (const s of p?.spouses || []) {
      if (!P.has(s.id)) continue;
      lit.add(`person:${s.id}`);
      lit.add(`edge:${[id, s.id].sort().join('~')}`);
    }
    for (const eid of eventsByActor.get(id) || []) lit.add(`event:${eid}`);
  } else if (kind === 'event') {
    addLinks(`event:${id}`);
    for (const a of E.get(id)?.actors || []) lit.add(`person:${a}`);
  } else if (kind === 'link') {
    const l = L.get(id);
    if (l) {
      for (const side of [l.from, l.to]) {
        lit.add(`${side.kind}:${side.id}`);
        if (side.kind === 'edge') for (const e of edgeEnds(side.id)) lit.add(`person:${e}`);
      }
    }
  } else if (kind === 'edge') {
    addLinks(`edge:${id}`);
    for (const e of edgeEnds(id)) lit.add(`person:${e}`);
  }
  return lit;
}

function paint() {
  const key = state.sel ? `${state.sel.kind}:${state.sel.id}` : state.hoverKey;
  svg.classList.toggle('has-focus', !!key);
  // split on the FIRST colon only — ids contain hyphens but never colons
  const lit = key ? relatedSet(key.slice(0, key.indexOf(':')), key.slice(key.indexOf(':') + 1)) : null;

  const mark = (map, prefix, els) => {
    for (const [id, n] of map) {
      const on = lit ? lit.has(`${prefix}:${id}`) : false;
      for (const e of els(n)) {
        if (!e) continue;
        e.classList.toggle('lit', on);
        e.classList.toggle('dimmable', !on);
      }
    }
  };
  mark(nodes.person, 'person', (n) => [n.life, n.reign, n.claim, n.label]);
  mark(nodes.event, 'event', (n) => [n.dot, n.label, n.leader, n.span]);
  mark(nodes.link, 'link', (n) => [n.path]);
  mark(nodes.edge, 'edge', (n) => [n.path]);
  succPath.classList.toggle('dimmable', !!lit);
}

/** Recompute visibility -> lanes -> geometry. Call after anything that changes who
 *  is on screen. */
function refit() {
  vis.ids = computeVisible(state.sel);
  relayout(vis.ids);
  position();
}

function centerOn(kind, id) {
  let y = null, x = null;
  if (kind === 'person') {
    const p = P.get(id);
    if (p && !p._undated) { y = yPx((p._y0 + p._y1) / 2); x = p._x; }
  } else if (kind === 'event') {
    const e = E.get(id);
    if (e) { y = yPx(frac(e.date)); x = EVT_X; }
  } else if (kind === 'edge') {
    const e = edgeById.get(id);
    if (e) {
      y = yPx(e.y);
      x = e.kind === 'pc' ? (e.parent._x + e.child._x) / 2 : (e.a._x + e.b._x) / 2;
    }
  }
  if (y == null) return;

  const w = stage.clientWidth, h = stage.clientHeight;
  view.ty = h / 2 - y;
  // Only nudge sideways if the node landed outside the readable band — otherwise
  // selecting anything would yank the whole chart across.
  const sx = x + view.tx;
  const lo = AXIS_W + 70, hi = w - EVT_LABEL_ROOM - 30;
  if (sx < lo) view.tx += lo - sx;
  else if (sx > hi) view.tx -= sx - hi;
  clampPanHere();
  applyTransform();
}

function clampPanHere() {
  clampPan(stage.clientWidth, stage.clientHeight, EVT_LABEL_X, EVT_LABEL_ROOM);
}

function select(kind, id, opts = {}) {
  state.sel = { kind, id };
  state.hoverKey = null;
  refit();
  paint();
  glossEl.innerHTML = glossHTML(kind, id);
  glossEl.scrollTop = 0;
  glossEl.hidden = false;
  if (opts.center !== false) centerOn(kind, id);
}

function deselect() {
  state.sel = null;
  state.hoverKey = null;
  refit();
  paint();
  glossEl.innerHTML = glossHTML(null);
}

function hover(kind, id) {
  if (state.sel) return;   // a live selection outranks a passing cursor
  state.hoverKey = kind ? `${kind}:${id}` : null;
  paint();
}
// ══════════════════════════ src/controls.js ══════════════════════════
/* Input: pan, zoom, search, keyboard, and the gloss's delegated clicks. */







const INTERACTIVE = '.person-hit, .evt-dot, .evt-label, .corr-hit, .edge-hit';

// ── gloss: one delegated handler for every cross-reference button
glossEl.addEventListener('click', (ev) => {
  if (ev.target.closest('[data-close]')) { deselect(); return; }
  const b = ev.target.closest('button[data-kind]');
  if (b) select(b.dataset.kind, b.dataset.id);
});

// ── drag to pan
let drag = null;
stage.addEventListener('pointerdown', (ev) => {
  if (ev.target.closest(INTERACTIVE)) return;
  drag = { x: ev.clientX, y: ev.clientY, tx: view.tx, ty: view.ty, moved: false };
  stage.classList.add('dragging');
  stage.setPointerCapture(ev.pointerId);
});
stage.addEventListener('pointermove', (ev) => {
  if (!drag) return;
  view.tx = drag.tx + (ev.clientX - drag.x);
  view.ty = drag.ty + (ev.clientY - drag.y);
  if (Math.abs(ev.clientX - drag.x) + Math.abs(ev.clientY - drag.y) > 3) drag.moved = true;
  clampPanHere();
  applyTransform();   // pan is a pure translate, so no geometry recompute
});
stage.addEventListener('pointerup', (ev) => {
  const wasDrag = drag?.moved;
  drag = null;
  stage.classList.remove('dragging');
  // A click on empty vellum clears the selection; the end of a drag must not.
  if (!wasDrag && !ev.target.closest(INTERACTIVE)) deselect();
});
stage.addEventListener('pointercancel', () => {
  drag = null;
  stage.classList.remove('dragging');
});

// ── zoom
let raf = null;
function zoomAt(factor, cy) {
  const before = (cy - view.ty) / view.scale;   // year under the cursor
  view.scale = Math.min(MAX_SCALE, Math.max(MIN_SCALE, view.scale * factor));
  view.ty = cy - before * view.scale;           // keep that year under the cursor
  clampPanHere();
  if (raf) return;
  raf = requestAnimationFrame(() => { raf = null; position(); paint(); });
}

stage.addEventListener('wheel', (ev) => {
  ev.preventDefault();
  const r = stage.getBoundingClientRect();
  zoomAt(Math.pow(0.999, ev.deltaY), ev.clientY - r.top);
}, { passive: false });

// ── buttons
const btn = (id) => document.getElementById(id);

btn('zoom-in').addEventListener('click', () => zoomAt(1.35, stage.clientHeight / 2));
btn('zoom-out').addEventListener('click', () => zoomAt(1 / 1.35, stage.clientHeight / 2));
btn('reset').addEventListener('click', () => { deselect(); fit(); });

const kinBtn = btn('kin');
kinBtn.addEventListener('click', () => {
  vis.showAllKin = !vis.showAllKin;
  kinBtn.setAttribute('aria-pressed', String(vis.showAllKin));
  kinBtn.textContent = vis.showAllKin ? 'all kin' : 'kin';
  refit();
  paint();
  clampPanHere();
  applyTransform();
});

// ── search
const search = btn('search');
const results = btn('results');
search.addEventListener('input', () => {
  const q = search.value.trim().toLowerCase();
  results.innerHTML = '';
  if (q.length < 2) { results.hidden = true; return; }
  const hits = [
    ...people.filter((p) => p.name.toLowerCase().includes(q))
      .map((p) => ({ kind: 'person', id: p.id, label: p.name })),
    ...events.filter((e) => e.title.toLowerCase().includes(q))
      .map((e) => ({ kind: 'event', id: e.id, label: `${e.title} (${yearOf(e.date)})` })),
  ].slice(0, 10);
  results.hidden = !hits.length;
  for (const h of hits) {
    const o = document.createElement('option');
    o.value = h.label;
    o.dataset.kind = h.kind;
    o.dataset.id = h.id;
    results.appendChild(o);
  }
});
search.addEventListener('change', () => {
  const o = [...results.options].find((o) => o.value === search.value);
  if (!o) return;
  // Searching for someone hidden by the kin filter must still find them.
  if (o.dataset.kind === 'person' && !vis.ids.has(o.dataset.id)) {
    vis.showAllKin = true;
    kinBtn.setAttribute('aria-pressed', 'true');
    kinBtn.textContent = 'all kin';
  }
  select(o.dataset.kind, o.dataset.id);
  search.value = '';
  results.hidden = true;
});

// ── keyboard
document.addEventListener('keydown', (ev) => {
  if (ev.target.tagName === 'INPUT') {
    if (ev.key === 'Escape') ev.target.blur();
    return;
  }
  if (ev.key === 'Escape') deselect();
  if (ev.key === '+' || ev.key === '=') zoomAt(1.35, stage.clientHeight / 2);
  if (ev.key === '-') zoomAt(1 / 1.35, stage.clientHeight / 2);
  const step = 80;
  const pan = { ArrowDown: [0, -step], ArrowUp: [0, step], ArrowLeft: [step, 0], ArrowRight: [-step, 0] }[ev.key];
  if (pan) {
    ev.preventDefault();
    view.tx += pan[0];
    view.ty += pan[1];
    clampPanHere();
    applyTransform();
  }
});

/** Fit the whole span, and park the gutter so the tree fills the left while the
 *  event rail and its labels stay clear of the gloss. */
function fit() {
  const h = stage.clientHeight, w = stage.clientWidth;
  view.scale = Math.max(MIN_SCALE, (h - 90) / Math.max(1, YEAR_MAX - YEAR_MIN));
  refit();
  view.ty = 50;
  view.tx = w * 0.62;
  clampPanHere();
  applyTransform();
  paint();
}
// ══════════════════════════ src/main.js ══════════════════════════
/* Entry point.
 *
 * Module order below is the dependency order the bundler relies on:
 *   dates -> config -> model -> layout -> scene -> position -> gloss -> select -> controls
 * Nothing above imports anything below it, so the graph is acyclic. gloss.js is pure
 * HTML generation precisely so it does not need select.js back.
 */




function boot() {
  if (!window.DATASET) {
    document.getElementById('gloss').textContent = 'No dataset — run build/merge.py.';
    return;
  }
  buildScene(select, hover);
  deselect();   // paints the empty gloss and lights nothing
  fit();

  // The axis rules span the viewport, and lane packing does not depend on width —
  // so a resize needs geometry rewritten but no relayout.
  new ResizeObserver(() => {
    position();
    clampPanHere();
    applyTransform();
  }).observe(stage);
}

boot();
})();</script>
